言此利害甚詳而明必曾與執事熟論况執事越人也想前已洞達於胸中君子懷濟民利物之志每恨不得行耳然則解斯人之倒懸顧不在今日乎橐愚意欲望執事斷以不疑除鑑湖外諸縣湖田悉罷之以便民誠不資之利也然儻俟奏報則湖田皆在四月上旬插種之後若行罷廢似非人情不廢則失今夏滀水之利故橐必冀左右以權宜即日施行一面具利害聞奏仍上章待罪如四聰嘉納則粒米狼戾之慶可坐而致或俞音尚閟則湖已滀水今歲不得為田足以寬嗷嗷之衆秋間果得一稔則疲氓可蘇盜賊可息人樂其生無思亂之意執事雖以此得罪亦無愧於心矣此事唯在斷而行之雖謀之上客謀之益友愚恐少有肯贊髙明以必行者執事試召所親信三數人詢之必有二三之論非其智識有不逮也其勢然耳為國計者必曰湖田歲入幾萬斛正今日經費所賴而遽罷之則緩急何以濟為左右計者必曰行在咫尺公為守臣豈可不待奏報而專罷行之事此皆知其一而不知其二也又或以為未必然者亦人情之常橐若非前日親見雖他人以誠相告亦未盡信蓋橐聞湖田之害熟矣向雖在幕府未嘗言及今播種迫期方獻言於左右誠以親究其害耳執事儻以橐之言為信不異身臨而目覩也恐或以為湖田行之纍年矣縱不便於民未應疾苦若此其甚豈可未聞於朝一旦驟欲罷廢待報而行未為晚也橐謂此特拘攣守常者之言非惻怛愛民者之言也吾民困苦極矣前此怨嗟呌號為其父母者恬不聞知流害滋深以至今日今執事將自比於拘攣守常之徒乎抑以世之重自任耶又事有大可慮者頃年雖有豐有凶然富民薄有儲畜兼他邦轉糴可以相補故小民幸免於溝壑今北騎所過之地穀粟皆被焚爇屈指聚落之間有餘糧者無幾且無他邦轉糴之望而官兵支費又將取給於民父子兄弟不相聊矣然猶竭力耕種以覬秋穫雨澤在天不可必也陂湖之與奪在人幸未至於後時可不任其責哉失此機會歲事或虧湖田之租常賦之額兩無所得元元艱食流離道路強者為盜弱者為丐嘯聚弄兵豈不由此執事當自見之知橐不為過論也建炎二年春邑民嘗訴湖田之害於撫諭使者使者下其狀於州縣上虞令陳休錫遂悉罷境內之湖田翟帥以未得朝廷指揮數窘之陳不為變是嵗越境大旱如諸暨新嵊赤地數百里農夫無事於銍艾獨上虞大熟餘姚次之餘姚七鄉通江潮蔭注兼有燭溪湖等數處不可作田不曾廢故亦熟而上虞新興等五鄉被夏蓋湖之利尤為倍收其冬新嵊之民糴於上虞餘姚者屬路不絶向使陳令行之不果則邑民救死不暇况他境乎夫以一縣令尚能為之橐之所望於左右宜如何聞陳令見在會稽敢望呼召訪以利害橐既知利害之詳今或不言橐則有罪遂敢不避僣易仰瀆聽覽不任悚懼更有數項鄙見條具于後此事如蒙采擇須在三月盡文字到諸縣設或遲緩不可過四月初二三也蓋此時湖田插種者尚少兼植利人户須於梅雨前修築堤塘雨作之後難以施工也橐三月十一日舟行湖中詢田夫云已種二十之一至月末可種十之一若罷湖田所插之秧當為棄物興大利不可恤小害也左右果欲施行不可先使衆人知恐刻木得以為市租湖田人有願種者亦有不願者往往相半蓋王仲薿多仰勒等第人租田或插種不及即空納租課如此之類皆不願者緣湖田不罷不敢推還官中年年以為患亦有請數畝為名而侵占蔓延至百十畝如此之類皆願種者此湖之所以盡為田也前此纍有論訴官中差人打量只是為刻木及牙人乞覔租課只仍元額未嘗增也擅湖利者皆鄉村豪強之人中間上司體量利害此輩行賄至千餘緡今來或罷田當有訴牒紛然並至必以已種為詞亦有乞俟收成罷廢者此乃緩官中行遣至期官吏移易又復寢矣惟在台嚴少加懲戒毋為浮言所惑幸甚似聞鑑湖所入居一郡湖田課額之半可望台旨令案吏具數亦可簽帖稟聞朝廷若有鑑湖田止減其半而民田免旱涸常賦無虧減亦朝廷所樂聞也上虞陂湖之為田者共一十四所共管納租米四千餘石其西溪湖等十三所共納二千餘石而夏蓋湖獨管納二千餘石可以見夏蓋湖之廣濶係上虞餘姚兩縣六鄉二萬餘户植利所繫非輕蓋六鄉皆邉海彌望盡是平陸非如衢婺諸郡間有池塘可以蔭注自興湖田無歲不旱大旱之歲至檢放秋米一萬餘石逮建炎二年陳令罷湖田獨此一鄉無一户訴旱其利害甚明前年陳令為新昌丞橐備聞其語恐台意以謂方朝廷多故又總鄉邦帥權慮事涉太專未欲盡罷不識可先罷夏蓋湖田否蓋其他諸湖比之為狹縱失其利未為大害雖州郡行遣不當分彼此然一時權宜救民之所甚急於理無礙此亦侯雍齒之意民間曉然皆知惠之將及我也此已涉第二義恐思其上者而不得故謾及之此項如蒙垂聽須當出榜述夏蓋湖利害及先罷之因并言已一面具奏付下植利張挂仍令本縣告示佃户即時罷種若止行下本縣而不出榜恐刻木特遲其事必致後時榜文既到必不敢匿橐今所言儻不蒙鄙斥更當密詢利害條具呈以備回鑾時論列橐恐安撫龍圖為事已迫期不暇草奏敢乞只以橐今所言録白繳進其間不急之語乞賜刪去茍利於民橐雖死不恨梨湖在縣西北二十里唐縣令金堯恭開置皮湖在縣西北三十里廟門湖在縣北一十二里周三里潛湖在縣西南四十二里並湖民多潛姓故以名髙公湖在縣西南一十二里周二百餘畝隱嶺湖在縣西北二十五里周二百畝小楂湖在縣東北一十五里周七里湖與餘姚縣雲樓鄉接蓋此湖雖屬縣而灌溉之利乃及於雲樓鄉以水勢東傾而就下也湖今溉田一十六頃四十畝光嚴湖在縣西南四十二里孔家湖在縣西南四十二里章汀湖在縣西南四十二里周三百六十畝髙境湖在縣西南四十