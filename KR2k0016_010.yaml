body:
  text: 會稽志卷十宋施宿等撰水府城府河在城南二里屬會稽縣河東南流經府市北出定清門入運河又西北流由蕭山達于浙江簞醪河在府西二百步一名投醪河舊經云越王勾踐投醪之所或又名勞去聲師澤水經越王栖會稽有酒投江民飲其流戰氣百倍所投醪即浙江也華安仁考古云句踐謀霸拊存國人與共甘苦師行之日有獻壺漿跪受之覆流水上士卒承流而飲之人百其勇一戰而有吳國也唐太和六年觀察使陸亘重浚華安仁云府東大河也然俗以府學前西河為是或又有新河滙水為之舊經云投醪即浙江蓋自府河東西諸流皆達于浙江也運河在府西一里屬山隂縣自會稽東流縣界五十餘里入蕭山縣舊經云晉司徒賀循臨郡鑿此以溉田新河在府城西北二里唐元和十年觀察使孟簡所浚會稽縣海在縣北二十里海水北流入嘉興府海鹽縣史記秦始皇上會稽望于南海二世並海南至會稽西漢地理志南江從會稽吳縣南入海中江從丹陽蕪湖縣西東至會稽陽羡東入海北江從會稽毗陵縣北東入海蓋漢會稽地廣綿亘數千里凡三江皆繇此以達于海也水經云江水竒分謂之三江口又東會稽東入于海又云浙江水出三天子都北過餘杭東入于海三記之説不同至江流入于海則古今論者不能易也釋名云海者晦也主引穢濁其水黑而晦博物志云天地四方皆海水相通地在其中蓋無幾四海之內闕復有海也初學記云凡四海通謂之禆海其外復有大瀛海環之曰百谷王一日朝夕池一日天池一云大壑海神曰海若海中山曰島海中洲曰嶼水經餘姚故城背巨海王粲海賦云翼驚風而長驅集會稽而一睍隋書志開皇十四年詔東海于會稽縣界並海立祠取側近巫一人主灑掃曹娥江在縣東南七十里源出上虞縣經縣界四十里北入海會稽典録云曹娥上虞人父盱漢安二年迎伍君神泝濤而上為水所溺娥年十四自投江而死江因娥得名也世説晉陽秋曹娥父盱溺不得尸娥投衣於江祝曰父在此衣當沉旬有七日衣偶沉娥遂投江而死縣長度尚悲憐其義為之葬且命邯鄲子禮作碑蔡雍聞之來觀夜暗以手模其文而讀之題云黃絹幼婦外孫韲臼二百年後碑當墮當墮不墮逢王叵魏武過曹娥碑下讀碑隂八字謂楊修曰解否答曰解魏武曰卿未可言待我思之行三十里魏武乃曰吾已得之令修别記所知修曰黃絹色絲也幼婦少女也外孫女子也韲臼受辛所謂絶妙好辭魏武亦記之與修同乃嘆曰我才不及卿乃較三十里異苑云蔡雍過吳讀曹娥碑旁作八字魏武見而不能解有婦人浣於汾渚曰第四車乃解既而悟曰禰正平也衡即以離合義解之此婦人即娥靈也二説不同世説亦兩存之廟碑晉夏統曰曹娥父子喪尸後乃俱出國人哀其孝義為歌河女之章潘逍遙題詩云曹娥廟前秋草平曹娥廟裏秋月明扁舟一夜炯無寐近聽潮聲似哭聲若邪溪在縣南二十五里溪北流與鏡湖合越絶云若邪之溪涸而出銅吳越春秋云赤堇之山已合無雲若邪之溪深而莫測戰國䇿云涸若邪而取銅破堇山而取錫溪旁即赤堇山也後漢劉寵為會稽太守去郡若邪父老人齎百錢相送為受一大錢十道志云後人因此名劉寵溪唐徐季海嘗逰溪因歎曰曾子不居勝母之閭吾豈逰若邪之溪遂改為五雲溪李白詩云若邪溪邉採蓮女笑隔荷花共人語李公垂詩云傾國佳人妖艷逺鑿山良冶鑄爐深自注云若邪溪乃西子採蓮歐冶鑄劒之所樵風涇在縣東南二十五里舊經云漢鄭𢎞少時採薪得一遺箭頃之有人覔箭問𢎞何所欲𢎞識其神人也答曰常患若邪溪載薪為難願朝南風暮北風後果然世號樵風水經云鄭𢎞少以清節自居恆躬采伐用貿糧膳每出入溪津常感神風送之慿舟自運無仗楫之勞村人貪藉風勢常依隨往還有淹留者徒輩相謂曰汝不欲及鄭風耶其感致如此宋之問詩云歸舟何慮逺日莫使樵風劉長卿詩云仙客常因一箭贈樵風長到五雲間涇去聲齊祖之鑄浦涇詩云掃拂􅓳蓬出涇來自注越人謂水道為涇鑄浦在縣東南三十里與若邪溪接一名錫浦浦上有橫梁人家聚落歐冶祠齊祖之家山記事云昔歐冶子鑄神劒之所今為里俗所祠沉釀埭在縣南二十五里若邪溪東十道志云鄭𢎞舉送赴洛親友餞於此以錢投水依價量水飲之各醉而去一名沉釀川寰宇記云太尉泉一名沉釀埭按太尉泉即鄭公泉𢎞自飲此水愈疾以埭為泉非也蘇鶚演義云鄭𢎞官京洛未至宿一埭名沉釀𢎞投錢水中勸酬飲盡多酣暢皆得大醉更名為沉釀泉與十道志所載不同浪港在縣東南二十里樵風涇之北天無風亦常有浪港北循山徑一巨石頃嵗里人因開徑得石爐鐵鈐恐為仙人鍊丹之所炭浦在縣東六十里舊經云句踐運炭於此越絶云句踐稱炭聚載從炭瀆出至鍊塘冬因事而名之吳越春秋云吳封地百里於越東至炭瀆纂風浦在縣東六十五里石瀆在縣東四十八里小舜江在縣東南九十里源出浦陽江東北流至錫浦以至于江清苦溪在縣東三十五里一名橫山源出台州寧海北流入縣界溉田三百餘頃了溪在縣東北一十五里源出了山合縣南溪流以入于剡溪舊經云禹疏了溪人方宅土華安仁作趙仲淵傳云安道采真於了水安道戴逵也以了水通剡故云平水在縣東二十五里鏡湖所受三十六源水平水其一也唐元微之撰長慶集序云嘗出逰平水市中見村杖諸童競習詩召問之曰先生教我樂天微之詩也水南有村市橋渡皆以平水名翁洲在縣東舊經云徐偃王居翁洲即此王龜齡賦云翁洲訪偃王之廬槩浦思夫差之封十道志翁洲一名翁山在海中徐偃王所居𨽻慶元范蠡洲舊經云句踐平吳蠡泛五湖後人思之名其洲也山隂縣西江在縣西四十五里源出諸暨縣界五十里西北流入蕭山江闊一里餘湖髙至八尺蘭渚在縣西南二十五里舊經云山隂縣西蘭渚有亭王右軍所置曲水賦詩作序於此水經注云蘭亭一曰蘭上里太守王羲之謝安兄弟數往造焉王廙之移亭在水中晉司空何無忌臨郡起亭於山椒極髙盡眺亭宇雖壞基陛尚存世説以蘭亭敘為臨河序賦詩者二十六人不能賦罰酒者一十六人天章寺碑云羲之謝安謝萬孫綽徐豐之孫統王彬之王凝之王肅之王徽之袁嶠之郤曇王豐之華茂庾友虞説魏滂謝繹庾藴孫嗣曹茂之曹華平桓偉王玄之王藴之王渙之各賦詩合二十六人謝瑰卞迪丘髦王獻之羊模孔熾劉密虞谷勞夷后綿華耆謝藤任擬吕系吕本曹禮詩不成罰三觥合十六人世説以謝藤作謝勝餘杭令作餘姚令何延之蘭亭記云四十一人有許詢支道林晉書列傳又有李充當以碑為正渚旁有曲水清流激湍映帶左右訖今猶然晉王羲之列傳云初渡浙江便有終焉志會稽佳山水名士多居之謝安未仕時亦居焉孫綽李充許詢支遁與羲之同好嘗燕集山隂之蘭亭羊欣筆陳圖云羲之年二十三書蘭亭敘王師乾撰右軍祠堂碑云右軍自內史後峻誓墳塋捐棄龜組曲水蘭亭自為之序黃長睿東觀餘論云永和十年右軍年三十八時已去會稽郡矣何延之蘭亭記云永和九年暮春宦遊山隂修祓禊禮所記右軍出處年嵗皆不同晉書列傳云羲之初渡浙江有終焉志會稽佳山水名士多居之嘗與同志燕集山隂之蘭亭為之序以申其志信如列傳則蘭亭之逰乃右軍隱居之日也按通鑑云永和四年殷浩以江州刺史王羲之為護軍八年王羲之遺殷浩書諫北伐十年以前會稽太守王述為揚州刺史又晉書列傳羲之自護軍右將軍會稽內史實代王述及述移揚州臨發一别而去後王述檢察會稽郡疲於簡對稱疾去郡於墓前自誓時永和十一年之三月也以此推之嵗在癸丑為永和九年其時為會稽內史無可疑者晉傳既脫略羊欣王師乾輩所記皆舛黃長睿號該洽嘗跋右軍破范帖云永和十二年去會稽郡巳嵗餘此語良是至東觀餘論則自相抵捂有不可解列傳又言右軍享夀五十有九按右軍生於惠帝大安二年癸亥沒於穆帝五年辛酉以此推之右軍蘭亭之逰時年五十有一當是時謝太傅隱居東山遂同此集碑署琅琊王友謝安是也葛常之韻語云一死生為虛誕齊彭殤為妄作蓋用謝安一時之語或者又疑羲之傳為會稽內史日與尚書僕射謝安書云云按謝安傳以升平四年為桓宣武司馬後十餘年始當國為僕射而永和八年為尚書僕射者謝尚也以尚為安乃列傳之誤上淺溪在縣西五十二里餘支溪在縣西四十七里舊經云溪有二源一溫一涼滙於此其溫涼不雜其實亦鏡湖之别流也故名餘支官瀆在縣西北一十里越絶云句踐工官也射瀆在縣南五里舊經云越陳音教射之所越絶云射浦句踐所教習兵處也射率陳音死葬浦西五里今人或稱射浦闕縣東八十里水經麻溪溪之下為潭闕縣西南三十里法華山唐李公垂詩云十峰排碧落雙澗合清漣自注法華寺前後有十峰回繞雙澗合流于良史宿天衣詩云掬水月在手弄花香滿衣掬水疑即謂此澗水也曾文清詩亦及此見天衣寺紀家滙在縣西七十里乾道八年諸暨縣陳諸開浚湖道水利得旨浚紀家滙導蕭山新江以達諸暨知蕭山縣謝暉言山隂沿江皆山也諸暨蕭山地勢低下小江舊以導諸暨之水也今浚新江其底石堅不可鑿徒費民力紀家滙一開則上流衝突而蕭山縣之桃源苧羅許賢新義來蘇崇化昭明凡七鄉背披巨浸力疏其不便上之議遂寢三邑民皆感其惠馮䛬為作碑嵊縣剡溪在縣南一百五十步溪有二源一出天台一出婺之武義西南流至東陽入縣一百四十里東北流入上虞縣界以達于江晉王子猷居山隂夜雪初霽四望皓然獨酌酒咏左思招隱詩忽憶戴逵時在剡便乘小舟詣之造門不前而返曰本乘興而行興盡而返何必見安道耶今人稱為戴溪又曰雪溪皆以此邑中亦有戴溪亭云李太白詩云試問剡溪道東南指越鄉舟從廣陵去水入會稽長杜子美壯逰云剡溪藴秀異又曰歸帆拂天姥皆謂此地也嶀浦在縣西南四十五里水經云嶀山成工嶠以北有嶀浦浦口有廟甚靈行人及樵採者皆先致敬若相盜竊必為蛇虎所傷浦北即嶀山與嵊山接二山雖異縣而峰嶺相連潘逍遙晚泊詩云曉泛剡溪水晚見剡溪山漁唱深潭上鳥啼髙樹間嶀浦與石欄干相連皆溪山竒絶之地紹興中有方士李季憩道傍遇異人自石欄干下揖季曰君來何為季曰秦太師遣往桐柏設醮請福其人太息曰秦今死矣張浚劉錡皆當起為將相秦豈得存耶季大駭亟去比至天台則秦之薨問至矣蓋天下名山宜有神仙往來云闕縣東北五十里諸暨縣闕縣西七十里源出富陽經縣永泰鄉入于江闕縣北十九里吳王闔閭弟之子夫槩所封因以為名浣江在縣東南一里俗傳西子浣沙之所一名浣浦又名浣渚元微之詩云浣浦逢新艷蘭亭詫舊題五泄溪在縣西五十里輿地志云山峻而有五級故以為名下泄垂三十丈廣十丈中三泄不可踰度登他山望始見之上泄垂百餘丈聲如震霆水經云浦陽浙江東徑諸暨縣與泄溪合溪廣數丈中道有兩髙山夾溪造雲壁立凡有三泄水勢髙急聲震水外上泄髙二百餘丈望若雲垂此是瀑布土人號為泄爾嘉祐中刁景純詩云西源窮底到東源直注層崖五磴泉石瀆溪在縣西南六十二里上下源各有二石井相聫合流如瀆故以為名上桑溪在縣東四十里黃壇溪在縣東北五十里源出黃壇嶺烏石溪在縣北四十八里溪多烏石故名開化溪在縣南二里瀨溪在縣南六十里一名堰溪雙橋溪在縣東北十四里源出烏石溪北流入髙湖櫟溪在縣東北四十里源出白崖山北流入祕浦湖干溪在縣東北六十二里以吳干吉故居於此故名俗呼乾溪非也靈泉溪在縣西二十五里源出范蠡潭山其流溉民田甚廣他鄉多求榖種於此俗呼稻種泉山遐浦在縣東八十里舊經云山遐斷髙公湖為浦取漁所集千艘後人思之號山遐浦按遐字彥林建元初為餘姚長為官出豪強所藏二千户境內肅然衆共驅之令不得安席後至東陽太守出晉書本傳蕭山縣浙江在縣西二十五里源自西東來由富陽經縣一百五十里轉北流入臨安府鹽官縣出海經云浙江西北入海注云今錢塘有浙江也説文云别流為汜至山隂會為浙江顧野王地志云浙江發源東陽新安不與岷山接至錢塘江有浙山正居江中潮水衝山即回入海故曰浙江亦曰定山是也漢地志云浙江水出丹陽黟縣南蠻中北徑其縣南又云穀水自太末東北至錢塘入浙江史記秦始皇三十六年臨浙江水波惡乃從狹中渡蓋捨此而渡餘杭矣莊子云浙河之水水經漸江水出三天子都即浙江也唐盧肇海潮賦云浙者折也蓋取其潮屈折而倒流也浦陽江在縣東源出婺州浦江北流一百二十里入諸暨縣溪又東北流由峽山直入臨浦􆀖以至海俗名小江一名錢清江酈道元水經注云浦陽江導源烏傷縣東徑諸暨與泄溪合東回北轉徑剡縣縣開東門向江江廣二百餘步又云柯水東北徑永興東與浙江合謂之浦陽江引漢地里志蕭山縣潘水所出又疑浦陽江之别名自外無水以應之謝惠連西陵遇風詩云昨發浦陽汭今宿浙江湄韻譜云水之相入為汭又云水北曰汭自浦陽江北流入浙江二水參錯其名曰汭宜矣泄溪屬諸暨縣所謂東回北轉蓋由山隂會稽滙曹娥江由上虞以入剡溪也道元又云浦陽江東北徑始寧縣嶀山其北即嶀浦又云東徑上虞縣南至王莽之會稽地名虞賓又云餘暨之南餘姚西北浙江與浦陽江同歸海又引闞駰十三州志云江水至會稽與浙江合自臨浦南通浦陽江其説不一與二文自相抵牾蓋始寧今上虞縣嶀浦嶀山皆屬嵊縣虞賓屬上虞又接餘姚江臨平湖在浙江以西其源殊别餘暨即諸暨距餘姚二百餘里謂餘姚西北浙江入海非也蓋此江東北流自山隂會稽泝曹娥江始至上虞餘姚嵊縣謂東回北轉入上虞嵊縣斯可矣道元之論又曰東南地卑其流所湊故川舊瀆難以取悉此未必一皆得其實蓋道元未嘗身履浙江以東故其誤如此後人因襲遂認此江為上虞江其失則寖邈矣漢志云蕭山縣潘水所出水經云柯水東北徑永興東與浙江合今山隂縣二十里有柯橋其下為柯水然則浦陽江與柯水一源由蕭山以達于浙江古今蓋不易也十道志婺州浦江一名浦陽江蓋江之導源實出於此禹貢三江既入震澤底定韋昭云三江者松江錢塘江浦陽江蓋江之名尚矣越絶云浦陽者越王句踐兵敗衆悶於此故曰浦陽去山隂五十里唐書志越州會稽縣有府一曰浦陽今土人以錢清為古浦陽也孔延之松英集云越之通道有四西接錢塘曰浙江城西四十五里曰錢清江州之東七十里曰曹娥江餘姚縣曰姚江舊經云會稽縣東南九十里為小江津然則錢清江小江津皆浦陽江之别名也今以地里考之自浦陽江至曹娥百餘里酈道元誤以曹娥為浦陽江豈當時曹娥江之名未著亦名浦陽耶或陵谷遷變舊流不循其故道耶十道志云浦陽江有琵琶圻岸有曹娥碑信此則曹娥江即浦陽爾五臣文選注云浦陽汭經上虞至會稽山隂為浙江謝康樂山居賦注云浦陽江自嶀山東北徑太康湖其説皆誤蓋自道元有東徑嵊縣又徑上虞之説有以誤之爾梁禇淡之為會稽太守孫法亮叛淡之遣隊主陳願議曹虞道納二軍過浦陽江與賊戰柯亭破之漁浦在縣西三十里十道志云漁浦舜漁處也梁丘希範旦發漁浦詩云漁潭霧未開赤亭風已揚謝靈運詩云宵濟漁浦潭錢起詩云漁浦浪花搖素壁西陵水色入秋窗祖瀆水經云浙江又東徑祖塘謂之祖瀆昔太守王朗拒孫䇿數戰不利孫靜果説䇿曰朗負阻守難可卒拔祖瀆是要道也若從此出攻其無備破之必矣䇿從之破朗於固陵餘姚縣餘姚江在縣南一十步源出上虞縣通明堰東流十餘里經縣江東入於海江闊四十丈潮上下二百餘里雖通海而水不醎菁江在縣四十五里源出四明山北流匯餘姚江以達菁江王荆公題詩云丹樓碧閣無處所惟有江山照眼明湖塘浦在縣東西十里水經云餘姚水東徑穴湖塘水沃其一縣並為良疇上虞縣上虞江在縣西二十八里源出剡縣東北流入江分二道一出曹娥江一自龍山下出舜江又北流至三江口入于海初學記云凡江帶郡縣以為名則有會稽江山隂江上虞江是也運河在縣南二百二十步源出七里湖漁門浦自皂李湖皆滙于河西抵梁湖堰東之通堰各三十五里通明江在縣東十里源出餘姚江其西自運河入于江有堰曰通明堰蔡舍人肇明州謝上表云三江重復百怪垂涎七堰相望萬牛回首蓋自杭經越至明凡三絶江七度堰此其一云五夫河在縣北三十五里源出夏蓋湖曰驛亭堰凡三十里東流入餘姚縣之菁江夏湖溪在縣東南二十五里源出黑龍潭冬夏不竭由下管寶泉至浦口入溪流注五十餘里李家溪在縣南六十里源出白龍潭由上山鄉寶泉浦口入溪杜浦在縣西南四十里梁杜京産之居也按京産傳在始寧東山開舍授學州辟從事稱疾去自浦之東山一里許其山舍下臨此浦也顧墅灘在縣西南四十里杜京産與同郡顧歡同契在東山開舍授學世傳顧歡家墅於此一作故墅石溪在縣南三十五里思湖浦在縣西北六十里東通海西抵錢塘其對岸即海鹽縣俗呼為風門海口飲牛溪在縣南五十里白道猷巖下石有繫牛足迹溪以此名邑人江公亮詩云好是道人巖畔月夜深清照飲牛溪姚家浦在縣西北六十里一名謝浦陳家浦在縣西北六十里槎浦在縣西六十里達浦在縣西北