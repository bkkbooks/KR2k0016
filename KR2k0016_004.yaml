body:
  text: 會稽志卷四宋施宿等撰軍營唐太宗時於府兵外置北門四軍則募兵也其後募兵寖盛為萬騎為左右神册天子不可自將故命中官握之謂之北司北司始盛不可制而府衛為南衙兵寖廢不備朱梁懲唐北司之弊乃取禁旅天子自將之所謂侍衛馬部軍是矣周世宗又謂之殿前軍蓋亦侍衛之比而加精鋭然當時藩鎮亦皆募兵倚以跋扈雖世宗不能盡制也祖宗有天下因周之制又盡收天下雄徑士卒列營京畿足以坐制四方矣又謂郡亦不可無備則為之制其别有禁軍廂軍禁軍蓋因梁周之名而廂軍則因藩鎮舊名廂者乃當時分軍之名今內則龍神衛四廂及外郡有第幾廂之類皆部分耳禁軍猶曰京師之兵而廂軍則郡國所有雖衣糧有差降然皆選擇及歷嵗久禁廂軍皆郡自募始猶自京師分遣壯卒為募士之準謂之兵樣繼易以木梃木䇿而兵樣不至矣於是禁軍則教閲以備征戍廂軍給役而已禁軍有退惰者降為廂軍謂之落廂自熙寧後置將官而禁軍又有係將不係將之别則禁軍亦分為二矣初梁太祖令諸軍悉黥面為細字各識軍號五代至本朝因之方募時先度人材次閲馳躍次試瞻視初舉手指問之而已其後又刻木作手加白堊舉以試之然後黵面而給衣屨緡錢謂之招刺利物至今皆不改若或惜費罷募使軍士子弟失職或至於溢額冗濫者皆非也禁軍雄節係將第一指揮營在第五廂秦望門熙寧二年置額五百人威捷係將第二指揮營在第一廂都亭橋大觀二年置額五百人威果係將第二十二指揮營在第四廂鯉魚橋東宣和五年十一月置先是四年二月詔增置戌將至是下江浙諸州各置威果全捷各兩指揮𨽻侍衛步軍司太守翟汝文置營於此額五百人威果係將第二十三指揮在第三廂水溝坊南宣和五年置額五百人全捷係將第四指揮營在第五廂秦望門宣和五年十一月置節鎮兩指揮餘州一指揮處以威果全捷為名餘州並以威果為名𨽻殿前司額五百人全捷係將第五指揮在第三廂水溝坊南額五百人威果不係將五十四指揮在第五廂卧龍坊宣和五年置額五百人全捷不係將十三指揮在第五廂秦望門宣和五年置額五百人防守步軍司指揮在欑宫禁圍外紹興二年以後置永祐陵二百五十五人永思陵八十五人永阜陵八十五人永崇陵七十八人廂軍崇節第七指揮在第五廂秦望門熙寧二年置額五百人崇節第八指揮在第一廂錢武肅廟東熙寧二年置額五百人壯城指揮在第一廂北善法寺側熙寧元年詔江浙兵官選少壯廂軍堪習武藝人充依例教閲量留重役以備使令宣和格壯城指揮帥府三百人節鎮二百人餘州一百人額四百人牢城寧節第二指揮在第一廂馬坊橋東熙寧四年詔攽廂軍名額自騎射至牢城二百三十三色額二百五十人屯駐營在第五廂附威果營先係海州兵養老紹興初屯駐額二十人作院指揮熙寧六年置剩員指揮堰營都泗堰營在會稽縣東額二十五人曹娥堰營在會稽縣東南梁湖堰營在上虞縣西額五十人錢清南堰營在山隂縣西錢清北堰營在蕭山縣東額五十人打竹索營在上虞縣東通明堰營在上虞縣東額二十五人西興捍江營在蕭山縣西額二百人土軍三江寨屬山隂縣額一百八十二人曹娥寨屬會稽縣額八十人龕山寨屬蕭山縣額一百三十二人西興寨屬蕭山縣額一百三十二人西興都巡寨屬蕭山縣額一百三十八人魚浦寨屬蕭山縣額四十八人廟山寨屬餘姚縣額一百人三山寨屬餘姚縣額一百人眉山寨屬餘姚縣額二百人長樂寨屬嵊縣額二百人管界寨屬諸暨縣額一百人新林寨屬蕭山縣額一百人紫巖寨屬諸暨縣額一百人弓手會稽縣額九十五人山隂縣額九十五人嵊縣額九十八人諸暨縣額一百一十三人蕭山縣額七十人餘姚縣額一百人上虞縣額七十人新昌縣額六十七人倉苗米倉在府衙東二百步如坻倉在府衙東北一里熙寧十年程給事師孟建秦少遊書榜今猶存焉淳熙四年修支鹽倉在府衙東二里常平倉在府衙東二百步夏麥倉在府衙南二百步受納糯米倉在西門外二里庫務場局等都稅務在府衙東一里九十步都酒務在府衙南一百二步比較務在府衙南一百步和旨庫在府衙東二百六十步激賞庫在府衙東二里十步公使庫在府衙軍資庫在府衙甲仗庫在府衙架閣庫在府衙設廳北常平庫在府衙西茶鹽庫經總制庫在通判北廳移用庫在通判北廳五分錢庫在通判北廳激賞錢庫在府衙西回易庫在府城東北醋庫在府城東造袋局在府東北提舉司惠民局在府東湯浦紙局新林紙局楓橋紙局三界紙局合同場在闕都物料場在府衙南子城內受納稅場在府衙內抽解竹木場在府橋收糴糯米場在迎恩門外受給場在府城東三十五里排岸司在城南卧龍坊浦陽府在城西四十里唐書云會稽有府一曰浦陽蓋唐之兵府也今廢都作院在府衙南省馬上院在府衙西省馬下院在府衙西潛火隊在府衙西衢巷府城𨽻會稽山隂越城之中多古坊曲圖經所載間可考知曰千秋坊以千秋亭名蔡雍得椽竹以為笛曰禮遜坊以陳囂遜地名曰解愠坊以王右軍書扇名曰龍華坊以古龍華寺名按江揔修心賦梁太清二年嘗避地此曰玄真坊以張志和所居名按本傳後又名回軒巷曰澄波坊以方平池名經行其間宛然猶故處也曰卧龍以山名曰錦鱗以橋名曰照水以湖名曰都賜以埭名曰義井以井名曰天長以觀名曰賢良以齊唐名曰富民曰觀仁曰清道曰德政此皆舊坊至今存者其他更易蓋漫不可知矣按圖經𨽻會稽坊二十𨽻山隂坊十有二厥後增益視舊三倍不可勝記乃若甘露坊耆舊云古甘滂巷是鍾離坊以鍾離意所居名竹園坊以陳囂竹園名筆飛坊以江淹所居名雖復後出於古有取焉若日池坊月池坊池皆錢武肅王所鑿故坊以池名因吳越而重也名之美者曰秦望以門名曰蕙蘭以橋名曰杏花以寺名曰花市以市名淳熙乙未郡人詹君騤既冠多士德政坊始更名狀元坊後二十一年而莫君子純繼之於是復立狀元坊矣剡縣一十坊皆如舊經進德益詠禮義清河嘉會兆慶集賢通安豐安齊禮諸暨縣二十坊八如舊經九更名三創立招賢西施以西子所遊處名范鄰以近范蠡壇名永寧臨津永夀安仁勸農舊製錦集貨華纓浣溪綵織道山台輔使星芝山更相門神秀狀元創蕭山縣三坊皆如舊經清風以許詢宅名招賢以江淹宅名並見寰宇記通闠餘姚縣一十坊九如舊經一更名履仁清和待士崇禮訓俗通德太平時清永寧舊雙桂更上虞縣一十三坊皆如舊經尚德尊賢照位崇義恤孤純孝好學屬文農務廉賈思仁重義習古新昌縣四坊皆如舊經康樂以謝靈運所遊止名霸越千秋太平凡外諸縣坊曲所以得名不能盡舉若諸暨之西施范鄰蕭山之招賢清風新昌之康樂蓋古迹尤著云館驛府城蓬萊館在卧龍山之左史魏公建蓋府東亭舊址髙宗皇帝巡幸嘗泊御舟於此吕頥浩奏事嘗曰臣等昨夕宿提刑司在御舟旁數步即謂此也東問津亭北通川亭皆臨府東大河即古簟膠河是水光映發望之如圖畫舟車既屆必有次舍焉而實一州佳觀也子城東門有豐宜館今為觀察判官署城西迎恩門東五雲門皆有亭以送迎御香則繇陵寢寓是也按圖經唐觀察使李紳嘗於府東建候軒亭今廢襲明子葆光録稱皮光業微時夢亭上偶人皆列拜覺而自負後果知東府事故老云翟忠惠公帥越亭尚亡恙公出有風骨其繖置闌干上或謂亭神實為祟也公怒即日撤毁之今市人猶稱軒亭府東北有安軺驛是為軺亭亦廢諸縣會稽縣有東城驛在縣東六十里今廢館二以待朝陵官屬在縣東三十五里有上馬亭山隂縣有仁風驛在縣北三里柯橋驛在縣西二十五里錢清驛在縣西北五十里剡縣有訪戴驛在縣東南五十五步戴溪亭在縣南二百十步諸暨縣有待賓驛在縣西南六十步今廢興樂驛在縣南五十里今廢亭濶驛在縣南二十里今廢使華館在縣東百六十步楓橋驛在縣東北五十里蕭山縣有夢筆驛在縣東北百三十步臨川亭在縣西北九十步蕭山館在縣西北百二十步駐旌亭在縣西一十二里日邊驛在縣西一十二里候春亭在縣之東門漁浦驛在縣南三十六里餘姚縣有寧波驛在縣西五十步今廢津亭二在縣北一里上虞縣有金罍驛在縣東二百步池湖驛在縣西南五十里之明亭在縣東一里適越亭在縣西一里新昌縣有南明驛在縣西一百步天媪驛在縣東南五十里諸縣亭驛興廢大略在是其間嵗月非有故實不復具書若戴溪亭夢筆驛一時風流皆可想見也郵置周官行夫掌邦國傳遽注曰若今時乘傳騎驛而使者也乘傳騎驛而使必有頓止之次故傳置驛因皆為次舍之名田儋傳橫至尸鄉廏置張敖傳要之置厠魏相傳客詐止傳文帝二年十一月詔曰太僕見馬遺財足餘皆給傳置之類是也顔師古注云置者置傳驛之所蓋至唐而後謂頓止之次為驛也唐季五代以前猶以民給其役謂之遞夫皇朝建隆二年乃悉以軍士充謂之鋪兵而為之制非法不許輒入驛役鋪兵與法所許而過其數者皆抵罪有急腳遞馬遞步遞三等元豐六年八月始用金字牌牌用朱漆以金飾字靖康元年嘗改用雌黃牌朱字髙宗皇帝中興乃復舊制令急腳遞傳送御前文字尤速於急遞矣蓋放古羽檄之意也稽留尺一罪至配流甚者上其罪能不廢其事亦次第推賞紹興五年諸軍斥堠鋪専承軍書其刑賞亦如之三十二年十一月又放斥堠之法立擺鋪遞軍書與他文書之最急者降此則步遞也而謂之常程然步遞亦有京遞省遞之别如令甲所云文書當遞赴京者因謂之京遞紹興五年有旨諸路機速文書許入尚書省急遞故又因謂之省遞焉今州境屬縣八凡為鋪四十三鋪兵三百八十一人東南接明台婺西達於行在所獄府院在府衙南司理院在府衙南市照水坊市在城東南二百步清道橋市在城西一里大雲橋東市在城南二里屬會稽縣梅市在城西十五里屬山隂縣梅市鄉鄉有梅福里舊經云梅福傳有人見福會稽變姓名為市門卒十道志云即梅福為監門處陸左丞適南亭記梅山少西有里曰梅市即此古廢市在都亭橋南禮遜坊舊經云薊子訓貨藥於此列仙傳云薊子訓齊人賣藥於會稽市時乘青騾往來忽然不見大雲橋西市在城北屬山隂縣龍興寺前市在城北二里旁有市門橋其北街曰市北街寺今廢驛地市在城北二里江橋市在城北五里堰會稽縣曹娥堰在縣東南七十二里唐光啓二年錢鏐破韓公汶於曹娥埭與朱褒戰進屯豐山後埭遂為堰治平中齊祖之撰曹娥重修廨宇記云自陽武之越堤開封之翟橋總為堰者二十七曹娥其一也東郭堰在縣東南三里陶家堰在縣東四十里都泗堰在縣東三里宋何胤至都賜埭去郡三里因曰僕棄人事此埭之遊於今絶矣梁江總言王父昔蒞此邦卜居山隂都賜里都賜今作都泗按江總言王父蒞此邦乃江彪也事見别卷茅洋堰在縣東三十里礬江堰在縣東二十二里俗作凡江政平堰在縣東十五里王家堰在縣東五十里稱浦堰在縣東北三十里杜浦堰在縣東五十五里董家堰在縣東七里嚴浦堰在縣東三十一里瓜山堰在縣東四十二里熙寧中越州檢校會稽山隂共管碶閘水䃮六十一所瓜山堰之一白米堰在縣東六十五里言家堰在縣東三里苦里堰在縣東北五十里新埭堰在縣東七十里夏家堰在縣東四十五里彭家堰在縣東五十二里石堰在縣東五里山隂縣南堰在縣南一里三江門外堰在縣東北七里堰之北有則水牌湖桑堰在縣西十里堰旁有小市居民頗繁白樓堰在縣西四里