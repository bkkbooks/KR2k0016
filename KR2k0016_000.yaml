  text: 欽定四庫全書史部十一
  hash: sha256:5f8ab01fbfc809cc911a707e5aa22577e1ed198056f701795ddffcd84b7bc12f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0016_WYG_000-1a, image: WYG0486/WYG0486-0001a.png}
body:
  text: 會稽志地理類三都會郡縣之屬提要臣等謹案會稽志二十卷宋施宿等撰續志八卷宋張淏撰宿字武子湖州人司諫元之之子嘗知餘姚縣遷紹興府通判淏字清源本開封人僑居婺州官至奉議郎所著雲谷雜記已從永樂大典中裒輯刋行其履貫略見金華志而所作續志序乃自稱僑寓是邦則又嘗卜居會稽矣宋自南渡以後升越州為紹興府其牧守每以宰執重臣領之屹然稱為大藩而圖志未備直龍圖閣沈作賔為守始謀纂輯華文閣待制趙不迹寶文閣學士袁説友等相繼編訂而宿一人實始終其事書成於嘉泰元年陸遊為之序其不稱紹興府志而稱會稽志者用長安河南成都相臺諸志例也其後二十五年淏以事物沿革今昔不同因彚次嘉泰後事作為續編而復於前志內補其遺逸廣其疏略正其訛誤釐為八卷書成於寶慶元年淏自為之序書中不分大類前志共為細目一百十有七續志共為細目五十不漏不支敘次有法如姓氏送迎古第宅古器物求遺書藏書諸條皆他志所弗詳宿獨能搜採輯此詳贍可觀淏所續亦簡核不茍洵地志之有體要者明時舊刻已亡正德庚午郡人王綖復訪求舊本校刋之今板並久佚故藏書家罕見著録蓋亦稀覯之本矣乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀會稽志原序昔在夏禹會諸侯於會稽歷三千嵗而我髙宗皇帝御龍舟橫濤江應天順動復禹之迹駐蹕彌年定中興之業羣盜削平強敵退遁於是用唐幸梁州故事升州為府冠以紀元大駕既西幸而府遂為股肱近藩稱東諸侯之首地望蓋視長安之陜洛汴都之陳許所命牧守皆領浙東安撫使其自丞相執政來與去而拜丞相執政者不可遽數而又昭慈聖烈皇后及永祐以來四陵欑殿相望於鬱蔥佳氣中朝謁之使艫銜轂擊中原未清今天下巨鎮惟金陵與會稽耳荆揚梁益潭廣皆莫敢望也則山川圖牒宜其廣載備書顧未暇及者綿數十年直龍圖閣沈公作賔來為守慨然以為已任而通判府事施君宿發其端安撫使幹辦公事李君兼韓君茂卿為之助郡士馮景中陸子虡王度朱鼐永嘉邵持正等相與上參禹貢下考太史公及歷代史金匱石室之藏旁及爾雅本草道釋之書稗官野史所傳神林鬼區幽怪慌惚之説秦漢晉唐以降金石刻歌詩賦咏殘章斷簡靡有遺者若父老以口相傳不見於文字者亦間見層出積勞纍月乃成沈公去為轉運副使猶經營此書不已華文閣待制趙公不迹寶文閣學士袁公説友繼為守亦力成之而始終其事者施君也書雖本之圖經圖經出於先朝非藩郡所可附益乃用長安河南成都相臺之比名會稽志會稽為郡雖遷徙靡常而郡本以山得名又禹所巡也故卒以名之既成屬遊參訂其槩且為之序嘉泰元年十二月乙酉中大夫直華文閣致仕賜紫金魚袋陸遊序
