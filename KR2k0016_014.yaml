body:
  text: 會稽志卷十四宋施宿等撰人物會稽自漢魏晉唐衣冠人物最盛五代之亂錢氏有國私置丞相以下官惟此邦人士耻之多自抑退無為其國顯仕者至宋興始相繼而起今取漢以來公卿大夫略掇其事于篇其訪求未偹者尚俟他日漢鄭吉會稽人以從軍為郎吉為人強執習外國事宣帝時吉以侍郎田渠黎積穀因發諸國兵攻破車師遷衛司馬使護鄯善以西南道神爵中胸奴乖亂日逐王先賢撣欲降漢使人與吉相聞吉發渠黎龜茲諸國五萬人迎日逐王口萬二千人小王將十二人隨吉詣京師漢封日逐王為歸德侯吉既破車師降日逐威震西域遂并護車師以西北道故號都護都護之置自吉始焉上嘉其功效乃下詔封吉為安逺侯食邑千户吉於是中西域而立莫府治烏壘城漢之號令班西域矣始自張騫而成于鄭吉語在西域傳嚴光字子陵一名遵會稽餘姚人少有髙名與光武同遊學及光武即位光乃變名姓隱身不見帝思其賢乃令以物色訪之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車玄纁遣使聘之三反而後至車駕即日幸其館光卧不起帝即其卧所撫光腹曰咄咄子陵不可相助為理耶光眠不應良久乃張目熟視曰昔唐堯著德巢父洗耳士故有志何至相迫乎帝曰子陵我竟不能下汝耶于是升輿嘆息而去復引光入論道舊故相對纍日帝從容問光曰朕何如昔時對曰陛下差增于往因共偃卧光以足加帝腹上明日太史奏客星犯帝座甚急帝笑曰朕故人嚴子陵共卧耳除為諫議大夫不屈乃耕于富春山後人名其釣處為嚴子陵瀨焉嚴當作莊賀純字仲貞會稽山隂人少為諸生博極羣藝十辟公府三舉賢良方正五徴皆不就復徴拜議郎數陳災異上便宜數百事多見省納遷江夏太守永和中李固上疏曰陛下初登大位聘會稽賀純䇿書嗟嘆待以大夫之位是以巖穴幽人智術之士彈冠振衣樂欲為用四海欣然歸服聖德鍾離意字子阿會稽山隂人舉孝亷辟大司徒府徴為尚書時交址太守張恢坐臧千金詔班賜羣臣意得珠璣而不拜賜帝問其故對曰此臧穢之寶誠不敢拜帝嗟嘆曰清乎尚書之言乃更以庫錢賜意轉尚書僕射車駕數幸廣成苑意以為從禽廢政當車陳諫天子即時還宫永平中大旱大起北宫意詣闕免冠上疏帝性褊察好以耳目隱發為明朝廷爭為嚴切以避誅責惟意獨敢諫爭數封還詔書臣下過失輒救解之出為魯相以愛利為化王充字仲任會稽上虞人少孤鄉里稱孝後受業太學師事扶風班彪好博覽而不守章句家貧無書嘗遊洛陽市肆閲所賣書輒能誦憶遂博通衆流百家之言後歸鄉里屏居教授仕郡為功曹以數諫爭不合去乃閉門潛思絶慶弔之禮著論衡八十五篇二十餘萬言蔡雍入吳始得之恆祕以為談助王朗為會稽守又得其書許下稱其才雋或曰不見異人當得異書又時嫌蔡雍得異書或搜求帳中果得論衡抱數卷去雍丁寧曰惟我與爾共之孟嘗字伯周會稽上虞人其先三世為郡吏並伏節死難嘗少修操行仕郡為户曹史有寡婦至孝養姑姑夀終夫女弟先懷嫌忌乃誣婦鴆其母嘗言其枉狀太守不為理嘗謝病去婦竟寃死自是郡中連旱二年後太守殷丹問故嘗曰昔東海孝婦感天致旱于公一言甘澤時降宜戮訟者以謝冤魂丹從之即刑女而祭婦墓天應澍雨後䇿孝亷遷合浦太守郡海出珠宰守採求不知紀極珠漸徙交址郡界于是行旅不至嘗革易前敝去珠復還被徴吏民扳車請之不得進乃夜遁去隱處窮澤士民慕其德就居止者百餘家桓帝時尚書同郡楊喬上書薦嘗安仁𢎞義耽樂道德清行出俗能幹絶羣而嘗單身謝病躬耕壟次匿景藏采不揚華藻沉淪草莽好爵莫及廊廟之寶棄于溝渠竟不見用卒于家魏朗字少英會稽上虞人為兄報仇亡命陳國從博士郤仲信學春秋圖緯又詣京師長者李膺之徒爭從之初辟司徒府遷彭城令時中官子弟為國相多行非法朗與更相奏幸臣忿疾欲中之會九真賊起乃共薦朗為九真都尉到官奬厲吏兵討破羣賊斬首二千級桓帝美其功徴拜議郎遷尚書屢陳便宜有所補益出為河內太守政稱三河表會被黨議免朗性矜嚴閉門整法度家人不見墮容以黨事急徴自殺著書數篇號魏子黃昌字聖真會稽餘姚人本出孤微居近學宫數見諸生修庠序之禮遂就經學又曉習文法仕郡為決曹刺史行部見昌甚竒之辟從事後拜宛令政尚嚴猛好發姦伏皆稱神明遷蜀太守訟者七百餘人悉為斷理宿惡大姦皆奔走他境後補大司農左轉太中大夫鄭𢎞字巨君會稽山隂人𢎞少為鄉嗇夫太守第五倫竒之召署督郵舉孝亷𢎞師同郡河東太守焦貺楚王英謀反發覺引貺貺被收道亡妻子繫詔獄諸生故人皆變姓名以逃其禍𢎞獨髠頭負鈇鑕詣闕上章為貺訟罪顯宗赦其家𢎞躬送貺喪及妻子還鄉里拜騶令纍遷尚書令𢎞前後所陳有補益王政者皆著之南宫以為故事出為平原相徴拜侍中遷大司農為太尉奏尚書張林阿附侍中竇憲而素行臧穢又上洛陽令楊光憲之賓客在官貪殘並不冝處位憲奏𢎞大臣漏泄密事帝詰讓𢎞收上印綬𢎞自詣廷尉詔勑出之乞骸骨歸未許病篤上書陳謝并言竇憲之短帝省章遣醫占𢎞病臨沒悉還賜物􅎁妻子褐巾布衣素棺殯殮以還鄉里朱俊字公偉會稽上虞人以孝養致名鄉里敬之舉孝亷除蘭陵令政有異能平交址賊封都亭侯討潁川汝南陳國黃巾賊悉破平之遣使持節拜右車騎將軍振旅還京師為光祿大夫封錢塘侯關東兵起董卓議移都俊輒止卓卓雖憚之然貪其名重乃表俊太僕以自副俊被召不肯受遷因進曰國不宜遷必孤天下望成山東之釁臣不見其可也有司詰曰召君受遷而君拒之不問徙事而君陳之何也俊曰副相國非臣所堪也遷都非計臣之所急也辭所不堪進臣所急臣之所宜也有司曰遷都之事初無此計也就有未露何所受聞俊曰相國董卓為臣説之臣聞之于相國有司不能屈朝廷稱服焉後為太尉李傕郭汜相攻劫質天子公卿俊性剛即發病而卒盛憲字孝章會稽人舉孝亷補尚書郎稍遷吳郡太守以疾去官孫䇿平定吳會誅其英豪憲素有髙名䇿深忌之初憲與少府孔融善融憂其不免禍乃與曹公書曰嵗月不居時節如流五十之年忽焉已至公為始滿融又過二海內知識零落殆盡惟會稽盛孝章尚存其人困于孫氏妻孥湮沒單孑獨立孤危愁苦若使憂能傷人此子不得復永年矣春秋傳曰諸侯有相滅亡者桓公不能救則桓公耻之今孝章實丈夫之雄也天下談士依以揚聲而身不免于幽執命不期于旦夕是吾祖不當復論損益之友而朱穆所以絶交也公誠能馳一介之使加咫尺之書則孝章可致友道可宏矣今之少年喜謗前輩或能譏平皮柄反孝章孝章要為有天下大名九牧之民所共稱嘆燕君市駿馬之骨非欲以騁道里乃當以招絶足也惟公匡復漢室宗社將絶又能正之正之之術實須得賢珠玉無脛而自至者以人好之也况賢者之有足乎昭王築臺以尊郭隗隗雖小才而逢大遇竟能發明主之至心故樂毅自魏往劇辛自趙往鄒衍自齊往嚮使郭隗倒懸而王不解臨溺而王不拯則士亦將髙翔逺引莫有北首燕路者矣凡所稱引自公所知而復有云者欲公崇篤斯義也因表不悉由是徴為騎都尉制命未至為䇿所害吳賀齊字公苖會稽山隂人守剡長縣吏斯從輕俠為姦齊立斬之後太末豐浦民反轉守太末長誅惡養善期月盡平領都尉事齊按兵建安立都尉府發屬縣兵受齊節度斬賊帥洪明等凡六千級名帥盡禽拜平東校尉遷威武中郎將討黟歙賊有功為新都郡太守加偏將軍吳郡餘杭賊起齊討破之豫章東部賊起衆萬餘人齊誅其首惡遷奮武將軍從權征合肥權為張遼掩擊幾至危殆齊率兵迎權涕泣言曰今日之事幾至禍敗願以此為終身戒權自前收其泪曰大慙謹以刻心非但書諸紳也鄱陽尤􅊳受曹公印綬為賊陵陽始安涇縣皆應齊與陸遜討破降之封山隂侯纍遷後將軍假節領徐州牧丁覽字孝連山隂人清身立行用意不茍推財從弟以義讓稱仕郡至功曹守始平長為人精微潔淨門無雜賓孫權深貴待之未及擢用會病卒甚見痛惜殊其門户覽子固字子賤在襁褓中闞澤見而異之曰此兒後必至公輔固少喪父獨與母居家貧守約色養致敬族弟孤弱與同寒溫虞翻與固同僚書曰丁子賤塞淵好德堂構克舉令德之後惟此君嘉耳歷顯位孫皓即位遷司徒皓悖虐固與陸凱孟宗同心憂國年七十六卒朱育山隂人少好竒字凡所特達依體像類造作異字千名以上仕郡門下書佐與太守濮陽興問對行于世育後仕朝常在臺閣為東觀令遙拜清河太守加位侍中推刺占射文藝多通虞汜字世洪翻第四子生南海父卒還鄉里永安初為散騎中常侍孫綝廢幼主迎立琅琊王休休未至綝欲入宫圖為不軌召百官會議皆惶怖失色唯唯汜對曰明公為國伊周處將相之任擅廢立之威將上安宗廟下惠百姓大小踴躍自以伊霍復見今迎王未至而欲入宫如是羣下搖動衆聽疑惑非所以永終忠孝揚名後世也綝不懌竟立休以討扶嚴功拜交州刺史冠軍將軍餘姚侯虞忠字四方翻第五子貞固幹事好議人物造吳郡陸機于童齔之年稱上虞魏遷于無名之初終皆逺致為著聞之士交同縣王岐于孤宦之族仕進先至冝都太守忠乃代之晉征吳忠與夷道監陸晏晏弟中夏督景堅守不下城潰被害鍾離牧字子幹會稽山隂人漢魯相意七世孫少與同郡謝贊吳郡顧談齊名爰居永興躬自墾田稻熟縣民有識認之牧遂以與民縣長聞之召民繫獄牧為之請長曰君慕承宫自行義事僕為民主何得寢公憲而從君耶牧曰今以少稻而殺此民何心復留裝還山隂長為釋之民慙懼率妻子春稻得米送還牧牧閉門不受輸至道旁莫有取者從郎中補太子輔義都尉遷南海太守後以前將軍假節領武陵太守卒官家無餘財士民思之始興太守羊衜與太常滕胤書曰鍾離子幹吾昔知之不熟近見其在南海威恩部伍智勇分明加操行清純有古人之風其見貴如此晉賀循字彥先會稽人父邵字興伯孫皓時仕至中書令領太子太傳皓凶暴驕矜政事日敝邵上疏諫皓深恨之邵奉公貞正親近所憚乃共譖邵後竟見殺循于家禍流放海濱吳平乃還鄉里節操髙嚴童齔不羣言行舉動必以禮讓好學博聞尤善三禮舉秀才除陽羡武康令顧榮陸機陸雲表薦循久之召為太子舍人除吳國內史不就元皇帝為晉王以循為中書令固讓不受轉太常領太子太傅時朝廷初建動有疑議宗廟制度皆循所定朝野咨詢為一時儒宗諸所著論並傳于世孔愈字敬康會稽山隂人與同郡張茂偉康丁潭世康齊名時人號曰會稽三康建興初召為丞相掾仍參丞相軍事以討華軼功封餘不亭侯元帝為晉王使長兼中書郎于時刁協劉隗用事王導頗見疏逺愈陳導忠賢有佐命之勳由是不合旨出為司徒左長史纍遷侍中太常蘇峻反愈朝服守宗廟峻平愈往石頭詣溫嶠嶠執手流涕曰天下喪亂忠孝道廢能持古人之節嵗寒不凋者帷君一人耳三遷尚書左僕射後以論議守正為導所銜纍乞骸骨不許出為會稽內史在郡三年乃營山隂湖南侯山下數畝地為宅草屋數間便棄官居之卒諡曰貞虞潭字思奧會稽餘姚人翻之孫也清貞有檢操周旋征討賜爵都亭東鄉侯元帝時為宗正卿以疾告歸會王含沈充等攻逼京都潭于本縣招合宗人及郡中大姓共起義兵萬數進赴國難至上虞明帝手詔潭為冠軍將軍領會稽內史潭即受命義衆雲集遣前鋒過浙江追躡而自次西陵為後繼會充巳擒罷兵徴拜尚書成帝即位以討充功進爵零陵縣侯蘇峻反督三吳晉陵宣城義興五郡軍事與郤鑒王舒協同義舉陶侃假潭節監揚州浙江西軍率衆并勢東西犄角峻平轉鎮東將軍吳國內史軍荒飢饉潭出倉米賑救又修滬瀆以防海抄百姓賴之丁潭字世康會稽山隂人元帝時為尚書祠部郎琅邪王褒始受封帝欲引朝賢為其國上卿將用潭以問賀循循曰郎中令職望清重實宜審授潭清淳貞粹聖明所簡才實宜之成帝時為散騎常侍蘇峻作亂帝蒙塵于石頭惟潭及鍾雅劉超等隨從不離帝側峻誅賜爵永安伯纍遷左光祿祭酒康帝即位乞骸骨詔以光祿還第卒諡曰簡虞喜字仲寧會稽餘姚人少立操行博學好古郡察孝亷舉秀才司徒辟公車徴拜博士皆不就邑人賀循為司空先達貴顯每詣喜信宿忘歸自云不能測也太寧中以博士徴復下詔徴皆不行太常華桓舉賢良會國有軍事咸康初內史何充上疏曰臣聞二八舉而四門穆十亂用而天下安伏見前賢良虞喜天挺貞素髙尚邈世束修立德皓首不倦加以傍綜廣採博聞強識髙枕柴門怡然自足冝使蒲輪紆衡以旌殊操詔曰潯陽翟湯會稽虞喜耽學守道操擬古人往雖徴命而不降屈政道須賢宜納諸廊廟其並以散騎常侍徴又不起有司議祧廟不能決朝廷遣使就咨訪焉虞預字叔寧徴士喜之弟也少好學有文章太守庾琛紀瞻並以為主簿轉功曹史察孝亷不行諸葛恢庾亮等薦預召為行參軍除著作佐郎太興中以冦賊未平上疏論為防之術宜得良將因言夀春無鎮祖逖孤立前有徑敵後無係援冝加奬厲使不顧命纍遷散騎常侍領著作以老歸預雅好經史憎疾玄虛其論阮籍裸袒比之伊川被髮所以外裔遍中國過于衰周之時著晉書會稽典録等皆行于世詩賦碑誄論難數十篇虞􅔎字思行潭之兄子也機幹不及于潭而素行過之歷吳興太守金紫光祿大夫王導常謂􅔎曰孔愈有公才而無公望丁潭有公望而無公才兼之者其在卿乎宦未達而喪時人惜之孔羣字敬休有智局志尚不羈蘇峻入石頭時匡術有寵于峻羣與從兄愈同行干橫塘遇之愈止與語羣初不視術術怒欲刃之愈下車抱術曰吾弟發狂卿為我宥之乃免峻平王導保存術常因衆坐令術勸羣酒以釋憾羣答曰羣非孔子厄同匡人雖陽和布氣鷹化為鳩至于識者猶憎其目導有愧色仕至中丞嘗與親舊書云今年田得七百石秫米不足了麯蘖事孔坦字君平愈從子也祖沖丹陽太守父侃大司農坦少方直有雅望善左氏傳解屬文元帝為晉王以坦為世子文學東宫建補太子舍人遷尚書郎歸會稽久之除領軍司馬未赴召會王敦反與右衛將軍虞潭俱在會稽起義而討沈充遷尚書左丞吳興太守封晉陵男加建威將軍卒贈光祿勳諡曰簡孔嚴字彭祖少仕州郡歷司徒掾尚書殿中郎殷浩臨揚州請為别駕遷尚書左丞朝廷崇樹浩以抗擬桓溫溫深不平浩又引接荒人謀立功于閫外嚴言于浩曰當今時事艱難可謂百六之運而處任者所至不同所見各異人口云云無所不至頃來天時人情良可寒心願深思亷藺屈伸之道平勃相和之義又觀此日降附之徒人面獸心貪而無親難以義感浩深納之哀帝時以侯領尚書多所匡益拜吳興太守善于牧守甚得人和又甄賞才能之士論者美焉孔汪字德澤愈之子好學有志行孝武帝時位至侍中時茹千秋以佞媚見幸于會稽王道子汪屢言之于帝帝不納遷尚書太常卿以不合意求出為假節都督交廣二州諸軍事征虜將軍平越中郎將廣州刺史甚有政績為嶺表所稱孔安國字安國愈之子羣從惟安國與汪少厲孤貧之操汪既以直諒稱安國亦以儒素顯孝武帝時甚蒙禮遇仕歷侍中太常再為會稽內史領軍將軍安帝隆安中下詔曰領軍將軍孔安國貞慎清正出納播譽可以本官領東海王師必能導達津梁依仁遊藝後歷尚書左右僕射孔沉字德度有美名何充薦沈于王導曰文思通敏宜登宰門辟丞相司徒掾琅邪王文學並不就從兄坦以裘遺之辭不受坦曰晏平仲儉祀其先人豚肩不掩豆猶狐裘數十年卿復何辭于是受而服之是時沈與魏顗虞球虞存謝奉並為四族之雋沈子廞位至吳興太守廷尉廞子琳之以草書擅名又為吳興大守侍中謝奉字𢎞道會稽山隂人祖端散騎常侍父鳳丞相主簿奉歷安南將軍廣州刺史吏部尚書後免官還東謝安赴桓公司馬出西相遇破岡既當逺别遂停三日共語安欲慰其失官奉輒引以他端雖信宿中塗竟不言及此事安深恨在心未盡謂同舟曰謝奉故是竒士奉弟聘字𢎞逺歷侍中廷尉卿同郡孔嚴字彭祖有才學簡文帝嘗曰謝安南清令不如其弟學義不及孔嚴居然自勝謝安字安石少有重名初辟司徒府又除著作郎並以疾辭寓居會稽與王羲之及髙陽許詢桑門支遁遊處出則漁弋入則言詠屬文無處世意揚州刺史庾冰以安有重名必欲致之不得巳赴召月餘告歸復除尚書郎琅邪王友並不起吏部尚書范汪舉安為吏部郎安以書拒絶之有司奏安被召歷年不至禁錮終身遂棲遲東土安弟萬為西中郎將總藩任之重安雖處衡門其名猶出萬之右自幼有公輔之望及萬黜廢安始有仕進志時年巳四十餘矣征西大將軍桓溫請為司馬溫與言生平歡笑竟日既出溫問左右頗嘗見我有如此客否徴拜侍中遷吏部尚書中護軍簡文帝疾篤溫上疏薦安宜受顧命詔安總中書事明帝始親萬幾進安中書驃騎將軍録尚書事苻堅敗以總統功進拜太保安雖受朝寄然東山之志始末不渝每形于言色及鎮新城盡室而行造泛海之裝欲須經略粗定自江道還東雅志未就而卒謝玄字幼度與從兄朗俱為叔父安所器重桓溫辟為掾轉征西將軍苻堅入冦朝廷求文武良將安以玄應舉郗超嘆曰玄必不負所舉吾嘗見其使才雖履屐間亦得其任於是徴拜建武將軍監江北諸軍事大破苻堅遂經略舊都兖青司豫平加玄都督徐兖青司冀幽并七州軍事會翟遼張願反叛玄上疏送節盡求解所職又以疾辭移鎮東陽轉授散騎常侍左將軍會稽內史玄即輿疾之郡卒葬于始寧初玄移鎮東陽於道疾篤上疏曰臣以常人忽蒙殊遇由恩厚忘軀甘死若生冀憑皇威以塵露報恩然後從亡叔臣安退身東山以道養夀豈謂經略不振自貽斯戾是以奉送章節待罪有司先疾既動便至委頓謹遣兼長史劉濟重奉送節蓋章傳伏願矜其所訴勿令微臣銜恨泉壤表十餘上寢不報王羲之字逸少司徒導之從子也少有美譽朝廷公卿皆愛其才器為右軍將軍會稽內史羲之雅好服食養性不樂在京師初渡浙江便有終焉之志會稽有佳山水名士多居之謝安未仕時亦居焉孫綽李充許詢支遁等皆以文義冠世並築室東土與羲之同好嘗與同志宴集于會稽山隂之蘭亭羲之自為之序以申其志稱病去郡於父母墓前自誓不仕羲之既去官與東土人民盡山水之遊弋釣為娛又與道士許邁共修服食採藥石不逺千里遍遊東中諸郡窮諸名山泛滄海嘆曰我卒當以樂死羲之既優遊無事與吏部郎謝萬書曰古之辭世者或被髮徉狂或汚身穢節可謂艱矣今僕坐而獲逸遂其宿心其為慶幸豈非天賜頃東遊還修植桑果今盛敷榮率諸子抱弱孫遊觀其間有一味之甘割而分之以娛目前雖植德無殊邈猶欲教養子孫以敦厚退讓或有輕薄庶令舉䇿數馬倣佛萬石之風君謂此何如比當與安石東遊山海斥行田視地利頥養間暇衣食之餘欲與親知時共歡宴雖不能興言髙詠銜杯引滿語田里所行故以為撫掌之資其為得意可勝言耶嘗依依陸賈班嗣楊王孫之處世甚欲希風數子老夫志願盡于此也王徽之字子猷羲之第三子性卓犖不羈為大司馬桓溫參軍又為車騎桓沖騎兵參軍嘗居山隂夜雪初霽月色清朗四望皓然獨酌酒詠左思招隱詩忽憶戴逵時逵在剡便夜乘小舟訪之經宿方至造門不前而反人問其故徽之曰本乘興而行興盡而返何必見安道耶後為黃門侍郎棄官東歸王獻之字子敬少有盛名而髙邁不羈雖間居終日容止不怠風流為一時之冠工草𨽻善丹青七八嵗時學書羲之密從後掣其筆不得嘆曰此兒後當復有大名獻之嘗從山隂道上行語人曰山川自相映發使人應接不暇若秋冬之際尤難為懷仕至中書令諡曰憲宋孫處字季髙會稽永興人以字行武帝征孫恩季髙樂從及平建鄴封新畨縣五等侯盧循之難武帝謂季髙曰此賊行破非卿不能傾其巢窟季髙率衆三千泛海襲畨禺拔之循父嘏長史孫建之等輕舟奔始興季髙分遣振武將軍沈田子等討平始興及南康臨賀始安嶺表諸郡循于左里奔還襲廣州季髙又破走之卒追贈南海太守封候官縣侯武帝念季髙功表稱所贈未優重贈交州刺史孔琳之字彥琳山隂人強正有志力桓玄輔政為太尉以為西閣祭酒玄議欲廢錢用穀帛又議復肉刑琳議以為宜且依舊玄好人附恱而琳之不能順旨是以不見知宋永初中為御史中丞奏敕尚書令徐羡之虧違典憲羡之領揚州刺史弟璩之為其中從事羡之使解釋琳之琳之不許曰我獨忤宰相政當罪止一身汝少不應從坐自是百僚震肅莫敢犯禁武帝甚嘉之行經蘭臺親臨幸焉虞願字士恭會稽餘姚人元嘉中為湘東王國常侍及明帝立以願儒吏學深兼藩國舊恩意遇甚厚除太常丞遷通直散騎侍郎帝以故宅起湘宫寺極奢侈新安太守巢尚之罷郡還見帝帝曰卿至湘宫寺未朕起此寺是大功德願在側曰陛下起寺百姓賣兒鬻婦何謂功德帝大怒使人馳曳下殿願徐去無異容帝好圍棋棋甚拙與第一品王抗對奕抗饒借帝曰皇帝飛棋臣不能斷帝以為信然願曰堯以此教丹朱非人主所冝好也遷兼中書郎除後軍將軍褚彥回常詣願願不在見其床上積塵成寸有書數帙嘆曰虞君之清至此令人掃地拂床而去齊虞玩之字茂瑤會稽餘姚人仕宋為烏程令路太后外親朱仁彌犯罪玩之依法案之太后怨訴孝武坐免官元徽中為尚書右丞齊髙帝鎮東府朝廷致敬玩之為少府猶躡屐造席髙帝取屐親視之訛黑斜鋭蒵斷以芒接之帝因咨嗟賜以新屐玩之不受帝問其故答曰今日之賜恩華俱重但蓍簮敝席復不可遺遷黃門郎及帝即位玩之表言便冝多見采納上表告退許之玩之于人物好臧否孔逖王儉恨之至是東歸儉不出送朝廷無祖餞者中丞劉休與親知書曰虞公散髮海隅同古人之美而東都之送殊不靄靄歸家數年卒虞悰字景豫會稽餘姚人少以孝聞仕宋位黃門郎明帝誅山陽王休祐至葬日寒雪厚三尺故人無至者惟悰一人來赴齊武帝時為太子中庶子兼祠部尚書領右軍明帝立悰稱疾不陪位帝使尚書令王晏賫廢立事示悰以悰舊人引參佐命悰謂晏曰主上聖明公卿戮力寧假朽老以匡贊維新乎因慟不自勝朝議欲糾之僕射徐孝嗣曰此亦古之遺直衆議乃止孔蕩字世逺會稽山隂人好典故學與王儉至交升明中為齊臺尚書儀曹郎屢針闕禮多見信納上謂王儉曰蕩真所謂儀曹不忝厥職也儉為宰相蕩嘗謀議幄帳每及選用頗失物情儉從容啓上曰臣有孔蕩猶陛下之有臣永明中為太子家令卒孔琇之會稽山隂人有吏能仕為尚書左丞廷尉卿出為臨海太守明帝輔政防備諸藩致密旨于上佐使便冝從事以琇之為晉熙王冠軍長史行郢州事欲令殺晉熙琇之辭不許欲自引決友人陸間諫之琇之不從遂不食而死孔稚圭字德璋會稽山隂人少學涉有美譽齊髙帝為驃騎取為記室參軍與江淹對掌辭筆歷黃門郎御史中丞建武初為南郡太守徴侍中不行留本任稚圭風韻清疏好文詠與外兄張融情趣相得又與琅琊王思逺廬江何點點弟胤並欵交不樂世務居宅甚營山水憑几獨酌傍無别事門庭之內草萊不剪中有蛙鳴或問之稚圭曰我以此當兩部鼓吹王晏常鳴鼓吹候之聞羣蛙鳴曰此殊聒人耳稚圭曰我聽鼓吹殆不及此晏甚有愧色梁孔休源字慶緒會稽山隂人梁臺初建為太學博士武帝嘗問吏部尚書徐冕求有學藝解朝儀者冕曰孔休源識見清通詳練故事自晉宋起居注誦略上口帝亦素聞之即日除尚書儀曹郎遷御史中丞正色直繩無所回避百寮憚之歷都官尚書金紫光祿大夫車駕臨幸常以軍國事委之昭明太子薨有敕夜召休源宴居殿參定謀議立晉安王綱為皇太子自公卿珥貂插筆奏決于前休源怡然無愧及卒帝流涕顧謝舉曰休源居職清忠方欲共康政道奄至殞沒朕甚痛之舉曰此人清介強直臣亦為陛下惜諡曰貞子陳虞荔字山披會稽餘姚人九嵗隨從伯闡候太常陸倕倕問五經十事荔對無遺及長博覽文籍善屬文梁武帝于城西置士林館用為士林學士遷通直散騎侍郎兼中書舍人時左右之任多參權軸內外機務互有帶掌惟荔與顧協泊然靜退但以文交見知侯景之亂荔率親屬入臺陳文帝時為太子中庶子領大著作初荔母隨荔入臺卒于臺內尋而城陷情禮不申由是終身蔬食布衣不聽音樂文帝深器之常引左右朝夕顧訪荔性沈密凡所獻替莫有見其際者虞寄字次安對䇿髙第起家梁宣城王國左常侍大同中嘗驟雨殿前往往有雜色寶珠寄因上瑞雨頌武帝謂寄兄荔曰此頌典裁清拔卿之士龍也將如何擢用寄聞之嘆曰以申擊壤之情爾豈買名求仕者乎乃閉門稱疾侯景之亂寄隨兄荔入臺陳寶應據閩中寄至晉安為寶應所得陳武帝除寄為中書侍郎寶應不遣欲引為僚屬固辭獲免及寶應結留異潛有逆謀寄微知其意每陳逆順之理度不可諫乃為居士服以拒絶之自稱東山虞寄寶應既禽賓客微有交涉皆誅惟寄以先識免文帝敕寄還朝衡陽王出閣用為掌書記帝曰所以屈卿遊藩非止文翰乃令以師表相事也後除東中郎建安王咨議寄辭疾不堪陪列有疑議就決之唐虞世南餘姚人受業于吳顧野王十餘年精思不倦父荔卒陳文帝召為建安王法曹時叔寄陷于陳寶應世南雖服除仍衣布飯蔬寄還乃釋布噉肉陳滅與世基入隋俱名重當時議者方晉二陸大業中纍至祕書郎十年不徙唐興秦王引為府參軍記室中舍王踐祚拜宏文館學士遷太子右庶子固辭改祕書監世南抗烈論議持正太宗嘗曰朕與世南商略古今有一言失未嘗不悵恨其懇誠乃如此帝每稱其五絶一曰性行二曰忠直三曰博學四曰文詞五曰書翰致仕授銀青光祿大夫𢎞文館學士如故卒年八十一詔陪葬昭陵贈禮部尚書諡曰文懿後帝為詩一篇述古興亡既而嘆曰鍾子期死伯牙不復鼓琴朕此詩將何所示敇褚遂良即其靈坐焚之後數嵗夢進讜言若平生翌日下制厚恤其家賀知章字季真越州永興人性曠夷善談説與族姑子陸象先善象先嘗謂人曰季真清談風流吾一日不見則鄙吝生矣證聖初擢進士超拔羣類科纍遷太常博士遷禮部侍郎兼集賢院學士一日併謝宰相源乾曜曰賀公兩命之榮足為光寵玄宗自為贊賜之遷太子右庶子充侍讀徙工部肅宗為太子知章遷賓客授祕書監知章晚節尤誕放遨嬉里巷自號四明狂客及祕書外監天寶初病夢遊帝居數日寤乃請為道士還鄉里以宅為千秋觀有詔賜鏡湖剡川一曲既行帝賜詩皇太子百官餞送擢其子僧子為會稽郡司馬賜緋魚使侍養幼子亦聽為道士卒年八十六羅珦越州會稽人寶應初詣闕上書授太常寺太祝曹王臯領江西荆襄節度使常署幕府纍遷副使臯卒軍亂劫府庫珦取首惡十餘人斬以徇環棘庭中俾投所劫庫物一日皆滿乃貰餘黨召為奉天令中官出入係道吏緣以犯禁珦搒笞之雖死不置自是屏息擢廬州刺史民間病者捨醫藥禱淫祀珦下令止之修學宫政教簡易有芝草白雀淮南節度使杜祐上治狀賜金紫服再遷京兆尹請減平糴半以常賦充之人賴其利以老病求解徙太子賓客纍封襄陽縣男卒諡曰夷經學漢趙曅字長君會稽山隂人少嘗為縣吏奉檄迎督郵曅耻于厮役遂棄車馬去到犍為資中詣杜撫受韓詩究竟其術積二十年絶問不還家為發喪制服曅卒業乃歸州召補從事不就舉有道卒于家曅著吳越春秋詩細歷神淵蔡雍至會稽讀詩細而歎息以為長於論衡雍還京師傳之學者咸誦習焉吳虞翻字仲翔會稽餘姚人辟召不就翻聞曹公辟曰盜跖欲以餘財汚良家耶遂拒不受翻與少府孔融書并示以所著易融答書曰覩吾子之著易乃知東南之美者非徒會稽之竹箭也張紘又與融書曰虞仲翔前頗為論者所侵美寶為質雕摩益光後翻以論議忤孫權逺徙交州雖處罪放而講學不倦門徒常數百人又為老子論語國語訓注皆傳于世闞澤字德潤會稽山隂人孫權稱尊號以澤為尚書嘉禾中為中書令加侍中赤烏五年拜太子太傅領中書如故每朝廷大議經典所疑輒咨訪之以儒學勤勞封都鄉侯虞翻稱澤曰闞生矯傑蓋蜀之揚雄又曰闞子儒術德行亦今之仲舒也徴崇字子和隱于會稽治易春秋左氏傳兼善內術本姓李遭亂更姓遂躬耕以求其志好尚者從學所教不過數人輒止欲令其業必有成也晉楊方字公回會稽人少好學有異才初為郡鈴下威儀公事之暇輒讀五經內史諸葛恢見而竒之時虞喜兄弟以儒學立名雅愛方為之延譽恢嘗遣方為文薦郡功曹主簿虞預美之送示賀循循報曰不圖偉才如此其文甚有竒分若出胸臆自是一國所推司徒王導辟為掾轉東安太守在郡積年著五經鉤深及吳越春秋并雜文皆行于世謝沈字行思會稽山隂人博學多識綜練經史郡命主簿功曹察孝亷內史何充引為參軍母老去職不交人事耕耘之暇研精墳籍康帝即位朝議疑七廟迭毁徴為太常博士以質疑滯除尚書度支郎何充庾氷共稱沈乃遷著作郎沈著毛詩漢書外傳及他詩賦文論其學在虞預之右梁賀瑒字德璉會稽山隂人齊時舉明經為太學博士梁天監中初開五館以瑒兼五經博士别詔為皇太子定禮撰五經義時武帝方創定禮樂瑒所建議多見施行尋領五經博士所著禮易講疏等數百篇卒于館賀琛字國寶伯父瑒授經業尤精三禮年將三十便事講授初瑒于鄉里受徒四方問業者三千人天監中亡至是咸復集焉武帝召見補王國侍郎纍遷尚書左丞詔撰新諡法便即施用加員外散騎常侍每進見帝與語嘗移晷刻省中語曰上殿不下有賀雅琛容止間雅故時人呼之後為光祿大夫卒所撰三禮講疏五經滯義及諸儀注凡百餘篇孔子袪會稽山隂人少孤好學耕耘樵採常懷書自隨明古文尚書為兼國子助教遷西省學士助賀琛撰録纍遷中書通事舍人武帝撰五經講疏及孔子正言子袪嘗考閲羣書以為義證又自撰注尚書及尚書義後加散騎侍郎卒于官虞僧誕會稽餘姚人為國子助教以左氏講授聽者常數百人時博士崔靈恩先習左傳服解不為江東所行乃改説杜義每文句常申服難杜僧誕最精杜學作申杜難服以答靈恩世並傳焉孔僉會稽山隂人少師事何胤通五經尤明三禮孝經論語生徒數百人三為五經博士太清亂卒于家子淑玄亦以文學官至太學博士兄子玄素善三禮有盛名孔子雲會稽人師事吳興沈峻峻始為國子助教吏部郎陸倕言于僕射徐勉以為周官一書羣經源本學絶不傳巳歷年世惟峻獨精冝即用其人使專此學勉于是奏峻兼五經博士於館講授子雲實傳峻業官亦至五經博士焉唐孔若思山隂人早孤母躬訓教長以博學聞有遺以褚遂良書者納一卷焉其人曰是書貴千金何取之亷答曰審爾此為多矣擢明經歷庫部郎中坐右置止水一石明止足意中宗初敬暉桓彥範當國以若思多識古今凡大政事必咨質而後行三遷禮部侍郎出為衛州刺史纍封梁郡公子季詡擢制科終左補闕康子元會稽人開元初詔舉能治易老莊者張説以聞纍擢袐書少監兼集賢侍講學士玄宗東之泰山説引康子元等商裁封禪儀及還徙宗正少卿以疾授袐書監致仕文章晉孫綽字興公家于會稽與兄統皆博學善屬文綽遊放山水十有餘年乃作遂初賦以致其意又嘗著天台山賦辭致甚工初成以示友人范榮期曰卿試擲地當作金石聲也內史王羲之引為右軍長史遷散騎常侍大司馬桓溫欲經緯中國以河南初平將移都洛陽朝廷畏溫不敢為異綽乃上疏溫不恱曰致意興公何不尋君遂初賦知人家國事耶綽少以文才著稱于時文士綽為其冠溫王郤庾諸公之薨必須綽為文辭然後刋石焉宋謝靈運陳郡陽夏人移籍會稽少好學博覽羣書文章之美與顔延之為江左第一從叔混特加愛襲封康樂公性豪侈車服鮮麗世共宗之咸稱謝康樂也纍遷祕書丞出為臨海太守郡有名山水靈運素所愛好遂肆意遊遨遍歷諸縣所至輒為歌詩以致其意靈運父祖並葬始寧有故宅及墅遂修營舊業傍山帶江盡幽居之美與隱士王𢎞之孔淳之等放蕩為娛有終焉之志每一首詩至都下貴賤莫不競寫宿昔間士庶皆遍又作山居賦並自注以言其事文帝徴為祕書監不起命光祿大夫范泰敦奬乃出使撰晉書粗立條例書竟不就靈運詩書皆兼獨絶每文竟手自寫之文帝稱為二寶云謝惠連祖沖父方明三世皆居會稽惠連幼有竒才不為父方明所知族兄靈運加賞之自言每有篇章對惠連輒得佳語常于永嘉西堂思詩竟日不就忽夢惠連即得池塘生春草大以為工及靈運自永嘉還始寧方明為會稽郡靈運造焉謂方明曰阿連才悟如此而尊作常兒遇之惠連與東海何長瑜潁川荀雍太山羊璿之以文學賞會共為山澤之遊靈運登臨海嶠初發強中以詩與惠連曰可見羊何共和之也嘗辟州主簿不就後為司徒彭城王法曹作雪賦以髙麗見竒焉隋虞綽字士裕會稽餘姚人博學有俊才尤工草𨽻陳左衛將軍傅縡有盛名見綽詞賦嘆曰虞郎之文無以尚也仕陳為太學博士永陽王記室大業初為祕書學士奉詔撰長洲玉鏡等書十餘部綽所筆削帝未嘗不稱善纍遷著作佐郎與虞世南庾自直蔡允恭等四人嘗居禁中以文翰待詔從征遼東帝舍臨海頓見大烏異之使綽為銘帝覽而善之命有司勒于海上其詞賦並行于世唐賀德仁越州山隂人與從兄德基皆以文辭稱時人為之語曰學行可師賀德基文質彬彬賀德仁兄弟八人時比漢荀氏始在陳為吳興王友入隋楊素薦其才授豫章王記室髙祖起兵為隱太子友遷中舍人以年耆不更吏職徙洗馬為東宫學士貞觀初遷趙王友卒有集二十卷藏于四庫見藝文志嚴維字正文越州人為祕書郎大厯中與鄭槩裴冕徐嶷王綱等宴其園宅聫句賦詩世傳浙東唱和維詩一卷及剡隱居朱放越僧靈徹詩集皆藏袐府先是神龍中越有賀朝萬齊融與同郡賀知章俱以文詞揚名上京朝官止山隂尉齊融崑山令惟知章最貴焉吳融越州山隂人祖翥有名大中時賜號文簡先生融學自力富辭調龍紀初及進士第韋昭度討蜀表掌書記纍遷御史歷翰林學士中書舍人昭宗反正御南闕羣臣稱賀融最先至于時左右歡駭帝有指授疊十許藁融跪作詔少選而成語當意詳帝咨賞良厚進户部侍郎鳳翔劫遷不得從去客閺鄉召還遷承旨卒節義漢戴就字景成會稽上虞人仕郡倉曹掾揚州刺史歐陽參奏太守成公浮臧罪遣部從事薛安收就于錢塘獄幽囚考掠五毒慘至就慷慨直辭顔色不變主者窮竭慘酷無復餘方乃卧就覆船下以馬通薰之一夜二日皆謂巳死發船視之就方張眼罵曰何不益火而使滅絶主者以白安安呼見就謂曰太守罪穢狼籍受命考實君何故以骨肉拒扞耶就據地答言太守剖符大臣當以死報國卿雖銜命固宜申斷寃毒奈何誣枉忠良強相掠理命臣謗其君子證其父就考死之日當白于天如蒙生全亦手刃相裂安竒其壯節即解械表釋郡事浮徴還京師太守劉寵舉就孝亷病卒吳董襲字元代餘姚人長八尺武力過人曹公出濡須襲從孫權赴之權使襲督五樓船住濡須口夜卒暴風五樓船傾覆左右散走舸乞使襲出襲怒曰受將軍任在此備賊何等委去耶敢復言此者斬于是莫敢干其夜船敗襲死權改服臨殯供給甚厚邵疇字溫伯會稽人為郡太守郭誕功曹孫皓時誕以不白妖言被收惶遽無以自明疇進曰疇今自在明府何憂遂詣吏吏上疇辭皓怒猶盛疇慮誕卒不免遂自殺以證之臨亡置辭曰疇生長邊陲不間教道得以門資厠身本郡踰越儕類位極朝右不能贊揚盛化養之以福今妖訛橫興干國亂紀疇以噂􅊱之語本非事實雖家誦人詠不足有慮天下重器而匹夫橫議疾其醜聲不忍聞見欲含垢藏疾不彰之翰筆鎮躁歸靜使之自息愚心勤勤每執斯旨故誕屈其所自默以見從此之為愆實由于疇謹不敢逃死歸罪有司惟乞天鑒特垂清察吏收疇喪得辭以聞皓免誕大刑送赴建安作船疇亡時年四十皓嘉疇節義詔郡縣圖形廟堂鍾離徇山隂人父牧徇領兵為將拜偏將軍戍西陵與監軍使者唐盛論地形勢謂冝城信陵為建平援若不先城敵將先入盛不然徇計晉果遣將修信陵城晉軍平吳徇領水軍督臨陳戰死晉張茂字偉康會稽人少有志行為鄉里所敬信初起義兵討賊陳斌一郡用全元帝辟為掾屬遷太子衛率出補吳興內史沈充反茂與三子並遇害茂弟盎為太守周札將軍充討札盎又死之贈茂太僕孔祗字承祖車騎將軍愈之弟也太守周札命為功曹史札既為沈充所害故人賓吏莫敢近者祗冒刃號哭親行殯禮送喪還義興時人義之梁王琳字子珩會稽山隂人授都督廣州刺史元帝為魏國所逼徴琳赴援除湘州刺史師次長沙知魏巳平江陵乃為元帝舉哀三軍縞素大營樓艦以圖義舉陳武帝受禪琳乃移湘州軍府就郢城帶甲十萬巡軍而言曰此可為勤王之師矣溫太真何人哉初魏克江陵永嘉王莊年甫七嵗逃匿人家琳迎還湘中出質于齊請納莊為梁王齊文宣遣兵援送册拜琳梁丞相遂奉莊纂梁祚于郢州琳兵東下為陳軍所敗復與莊同入齊齊孝昭遣琳出合肥鳩合義故更圖進取淮南傖楚皆願戮力陳將吳明徹冦齊齊遣琳與尉破吳等出援秦州破吳軍敗琳還至彭城齊令徑赴夀陽并許召募明徹進兵圍之城陷被殺哭者聲如雷齊贈琳侍中諡曰忠武張彪亡命若邪山中臨城公大連出牧東揚州以為中兵參軍侯景將宋子仙攻下東揚州還入若邪山義舉貞陽侯即位以為東揚州刺史陳文帝入會稽彪擊走之沈泰申進等共叛彪彪敗遂與弟崑崙及妻楊氏還入若邪山一犬名黃蒼在彪前後陳遣章昭達領兵購之并圖其妻劫來黃蒼便嚙一人中喉死彪應犬識之曰卿須我者但可取頭誓不生見陳蒨謂妻楊呼為鄉里曰我不忍令鄉里落他處今當先殺鄉里然後就死楊引頸受刃不辭彪不下刀便相隨下嶺彪謂楊曰從此而訣若見沈泰申進等為語功名未立猶望鬼道相逢劫即殺彪并其弟首致于昭達遂稱文帝教進兵迎楊楊便改啼為笑謂昭達殯彪既畢黃蒼俯伏冢間號呌不肯離楊還經彪宅謂昭達曰婦人本在容貌今辛苦日久請暫過宅妝飾楊入室遂割髮毁面哀哭慟絶誓不更行文帝聞之嘆息遂許為尼彪起于若邪興于若耶終于若耶及妻犬皆為時所重異孝行晉夏方字文正會稽永興人家遭疫癘父母伯叔羣從死者十三人方年十四夜則號哭晝則負土十有七載葬送得畢因廬于墓側種植松柏烏鳥猛獸馴擾其旁吳時拜仁義都尉纍遷五官中郎將吳平除髙山令百姓有罪應加捶撻輒涕泣向之小大莫敢犯焉宋賈恩會稽諸暨人少有至行母亡居喪過禮未葬為鄰火所逼恩及妻柏氏號哭奔救鄰近赴助棺櫬得免恩柏俱見燒死有司奏改其里為孝義里追贈天水郡顯親都尉郭世道會稽永興人生而失母父更娶世道事父及後母孝道淳偹年十四又喪父居喪過禮殆不勝哀母亡負土成墳親戚或共賻助微有所受葬畢雇賃還直仁厚之風行于鄉黨莫有呼其名者元嘉中大使散騎常侍袁愈表其淳行敕表門閭改所居獨楓里為孝行焉郭原平字長泰世道子父抱篤疾彌年原平衣不解帶跨積寒暑及亡哭踊慟絶數日方蘇以為奉終之義情禮自申乃訪邑中有營墓者助人運力經時展勤久乃間練窀穸之事儉而當禮性無術學因心自然母終毁瘠彌甚僅乃免喪文帝崩原平號慟日食麥粄一枚如此五日人曰誰非王臣何獨如此原平泣曰吾家見異先朝蒙褒贊之賞不能報恩私心感動耳太守蔡興宗臨郡深加嘆異還都表其殊行舉為太學博士會興宗薨事不行何子平世居會稽少有志行見稱于鄉里事母至孝竭身運力以給供養元嘉中除吳郡海虞令縣祿惟以養母不及妻子人或疑其儉薄子平曰希祿本以養親不在為已母喪去官哀毁踰禮每至哭踊頓絶方蘇大明末東土飢荒繼以師旅八年不得營葬晝夜號哭劈踊不闕俄頃所居屋敗不蔽雨日兄子伯興採伐茅竹欲為葺治子平不肯曰我情事未申天地一罪人耳屋何冝覆子平居喪毁甚困瘠踰久及至免喪支體殆不相屬幼持操檢敦厲名行雖處暗室如接大賓學義堅明處之以默好退之士以此貴之齊杜栖字孟山自父京産居會稽日門山中栖善清言連辟從事書佐為國子學士父老歸養栖肥晳長壯及京産病旬日間便皮骨自支京産亡水漿不入口晨夜不罷哭朔望節嵗絶而復續嘔血數升何胤謝朏並移書敦譬戒以毁滅至祥禫夢見其父慟哭而絶初胤兄點見栖嘆曰卿風韻如此雖獲嘉譽不永年矣卒時年三十六當時咸嗟惜焉唐羅讓字景宣以文學蚤有譽舉進士宏辭賢良方正皆髙第為咸陽尉父喪幾毁滅服除布衣糲食不應辟署十餘年淮南節度使李鄘即所居敦請置幕府除監察御史位給事中纍遷福建觀察使兼御史中丞有仁惠名丁興會稽人家近荒野野火沿燒興母老病乃濕衣覆母以身障火身死母全張萬和會稽諸暨人遭父母喪兄弟廬于墓側二十餘年有芝草生甘泉出萬和終其子亦廬于墓所唐孝友傳敘曰唐以孝弟名通朝廷者多閭巷刺草之民皆得書于史官諸暨張萬和蕭山李渭許伯會戴恭俞僅皆事親居喪著至行者天子皆旌表門閭賜粟帛州縣存問復租稅有授以官者許伯會蕭山人玄度十二世孫舉孝亷上元中為衡陽博士遭父喪負土成墳不御絮帛嘗滋味野火將逮塋樹悲號于天俄而雨火滅嵗旱泉湧廬前靈芝瑞獸生于墓側戴恭字玄敬蕭山人少居母喪十年廬于墓側生芝草嘉禾俞僅蕭山人一門四代兄弟十五人老幼八十餘口並經術貞亷僅遭親喪哀毁骨立為鄉里所稱觀察使孟簡書于圖經以勵風俗隱遁魏嵇康字叔夜其先會稽上虞人恬靜寡欲好老莊常修養性服食之事彈琴詠詩自足于懷著養生論所與神交者惟陳留阮嗣宗河內山巨源豫其流者河內向子期沛國劉伯倫嗣宗兄子仲容琅邪王濬沖遂為竹林之遊世所謂竹林七賢也嘗採藥遊山澤會其得意忽焉忘反山巨源將去選官舉康自代康乃與書告絶又撰上古以來髙士為之傳贊欲友其人于千載也晉阮裕字思曠陳留尉氏人居會稽剡縣有肥遁之志有以問王逸少逸少曰此公近不驚寵辱雖古之沉冥何以過此劉真長曰我入東正當泊安石渚下耳不敢復近思曠傍在東山終日靜默無所修綜而物自宗焉裕孫萬齡少知名家在剡縣頗有素情宋永初末自侍中解職東歸謝敷字慶緒會稽人性澄靖寡欲入太平山十餘年辟命皆不就初月犯少微一名處士星占者以隱士當之譙國戴安道有美才時人憂之俄而敷死會稽人士以嘲吳人云吳中髙士求死不得死戴逵字安道譙國人居會稽剡縣性髙潔常以禮度自處深以放達為非孝武帝時以散騎侍郎國子博士纍召辭父疾不就郡縣敦逼不巳乃逃于吳會稽內史謝幼度慮其逺遁不反乃上疏請絶其召命帝許之逵復還剡後召之復不至夏統字仲御會稽永興人嘗詣洛市藥會三月上巳王公以下並至浮橋士女車服燭路統在船中曝藥並不之顧太尉賈充怪而問之徐答曰會稽夏仲御也充耀以文武鹵簿鼓吹車乘又使妓女匝繞其船統危坐如故若無所聞充等各散曰此吳兒木人石心也統歸會稽不知所終宋孔淳之字彥深魯人居剡性好山水每有所遊必窮幽峻或旬日忘歸嘗遇沙門釋法崇因留三載與戴顒王𢎞之王敬𢎞等共為方外之遊會稽太守謝方明苦要之不能致使謂曰茍不入吾郡何為入吾郭淳之笑曰潛遊者不識其水巢栖者不辨其林飛沈所至何問其主終不肯往茅室蓬户庭草蕪徑惟床上有數帙書元嘉初徴為散騎侍郎乃逃于上虞界中家人莫知所在戴顒字仲若安道子也會稽剡縣多名山故世居剡下與兄並受琴于父父沒所傳之聲不忍復奏各造新㺯兄制五部顒制十五部顒又制長㺯一部並傳于世桐廬縣又多名山兄弟復共遊之因留居止兄卒顒以桐廬僻逺難以養疾乃出居吳下吳下士人共為築室聚石引水植林開澗少時繁密有若自然乃述莊周大旨著逍遙論禮記中庸篇元嘉中召不就又止京口黃鵠山山北竹林精舍宋文帝每欲見之嘗謂黃門侍郎張敷曰吾東巡之日當宴戴公山下也朱百年會稽山隂人少有髙情携妻孔氏入會稽南山以伐樵採箬為業以樵箬置道傍輒為行人所取明旦巳復如此人稍怪之積久方知是朱隱士所賣須者隨其所堪多少留錢取樵箬而去或遇寒雪樵箬不售無以自資輒自榜船送妻還孔氏天晴迎之好飲酒頗言玄理時為詩詠有髙勝之言隱迹避人惟與同縣孔凱友善凱亦嗜酒相得輒酣對盡歡顔竣為東揚州餉百年米五百斛不受後卒山中蔡興宗為會稽太守餉百年妻米百斛妻遣婢詣郡門奉辭固讓時人美之以比梁鴻妻王𢎞之字方平家在會稽上虞兄敬𢎞為左僕射嘗解貂裘與之即著以採藥性好釣上虞江有一處名三石頭𢎞之嘗垂綸于此經過者不識之或問漁師得魚賣否𢎞之曰亦自不得得亦不賣日夕載魚入上虞郭經親故門各以一兩頭置門內而去始寧沃川有佳山水𢎞之又依巖築室謝靈運顔延之並相欽重靈運與廬陵王義真箋曰會稽既豐山水是以江左嘉遁並多居之至若王𢎞之拂衣歸耕踰歷三紀孔淳之隱約窮岫自始迄今阮萬齡辭事就間纂戎先業既逺同羲唐亦激貪厲競若遣一個有以相存真可謂千載盛美也孔祐會稽山隂人敬康曽孫也至性通神隱于四明山嘗見山谷中有數百斛錢視之如瓦石不異采樵者競取入手即成沙礫曽有鹿中箭來投祐祐為之養創愈然後去太守王僧虔欲引為主簿不可屈祐子道徽與杜景齊友善少厲髙行能世其家隱居南山終身不窺都邑齊豫章王嶷為揚州辟西曹書佐不至鄉里宗慕之道徽兄子總有操行遇飢寒不可得衣食縣令丘仲孚薦之除竟陵王侍郎竟不至齊杜京産字景齊吳郡錢塘人少恬靜絶意榮宦頗涉文義専修黃老會稽孔顗清剛有峻節一見而為欵交與同郡顧歡同契始寧東山開舍授學劉瓛入東與之遊曰杜生當今之臺尚也又于會稽日門山聚徒教授建武初徴員外散騎侍郎京産曰莊生持釣豈為白璧所回不就卒褚伯玉字元璩錢塘人少有隱操年十八父為之昏婦入前門伯玉從後門出遂往剡居瀑布山性耐寒暑三十餘年隔絶人物王僧達為吳郡苦禮致之伯玉不得巳停郡信宿才交數言而退宋孝建二年召聘不就齊髙帝即位手詔吳會二郡以禮迎遣又辭疾上不欲違其志敕于剡白石山立太平館舍之卒年八十六伯玉常居一樓上仍葬樓所梁何胤字子季廬江灊人仕齊至中書令賣園宅欲入東山拜表辭職不待報輒去有詔許之以會稽山多靈異往遊焉居若邪山雲門寺初胤二兄求點並棲遁求先卒至是胤又隱世號點為大山胤為小山亦曰東山世謂何氏三髙梁武帝踐祚詔為特進不起有敕給白衣尚書祿固辭又敕山隂庫錢月給五萬不受乃敕何子朗孔夀等六人于東山受學胤以若邪處勢迫隘不容學徒遂遷秦望山山有飛泉乃起學舍即林成園因巖為堵别有小閣室寢處其中躬自啓閉僮僕無得至者唐秦系字公緒越州會稽人北都留守薛兼訓奏為右衛率府倉曹參軍不就客泉州南安九日山大松百餘結廬其上穴石為研注老子彌年不出刺史薛播數往見之嵗時致羊酒未嘗至城門張建封聞不可致請加為校書郎其後東度秣陵既卒南安人思之號其山為髙士峯張志和字子同婺州金華人居江湖自稱煙波釣徒著書號玄直子亦以自號兄鶴林恐其遁世為築室越州東郭茨以生草椽棟不施斤斧豹席棕屩每垂釣不設餌志不在魚也觀察使陳少遊往見為終日留表其居曰玄真坊以門隘為買地大其閎號回軒巷志和善圖山水擊鼓吹笛舐筆輒成嘗撰漁歌憲宗圖真求其歌不能致李文饒稱志和隱而有名顯而無事不窮不達嚴子陵之比云孔述睿越州山隂人梁侍中休源八世孫少與兄弟充符充讓篤孝巳孤偕隱嵩山而述睿資嗜學大厯中劉晏薦于代宗召纍擢司勳員外郎史館修撰述睿每一遷即至朝謝俄而辭疾歸以為常德宗立拜諫議大夫賜第宅固辭久乃改袐書少監以太子賓客還鄉方干字雄飛新定人隱于會稽漁于鏡湖蕭然山水間以詩自放咸通中太守王龜知其亢直薦之以諫官召不就而卒門人相與私諡曰玄英先生貞婦烈女漢曹娥見祠廟門晉虞潭母孫氏潭山隂人見人物門潭父忠亡遺孤藐爾孫氏雖少誓不改節躬自撫養劬勞偹至潭始自幼童便訓以忠義永嘉末潭為南康太守值杜叛逆孫氏勉潭以必死之義又傾資産以餽戰士潭遂尅捷及蘇峻亂潭守吳興假節征峻孫氏戒之曰吾聞忠臣出孝子之門汝當捨生取義勿以吾老為纍于時會稽內史王舒遣子允之為督護孫氏又謂潭曰府君遣兒征賊汝何獨不潭即以子寵為督護與允之合勢拜武昌侯太夫人潭立養堂于家王導以下皆拜謁焉卒諡曰定忠夫人張茂妻陸氏茂會稽人見節義門茂為吳郡太守為沈充所害陸氏傾家産率茂部曲為先登以討充充敗陸詣闕為茂謝不尅之責詔曰茂夫妻忠誠舉門義烈遂追贈茂太僕王凝之妻謝氏字道韞聰識有才辨凝之為會稽內史孫恩之亂凝之及諸子巳被害道韞命婢肩輿抽刃出門亂兵稍至手殺數人乃被虜外孫劉濤時年數嵗賊又欲害之道韞曰事在王門何關他族必其如此寧先見殺恩雖毒虐為之改容乃不害濤自爾嫠居會稽家中莫不嚴肅孫晷妻虞氏初徴士虞喜喜餘姚人見人物門隱居海濱有髙世之風晷欽其德名聞喜弟預有女遂聘焉女棄華尚素與晷同志時人號為梁鴻夫婦宋吳翼之母丁氏翼之永興人少喪夫不再行年荒分食以貽餓者同里左僑家露四喪無以葬丁為辦冢槨以仁愛著稱長婦王氏既寡亦執志不嫁州郡上言詔表門閭齊屠氏女居諸暨東汙里父失明母痼疾女晝樵採夜紡績以供養父母俱卒負土成墳鄉里多欲娶之女以無兄弟誓守墳墓不嫁梁張彪妻見節義門會稽志卷十四
