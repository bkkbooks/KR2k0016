  - {type: page-break, offset: 0, content: '', id: KR2k0016_WYG_016-1a, image: WYG0486/WYG0486-0343a.png}
body:
  text: 㑹稽志巻十六宋施宿等撰翰墨蘭亭叙者晉右將軍㑹稽内史琅琊王羲之逸少所書詩序也右軍以穆帝永和九年三月三日與太原孫統承公孫綽興公廣漢王彬之道生陳郡謝安安石高平郄曇重熈太原王藴叔仁釋支道林及其子凝之徽之操之等四十有一人脩祓禊于山隂之蘭亭酒酣賦詩製序用蠶繭紙鼠須筆書凡二十八行三百二十四字有重者皆構别體而之字最多至二十許字他日更書數十本終無及者右軍亦自愛重留付子孫至七代孫智永為比丘俗呼永禪師永卒傳書于弟子辨才辨才俗姓袁氏梁司空昻之𤣥孫唐貞觀中太宗鋭意學二王書帖摹搨殆盡惟未得蘭亭凡三召辨才詰之固稱荐經喪亂亡失不知所在後遣監察御史蕭翼微服為書生以詭辨才始得之命供奉搨書人趙模韓道政馮承素諸葛貞等四人各搨數本以賜皇太子諸王近臣貞觀二十三年高宗奉遺詔以蘭亭入昭陵惟趙模等所搨者傳於世事見何延之蘭亭記蘭亭記凡二千一百餘言秦少㳺摭取以載集中此本是也黃長睿東觀餘論䟦蘭亭記云因臨蘭亭閲法書要録見此記文詞繁𤨏戱為删潤但筆孏不能好書當俟他日别冩長睿所删本不復傳矣晁無咎跋蘭亭記始余幼時讀太平廣記見唐太宗遣蕭翼購蘭亭叙事葢譎以出之輒嘆息曰蘭亭叙若是貴耶至使萬乘之主捐信於匹夫傳稱子貢詐而全魯弦高誕而存鄭遺一言之細建二國之業猶不可以為常以太宗之賢巍巍乎近古所無奈何溺小嗜好而輕喪其非常之寶異於得原失信不圍而去者矣晚多閒居頗屏世好獨于古人筆墨之遺猶愛而不能置甚于少年喜官爵遲暮營田宅者與前論異矣因誦白居易七德歌曰功成理定何其速速在推心致人腹怨女三千放出宮死囚四百來歸獄復嘆曰太宗以一旅取天下惟信爾夫不吝三千女而放出宮自信也不約四百囚而來歸獄人信也晉捨原何足道哉全魯存鄭利重於譎也愛蘭亭叙事小於欺也其老而將傳至從其子求書從葬亦累矣累物鈞病於行若太宗不累者大累者小則世將曰此何足以論諸信不信之間士之行已亦若此而已然則此書雖以石刻傳可寶也崇寧丙戌前冬至五日緡東臯流憩洞李季良出之晁補之題吳傅朋跋閻立本畫蘭亭右圖冩人物一軸凡五輩唐右丞相閻立本筆一書生狀者唐太宗朝西臺御史蕭翼也一老僧狀者智永嫡孫㑹稽比丘辨才也唐太宗雅好法書聞辨才寶藏其祖智永所蓄晉右將軍王羲之蘭亭脩禊叙真蹟遣蕭翼出使求之翼至㑹稽不與州郡通變姓名易士服徑詣辨才朝暮還往情意習洽一日因論右軍筆蹟悉以所携御府諸帖示辨才相與反復折難真贋優劣以激發之辨才迺云老僧有永禪師所寶右軍蘭亭真蹟非此可擬藏之梁間不使人知與君相好因取以相示翼既見之即出太宗詔札以字軸寘懐袖閻立本所圖葢狀此一段事蹟書生意氣揚揚有自得之色老僧口張不呿有失志之態執事二人其一嘘氣止沸者其狀如生非善冩貌馳譽丹青者不能辦此上有三印其一内合同印其一大章漫滅難辨皆印以朱其一集賢院圖書印印以墨朱久則渝以故唐人間以墨印如王涯小章李德裕贊皇印皆印以墨此圖江南内庫所藏簮頂古玉軸猶是故物太宗皇帝初定江南以兵部外郎楊克譲知昇州時江南内府物封識如故克譲不敢啓封具以聞太宗悉以賜之此圖居第一品克譲蔡人寶此物傳五世以歸其子婿周氏周氏傳再世其孫穀藏之甚秘梁師成請以禮部度牒易之不與後經擾攘穀將逺適以與其同郡人謝伋伋至建康為郡守趙明誠所借因不歸紹興元年七月望有携此圖貨於錢塘者郡人吳說得之後見謝伋言舊有大牙籖後主親題刻其上云上品畫蕭翼籖今不存此畫宜歸太宗御府而乆落人間疑非所當寶有者説記汝隂王性之銍攷古云劉餗傳記云蘭亭叙梁亂出在外陳天嘉中為僧智永所得至太建中獻之宣帝隋平陳或以獻晉王即煬帝也帝不之寶後僧果從帝借搨及登極竟不從索果師死弟子辨才得焉文王為秦王日見搨本驚喜乃貴價市大王書蘭亭終不至焉及知在辨才處使歐陽詢求得之以武德二年入秦王府劉餗父子世為史官以討論為已任于是正文字尤審則辨才之師智果非智永求蘭亭叙者歐陽詢非蕭翼也此事鄙妄僅同兒戱太宗始定天下威震萬國尫殘老僧敢靳一紙書耶儻欲圖之必不狹陋若此況在秦邸豈能遣臺臣世亦猥信之何耶按辨才所住永欣寺即古之雲門今號淳化寺有蕭翼宿雲門東客院留題雲門二詩當是取蘭亭時也秦晁黃三公皆嗜古於攷訂為精信而不疑諸家所跋蘭亭叙多本延之之說吳傅朋記閻立本畫畫亡而跋猶存立本太宗時人葢亦親見當時事者恐不可盡棄然劉餗所云亦殊有理當兩存之中書侍郎虞龢論書表云羲之為㑹稽獻之為吳興故三吳之地偏多遺迹又是末年遒美之時羲之罷㑹稽住蕺山下一老嫗捉十許六角竹扇出市王聊問一枚幾錢云直二十許右軍取筆書扇扇為五字嫗悵惋云舉家朝飡惟仰於此何乃書壊王云但言王右軍書字索一百入市市人競市去姥復以十數扇來請書王笑不答羲之性好鵞山隂曇􅙓一作釀村有一道士養好鵞十餘王清旦乘小船故往意大願樂乃告求市易道士不與百方譬説不能得道士乃言性好道久欲冩河上公老子縑素早辦而無人能書府君若能自屈書道德經各兩章便合羣以奉羲之便住半日為冩畢籠鵝而歸陶隠居與梁武帝論書啓云逸少自吳興以前諸書猶為未稱凡厥好迹皆自向㑹稽時永和十許年中者從失郡告靈不仕以後畧不復自書皆使此一人世中不能别也見其緩異呼為末年書今聖㫖標題足使衆識頓悟於逸少無復末年之譏逸少黃庭經後題云永和十二年五月二十五日山隂縣冩東方先生畫像贊永和十二年五月十二日書與王敬仁曹娥碑昇平二年八月書皆誓墓不仕在越所書班班可考換鵞乃道德經而李太白送賀季真詩云山隂道士如相見應冩黃庭換白鵞道德經既不傳獨黃庭至唐太宗時入御府禇遂良於中禁西堂録出正書目五巻第二乃黃庭經六十行與山隂道士武韋之禍古帖散落至𤣥宗開元間収綴二王書黃庭為第一豈太白在翰林嘗見之亦有所據而云耶十七帖凡二十七條逸少書中龍也張彦逺以為王草書中烜赫著名帖信然自昔相傳與周益州葢其中間蜀事為多玩味帖語類多晚歳所作正在㑹稽時也第十六條云胡母氏從妹平安故闕興居去此七十也按吳置永興縣其地闕今之蕭山云羲之㳺天台還至㑹稽值風月清照夕止洞庭豪詠之末題柱其飛字有爪之形焉後人因之遂稱龍爪書羲之為㑹稽獻之七八歳學書羲之從後掣其筆不脱歎曰此兒書後當有大名獻之羲之第七子書入神品羲之為㑹稽子敬出戱見北館新白土壁白净可愛子敬令取掃箒沾泥汁中以書壁為方丈二字晻曖斐亹極有好勢日日觀者成市羲之後見嘆其美僧智永章草題右軍樂毅論云樂毅論者正書第一梁世摹出天下珍之陳天嘉中人得以獻文帝帝賜始興王王作牧鏡中即以見示昔聞其妙今覩其真此書留意運工特盡神妙智永時在雲門永欣寺謝靈運㑹稽人模憲小王真草俱美靈運母劉氏子敬之甥故靈運能書而特多王法𨽻草入妙虞松字叔茂㑹稽人魏中書令大司農竇臮述書賦云名微格高復見叔茂體裁簡約肌骨豐娉如空凝斷雲水泛連鷺孔琳之山隂人善草行書師於小王稍露筋骨時稱羊真孔草王僧䖍云孔琳之放縱快利筆道流便二王以後畧無其比但工夫太少故常劣於羊欣𨽻行草入妙妻謝氏亦善書謝敷為㑹稽山隠士善草𨽻王僧䖍云敷善冩經入能品賀道力㑹稽人善草書尺牘尤美盧綽字士裕餘姚人官至秘書學士博學有俊材工草𨽻賀朗㑹稽人陳秘書監書賦云賀氏曰朗雖非動人不凡筆力猶阻學貧若宦㳺旅泊衣化風塵僧法極字智永㑹稽人王右軍七代孫號永禪師與兄子孝賔俱捨家入道孝賔改名惠欣初落髪時住㑹稽嘉祥寺即右軍之舊宅後以每年拜墓便近因移此寺梁武帝以欣永二人故號所住之寺曰永欣焉今雲門淳化寺常居閣上臨書凡三十年所退筆頭置之大竹簏簏受一石餘而五簏皆滿人來覔書如市戸限為之穿穴用鐵裹之人謂之鐵門限後取筆頭瘞之號退筆冢自製其銘又嘗臨冩真草千字文八百餘本浙東諸寺各施一本妙傳家法精力過人隋唐間工書者鮮不臨學禪師年百歳乃終兄智楷亦工書智果㑹稽人師永禪師于永欣寺煬帝甚善之工草書銘石甚為瘦健嘗謂永師曰和尚得右軍肉智果得其骨僧辨才俗姓袁氏梁司空昻之𤣥孫為永禪師弟子遺書並付與博學工文琴書碁畫皆得其妙每臨禪師書逼真亂本於方丈梁上鑿闇檻以貯蘭亭年八十餘猶每日於牕下臨學數徧其老而篤好也如此虞世南字伯施餘姚人其書得大令之宏規同郡智永善學王右軍書世南師焉妙得其體由是聲名籍甚及其暮齒加以遒逸太宗謂世南有出世之才遂兼五絶書翰居一焉𨽻行草書入妙孔侃字敬思官大司農愉字敬康官車騎將軍居㑹稽山書賦云敬思敬康二孔殊芳思行則輕利峭峻類驚虬逸駿康草則古拙鬱紆如落翮摧枯謝藻字叔文㑹稽人官中書侍郎書賦云叔文法鍾纎薄精練用筆雖巧結字未善似漸陸之遵鴻等窺巢之乳燕丁潭字世康㑹稽人官散騎常侍書賦云反古不忘吾推世康似無逸少如稟元常猶落堯階之蓂莢掇秘府之芸芳劉廞字季舒㑹稽人為光禄大夫書賦云季舒纎勁循古有體遇稀難評唯署二啓賀知章字季真㑹稽人善𨽻草嘗與張旭㳺于人間凡人家好㕔館好墻壁及屏障或忘機興發落筆數行如蟲篆飛走雖古之張索不如也好事者供其牋翰共傳寶之書賦云湖山降祉狂客風流落筆精絶芳詞寡仇如春林之絢彩實一望而冩憂今存草書一帖云湖東只因種蓮四十步間遂不生闕豈不相宜耶菓珍紫蓴適我願也闕下稍止赤精服七八過前後有米元章小楷題識禮部尚書尤延之刻置天台郡齋政和間秘書黃長睿嘗見張長史帖十字云賀八清鑑風流千載人也長睿跋云沈吟此語恍若季真在目長史此帖不獨草聖可賞也徐浩字季海越州人唐肅宗立由襄陽刺史召授中書舍人兼尚書右丞四方詔令多出浩手遣辭贍敏而書尤精帝喜之寵冠一時始浩父嶠之善書以法授浩益工嘗書四十二幅屏八體皆備草𨽻尤工世狀其法曰怒猊抉石渴驥奔泉浩有論書一篇及古迹記傳於世王右軍書家譜在山隂縣王氏越州教授王渙之以書抵芾具云有此書王獻之已復此節帖在朝請大夫新昌石元之家闗景仁屢見之嘗模石芾見臨兩本字體精妙洪元眘集右軍越州字碑真迹在越州僧正子文處嘗通書許借未果託提刑喬執中携去質看亦不肯出欲公幹至越㑹家難不果去今要度牒易虞世南枕卧帖雙鈎唐模在朝奉大夫錢塘闗杞處上有儲氏圖書古印闗嘗謂芾曰昔越州一寺修佛殿于梁棟内龕藏一函古摹數十本所可記者王右軍十七帖世南枕卧帖十鬭九帖褚遂良奉書寧帖上皆有儲氏圖書字印致工精絶毫髪乾濃畢備闗與僧善購得枕卧十鬭九奉書寧三帖虞世南書經在越州上虞右自王右軍書家譜以下五條見米禮部書史寶章待訪録顔魯公與夫人帖一幅米元章書史云夫人當是其㛐在王銑家後有黄魯直等跋帖破碎過半今在府城故司馬泰州儼家李陽冰小篆二十四大字在直華文閣陸公㳺家葢先師所藏李後主與徐鉉帖在王編修銍家凡數紙所謂小字如聚鍼鐵者亞栖書在開元寺僧房亞栖筆法雖前輩或有異論然今閣下所刻闕古帖有之闕唐名迹也碑刻秦頌德碑丞相李斯小篆史記始皇三十七年上㑹稽祭大禹望于南海立石刻頌德二世元年春行郡縣至㑹稽盡刻始皇所立刻石石旁著大臣從者名以彰先世成功盛德其文曰皇帝休烈平一宇内德惠攸板本作脩長三十有七年親巡天下周覽逺方遂登㑹稽宣省習俗黔首齋莊羣臣頌功本末事迹追首高明秦聖臨國始定刑名顯陳舊章初定法式審别職任以立恒常六王專位貪戾慠猛率衆邦板本作自强暴虐恣行負力而驕數動甲兵隂通間使以事合從行為辟方内飾詐謀外來侵邊遂起禍殃義威誅之殄熄暴悖亂賊滅亡聖德廣密六合之中被澤無疆皇帝并宇兼聽萬事逺近畢清運理羣物攷驗事實各載其名貴賤並通善否陳前靡有隠情飾省宣義徐廣曰省一作非有子而嫁倍死不貞防隔内外禁止淫佚男女潔誠夫為寄豭殺之無罪男秉義程妻為逃嫁子不得母咸化亷清大治闕俗天下取風蒙被休經皆遵度軌和安敦勉莫不順令黔首修潔人樂同則嘉保太平後敬奉法常治無極輿舟不傾從臣誦烈請刻此石光垂休銘越絶云秦皇東㳺之㑹稽以正月甲戌到大越舍都亭取錢塘岑石長丈四尺南北面廣六尺三寸東面廣四尺西面廣尺六寸刻于越東山上其道九曲去越二十一里水經云秦始皇登稽山刻石記功尚在山側梁書竟陵王子良為㑹稽太守范雲為主簿以山上有始皇石刻三句一韻多作二句讀之並不得韻又有字皆不詳雲夜取史記讀之明日登山讀之如流張守節史記正義云㑹稽刻李斯書其字四寸畫如小指圓鐫今文字整頓是小篆也姚令威叢語云嘗上㑹稽東山自秦望山之巔並黃茅無樹木復自小徑别至一山俗名鵞鼻山山頂有石如屋大挿一碑於其中文皆為風土所剥隠約就碑可見缺畫如禹廟没字碑之類不知此石果岑石歟非始皇之力不能挿於石中此山險絶罕有至也紹興二十八年王詹事十朋為簽書判官莫舍人濟教授府學梁寺丞安世為㑹稽尉用令威所記鋭意捜抉三公各賦三十四韻以紀其事王公詩序云秦誦徳碑世傳在秦望山莫知所在教授莫子齊好竒嗜古捜訪甚力有言在何山者莫以語十朋何山見圖經在秦望東南疑其真秦望十朋語縣尉梁次張勸其親往梁慨然而行命工登山梁得之碑石僅存字磨滅已盡墨片紙而還作詩具記始末因次其韻且記吾三人好事之癖永以示後人莫公詩叙云秦㑹稽石刻唐人如張守節司馬貞皆嘗援以證史記紹興初舅氏姚令威删定登山弔古見碑石猶存後二十餘年分教是邦以語簽判王龜齡勉邑尉梁君求之則石已缺字不可見矣以詩記其事龜齡既賡以濟首發其端書以示濟按㑹稽秦頌德碑凡二百九十六字視秦世泰山之罘諸刻獨此碑字為最多唐李嗣真云斯小篆之精古今妙絶秦望諸山及皇帝玉璽猶千鈞强弩萬石洪鐘豈徒學之宗匠亦是傳國之遺寶周越法書苑猶載封禪碑數十字而已至歐陽公趙德父集録天下金石遺文殆盡亦不復有秦望山碑姚令威紀鵞鼻山頂石屋所挿一碑今石屋故在碑葢無有梁次張所摹片紙指為秦碑乃在何山其去鵞鼻尤為隔絶盡記本末以俟後之君子禹廟窆石遺字直寶文閣王順伯復齋金石録定為漢刻齊石佛像銘十八字曰齊永明六年太嵗戊辰於吳郡敬造維衛尊像筆法亦工在㑹稽石佛妙相寺桐栢山金庭館碑沈約造兒珪之正書永元三年三月石已亡系地云在嵊縣東七十二里本觀内據記稱永泰中定居桐栢嶺因地名建館曰金庭館命置道士十人而已為之首葢道士自叙之言非約所撰其謂之造者疑如後世立碑之類爾今碑本朝重刻隋禹廟碑史陵所書張懐瓘書斷稱陵書高古褚遂良嘗師焉趙德父金石録謂此碑文字磨滅隠隠可辨筆法精妙不減歐虞姚令威叢語名為禹廟没字碑吳興施宿來佐此府命工椎拓刮磨垢蝕得二百二十有四字乃為碑譜刻寘祠下唐虞世南碑訪碑録云虞世南書系地云貞觀二年立在㑹稽南二十里龜趺猶存碑已亡矣虞荷碑永興公世南撰釋某書貞觀六年大中大夫致仕其年卒于㑹稽石不存越州龍泉寺碑虞世南撰布夜董尋重書沙門好直篆額大周天授二年竪太和八年再修建碑在餘姚縣今亡矣寺有重刻碑周宻州司馬康遂誠墓誌行書小字無書撰人姓名則天長壽三年三月窆於離渚山賀知章二告一延和元年八月加階告四門助教擬宣義郎一開元四年八月起居郎舊在天長觀今徙至府學龍瑞宮記賀知章撰並正書刻于宮後葛仙公煉丹井側飛來石上漫滅僅存宮内有重刻本高行先生徐師道碣開元十一年四月姚奕序賀知章銘子嶠之正書僅餘碎石四片十不一存陷府治㕔壁香嚴寺碑康希銑撰徐嶠之正書篆額開元十一年六月立碑在諸暨薦嚴寺秦望山法華寺碑李邕撰并行書篆額開元二十三年十二月八日建在天衣寺孔子弟子賛明皇源乾曜盧從愿李抗元行冲張嘉貞宋璟陸餘慶姚元崇蘓頲裴灌撰康廷告徐浩行書天寶十二載三月石不存太子率更令康君碑宇文顥山隂述天寶十五載寶公衡記史懐則分書并篆額其畧云天寶甲午夏四月宇文顥莅山隂一年而成其佳政二年而號為樂土石不存大理少卿康公夫人河間郡君許氏墓誌王壽撰禇庭誨正書夫人葢康珽之妻祖敬宗以天寶六載葬于蘭亭休光寺真法師行業贊寺在餘姚縣今名九功天寶十五載王燧文洪元眘集王右軍行書石不存𤣥儼律師戒壇碑萬齊融撰徐浩正書篆額天寶十五載六月建在天衣寺徐浩先塋題記大厯九年十月浩正書刻于高行先生徐師道碑隂石不存山隂縣額三字舊傳徐浩書或謂學王右軍書而工者非浩所及丹陽葛蒙勒石在縣治康希銑殘碑大厯十二年顔真卿撰并正書舊在山隂離渚今在府治㕔壁通判府事施宿又得二十餘字于民間併陷寘焉丞相神道殘碑訪碑録云篆額三字遺文一百九十字顔書在山隂縣今皆不存亦莫知丞相為何人康府君碑并隂皆不存碑隂上列伯顯貞伯遂誠父德言叔希銑叔闕五人各有官位中列堂兄四人堂弟九十下列男泚液令初令望泳五人德言即率更令有徐浩所書墓碑嗣子珽又有大理少卿康公夫人許氏墓志云有子泚液令初令望泳則此碑葢康珽碑也夫人碑載珽正為少卿不及送葬府君正碑既亡所終官不復可攷碑隂拓本猶有存者王順伯録其碑始得具載本末然遂誠有墓誌希銑有顔魯公書碑康氏在一時亦盛矣太子率更令康君碑徐浩正書篆額九字云大唐故康府君墓誌銘環以十二相屬石在山隂之離渚紹興間里正病官司拓本之煩斷仆田間徐浩書經在上虞下葢山石不存南鎮㑹稽山永興公祠堂碣貞元元年四月羊士諤撰韓杍材書韓方明篆額大覺禪師國一影堂碑崔元翰撰羊士諤正書貞元九年二月八日石在府城大慶寺碑作嘉祥寺貞元題名在府治卧龍山磨崖所刻貞元乙已歳十一月九日復禹衮冕并修廟記元和三年十月崔及撰馬稹正書篆額十二字在禹廟今名告成觀薛苹禹廟祈雨唱和詩薛苹及和者崔述等十七人共十八詩豆盧署正書刻於復禹衮冕碑之隂建南鎮碣記孟簡撰陳構正書元和十年七月禹廟題名張良祐孟簡等十一人元和十年三月二十七日祭南鎮謁禹廟畢至寺崔詞謁禹廟詩杜專正書陳章甫序釋惠通分書開元二十載孟秋宋之問詩附元和十一年八月陳翺書又題名二人去年同逰今年不到張良祐孟存七又今年續到同逰鄭逌元和十一年四月三日記後又題奉使續到劉茂孫庾肩吾孟簡禹廟詩謝楚行書元和十一年八月二十六日禹穴碑鄭昉撰元稹銘韓杍材行書陸洿篆額寶厯景午秋九月作後有太和元年八月三日中山劉蔚續記二行在龍瑞宮禹穴碑隂元稹并僚屬十一人官位名氏并拜禹廟詩一首後有章草一行元威明春分投簡陽明洞天詩王璹分書劉蔚篆額太和三年正月十五日立石龍瑞宮越州衙前總管杜義墓誌沙門東乂述太和三年四月二十四日葬淳熈壬寅呂氏營葬紹興府九里得此塼誌㩦歸諸暨白居易繼春分投簡陽明洞天詩王璹分書太和三年八月十五日故呂氏道場寧賁禪師塔銘范的撰并行書沙門潭鏡八分書額八字太和五年九月建塔在山隂縣昭福寺李紳題法華寺詩趙德父金石録云法華寺詩唐越州刺史撰其後自序題云太和甲寅歳逰寺刻詩于壁詳自序所言似紳自書然以端州題名較之字體殊不類甲寅太和八年也修龍宮寺碑浙江東道都團練觀察處置等使中散大夫檢校左散騎常侍兼越州刺史御史中丞李紳撰行書篆額無姓名太和九年四月二十五日建在嵊縣古羅漢塔記沙門知白述王辭正書開成二年丁已九月八日咸通七年七月二十日再建立在餘姚縣戸曹齊饟墓誌蔣璟撰正書無姓名開成三年四月窆于㑹稽笥山之南原石不知所在奚奬書尊勝經小字闕多開成四年十二月十七日建在餘姚龍泉寺開元觀夏尊師墓誌何得一述正書無姓名尊師名季昌㑹昌元年二月分宮于陶朱峰東北長山之極原屬諸暨縣奚奬書尊勝經行書序正書經㑹昌元年六月二十七日建前昭義軍節度要藉試右監門率府兵曹參軍上䕶軍奚奬書在戒珠寺靈應廟碑前進士呂確書㑹昌元年辛酉歳建已月十五日乙夘記廟在錢清鎮賜額靈助近歳修廟得之土中今寘祠下京兆阿史那夫人墓志㑹昌二年十二月山人陳儉述石在府城五大夫市新橋記余球述周授行書㑹昌三年月屬無射二十有九日建石不存賜李褒改大中禹跡寺勅無歳月當是大中年間碑在本寺勅大中聖壽院額六字又題散騎常侍充集賢殿學士兼判院事栁公權書十八字於其旁皆公權書院有刻石本勅戒珠寺記趙璘撰貝靈該分書并篆額四字咸通三年正月二十五日平察微墓誌咸通三年八月窆于陶朱鄉赤山之崗名闕字察微實漢相平公之逺裔也石在諸暨縣大慶寺衆尼粥田記裴澹述王隋正書咸通三年十月二十七日後有田段四至越城劉府君墓誌楊珪撰咸通十年已丑歳十一月窆于易俗鄉山亭諸暨縣大慶寺復寺記貝靈該分書并篆額咸通十一年二月二十日刻王鋗書尊勝經咸通十三年八月聞人銖造戒珠寺王修已書尊勝經正書小字咸通十五年歳次甲午三月丁亥禹跡寺董府君墓誌祝知微撰正書無姓名誌云唐故浙東都團練使右廂兵馬司銀青光禄大夫檢校國子祭酒行處州司馬兼侍御史上柱國濟隂董府君墓誌乾符四年十月二十五日窆石不知所在平陽霍夫人隴西李氏墓志任遐述乾符六年建子月窆于犠溪里楊公山之陽候官令魏容墓志袁闕述中和元年十月卒景福元年題字在府城天王寺山王右軍祠堂記從十一代孫師乾撰晉故右將軍㑹稽内史瑯琊王府君祠堂碑銘正書并額四字系地云范的書碑無書人姓名歳月趙德父金石録附唐末在府城蕺山戒珠寺雲門寺畫華嚴經變相讚馬鴻篹田琦分書碑無歳月吳越忠懿王詩丁未歳仲冬自丹丘歸國由南明川禮瑞像因抒二十八字熈寧已酉刻石錢忠懿王二書付長老重曜有吳越國印刻石在雲門净雲菴求遺書本朝崇文總目為書三萬六百六十九巻嘉祐中從左正言秘閣校理吳及之請下詔購遺書每一巻支絹一疋五百巻與文資自是獻書者甚衆及高麗來朝亦數獻書至宣和中册府所藏充牣棟宇而禁中藏書尤盛設官校勘謂之御前書籍中更變故喪亡略盡至高宗巡幸至吳中雖祖宗謚號亦亡之但稱廟號建炎三年因攷求字訓而有司言止有廣韻俟求訪得集韻乃可盡見其散亡乃至于是紹興十三年始建秘書省於臨安天井巷之東仍詔求遺書於天下首命紹興府録朝請大夫直秘閣陸宰家所藏書來上凡萬三千巻有竒時置局於班春亭命新信州教授虞仲闕新江東安撫司准備差遣陸淞等數人校勘書手百餘人再閲歳乃畢今四庫所藏多其本也先是有布衣諸葛行仁亦㑹稽人進所藏書八千五百四十六巻賞以官實紹興五年六月也陸氏書幾倍之時秦檜當國以其嘗為李光所薦故不復議褒録藏書越藏書有三家曰左丞陸氏尚書石氏進士諸葛氏中興秘府始建嘗于陸氏就傳其書而諸葛氏在紹興初頗有獻焉可以知其所蓄之富矣二事見求遺書門尚書則石公公弼也陸氏書特全於放翁家嘗宦兩川出峽不載一物盡買蜀書以歸其編目日益鉅諸葛氏以其書入四明子孫猶能保之而石氏當尚書亡恙時書無一不有又嘗纂集前代闕器為圖記亦無一不具其後頗弗克守而從子大理正邦哲盡以金求得之於是為博古堂博古之所有衆矣其㝠搜逺取抑終身不厭者後復散出而諸孫提轄文思院繼曽稍加訪尋間亦獲焉三家圖籍其二氏嘗更廢遷而至今最盛者惟陸氏初荆國王文公臨川人其從諸孫實來暨陽今為直寶文閣厚之平生澹泊無他好獨好聚金石刻甚于嗜欲又特精鑒故所得尤多自三代彛鼎欵識秦漢以降碑篆銘碣縣厓斷壁題字紀績收刓補闕整緝漶滅皆大備於所著復齋金石録家世有右軍繭紙建安帖尤所寶惜常以自隨其他汗牛充棟矣迨及晚年遂謂無可欲者葢愛之專有之又豐世共知之當自為一家云㑹稽志巻十六
