田者以舜之餘族所封舜姚姓故曰餘姚蓋其子孫思舜鄉取像於此亦猶漢新豐之義蓋此山雖非舜之耕所亦因舜而得名也王介甫歷山賦序云餘姚縣人與季父爭田豫為直之將歸閔然望歷山而賦之歷山在上虞界中按此山實屬餘姚介甫謂在上虞界中誤矣蘇鶚演義云歷山有四一河中二齊州三冀州四濮州雷澤又其二不聞又云耕之與漁宜皆在雷澤史記注云歷山在河東漁澤今歷山隂然則舜之所耕不在明矣演義云歷山其二不聞豈此山乃其一耶梁江文通題歷山詩云愁生白露日思起秋風年落葉下楚水别鶴噪吳田嶂氣隂不極日色虧半天酒至情蕭瑟慿尊還惘然文通會稽永興人所題乃此山也大蘭山在縣東南八十里傳云劉樊夫婦於此山仙去靈源山在縣西南三十里有泉曰靈源故名鳥膽山在縣西南四十里山與上虞縣接於上虞互見風山在縣西北一十里廣四十里十道志云山少木多石通于始寧及剡東明山在縣西南五十里白雲山在縣西南六十里冶山在縣東北二里傳云歐冶子鑄劒之所會稽縣志堇山鑄浦皆傳歐冶子鑄劒處今並存之陳山在縣東北一十五里有嚴子陵墓靈瑞塔山下泉名華清石匱山在縣東六十里傳云禹藏書於此山有大石礧磈其形如匱會稽縣宛委山一名石匱山隂縣南亦有石匱山今並存之安山在縣東北一十里石人山在縣東北四十五里山下有洞破山在縣東北六十里一名三山嶼山在縣東北三十里仙居山在縣東北六十里一名栲栳山聖龜山在縣西北二里一名打石山鏌劒山在縣西北四十里烏山在縣西北二十里薑山在縣西北五十里袤十里山有五峰曰金雞曰娥眉曰積翠曰凌雲曰白馬山下有薑女泉精舍尉斗山在縣西北二十五里何山在縣西北四十里上虞縣􅏛山在縣南五里一名太平山舊經云形如傘也吳道士于吉築館於此山巔平衍有良疇數十頃橫塘溉之無水旱太平山有三一在會稽一在餘姚一􅏛山亦名太平山舊經云此山在餘姚縣西南一百一十里考之的然上申山在縣南四十里升相山在縣南三十五里山巔瀑布號白水蘭穹山在縣西北二十五里一名蘭風舊經云葛洪嘗栖隱於此有石井丹竈山多石少木四望迢遙有形勢自東西眺之則正方寰宇記云琅邪王𢎞之垂釣之地宋王𢎞之傳性好釣上虞江有三石頭𢎞之常垂綸於此人問得魚賣否答曰釣自不得得亦不賣東山在縣西南四十五里晉太傅謝安所居也一名謝安山巋然特立於衆峰間拱揖蔽虧如鸞鶴飛舞其巔有謝公調馬路白雲明月二堂址千嶂林立下視滄海天水相接蓋絶景也下山出微徑為國慶寺乃太傅之故宅傍有薔薇洞俗傳太傅携妓女遊宴之所又山西一里始寧園乃謝靈運别墅一曰西莊按謝安傳云寓居會稽與王羲之許詢支遁逰出則漁獵山水入則言詠屬文後雖受朝寄然東山之志始末不渝靈運傳云父祖並葬始寧山中并有故宅及墅遂移籍會稽故其詩云偶與張邴合久欲還東山又云分離别西川回景歸東山注謂會稽靈運之所居也蓋太傅始居此及出鎮新城欲造泛海之裝自海道還東雅志未就而沒後卒葬焉今山西有太傅墓靈運自移籍會稽多在始寧其著山居賦云南北兩居水通涯阻注云兩居謂南北兩處南山是開創卜居之處傳云修營别業傍山帶江盡幽居之美今山半有洗屐池東西二眺亭雖後人好事為之然舊園别墅迹不可泯又舊經云梁徴士魏道微修道得仙於謝安山南史杜京産與顧歡開舍授學於東山下今距山一二里有杜浦顧墅舊經云東山在縣西北三十里非也東山因太傅而名者三一在臨安山中按傳云嘗坐石室臨濬谷悠然嘆曰此與伯夷何逺東坡詩云謝公含雅量世運屬艱難獨携縹眇人來上東西山今臨安縣東西巖石室存焉一在金陵按列傳云及登台輔於土山營墅樓館林竹甚盛每携中外子姪往來逰集建康志云謝安本居會稽東山後入朝乃於此營築以擬之山無巖石故名土山是二山雖太傅平生之所遊歷非故居之東山也惟始寧東山乃其故居其證明甚世説王羲之語劉倓曰若安石東山志立當與天下共推之注引續晉陽秋曰安石家於會稽上虞縣優遊山林六七年間徴召不至雖彈奏相屬繼以禁錮晏然不屑也自咸康初避召不起髙以歷年所以放情邱壑正在此山自東漢末析上虞之始寧鄉為始寧縣至東晉有上虞始寧二邑陽秋所載得其實矣王性之著東山記言東山之在會稽其證有七獨不援此為説豈偶遺之耶然晉宋諸賢居會稽剡中例稱東山阮裕居剡中有肥遁之志其在東山久之蕭然無事嘗內足於懷戴逵厲操東山王修齡在東山甚貧乏道一道人從都下還東山支遁好鶴住東山宋何胤以會稽山多靈異居若耶山雲門世號胤為小山亦曰東山又何子朗等六人於東山受學梁虞寄領會稽郡輒致書陳寶應自稱東山虞寄然則會稽剡中若耶雲門皆可稱東山也今阮戴支遁遺迹在嵊縣何胤所居在雲門東山屬新昌縣凡山之處東皆可稱東山伹不若此山因太傅而著爾王性之記云安石與戴逵同寓此東山恐别有據大抵晉宋人指會稽剡中皆曰東如太傅傳云棲遲東山又云海道還東是也檀燕山在縣西南五十里舊經云神仙宴集之所上有旃檀香氣襲人樵者或時聞管簫聲太平御覽山頂有十二方石悉如坐席許大皆作行列仙靈之所宴集也釣臺山在縣西南七里舊經云山有槎大十圍昔陶公嘗乘此垂釣公既去槎墜於潭底不復浮矣崤山在縣西南四十二里舊經云漢東陽駱夫人於此上升傍有井竈嵗久蕪沒今山崖南有二白石土人號日月石會稽縣東七十里有崤山云駱夫人學道之所舊經作駱大夫誤指石山在縣西南四十五里舊經云上虞縣有立石所謂指石者俗呼為公嶄言舜登此石夏蓋山在縣北五十里舊經云山形如蓋因以為名引輿地志云上虞縣北有夏駕山在湖中湖即名夏駕出苮草土人織以為席甚細密多接者為精讖書云夏駕山浮可避甲申水災湖北去海數里山北對海鹽岸蓋一作駕蓋駕音近傳之訛耳舊經蕭山縣翠嶂山一名夏駕山在縣西二十五里有夏蓋湖湖北去海數里山北對海鹽岸餘並同握登山在縣西南四十里山有握登聖母廟象田山在縣西南四十里周四十餘里山平衍俗呼小天台南有舜井大雷尖山在縣南一十里十道志云一名百樓山山腰有平地數十文漢魏伯陽嘗築居於此石壁山在縣西南四十五里十道志其南小山山形方正如樓號鼓吹樓寰宇記云山有飛翼樓謝靈運題石壁精舍詩云披拂趨南徑愈悅偃東扉注云精舍讀書齋也龍山在縣西二十五里佛迹山在縣西北四十五里有石徑尺許深一寸如巨人足迹長者山在縣南二里蔡墓山在縣西一十二里或以為蔡雍墓山也按蔡雍傳雍陳留圉人亡命逺迹吳會文選伏滔笛賦云雍避難江南宿於柯亭之館取椽為笛又傳云雍過吳讀曹娥碑則雍嘗至會稽郡然有墓於此未詳裏嶴山在縣西南三十里龍塘山在縣西南四十里一名鵝鼻山山有上下二潭上潭泉脈不竭下潭多枯嵗禜禱於此有驗里人結屋以覆之崑崙山在縣西南四十里有神祠羅巖山在縣北七里羅壁山在縣北十里餘姚縣南十八里山同今並存之雙碁山在縣西南五十里俗傳二仙者沐訖對奕於此四明山在縣南四十里南史梁孔祐隱四明山見山谷中有錢數百斛視之如瓦石采樵者競取之入手即成沙礫有鹿中矢來投祐祐為豢之瘡愈而後去太平御覽李汾上虞人嘗入四明山讀書餘姚縣南一百二十里山名同今並存之銅山在縣南二十五里烏膽山在縣東一十五里大雷山在縣西南六十五里鳯凰山在縣西南六十里山有鳯穴含珠山在縣西南五十里鳯山在縣北三十五里山形如鳯白道猷嶺在縣南五十里晉天竺僧白道猷卓菴於此孝間嶺在縣北十里昔嶺下有包全居之以孝聞新昌縣南明山在縣南五里一名石城一名隱嶽初晉僧曇光棲迹於此自號隱巖支道林昔葬此山下齊僧護夜宿聞笙磬仙樂之聲梁天監中建安王始造彌勒石佛像劉協撰碑其文存焉山有錢鏐所造三層閣寶相寺白雲莊白蓮菴齊顗井白鷴塢石縫梅皆勝迹也支道林葬處今泯按世説戴逵過林法師墓曰德音未逺拱木已積注云永和九年支遁終於剡之石城山因葬焉今不知何所王珣詩序云豫以寧康三年命駕之剡石城山即法師之墓也髙墳鬱為荒野丘隴化為宿莽遺迹未滅而其人已逺感想平昔觸物悽懷其為時賢所惜如此僧史云道林葬餘姚塢山未詳今兩存之東山在縣東四十里晉僧法深支遁皆隱居此世説支道林好鶴住剡東山有人遺其雙鶴養成翮便使飛去又嘗就深公買山深公曰未聞巢由買山而隱沃洲山在縣東三十二里晉白道猷法深支遁皆居之戴許王謝十八人與之逰號為勝會亦白蓮社之比也唐白樂天山院記云東南山水剡為面沃洲天姥為眉目唐韋應物權德輿送靈徹歸沃洲有詩序傳焉山有靈徹杖錫泉西南養馬坡放鶴峰皆因支道林得名吳虎臣漫録云沃洲天姥號山水竒絶處自異僧白道猷來自西天竺賦詩云連峰數十里修林帶平津茅茨隱不見雞鳴知有人晉宋之世隱逸為多寰宇記以沃洲山屬嵊縣今從正之天姥山在縣東南五十里東接天台華頂峰西北聫沃洲山上有楓千餘丈寰宇記云登此山者或聞天姥歌謡之響道藏經云沃洲天姥福地也謝靈運詩云暝投剡中宿明登天姥岑李白詩云辭君向天姥拂石卧秋霜又夢逰天姥歌云天姥連天向天橫勢拔五嶽掩赤城天台四萬八千丈對此欲倒東南傾杜少陵壯逰云剡溪藴秀異欲罷不能忘歸帆拂天姥中嵗貢舊鄉時少陵將辭剡西入長安也或云自剡至天姥山八十里歸帆拂之非也詩人之辭要當以意逆志大概言此山之髙而已南巖在縣西南二十里世傳任公子釣魚之所莊子任公子以五十犗為餌蹲於會稽投竿東海經年而得巨魚唐齊顗題南巖云南巖寺本滄海任公釣臺今尚在巖側有任公釣車石棺蛻骨存焉人掘其地有螺蚌殼云巖下乃海門也穿巖在縣西南五十里有十九峰排列如圖畫中峰有一圓竅東西通故名穿巖巖有石室廣二十餘丈鼓山在縣西四十里山形如鼓天嶽在縣西南七里劉門山在縣東南三十里傳云劉晨阮肇自剡採藥至此山有劉阮祠山亭採藥徑山下居民多劉姓者石牛山在縣西三里黃罕嶺在縣三十里唐咸通中賊裘甫冦浙東王式曰惟黃罕嶺可入剡然卒亦成擒甫果自嶺入剡兵遂敗會稽志卷九
