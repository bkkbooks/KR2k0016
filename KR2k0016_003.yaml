body:
  text: 會稽志卷三宋施宿等撰節度使唐節度使之名本起於西北用武之地如安西北庭河陽三城盧龍范陽鳳翔河中朔方之類以地名也河東河西淮南劍南東川劍南西川山南東道山南西道總數州為名也淄青澤潞之類合兩州為名也護國天雄宣武橫海昭德鎮西大同之類特創美名以寵其軍也然大抵多在中原耳自唐末五代以來漸及東南為姑息割據之術於是節鎮不勝其繁然猶各有支郡其後四方僭竊則又擅置名號不録於職方獨錢氏擅有兩浙猶尊視中朝凡大事皆請命而中朝亦曲從之故境內節鎮尤多用以命其子弟若杭之為寧海越之為鎮東最其大鎮也久之自尊但為國王而以寧海鎮東兩節授其子至其納土越州猶領鎮東軍節度而朝廷以寵親王將相或外戚無歸鎮者安撫使初錢氏國除杭守帶鈐轄提舉兩浙路州軍兵甲賊盜而浙東限濤江議者以為非杭所能兼領皇祐三年十二月始分兩浙為東西兩路杭越守臣各兼兩路屯駐駐泊兵馬鈐轄而越守自魏瓘始歷五朝皆因之至宣和二年有方臘之變五月已亥臣寮言睦賊猖獗已見平靖慮班師之後餘孽尚在乞以杭越知州並兼本路安撫使鎮撫一方詔杭越州江寧府守臣並帶安撫使此浙東安撫使之始也國朝初止以安撫使命河北雄州守河東代州守其後陜西沿邊亦有之寖及內地帥臣皆兼領都總管國初節度使領馬步軍都部署掌屯戍邊要訓練之政令以肅清所部英宗皇帝即位避御名改都總管其後守臣兼一路安撫使者皆帶馬步軍都總管浙東亦其一也提刑司宋興使者止有轉運使副使淳化二年置諸路提點刑獄以朝官充此提刑之始也景德四年又置同提點刑獄事以閣門祗候以上充皆察所部疑留獄訟勸課農桑按其官吏之不法别其廉良以達於朝其後嘗再省提刑然旋即復置而同提刑則屢廢不補雖置猶帶同字故武臣常居文臣之次及乾道以後復置遂去同字故武臣之權益重淳熙以後寖不復命矣祖宗時又嘗以提刑兼勸農使武臣提刑兼勸農副使後皆省去元祐初罷提舉常平以其事來屬建炎初亦如之紹興中復置提舉常平司乃復其故浙東提刑司治所在府治之東二百三十七步前臨運河與蓬萊館相望而武臣提刑則以添差通判廳為之其後武臣提刑既久不除乃復為通判東廳提舉司熙寧二年閏十一月壬子制置三司條例司言差官提舉諸路常平廣惠倉兼管勾農田水利差役事河東梁端謝卿材江西張次山湖南吳審禮喬敘湖北田君平成都路李元瑜梓路吳師孟田祐利路王直溫張吉甫夔路韓正彥張援廣東遊烈廣西關杞福建嚴君貺詔從之皆召對遣行或賜緋章服此提舉常平之始也元祐初廢其官紹聖初復推行而設官亦如初方是時立法甚嚴専以講補助之政秋毫不許他用上下共守之至崇寧中始取以充學校養士之費也而居養院安濟坊漏澤園至於花石應奉皆於此取以有執奏之法乃降御筆免執奏提舉江東常平王瞻以為言朝廷為降詔戒飭然終無益也侵蠧之餘至建炎初四方所積猶以億萬計會復罷提舉司所積頗為諸司侵取孫尚書覿時為給事中奏疏請復専置一司言路論擊孫公坐去國然議者終以為不當廢乃特置常平主管官一員𨽻提刑司實使之行常平司事但避提舉官之名久之乃併提舉茶鹽司提舉茶鹽司崇寧中所創置為提舉常平茶鹽司其名始正初置使合兩浙為一路治蘇州中徙杭州宣和末釐為東西二路東路使者定治於越見毛平仲所撰題名記司治舊在府衙東一里紹興末嘗以賜皇姪恩平郡王璩而遷提舉司於鎮東門外頗宏壯已而復以新提舉司賜恩平而司復還其舊今治所是也通判廨舍唐刺史雖有上佐然皆佐二及方鎮權益重則佐二尤卑屈故大厯中杜子美至云治中實棄捐也藝祖有天下首置諸州通判以朝官以上充實使之督察方鎮非復唐上佐比故當日謂之監州典郡者至有欲求無通判處建隆中初復湖南未逾月即命賈玭等分通判諸州其委任之急如此太平既久其任稍削矣然著令猶不許知州薦舉通判蓋祖宗遺意也越州舊止通判一員及經駐蹕又為輔藩增至三四員亦嘗有不釐務者往時謂三司副使為簉通判為倅簉倅皆副二之名然唯此兩官則稱之他雖副二不可用矣謂通判為倅至今猶然而三司副使廢已久世或不知簉之名故併記之通判北廳在府東六十步通判南廳在府南六十四步通判東廳在府東南八十五步路鈐轄廨舍國朝置馬步軍副都部署觀察使以上充兵馬部署及副部署皆橫班今右武郎以上諸司使今武翼大夫以上及刺史充都鈐轄諸司使充都監以闕稱都監名皆為路分閣門祗候以上充凡此諸職國初亦有以文臣充者後乃専命武臣宣和三年五月已亥詔兩浙東路鈐轄皆視三路選差時初平方臘也路鈐轄廨舍在府東北一里二百五十五步正副將元豐四年詔諸路團練給軍馬各置將副於東南置十三將淮南東路第一西路第二兩浙西路第三東路第四江南東路第五西路第六湖北路第七南路潭州第八全邵永州第九福建第十廣東路第十一西路桂州第十二雍州第十三各以兵𨽻之給虎符為驗其兵不滿三千人惟置單將熙寧十年詔總門封府京畿東西河北路兵分置將副自河北始自第一將以下十七將在河北四路第十八將以下七將在府畿自第二十五將以下九將在京東第三十四將以下四將在京西合三十七而鄜延環慶隰原秦鳳熙河又各列將合四十二總天下為九十二將至是始定其制後詔諸路兵以本軍才武為三等及置部將隊將押隊訓練次諸將佐春秋都試擇武力士千人內選十人皆以名聞待旨解發其願留鄉里者勿強遣也凡正副將皆選內殿崇班以上嘗歷戰陳親民者充之仍許監司奏舉職制令將副訓練約束措置兵政軍情不便違法聽州縣長吏覺察以聞今府將兵額三千人東南第四正副將各一員蔡氏官制舊典云王荆公建言分籍諸路兵通一路團結今東南將乃其遺制元豐中將兵法行荆公己罷相矣時北人求欣代地富鄭公言因創置將兵遂生邊隙冝罷之便張文定公又言使敵人有以測知中國之兵數也後竟不果罷今百餘年蓋制軍之良法也都監都監自府州軍監至縣鎮城寨關堡並以閣門祗候以上充亦參用三班使臣監押則専用使臣而己都監監押悉充在城巡檢始其任頗重後寖衰削矣三司屬官安撫司舊制都部署都總管司有參謀官兵馬鈐轄司有機宜文字走馬承受公事或不常置後罷承受公事置管勾官中興後創置參議準備差遣準備差使管勾改為幹辦機宜有主管有書寫一路多至十餘員而書寫一員例辟其子弟親屬為之後議者以諸司屬官員多宜省尋廢參謀官準備差遣差使乃罷辟差書寫惟存參議主管機宜幹辦公事員外置各二員而添差參議官獨不釐務提刑司部使者之屬舊有勾當官然不常置今幹辦公事乃其職也浙東路提刑司幹辦公事一員或雙員檢法官一員銓法注試中刑法或曽歷法曹掾人提舉司熙寧初置諸路提舉常平農田水利差役崇寧中置提舉茶鹽事紹興中併二司為一舊有勾當公事一員於文臣通判幕職內選差如一路十州軍許差雙員後改幹辦公事今茶鹽常平司各一員職官曹廨舍國朝大都督府官屬之制有長史左司馬右司馬録事參軍司户參軍司法參軍司士參軍司理參軍大都督闕則置知府一人通判一人而長史司馬皆省節度兼觀察處置等使官屬之制有行軍司馬節度副使節度判官節度掌書記節度推官觀察判官觀察支使有掌書記則省觀察推官其實大都督節度觀察使職務悉歸知州通判兼總之此越州州官舊制之大略也若防團州以下其制殺減不同矣崇寧四年始命諸州分六案以仿尚書省六曹然官名猶未改也政和二年乃議分曹建掾猶修改久之乃定有司録事有司士曹事司户曹事司儀曹事司刑曹事司工曹事以上為曹官有士曹掾戶曹掾兵曹掾刑曹掾以上為掾官司録曹官承務郎以上掾官並差將仕郎建炎元年九月詔州郡曹掾官改從舊制司録依舊為簽判曹掾依舊為推判官支使書記録事參軍司理參軍司户司法參軍先是曹掾比舊既增員吏額亦從而增至是又詔人吏亦減三之一擇不才多過犯者罷之簽書節度判官廳公事廨在府治之西南二百七十步觀察判官廨舍在府治之南二百六十六步觀察推官廨舍在府治之東北一里二百十步録事參軍廨舍在府治之西南宣詔亭下府院在焉司理參軍廨舍在府治之南獄在焉司尸參軍廨舍在府治之東南一里一百十步司法參軍廨舍在府治之東南二里一十步縣令長會稽唐李俊之開元中為會稽令縣東北有防海塘自上虞江抵山隂百餘里以瀦水溉田俊之增修焉民賴其利其後令李左次又增修之李左次見上竇伯元河南洛陽人會稽令李堯年常山人會稽令王潨字瀑源臨沂人會稽令孫孝哲清河人會稽令已上四人見宰相世系表吳鐐乾寧初為會稽令威勝軍節度使董昌反召鐐問䇿鐐曰王真諸侯遺榮子孫而不為乃自取滅亡昌怒叱出斬之併族其家本朝曽公亮字明仲泉州人舉進士第五人以太常寺奉禮郎知會稽縣事初試吏聽獄決訟吏莫敢欺縣有鏡湖溉民田湖溢反為田病公亮即曹娥江隄疏為斗門泄湖水入江田不病後相三朝官至太傅魯國公贈太師中書令諡宣靖配饗英宗廟廷山隂吳朱然為餘姚長遷山隂令加折衝校尉督五縣孫權竒其能以為臨川太守吾粲字孔休吳郡烏程人與同郡陸遜齊名為山隂令後至會稽太守晉沈叔任吳興武康人少有幹質為山隂令大有治聲後為益州刺史王鎮之字伯重琅邪臨沂人歷剡上虞令並有能名會稽內史謝輶請為山隂令復著殊績魏顗字長齊會稽人世稱四族之雋仕至山隂令徐豁字萬同東莞姑幕人元嘉初為尚書左丞山隂令精練法理為時所推後為始興太守廣州刺史卒傅僧祐北地靈州人有吏才再為山隂令在縣有能稱子琰傅琰字季圭遷山隂令尤以明察著名遷尚書左丞及齊太祖輔政以山隂獄訟煩積復以琰為令有賣針賣糖二姥爭團絲詣琰琰縛團絲於柱鞭之密視有鐵屑乃罰賣糖者又二野父爭雞琰各問何以飼雞一人云豆一人云粟破雞得粟罪言豆者縣內稱其神明琰父子並著竒績江左鮮有世云傅氏有治縣譜子孫相傳不以示人後為廬陵王長史南郡內史行荆州事孔僉會稽山隂人自五經博士為山隂令齊沈憲吳興武康人少有幹局歷烏程令太祖以山隂戶衆難治欲分為二縣世祖啓曰縣豈不可治顧用不得人爾乃以憲帶山隂令治聲大振孔稚圭請假東歸謂人曰沈令斷事特有天才後為散騎常侍孫浚沈浚字叔源博學有才幹仕梁歷山隂吳建康三縣並有能名纍遷御史中丞周顒字彥倫汝南安城人建元中為山隂令劉玄明臨淮人有吏能為山隂令大著聲績傅琰子翽代之傅翽見上王詢永泰初為山隂令太守王敬則將舉兵反召詢問吾欲發丁丁可得幾人傅庫物錢有幾詢答縣丁卒不可得傅庫物多未輸入敬則怒將出斬之乃起兵過浙江丘仲孚字公信吳興烏程人王敬則反以拒守有功遷山隂令居職甚有聲稱百姓為之謡曰二傅沈劉不如一丘前世傅琰父子沈憲劉玄明繼宰山隂並有政績言仲孚皆過之也梁武帝即位著令小縣有能遷大縣大縣有能遷二千石仲孚於是擢為內史梁謝岐會稽山隂人為尚書金部郎山隂令侯景亂岐寓東陽景平依張彪彪在吳郡及會稽庶事一以委之沈僧昭吳興武康人為山隂令劉爽東莞莒人為山隂令王淮之字元曽琅邪臨沂人為山隂令有能名預討盧循以功封都亭侯江統字應元陳留圉人山隂令干寶字令升新蔡人領國史補山隂令宋張岱字景山吳郡吳人為司徒左曹掾纍遷山隂令職事間理時人稱之顧凱之字偉仁吳郡吳人為山隂令邑素號繁劇前後官長晝夜不得休事猶不舉凱之理繁以約縣曹無事晝日垂簾門庭間寂自宋世為山隂令務簡績修莫能尚也還為尚書吏部郎卒官湘州刺史江秉之字元叔濟陽考城人歷烏程建康令遷山隂令民户三萬訟訴殷積階庭常數百人秉之御煩以簡處之晏然以在縣有能補臨海守陸邵景平初為山隂令富陽賊孫道慶等攻沒縣邑直抵山隂會稽太守褚淡之自假凌江將軍以邵領司馬邵與行軍將軍漏恭期合力大破賊於柯亭陳褚玠字溫理大建中為中書侍郎時山隂多豪猾前後令皆以贓汙免宣帝患之以玠清廉有幹用遂擢為令縣人張次的王休達等賄賂通姦全丁大尸多有隱沒玠乃鎖次的具狀啓臺宣帝手敕慰勞並遣使助玠搜括所出軍人八百餘户時曹義達為宣帝所寵縣人陳信諂事義達信父顯文恃勢暴橫玠執顯文鞭之吏民股栗莫敢犯者唐韋友順京兆人山隂令見宰相世系表張遜乾寧初為山隂令董昌反自號大越羅平國改元順天署置百官召遜知御史臺遜固辭曰王自棄為天下笑且六州勢不助逆王據孤州祗速死耳昌怒曰遜不知天意以邪説拒我囚之他日謂人曰我縱無遜何乏於事乃害之剡縣吳卜靜字玄風吳郡人為剡令賀齊字公苗山隂人為剡長縣吏斯從為姦立斬之從族黨遂相糾合千餘人攻縣齊開城門突擊大破之晉周翼郗鑒外甥少遇飢亂賴鑒得存郗亡翼為剡令解職歸心喪終三年後歷青州刺史少府卿卒謝奕字無奕陳郡陽夏人少有器鑒郡太尉掾為剡令有一老公犯法謝以醇酒罰而遣之纍遷豫州刺史追贈鎮西大將軍李𢎞度常嘆不被遇殷揚州知其家貧問君能屈志百里否李答曰北門之嘆久已上聞窮猿奔林豈暇擇木遂授剡縣令殷曠之仲堪子有父風仕至剡令宋王鎮之字伯重祖耆之位中書郎父隨之上虞令鎮之為剡令並有能名宋武帝時周顒字彥倫宋明帝頗好玄理以顒有辭義引入殿內親近宿直帝所為慘毒之事顒輒誦經中因緣罪福亦為之少止元徽中為剡令有恩惠百姓思之齊張稷字公喬幼有孝性母疾時稷年十一侍養衣不解帶每劇則纍夜不寢及終毁瘠過人杖而後起州里謂之純孝齊永明中為豫章王嶷主簿以貧求為剡令會山賊唐宇之作亂稷率厲部人保全縣境梁王懷之剡令張彪傳陳徐陵剡令唐張子胄剡令本朝丁寶臣字元珍晉陵人進士起家以太子中允來知縣事始至流大姓一人除弊興利甚衆其殁也王荆公志墓諸暨吳陸凱已見蕭山門齊卞彬字士蔚建武末為諸暨令梁蕭視素性靜退少嗜欲好學能清言榮利不關於中喜怒不形於色天然簡素纍遷中書侍郎在位少時求為諸暨縣令到縣十餘日挂衣冠於縣門而去裴子野為諸暨令不行鞭罰民有爭者示之以理百姓稱悅合境無訟唐李罕諸暨令本朝丁寶臣已見剡縣其治諸暨如剡越人滋以為循吏蕭山吳陸凱字敬風吳郡人丞相遜族子也為永興諸暨長所在有治迹吳書晉王雅字茂達東海剡人補永興令以幹理著稱本傳本朝杜守一景德二年以大理丞知先是縣東五里有虎守一為政之二年虎負子西渡浙江而去鄉人相賀名其里曰去虎里郭源明字潛亮嘉祐六年知蕭山縣縣之宿豪有父子為姦利者悉置於法民有育孤女利其資過時不嫁者諭以禮律女遂得所歸太守刁景純約聞之曰郭蕭山厭民望矣餘姚吳朱然嘗與孫權同書學結恩愛至權統事以然為餘姚長時年十九後遷山隂令朱亘為餘姚長遇疾疫榖食荒貴分部良民隱視醫藥飱粥相繼士民感之晉山遐為餘姚令時江左初基法禁寬弛豪族多挾藏戶口以為私遐繩以峻法到縣八旬出口萬餘孫統為餘姚令性好山水居職不留心碎務縱意遊肆名山勝川靡不窮究闕名字恩充選補太學博士出為餘姚令謝勝為餘姚令王羲之臨河敘曰餘姚令謝勝等十五人不能賦詩罰酒各三斗即蘭亭之會也見劉孝標世説注石本蘭亭詩作前餘杭令謝藤宋韓景之為餘姚令張永為餘姚令有稱績劉仲道為餘姚令明震為餘姚令梁沈瑀字伯瑜吳興武康人為餘姚令縣大姓虞氏千餘家請謁如市瑀以法繩之又縣南豪族子弟縱橫瑀召其老者為石頭倉監少者補縣傭權右屏迹劉杳為餘姚令在縣清潔湘東王發教褒稱之唐李穩為餘姚令李悰為餘姚令本朝謝景初字師厚陽夏人其知餘姚縣也宛陵先生梅聖俞以詩送之略曰我從淮上歸君向海澨去安知無幾舍邂逅不相遇頗如飛空雲到月不得附月行既不留雲亦值風故師厚故知制誥希深絳之子弟師直景溫師同景年師復景回皆知名士諸子悰愔亦皆有名師厚詩極髙豫章黃魯直娶其女自以為從師厚得句法而師厚之姑實歸聖俞觀送行詩其淵源所從來逺矣今後進乃有詆訾聖俞者至以為不可不觀者陳無已詩不可觀者聖俞詩豈不陋矣哉故略為辨之上虞後漢度尚為上虞長為政嚴峻明於發摘姦非吏人謂之神明吳顧雍為上虞長有治迹濮陽興為上虞令後為會稽太守位至丞相劉綱為上虞令師事白君受道歷年道成與妻樊夫人俱升天而去晉顔含為上虞令簡而有恩明而能斷然多以威御下傅晞為上虞令甚著政績周鵬舉為上虞令華茂為上虞令與王右軍會蘭亭賦四言詩徐祚之為上虞令王隨之為上虞令宋王鎮之為上虞令有能名虞季為上虞令卞延之濟隂寃句人弱冠為上虞令有剛氣會稽太守孟顗以令長裁之積不能容脫幘投地曰我所以屈卿者政為此幘耳今已投之卿矣卿以一世勳門而傲天下國士拂衣而去王晏為上虞令孔覬自會稽發兵反晏起兵攻郡覬率千人趨石瀃竄於山嵴村村人縛以送晏斬之東閣外齊周洽為上虞令廉約無私進士晉史謂會稽有佳山水名士多居之王羲之晚渡江遂有終焉之志顧愷之謂千巖萬壑競秀爭流而一時人物如孫綽李充賀循許詢輩皆文藝冠世説友幼讀史長而從仕謂今會稽實供行闕仕而有職於東蓋無難者亦庶幾見所謂以山水名天下與人物風流之盛者乎而宦海萍遊迄三十年而志弗遂淳熙十六年春始得辱乘傳典倉事於是登秦望探禹穴識其委蛇盤礴之觀而得其溫厚粹美之氣蓋其鍾靈孕秀雲行川流胚胎藴釀發而為英傑宜有獨盛於斯世者國朝崇儒右文視古為重而東南儒風宏楙盛美會稽為最焉杜祁公以道德文章功業行實克相昭陵德在生民勳在史册足以儀萬世而垂後學如李公光入參大政孫公沔晉二樞管顧公臨典制北門陳公揚庭執法中司傅公墨卿正位常伯陸公佃石公景略皆以文學冠春官夏公噩齊公唐皆以賢良應大科傅公嵩卿以藝魁舍選儒學之秀頡頏上下此非騫朔奮厲之所藴而雄深秀麗之所鍾耶建炎初六飛渡江嘗駐蹕於越而越今為陪都蓋古三輔也山川之所形見風化之所漸被其儒風士業流聞彰布益以昌大要非餘郡可比王公佐詹公騤相望二十餘年之間皆以大䇿冠多士王公俊石公延慶莫公叔光皆以進士中宏博石公公輒以奏恩擢魁名而三嵗大比賜第於太常者率十餘人其連取世科伯仲聨第者又間見層出人物之茂實為衣冠盛事其亦有以權輿於此哉郡之前進士石朝英陸泮張澤闔辭以告説友曰越之山川則有郡之圖志在越之名卿才大夫則有國之信史在若無俟於登載者然鄉之宗老則懼晚學之未聞也人寖逺而寖忘事愈久而愈墜其不沒前人之事者幾希朝英等將以郡之進士列名於石且請於府帥閣學尚書王公願飭工鑱石置諸郡庠之講堂於以示勸激之意然非文不傳也敢以請説友幸以將指來越而楚實有材又所深見而目識者其何可辭則與之言曰夫讀古人之書肄當世之業豈止取科級釣爵位以夸榮侈盛於鄉曲哉其致君澤民行道及物實自讀書肄業始漢世設科射䇿勸以官祿史氏譏之韋氏教子一經志於青紫後世貶焉士之學固有逺者大者今天子龍飛御天適當興賢之嵗越之士將企前慕昔以接踵賢躅而振袂流風者其盍思所以逺者大者乎雖然越有君子六千人昔人謂其有志行猶齊之士吳之賢良也嗚呼千載之後其必有仍盛美於前人者説友猶拭目以觀之題名起於慶厯二年前乎此者考諸登科記則鄉里多不載故不書而杜祁公則大中祥符元年甲科四名進士蓋可考云是年十一月望日朝議大夫權兩浙西路提點刑獄公事袁説友記題名舊刻始於慶厯用登科記修也前此記不詳其鄉里故雖祁公亦不復書闕所不知是固未害然祁公不書何以寓髙山景行之瞻教授劉君庶請於府帥待制侍郎單公夔礲舊石而增修之訪遺逸於邦之長者得陸公軫以下凡七人遂列祁公於其首自建隆開國距慶厯餘八十年其間䇿名多矣未易考也仍存闕疑之義自慶厯至今百五十餘嵗登載日益盛今年上以孝廟故未親䇿多士而莫君于純實為南宫第一三魁相望於四十餘年之間是碑重修其風逺矣介既為書舊記於碑首復敘大略以輔教事慶元丙辰臘月既望承議郎添差權通判紹興軍府兼管內勸農事王介書姓氏舊經載會稽之姓十四而不著其望之所出按氏姓書及書傳所載其望實出會稽者虞夏兹資駱五氏而已孔謝朱賀鍾離雖不云望出會稽而世居此者皆有顯人鍾氏粗有所見而榮俞戚三氏於此未有聞焉康莊闞留搖黃裘皆望出會稽而舊經不載總之凡二十有一今併考姓氏所自出與其昔之聞於世者疏於後然會稽今宦學最盛者杜氏石氏陸氏唐氏諸葛氏等各自有譜故不復出虞氏帝舜之後商有虞仲實出太王之後子孫亦氏虞史記有趙相虞卿漢有虞延吳有會稽虞翻及唐虞世南望出會稽陳留夏氏夏后氏之裔或云陳宣公之後有夏徴舒故其後亦以夏為氏後漢有夏馥夏牟晉有會稽夏統望出吳郡會稽本朝夏竦為樞密使竦子安期為龍圖閣直學士又有賢良夏噩亦以文稱孔氏衛之孔氏出於孔達鄭之孔氏出於子孔吾夫子乃出於宋之孔父嘉前漢有孔光孔安國後漢有孔融晉有孔愈融與愈皆自以為出於夫子之後愈之先世避亂徙居會稽遂為會稽人孔靖孔淳之等皆其後也本朝有孔道輔為御史中丞有直聲孔旻居汝州以隱操聞於慶厯中皆夫子之後榮氏左傳有榮駕鵝孔子弟子榮旗列子有榮啓期北史有榮毗唐有郎中榮九思本朝有榮諲為光祿卿榮薿為將作監望出樂安謝氏炎帝之後周申伯食采於謝因而氏焉後漢有謝夷吾謝奉皆會稽人東晉謝安本朝太子賔客謝濤濤子絳知制誥絳子景初景溫景平景回景初子悰愔皆知名望出陳留鍾氏出潁川左傳有鍾儀漢有鍾興鍾皓魏有鍾繇南史文學傳有鍾嶸唐有鍾紹京江南有禮部侍郎會稽鍾謨本朝有鍾傳為西帥鍾世美以工書見拔擢兹氏左傳魯大夫兹無逸今望出會稽俞氏出姓苑古有俞附善醫今望出河間南史孝義傳有俞僉唐有俞文俊江寧人本朝龍圖閣待制俞獻可弟刑部侍郎獻卿新安人戚氏衛大夫食采於戚因氏焉漢有臨轅侯戚鰓南史儒林傳有戚袞本朝睢陽人戚同文號正素先生子維為職方郎中綸為樞密直學士望出齊郡其後儒學世有人或問曽南豐以宋之世家南豐以戚氏對資氏黃帝裔孫有食采於資者後以為氏姓纂漢有資成南陽人望出陳留會稽駱氏姓苑云吳有東陽駱統唐駱賓王望出河南會稽本朝駱偃登進士第朱氏出沛郡義陽吳郡河南四望本自髙陽之後封於邾後為楚所滅乃去邑氏朱焉范蠡去越改姓朱曰陶朱公子孫亦或以朱為氏史記有朱亥平原君朱建漢有會稽太守朱買臣會稽朱雋及宋朱百年賀氏齊之六族慶封之後漢有侍中慶純避安帝諱改為賀氏吳賀齊賀劭唐賀知章皆會稽人望出河南廣平知章之後有鑄以詩文得名於元祐中自稱鑑湖遺老又有道士賀仲清者會稽人亦自言知章之後紹興中猶在鍾離氏漢有鍾離昧會稽鍾離意及吳志有鍾離牧鍾離徇舊經有鍾離表皆郡人紹興中有鍾離松仕至朝請大夫致仕髙宗慶夀松以耆老聽再仕力辭康氏周文王子衛康叔之後又梁有康絢其先出自康居初漢置都護盡臣西域康居遣子入侍待詔河西因留不去其後遂氏焉晉亂遷於藍田唐儒學傳有會稽康子元本朝有兵部員外郎知越州康戩建炎中有康執權為中書舍人允之浙西安撫使知杭州望出會稽東平京兆唐康日知靈州人有功深趙封會稽郡王子志睦會稽郡公孫承訓會稽縣男莊氏楚莊王之後以諡為姓六國有莊周望出會稽東海天水至後漢避顯宗諱改氏嚴嚴光本亦姓莊乃後人追改以避諱也又前漢有嚴忌嚴助望出馮翊闞氏左傳齊大夫闞止吳有闞澤會稽人北史有闞駰唐有闞稜本朝尚書郎闞泂望出會稽天水留氏出自會稽本衛大夫留封人之後漢功臣表疆圉侯留盻其後避地山隂遷居東陽陳將軍留贊留異五代留從效為泉州節度使搖氏姓苑云句踐之後有東海王搖子孫以為氏漢功臣表有海陽侯搖毋餘望出會稽黃氏姓苑云句踐之後封於黃因以為氏或云亦嬴姓十四氏之一也楚有春申君黃歇漢有夏黃公大司農黃昌皆會稽人及黃霸黃憲三國黃忠黃蓋望出會稽江夏按黃氏所在有之然仕至丞相者惟西漢黃霸及髙宗初黃潛善二人相距千五百年裘氏出姓苑衛大夫食采於裘因以為氏望出渤海虢略姓纂云會稽有裘氏今會稽有旌表門閭裘氏别見會稽志卷三
