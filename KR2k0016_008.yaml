body:
  text: 㑹稽志巻八宋施宿等撰寺院嵊縣惠安寺在縣西一百五十里剡山之下晉義熙二年南天竺國有髙僧二人入金華師道深弟子竺法友授阿毗譚論一百二十巻甫一宿而誦通道興遂讚法友曰釋家重興今先授記遂往剡東卭山東卭山今屬新昌縣復於剡山立般若臺寺獵士陳惠度射鹿此山鹿孕而傷既産以舌䑛子身乾而後母死惠度棄弓矢投寺出家後為名僧鹿死之處生草號鹿胎草㑹昌廢咸通八年重建改法華臺寺天祐四年吳越武肅王改興邑寺大中祥符元年改賜今額宣妙寺在縣西四十五里宋元嘉二年建號崇明寺㑹昌廢晉天福四年重建治平三年改賜今額安福寺在縣南六十里梁永明二年置唐㑹昌五年廢景福元年重建上鹿苑寺在縣西四十五里寺山自太白山來宋元嘉七年姚聖姑於西白山造寺賜披雲院額㑹昌廢咸通七年重建改咸通披雲院晋天福七年吳越改披雲寺下鹿苑寺在縣西四十五里寺山亦自太白山來其上即披雲寺宋元嘉二年建號靈鷲寺㑹昌廢咸通十四年重建山有瀑布及龍潭寺治平元年改賜今額明覺寺在縣南二十里梁大通元年智逺法師建號禪林寺㑹昌廢晉天福元年重建大中祥符元年改賜今額禪㑹寺在縣西二十里傳者以為齊景明元年安南將軍黄僧成家天雨錢捨以造寺號錢房院梁天監中改禪房寺㑹昌毁廢咸通二年重建後改賜今額福感寺在縣東二十五里晉天福四年建號報恩寺大中祥符元年改賜今額實性院在縣西二百五十步唐乾元中建號清泰院㑹昌廢晉天福七年重建大中祥符元年改賜今額寳積院在縣北三十里後唐長興四年建號徳興院大中祥符元年改賜今額龍藏寺在縣北四十五里梁天監二年建號龍官院㑹昌廢咸通十四年重建浙東觀察使李紳少年寓此肄業有紳所為碑存大中祥符元年改賜今額普惠寺在縣西四十里齊永明三年建號安養法華院㑹昌廢乾符六年重建治平三年改賜今額普安院在縣東二十五里宋元嘉二年建㑹昌廢後唐清泰二年重建戒徳院在縣西四十里齊永明三年建號光徳院㑹昌廢晉天福七年重建治平二年改賜今額定林院在縣西四十五里宋元嘉二年建號松山院㑹昌廢晉天福八年重建有響巖龍潭治平三年改賜今額圓超院在縣西二百五十步院山與郯山相連舊曰靈岫菴晉天福六年建奉國院有觀音靈異祈禱必應西廡有亭臨雙溪之上溪山勝絶政和間衢人盧駿元天驥為提㸃刑獄行部至此命其亭曰挾溪題詩云孤亭瞰平野雙溪分兩腋野濶春風香溪晴照人碧駿元工詩能書札仕至吏部侍郎寺前松嶺之側有瞰山堂下瞰城邑前對羣山昔人留題甚多邑士傳誦一聫云近離城市不多地髙壓樓臺無限家莫知誰氏作也今堂廢久矣真如院在縣西四十里周顯徳三年建號寳夀院大中祥符元年改賜今額尊勝院在縣東四十里宋元嘉二年建號厚山院㑹昌廢咸通十一年重建久之又廢晉天福六年重建治平三年改賜今額天竺院在縣西二十里晉天福七年建號西明院大中祥符元年改賜今額靈巖院在縣西七十里唐乾符三年于茹蘭禪師伏虎歇食巖下古石門寺基上建有石門龍潭法祥院在縣東七十里宋元嘉二年建號延福院㑹昌廢後唐清泰二年重建大中祥符元年改法朗後以犯聖祖諱改今額超化院在縣北三百步晉天福七年建號水陸院大中祥符元年改賜今額瑞像院在縣東一百步唐景福元年吳越武肅王建法華院在縣東闕百步唐龍紀元年建南巖廨院在縣東二百步唐龍紀元年建清隠院在縣東七十里唐大中七年建號三峰院院後有山三峰故曰三峰治平三年改賜今額大明院在縣西南二十里晉天福七年建號資國大明院大中祥符元年改賜今額證道院在縣西四十里晉開運元年建號五龍院後改今額院晉高僧帛道猷道場山有龍潭華藏院在縣東四十五里晉開運二年建號雲峰院大中祥符元年改賜今額皇覺院在縣西闕十里漢乾祐三年建號仙巖院大中祥符元年改賜今額葛仙翁釣臺石梯在其傍顯浄寺在縣西闕十里齊永明三年建號青林寺㑹昌廢後唐長興元年重建大中祥符元年改賜今額報思院在縣西二十里唐乾寧元年建號報徳院大中祥符元年改賜今額資福院在縣東二十里晉天福八年建號增福院大中祥符元年改賜今額空相院在縣南四十里太平興國元年建號開明院大中祥符元年改賜今額悟空寺在縣西闕十里周廣順元年於古烏流寺基上建號保安院治平二年改賜今額安國院在縣西六十五里晉天福七年建號太平院治平三年改賜今額明心院在縣北二里建隆二年陳鄴捨宅建號黄土塔院大中祥符元年改賜今額諸曁縣大雄寺在縣西闕里梁普通六年大智禪師建號法樂寺㑹昌廢大中二年重建改報國寺後改賜今額咸通保夀寺在縣西南一十一里唐大中八年僧神智建號大中聖夀寺咸通十年改賜今額寺碑實唐人書廣夀寺在縣南二里梁大同二年左僕射吳文寵捨宅建號延夀寺㑹昌廢咸通十年重建後唐天成三年改長夀寺後改今額闕城寺在縣東北八十五里晉天福七年建周顯徳二年吳越給靈根寺額大中祥符元年改賜今額青蓮院在縣西一十八里天福四年建號碧泉院至道二年改賜今額三學禪院在縣西六十里唐元和三年曹溪第四代靈黙禪師建咸通六年賜五洩永安禪院額天祐三年改應乾禪院後改今額自夾巖山峰并五洩溪響鐵嶺盡屬之寳乗院在縣北二十里後唐同光二年吳越武肅王建號石佛院大中祥符元年改賜今額永慶院在縣北五里唐天祐元年建號五峰院法海院在縣南三里二百步唐大中八年僧神智建號保夀廨院大中祥符元年改賜今額慈氏院在縣西北一十八里晉