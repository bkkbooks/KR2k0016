body:
  text: 㑹稽志巻十三宋施宿等撰鏡湖按舊經云湖水髙平疇丈許築塘以防之開以泄之平疇又髙海丈許田若少水則開海而泄湖水足而止若苦水多則閉湖而泄田水適而止故山隂界内比畔接疆無荒廢之田無水旱之嵗其文雖簡湖之利害盡矣曽子固序鑑湖云刁約謂宜斥湖三之一與民為田而益隄使髙一丈則湖可不開而其利自復以湖水較之髙於城中之水或三尺有六寸或二尺有六寸而益隄壅水使髙水之敗城郭廬舍可必也又云壅水使髙必敗城郭此議者之已言也以地勢較之濬湖使下然後不失其舊不失其舊然後不失其宜此議者之所未言也又云山隂之石則為四尺五寸㑹稽之石則幾倍之壅水使髙則㑹稽得尺山隂得半地之窪隆不並則益隄未為有補以今考之刁約之説斥湖三之一與民為田誠不可也益隄髙一丈湖不可開而其利自復此則復湖之至論也湖不髙于田則不可引以灌溉湖髙于田不築隄則水不可蓄泄非獨鏡湖而已凡天下蓄泄以灌溉者莫不皆然也獨鏡湖乃憂隄決而敗城郭廬舍乎且天下之水獨黄河有決溢之患以其湍悍善決也捨黄河之外不聞有自決而敗城郭廬舍者誠使以人力決之湖下有九千頃之田有江有海水不乘髙下注散漫而去乃敗城郭乎且以隄蓄水漢永和以來有之千嵗之久未嘗決也豈今築隄則獨決耶至言濬湖使下然後不失其舊此正議湖之大害也自永和以來考于史册圖志湖之成也未嘗言濬湖之廢也未嘗言塞若今復湖必欲濬則昔之廢湖當運土以塞之非特無取土之地亦用工役若干乃得而塞雖國力不能而謂民之盗耕者能之乎謝靈運從宋文帝求回踵休崲湖為田彼亦決之而已故有大利若須運土塞之乃可為田非惟靈運㫁不能為之亦不肯為也且湖之未廢正以隄壅而水髙故若耶溪等諸溝澗皆滿其驗有四唐時太守皆乘舟舫直至雲門諸寺一也今若耶溪傍草市謂之平水以地理考之未為湖以前水不能留有湖則水不亟去津涯深廣故曰平水二也禹祠有山路度嶺至龍瑞宫謂之觀嶺來往者皆由此路今不復行湖存則水浸山麓不可並山而南必由嶺路湖廢而並湖有路三也平水之南有五雲橋盖唐時舟舫所經今在陸地矣四也西北如引涇水漳水之類地逺不可盡質如安豐之芍陂明州之廣德湖則近而可質者芍陂則引渒河注滿陂内髙築陂岸廣德湖則築環湖之隄九千一百三十四丈廣一丈八尺髙八尺皆見于地志及奏牘碑刻非髙為之隄何由積水隄之下孰無城郭廬舍未聞以決為急也漢汝南有鴻隙大陂郡以為饒成帝時闗東數水陂溢為害翟方進為相以為決去陂水其地肥美省隄防費而無水憂遂奏罷之王莾時常枯旱郡中追怨方進童謠曰壞陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰云者兩黄鵠汝南之陂遇成帝大水災異舉山東皆然陂水滿溢而出非可歸罪于陂然亦不聞壞城郭廬舍也方進決去其水使嵗常枯旱民怨苦而思陂之復如此亦可見築隄有利無害矣或問曰馬臻之始為湖也㑹稽民數千人詣闕訟之臻得罪死反按見訟者皆已死説者以為鬼予獨曰不然臻之為湖不利于豪右故相與訟之而假死者以為名臻雖坐死湖乃得不廢亦幸而巳九千頃之田千餘年無水旱豈偶然哉起居郎熊克著中興小厯云紹興二十九年上因與同知樞宻院王綸論溝洫利害云往年宰臣曽欲盡乾鑑湖云嵗可得米十萬石朕荅云若嵗大旱無湖水引灌即所損未必不過之凡慮事須及逺也綸曰貪目前之小利忘經久之逺圖最謀國之深戒克所著當出于日厯則髙宗聖訓固巳著于簡册矣有徐次鐸者著復湖議頗可取今附于後次鐸竊見㑹稽山隂兩縣之形勢大抵東南髙西北低其東南皆至山而北抵于海故凡水源所出多自西東南今衆流所聚者曰平水溪即古若耶溪也曰上竈溪曰欑宫溪曰龍瑞宫溪皆在㑹稽曰蘭亭溪曰南池溪曰離渚溪皆在山隂其他一派一坑所出總之三十六源當其未有湖之時三十六源之水盖西北流入于江以逹于海自東漢永和五年太守馬公臻始作大堤瀦三十六源之水名曰鏡湖堤之在㑹稽者自五雲門東至于曹娥江凡七十二里在山隂者自常喜門西至于西小江一名錢清凡四十五里故湖之形勢亦分為二而𨽻兩縣𨽻㑹稽曰東湖𨽻山隂曰西湖東西二湖由稽山門驛路為界出稽山門一百步有橋曰三橋橋下有水門以限兩湖湖雖分為二其實相通凡三百五十有八里灌溉民田九千餘頃湖之勢髙于民田民田髙于江海故水多則泄民田之水入于江海水少則泄湖之水以溉民田而兩縣湖及湖下之水啓閉又有石牌以則之一在五雲門外小凌橋之東令春夏水則深一尺有七寸秋冬水則深一尺有二寸㑹稽主之一在常喜門外跨湖橋之南令春夏水則髙三尺有五寸秋冬水則髙二尺有九寸山隂主之㑹稽地形髙于山隂故曾南豐述杜把之説以為㑹稽之石水深八尺有五寸山隂之石水深四尺有五寸是㑹稽水則幾倍山隂今石牌淺深乃相反盖今立石之地與昔不同今㑹稽石立于瀕堤水淺之處山隂石乃立湖中水深之處是以水則淺深異于曩時其實㑹稽之水常髙於山隂二三尺於三橋閘見之城外之水亦髙于城中二三尺於都泗閘見之乃若湖下石牌立于都泗門東㑹稽山隂接壤之際春季水則髙三尺有二寸夏則三尺有六寸秋冬季皆二尺凡水如則乃固斗門以蓄之其或過則然後開斗門以泄之自永和迄我宋幾千年民䝉其利祥符以來並湖之民始或侵耕以為田熈寧中朝廷興水利有廬州觀察推官江衍者被遣至越訪利害衍無逺識不能建議復湖乃立石牌以分内外牌内者為田牌外者為湖凡牌内之田始皆履畝許民租之號曰湖田政和末郡守方侈進奉復廢牌外之湖以為田輸所入于少府自是環湖之民不復顧忌湖之不為田者無幾矣隆興改元十一月知府事吳公芾因嵗飢請于朝取江衍所立石牌之外盗為田者盡復之凡二百七十七頃四十四畝二角二十二步計闕度廬先從禹廟後唐賀知章放生池開濬百餘日訖工每嵗期以農隙用工至農務興而罷然次鐸出入阡陌詢父老面形勢度髙卑始知吳公未得復湖之要領夫為髙必因邱陵為下必因川澤豈有作陂湖不因髙下之勢而徒欲資畚鍤以為功哉馬公惟知地勢之所趨横築隄塘障捍三十六源之水故湖不勞而自成歴嵗滋乆淤泥填塞之處誠或有之然湖所以廢為田者非直以此也盖以嵗月彌逺湖塘既寖壞斗門堰閘諸私小溝固䕶不時縱閉無節湖水盡入江海而瀕湖之民始得増髙益卑盗以為田使其堤塘固堰閘堅斗門啓閉及時暗溝禁窒不通則湖可坐復民雖欲盗耕為尺寸田不可得也紹熈五年冬孝宗皇帝靈駕之行府縣懼漕河淺涸盡塞諸斗門固䕶諸堰閘雖當霜降水涸之時不雨者踰月而湖水僅減一二寸湖田被浸者久之訖事決堤開堰放斗門水乃得去是則復湖之要又較然可見者也夫斗門堰閘隂溝之為泄水均也然泄水最多者曰斗門其次曰諸堰若諸隂溝則又次焉今兩湖之為斗門堰閘隂溝之類不可殫舉姑以其著者言之其在㑹稽者為斗門凡四所一曰瓜山斗門二曰少㣲斗門三曰曹娥斗門四曰蒿口斗門為閘者凡四所一曰都泗門閘二曰東郭閘三曰三橋閘四曰小凌橋閘為堰者凡十有五所在城内者有二一曰都泗堰二曰東郭堰在官塘者十有三一曰石堰二曰大埭堰三曰臯步堰四曰樊江堰五曰正平堰六曰茒洋堰七曰陶家堰八曰夏家堰九曰王家堰十曰彭家堰十有一曰曹娥堰十有二曰許家堰十有三曰樊家堰其在山隂者為斗門凡有三所一曰廣陵斗門二曰新逕斗門三曰西墟斗門為閘者凡三所一曰白樓閘二曰三山閘三曰柯山閘為堰者凡十有三所一曰陶家堰二曰南堰皆在城内三曰白樓堰四曰中堰五曰石堰六曰胡桑堰七曰沉壤堰八曰蔡家堰九曰葉家堰十曰新堰十有一曰童家堰十有二曰賓舍堰十有三曰抱姑堰皆在官塘兩縣之北又有玉山斗門八間曽南豐所謂朱儲斗門是也去湖最逺去海最近地勢斗下泄水最速其三間𨽻㑹稽五間𨽻山隂若其他民各於田首就掘堤増為諸小溝洎古諸暗溝及他缺穴之處難徧以疏舉大抵皆走泄湖水處也吳公釋此不察猥敝敝從事於開濬之末誤矣故吳公所開湖才數年皆復為田暨於今或嵗輸所入於官或為慈福宫荘田及蕩地嵗所輸入于荘或為縣公田及蕩地嵗輸賃直于縣為應辦用度錢或為告成天長千秋大禹等寺觀因佃吳給事積土之山而包佃為田及蕩地故湖廢塞殆盡而水所流行僅有縱横支港可通舟行而巳每嵗田未告病而湖港巳先涸矣昔之湖本為民田之利而今之湖反為民田之害盖春水泛漲之時民田無所用水而畊湖者懼其害巳輒請于官以放斗門官不從相與什伯為羣決隄縱水入于民田之内是以民常于春時重被水澇之害至夏秋之間雨或愆期又無瀦畜之水為灌溉之利於是兩縣無嵗無水旱監司府縣亦無嵗無賑濟利害曉然甚易知也然則湖其可不復乎道聽塗説者方以闕上供失民業為説是不然夫湖田之上供嵗不過五萬餘石兩縣嵗一水旱其所損所放賑濟勸分殆不啻十餘萬石其得失多寡盖已相懸絶矣湖之為田若蕩地者不過餘二千頃耕湖之民多亦不過數千家之小利而使兩縣湖下之田九千頃民數萬家嵗受水旱飢饉而弗之恤其利害輕重亦甚相逺况湖未為田之時其民豈皆無以自業乎使湖果復舊水常瀰滿則魚鱉蝦蟹之類不可勝食茭荷蓤茨之實不可勝用縱民採捕其中其利自溥何失業之足慮哉次鐸論載既畢又有援舊説而詰之曰從子之説不必濬湖使深必須増隄使髙且懼隄髙壅水萬一決潰必敗城郭子將為之奈何是又未知形勢利害者也夫水之湍急者其地或狹不能容於是有衝激決溢之患今湖之水源不過三十六所而湖廣餘三百里以其地容其水裕如也况自水源所出北抵于隄及城逺者四五十里近猶一二十里其水勢固已平緩于衝隄何有且隄之去漢如此其久是必有虧無増今誠築隄増于髙者二三尺計其勢方與昔同昔不慮其決而今顧慮之何哉慶元二年五月中澣迪功郎㑹稽縣尉東陽徐次鐸述守禦宣和二年冬睦州青溪縣民方臘起為盗勢張甚及破杭州與越隔一水越大震官吏往往遁去知州事徽猷閣待制劉韐獨調兵築城固守令民富者出財壯者出力士民皆奮已而盗益熾連䧟衢婺二州以三年二月抵越城下衆數萬有酋渠絳衣散髪被重甲而進自號佛母指呼羣盗蟻附攻城㑹有礟卒為礟所激墮城中積草上不死具言賊中事公麾衆出直攻其腹心破之擒佛母指賊遂大潰僵尸蔽野不敢復進明台温賴越骾賊喉牙得以皆全方受圍時公之子子羽年二十四五出入兵間且計且戰得賊酋躬自行刑于市色不變士卒恃以増氣靖康三年公死事東都䘮歸道出越境父老鮑方等祭之哭泣甚哀其文曰天地有覆載之德父母有養育之恩若乃枯骨重肉巳死復生兼之者其惟公乎昔公之帥越也仁恩恵化遐邇䝉福論湖田之弊捐十萬之租使我民温衣飽食安于里閭則公之德澤在人巳淪肌浹髓矣睦冦竊發全浙披靡破邑屠城無敢當者公獨晏然不動激孱鼓懦守孤城于兇焰之中獮薙驅除民卒安堵故當時歌謠曰我公按甲坐譙門百萬生靈一呼存嗚呼我有父母賴公保之我有妻子賴公畜之我有室廬賴公全之我有田疇賴公闢之是以越人家有繪像巷有祠宇飲食必祝公至殞身沒齒子子孫孫永不敢忘也嗚呼公今死矣若迺公立朝之德望許國之忠烈四海所共知搢紳所皆言惟是越民感公恩德同于天地過于父母今靈輀來歸道出此境旄倪號赴不約而同悵英魂之莫招覩甘棠之猶在雨泣雷慟天悲日昏公懷我民尚復歆其奠觴察其情至也哉濡血書詞告于靈下乾道中觀文殿大學士史公浩作公祠堂記曰宣和初忠顯劉公守㑹稽迺二年冬青溪盗大起連䧟杭睦明年春衢婺處亦失守于是乗鋭四出直𢷬㑹稽䗬集螘緣孤堞岌岌賊怙其衆意公必嬰城欲以持久困之而公乃亟開闗麾衆出戰賊遂大潰死者相枕于野自是不敢復東時永嘉臨海四明以㑹稽為蔽障卒賴以全制書䇿勲自徽猷閣待制太中大夫拜述古殿直學士正奉大夫于是天下識與不識皆期公大用其後雖不幸不至輔相然守封疆死國難忠貫白日義感異類哀榮之典震曜一時秩宗奉常攷靖康死事之臣足以配李忠愍者惟公一人故諡曰忠顯浩後五十年來領郡事獲拜公生祠于圓通院邦人肅恭奉祀如公尚存思慕誦説如公始去盛德之容凜然如生望之足以亷貪而起懦嗚呼盛哉惟公無恙時有生祠二南維㑹稽北維真定皆以禦冦捍難有大功于是邦也㑹稽之祠葺矣今天子神聖英武將北復趙魏廓清中原則真定之祠行亦汛掃浩雖老尚庶幾見之乾道巳丑七月望日句章史浩述方劉公城守時待制沈公調為士曹掾公募民能得賊首一級賞錢二萬沈公聞遽請見以為如是則小人規利或殺平人乞令必生擒乃給賞仍倍其數不閱日郡人俘數百輩以獻帥命沈公覈其實其間附賊者才三四人乃請盡釋其餘劉公從之自後凡有稱得賊者悉付沈公辨證全活殆數千人沈公至太中大夫敷文閣待制知福州年八十餘乃終嗣子繼顯于朝議者以為隂德之報討賊建炎二年秋八月一日夜半杭州第三將下卒陳通林永誘決勝萬全歸逺龍騎指揮嬰城叛因守臣葉夢得等殺將官田均明日外沙巡檢司越州西興鎮㳂江巡檢司以狀告浙東安撫使兼知越州顯謨閣學士翟汝文又明日杭州司録范正巳適在城外亦以卒叛事來告翟公聞之乃出次躬治兵凡禁旅弓手保甲七千有竒命副總管髙棟分步伍知山隂縣王饎集芻糧又分遣官屬至所部六州益發兵翟公遂禡祭牙神其詞曰嗚呼王室未靖盗多卒徒孰安招㩦孰克誅鋤維杭叛卒三五其羣戕殺官師持燎縱焚我司方隅宻邇隣冦其忍翫賊不寧往救初順撫之命取其成狂狡自疑不獲要領嗟杭之人思拯禍虐興我戎兵往定亂畧提我萬衆取彼數黥士氣奮張曽不留行維神鑒衷用相茲役助我師征咸劉厥敵建牙出境維敵是求俾我有功蒙神之庥遂出師次西興耀兵江上遣人賫旗榜入杭州城開示禍福又奏乞併將浙西諸州兵滅賊有保甲於綝獨冐兵先登死之翟公親作文祭之曰親以清酌庶羞之奠致祭于防城保甲忠義死難之士於君之靈嗚呼哀哉杭卒叛命蕩為賊區我昔治師躬行天誅士衆穉驕隂與賊圖戰則先遁均為萑苻爾獨忠義奮然前驅衆亡被執怒叱賊徒脅使必降誓死不汙眥裂髪衝氣象自如賊羣束之曹射其軀矢如蝟毛慢罵如初嗚呼哀哉委身蹈義得死乃趨生氣如在沒與衆殊瞻彼圍城深愧士夫嗚呼哀哉痛爾酷禍慘傷余膚我實負念致爾不辜招魂于館歸安泉塗力能報德哀死字孤魂兮來歸登此䘮車嗚呼哀哉翟公慷慨流涕于是士皆思奮翟公乃先作擒賊露布其詞曰盖聞古者賜諸侯以弓矢使得專征用公侯為腹心欲其守衛所以作扞王室同奬天衷春秋獻俘載于册命當所身任藩鎮職統戎兵當誅不庭以禦外侮乃者餘杭逋卒叛命據城奮臂一呼變生肘腋縱兵大掠禍及搢紳戕害吏人蕩焚城邑至乃捕衣冠而黥面驅士女以守陴念茲無辜刼以阻亂當所顧瞻一舍之近傷悼重圍之寃拯溺救焚其忍安視痛心疾首誓不圖存躬提戈矛率先士衆三軍賈勇悉勵貔虎之師元惡就擒卒正鯨鯢之戮仰承天子之威命俯賴將士之協心兵無淹辰市不易肆巳于某月日殺獲陳通等不以賊遺君父巳殄凶殘凡克敵示子孫毋忘勲伐方觀諸將之効首肆命幕府之上功㨗布諸州明曉士庶㑹朝廷以節制付浙西提㸃刑獄髙士瞳周格格為賊誘殺士瞳亦遯去惟浙東之師不少剉賊凜然知懼故城中吏民及寓居士大夫悉賴以全十二月御營使司都統制王淵遂平杭州翟公猶以不能成功降顯謨閣直學士然陳通初叛包藏不軌之志隂遣姦人結台州仙居天台縣魔賊俞道越州新昌縣魔賊盛端才董閏約同日起事翟公設方畧悉捕誅之以故無應者平亂建炎三年十月壬辰車駕駐蹕越州聞金兵數道並入朝論謂恐金由江黄間渡江徑趨衢信以廹行在當分兵守衢信隘路十一月丙申命朝奉郎中書門下省檢正諸房公事傳公崧卿帶本職為浙東防遏使行至衢州有任士安將下潰兵近萬人其為首者曰成臯等五人號五朶花方圍婺州傅公單騎晝夜疾馳至其營未旦朝服趨入叱責之徐諭以禍福臯等皆俯伏曰惟公命傅公乃為具奏皆命以官而納其兵於麾下㑹得報有統制官闗濟者乗金委㑹稽去乃以李鄴降金為邦人之罪由五雲門入揚言將屠城脅而求財殺掠縱横傅公先遣防遏司統制侯延慶步汝霖及成臯等帥師馳入㑹稽傅公以中軍繼至闗濟窘迫乃與腹心跳登蕺山絶頂以弓弩自衛其徒閉開元寺堅守俄攻下之又俘闗濟于蕺山傅公數其罪斬于開元寺之西由是一府皆安傅公亦就除知越州兼浙東安撫使方是時李參政光以書勉傅公曰公今大權在手可以有為非如曩日短檠相對扼腕夜語時也盖前輩平日常相期以忠義如此故併錄之社倉社倉一名義倉始于隋開皇中史臣以為天下義倉皆充滿由唐以來歴代雖皆不廢然不復能如隋之盛至國朝熈寧三年七月巳已御史言齊州科配義倉取數太多民何以堪大臣亦謂人有餘粟藏之于家有何所害而固欲使之輸官非良法也遂詔廢義倉已納者給還然後雖廢置不一多失本謂矣淳熈八年提舉浙東常平朱秘書熹適當嵗歉乃奏以常平米建社倉付富室歛散每嵗取息二斗凶嵗則蠲其息又以士大夫或舉人有行義者與縣官同出納俟息米及十倍即以本米還官倉專以息米歛散每石止収耗米三升士民願以所藏米充入者亦聽之如官米法户部看詳以為可行而一時議者以為每石取息二斗乃青苖法紛然攻詆然朝廷卒行之併下諸路諸路既不能皆如詔而府外之六縣亦止報府言一面措置竟不以已立社倉為言惟㑹稽山隂二縣至今為小民之利方朱公為此時府帥王尚書希吕實左右之慶元二年提舉李少監大性復以常平米一千五百石増置社倉在㑹稽則若馬山若妙智若資夀若廣教若淨社者凡五處在山隂則有梅山之本覺柯橋之靈祕南池之興教迎恩稽山之廟菴凡五處又以常平錢糴慈福宫米一千五百石每倉以三百石為率又於㑹稽姥廟取當來本米二百七十石有竒立琶山倉共為倉十有二所今王公朱公李公民皆立祠以時祀享雖他善政多可紀社倉尤其著者也義田故丞相魏國史公鎮越之明年實乾道戊子始捐已帑置良田嵗取其贏給助鄉里賢士大夫之後貧無以䘮𦵏嫁遣者附于學而以義名之為規畫十許條劖諸石凡有請而應給與給而舉事多寡遲速皆有程覈實委之鄉官錢粮屬之縣主簿米歛散則隨鄉俗錢出納則均省計嵗稔及給助有餘則就復増置教授學職亦與其事然雖養士不許侈用府帥前後繼而成之盖非一人所以久而不廢也總之㑹稽山隂餘姚三縣今為湖水田二千七十一畝有竒地三十六畝有竒山篠地一百一十六畝有竒殯岡六十四畝有竒蕩越人謂瀦水之地為蕩一畝二角五十一步屋一十六間節序㑹稽之俗正旦詣府學少長序拜以齒不以官子弟從父兄之後上元觀燈行街中必相遜避無争道喧競城門弛禁率至夜分以便郊居者二月二日始開西園縱郡人遊觀謂之開龍口謂卧龍山也府帥領客觀競渡異時競渡有争進攘奪之患自史魏公為帥雖設銀杯綵帛不問勝負均以予之自是為例兒童歌青梅聲調宛轉大抵如巴峽竹枝之類三月五日俗傳禹生之日禹廟遊人最盛無貧富貴賤傾城俱出士民皆乗畫舫丹堊鮮明酒樽食具甚盛賓主列坐前設歌舞小民尤相矜尚雖非富饒亦終嵗儲蓄以為下湖之行下湖盖鄉語也春欲盡數日遊者益衆千秋觀前一曲亭亦競渡不減西園郡人謂禹廟為廟下千秋觀為先賢堂至立夏日止惟丐者乃以是日出亦鮮衣鼔笛相娱非此類則以為耻重五日户户皆以土偶張天師置門額上或以虎或以艾束作人形而以土作天師頭竹作劍木作印七夕立長竹竿于中庭上設蓮花謂之巧竿以酒果餅餌祭牛女盖乞巧也五月六月觀荷花亦乗畫舫多集于梅山本覺寺同時又遊容山項里六峯觀楊梅重九亦相約登髙佩萸泛菊不甚食糕而多食栗糉亦以相餽然是日俗忌不相過必有䘮者乃往哭其靈几且致祭焉不知其所始也冬至大畧如正旦而差簡臘日作粥春日作餅與他鄉不甚異故不偹載惟除夕爆竹相聞亦或以硫黄作爆藥聲尤震厲謂之爆杖桃牌書左神荼右鬱壘亦或書他語門左右設之舊又以酒糟漬筆大書于門上曰宜入新年大吉利近嵗糟書頗廢矣送迎吳越春秋有越人相送之辭曰行行各努力盖自古風俗篤厚重于離别如此今西出迎恩門則臨安路有接待院有吕氏莊皆將迎之地院側竹臺因古城遺址巨竹森茂莊亦有亭榭花木可以置酒昔時山隂尉廨門外臨運河亦有亭今廢矣逺則有法雲寺闕林院皆其所也東出五雲門則明州路有㑹稽尉廨前亭子石佛院西南出常憙門一名偏門婺州路則有小隠山園其亭榭山林别見逺則有蘭亭天章寺正南出稽山門台州路則有告成觀大禹寺皆禹廟也亦别見西門東門皆舟行南門西南門皆陸行惟北門曰三江門並海路絶㑹稽之俗篤厚交親迎則叙間闊送則惜暌異觴豆迭進往往竟日餘樽賸炙淋漓狼籍舟車結束惨有行色至于僮僕鈴下挽舟將車之人羅拜于前則亦犒以酒食勉往者以勤悴勞歸者之良苦恩意曲盡觀者太息亦風俗之厚也義門平水雲門之間有裘氏自齊梁以來七百餘年無異㸑子弟或為士或為農鄉黨稱其行大中祥符四年州縣奏旌其門閭是時裘氏義居巳十有九世闔門三百口其族長曰承詢至嘉泰初又五六世盖二十四五世矣猶如故聚族亦加于昔鄉人謂嘗有餽𤓰者族長集小兒十三嵗以下者百餘人使自取之各相推遜以長幼持去其習為亷遜如此至今共一㕔尚頗閎壯有孫威敏公題字存焉至和中李待制兊題詩有云夫何于㑹稽卓然有裘氏同居六百年相聚三千指昔賢欽義方列奏聞天子詔恩表門閭光華映閭里其後又有族老季光以所藏今昔留題詩刻石傅惇作序焉所謂旌表門閭者唐以來有聽事步欄前列屏樹烏頭正門閥閱一丈二尺烏頭二柱端冐以瓦桶築雙闕一丈在烏頭門之南三丈七尺夾植槐栁十有五步五代多故不能如故事晉天福中乃敇度地之宜髙其外門門施綽楔左右築臺髙一丈二尺廣狹方正稱焉圬以白而赤其四角今裘氏盖用此制自平水適雲門者望其旌表在道旁數十步祖宗所以崇孝弟勵風化者至矣裘氏旌表之後六十七年而上虞劉承詔繼之熈寧十年趙清獻公為守得上虞縣劉承詔唐襄公德威之裔德威五世孫愉避黄巢亂自河南徙上虞至承詔十世聚族四百餘口内外無間言畜犬化之一犬不至羣犬皆不食號孝義劉家清獻公嘆異以其事聞于朝有詔旌表門閭復其徭役清獻公為之記又故闕胡公洴賦詩贈之皆藏其家園池謝安石東西二眺亭址在今上虞東山方安石時東山盖重天下臺榭遺跡當不止此嵗久不可攷爾山之國慶院左有小方池草莽被焉甚有古意傳者云此安石洗屐池也王性之遊山記稱山半薔薇洞院上方白雲堂明月堂以為安石故迹竊亦疑之李白詩云不到東山久薔薇幾度花白雲還自散明月落誰家恐後人緣此詩為之云王逸少有書堂在山隂蘭亭鵝池墨池亦在焉當其與羣公祓禊賦詩盖一時之集爾而遺跡勝槩照映林谷則右軍或嘗居之後人追懷風流於是葺為流觴曲水此必皆其舊也王子敬山亭在雲門唐永淳元年春王勃嘗脩禊于此亭今顯聖寺後有子敬筆倉疑距其地不逺也許詢園在蕭山縣北幹山下圖經云詢家此山之陽故其詩曰蕭條北幹園也謝康樂始寧園亦在東山事具文選及傳亭觀舊址無復存者康樂過始寧詩云葺宇臨迴江築觀基層巔其山居賦有云南北兩居水通陸阻南山則夾渠二田周嶺三苑九泉别澗五谷異巘北山二園南山三苑杏壇㮏園橘林栗囿桃李多品梨棗殊所枇杷林檎帶谷映渚其綿亘邐迤包絡上下可謂廣矣而今所可識惟東山爾孔稚圭山園在山隂縣東三十里曰尚書隖見太平寰宇記所謂塢者因稚圭之園以得名也今園已不可見而尚書隖仍存賀知章放生池事具本傳知章始求周宫湖數頃詔賜鏡湖剡川一曲耆舊謂今東城南望為賀家湖疑即剡川也其極目浩渺光景澄澈實東州佳觀云嚴長史園林頗名于唐大厯中有聫句者六人其宅詩云落木秦山近衡門鏡水通園詩云杖䇿山横緑野乗舟水入衡門皆維佳句可以想見其處矣方雄飛别墅在湖中其自為詩云寒山壓鏡心此處是家林今禹廟東有寒山或云即其故處是時有袁秀才林亭雄飛相近數過之故云經年此地為吟侣早起尋君日暮迴也皇甫秀才山亭孟東野嘗賦之其詩曰晴湖㵼峯鏡翠浪開萍蘚平聲往往唐人多因依鏡湖以為勝趣惜其不盡傳爾小隠山園在郡城西南鏡湖中四面皆水舊名侯山晉孔愉嘗居焉皇祐中太守楊綋始與賓從往遊遊而惬焉問其主王氏山何名對曰有之非佳名也亭有名否則謝不敢迺使以其圖來悉與之名山曰小隠之山堂曰小隠之堂池曰瑟瑟之池命其亭曰勝奕亭曰志歸亭曰湖光亭曰翠麓亭又有探幽徑擷芳徑捫蘿磴百花頂山之外有鑑中亭倒影亭皆楊公所自命名而通判軍州事錢公輔又為刻石記之後且百年寖廢弗理少師陸公宰嘗得之以為别墅作賦歸堂六友堂遐觀堂秀發軒放龜臺蠟屐亭明秀亭拄頰亭撫松亭㑹公改築之城之東隅今惟賦歸堂蠟屐亭存焉皆少師所扁也有盧贊元襄周秀實芭題詩最傳于世齊氏家園在城東少㣲山山甚小而近湖齊祖之分司東歸遂家焉引流為沼藝花為圃山之上下有芳華亭脩竹巖真珠泉石屋嘉遯亭樵風亭禹穴閣應星亭東山亭釣閣其自為家山十詠陶冩景物語尤閒逺今廢為神祠無復舊觀惟釣閣故基猶略可識盡湖山登覽之勝古第宅本朝㑹稽文獻相望然往往不營第宅如杜丞相左丞顧内相陳中書方鼎貴時皆無尺椽之居傅給事歸北海故廬以鵞換竹種之而已未嘗營葺李参政罷政歸質新河小宅居之旋即棄去竟無一區所以示後人簡儉之法至矣故今著于篇者槩古事也虞國宅漢日南太守虞國宅舊經云按輿地志餘姚縣西二里有嶼山山南有虞國宅國在日南愛及民物出有雙雁隨軒秩滿還家雁與偕至宅今為百官倉孟嘗宅漢合浦太守孟嘗宅在上虞縣南二十三步有孟宅橋又縣東一里有還珠門取合浦還珠之意陳囂宅漢太中大夫陳囂宅在今禮遜坊長慶寺竹園巷之間去㑹稽縣東二里許囂宅有大竹園至宋永徽中為寺猶號竹園寺初囂與紀伯為鄰伯竊囂藩地以自益囂見之不言益徙地與之伯慙懼亦歸所侵地其中乃為大路鴻嘉二年太守周君刻石刻表號曰義里長簷路至今鄉人猶號長簷街江彪宅江總傳云總于㑹稽龍華寺製修心賦云晉䕶軍將軍彪昔莅此邦卜居山隂都陽里寺域則宅之舊基左江右湖面山背壑東西連跨南北紆縈寢處風雲凴棲水月太平寰宇記云郭北有江橋即彪所居之地按晉書江傳永和中嘗為䕶軍將軍出補㑹稽内史疑即彪也孔車騎宅孔愉初以討華軼功封餘不亭侯授車騎將軍及為㑹稽三年營山隂南湖侯山下數畝地為宅草屋數間便棄官居之初無名以愉來居故名侯山在縣西南四里今為小隠山園别見謝太傅宅謝安本傳云安寓居㑹稽與王羲之及髙陽許詢桑門支遁遊處出則漁弋山水入則言詠屬文相傳以為今國慶寺乃太傅舊居世説注引晉陽秋謝安石家于㑹稽上虞縣優游山林六七年間徴召不至太傅居東山實二十餘年此云六七年者乃太傅未出時也許徴士宅許詢父旼從元帝過江遷㑹稽内史因居焉詢隠居不仕召為朝議郎不就常登永興縣西山築室其上蕭然自放乃號其岫為蕭山東晉咸和六年捨山隂永興二宅為寺穆帝時名山隂舊宅曰祗園今為能仁寺永興新宅曰崇化縣西南四十里有慈雲寺縣西九十里有重興院皆詢嘗所居也舊經云郡國志云㑹稽山南有許君宅又許君里在㑹稽清風坊按皇甫冉詩云昔聞𤣥度宅門對㑹稽峯者謂山隂宅也王勃山亭序云永興新郊許𤣥度之風月者謂永興宅也謝車騎宅酈道元水經注云嶀山東北太康湖晉車騎將軍謝𤣥舊居所在右濱長江左傍連山平陵脩通澄湖逺鏡於江曲起樓樓側悉是桐梓森聳可愛居民號為桐亭樓樓兩面臨江盡升眺之處蘆人漁子汎濫滿焉湖中築路東出趣山路甚平直山有三精舍髙甍凌虚並簷帶空俯眺平湖杳然在下水陸寧宴江有琵琶圻臨江有石床名釣魚臺王右軍宅王羲之宅在山隂縣東北六里舊傳戒珠寺是也舊經云羲之别業有養鵞池洗硯池題扇橋存焉今寺有右軍祠堂既謂之别業則疑宅不在是或云嵊縣金庭觀乃右軍舊宅嘗捨讀書樓為觀在縣東南七十二里孝嘉鄉今觀之東廡有右軍肖像及墨池養鵞池王中令宅王獻之宅在㑹稽縣南三十里舊經云晉義熈三年中書令王子敬居于此有五色祥雲見安帝詔建雲門寺何驃騎宅何充宅在㑹稽縣東南七十里充嘗為㑹稽内史居于此今福慶寺乃其舊宅云郭偉宅晉驃騎大將軍郭偉宅在㑹稽縣東南三里五十步大禹跡寺是也今尚為壮刹餘地亦廣可想見當時園第之盛謝敷宅謝敷宅在㑹稽縣五雲門外一里許或云在雲門寺東與何𦙍宅相近故唐僧靈一詩云春山子敬宅古木謝敷家又宋考功雲門詩云樵徑謝村北學井何巖東是也戴安道宅戴公舊居剡中郗超每聞欲髙尚隠退者輒為辦百萬資并為造立居宇在剡為戴起宅甚精整戴始往舊居與所親書曰近至剡如官舍事見世説謝康樂宅宋謝靈運宅在始寧山中與太傅宅當不甚逺靈運本傳云父祖並𦵏始寧有故宅及墅遂移籍㑹稽脩營别業傍山帶江盡幽居之美作山居賦以自見孔稚珪宅宋衡陽王蕭鈞傳云孔稚珪家起園列植桐栁多營山泉殆窮真趣又本傳云稚珪不樂世務居宅甚營山水凴几獨酌傍無雜事門庭之内草萊不剪江文通宅梁金紫光禄大夫江淹宅太平寰宇記云江君里在招賢坊又蕭山縣東北一百三十步有江淹故宅今為覺苑寺寺前有夢筆驛亦以文通得名按文通城中已有宅此殆别墅也賀季真宅唐賀祕監宅在㑹稽縣東北三里八十步知章晚自號四明狂客天寶初請為道士還鄉里詔許之以宅為千秋觀又求周宫湖剡川一曲宅今天長觀是也張𤣥真宅𤣥真子張志和隠居在郡之東郭茨以生草椽棟不加斧斤唐大厯中觀察使陳少游往見為終日留表其居曰𤣥真坊以門隘為買地大其閎號曰回車巷其初門阻流水無梁少游為營之郡人號曰大夫橋徐浩宅徐浩宅在㑹稽縣五雲橋之東彷彿有遺跡存溪山竒麗過者猶屬目焉嚴維宅嚴長史宅大厯中鄭槩裴冕等聫句賦詩與長史凡六人長史名維以詩著稱其自序云落木秦山近衡門鏡水通又皇甫冉宿長史宅詩亦云昔聞𤣥度宅門對㑹稽峯君住東湖上清風繼舊蹤以詩攷之可想見其處也施肩吾宅施肩吾宅在山隂唐真人施君肩吾之故居也陳文恵公詩云幽居正想飱霞客夜久月寒珠露滴千年獨鶴兩三聲飛下簷前一株栢趙處士宅本朝趙處士宅在㑹稽縣東南照水坊華鎮云趙萬宗字仲淵飬素邱壑德名上聞祥符中被召不赴獻跛鱉傳以自喻求為道士即其家賜羽衣以遂其志養鶴名丹砂嘗有詩云斗懸金印心難動屏列春山眼暫開盖自述也古器物神女墨漢王朗為㑹稽太守其子肅隨在郡住東齋中夜有女子從地中出自稱越王女與肅語竟夕將曉辭别贈墨一丸是時肅方著周易多有凝滯旦用此墨便覺才思開敏石船石帆鐵履鐵屐郡國志塗山有石舡長一丈云禹所乗者十道四蕃志聖姑從海中乗石舟張石兠帆至此遂立廟廟中有石船船側掘得鐵履一兩寰宇記宋元嘉中有人于石船側掘得鐵屐一雙㑹稽記云東海聖姑乗石舡張石帆至二物見在廟中盖江北禹廟也錞于寰宇記聖姑祠又有周時樂器錞于銅為之形似鐘而有頸映水用芒莖拂之則鳴古珪青玉印寰宇記宋武修塗山禹廟得古珪梁初又得青玉印白璧十道四蕃志宋孝武使任延修禹廟土中得白璧三十餘枚明知萬國所執梁初治廟穿得碎珪及璧百餘片五寶劍一曰純鈎二曰湛盧三曰勝邪四曰魚腸五曰巨闕越絶云昔越王勾踐有寶劍五聞於天下今越有鑄浦上竈下竈劍翁嶺説者以為皆越王鑄劍之地古銅罌舊經云在州南三里輿地志云勾踐所藏晉太元中謝輶為郡守掘郡㕔柱下深八尺得古銅罌可容數斗題作越王字文甚分明是今𨽻書餘不可識輶以為范蠡厭勝之術遂埋之今不識其處御史床寰宇記云在州東四里虞翻為吳長沙桓王禮待特設此床以表賢客翻仕漢至御史梁元帝𤣥賦云御史之床猶在都䕶之門不修舊經五官省相傳有虞翻床黄閣銅漏舊經云黄閣有銅漏古制甚精王羲之書陸機漏賦鐫刻于上歴代以為寶今不復存雷鼓輿地志云勾踐應門之上有大鼓名之曰雷鼓以威于龍也寰宇記吳作蛇門有蛇象而龍角㑹稽記曰雷門上有大鼓闊二丈八尺聲聞洛陽孫恩之亂軍人斫破有雙白鶴飛出後不鳴湘洲記云泉陵山有大石鼔云昔神鶴飛入㑹稽雷門中鼓因大鳴漢書王尊曰毋持布鼓過雷門㑹稽徽命鐘晉書郭璞傳元帝為晉王使璞筮遇豫之暌璞曰㑹稽當出鐘以告成功上有勒銘應在人家井泥中得之繇辭所謂先王以作樂崇德殷薦之上帝者也及帝即位太興初㑹稽剡縣人果于井中得一鐘長七寸二分口徑四寸半上有古文竒書十八字曰㑹稽徽命餘字時人莫識璞曰盖王者之作必有靈符塞天人之心與神物合契然後可以言受命矣觀五鐸啓號於晉陵棧鐘告成于㑹稽瑞不失類出皆以方豈不偉哉柯亭笛蔡邕避難柯亭仰見椽竹知有竒音取之作笛許承瓢真誥曰上虞吳曇拔得許承一瓢贈褚伯玉伯玉亡後留付弟子朱僧標歴代寶之可受一斛唐先天二年勅女真道士王妙行詣金亭觀投龍因持此瓢以進金罍晉太康中上虞鑿井得之井在縣南一里今天慶觀東廡驅山鐸唐人于越溪獲鐸以問僧一行答云此秦始皇驅山鐸也禹劍在禹祠殿几世言禹之所服寸刃出于韣外瑩無鋪澁而牢不可引孫冕詩云水劍還難問梅梁亦可疑錢倧詩云塵埃共鏁梅梁在星斗仍分劍韣存禹珪璋璧佩紹興末得之廟殿前土中去土面才二三尺今在告成觀珪二璋璧各一珮三觀者多疑非古物或謂後世以奉神者其説近之漏鼎漏壺漏盤漏權漏鉦太守翟公汝文所製各有銘公之子大宗正丞耆年作鼎篆筆力竒古鼎云公巽父作牧命工浩範金作鼎于觀肆命壺氏司漏時若昬明惟茲邦永用寶其無斁壺云惟建炎戊申三月癸丑公巽父作壺審漏節其永保盤云公巽父作玷司漏節其永保權云公巽父作金漏用衡石其永寶鉦云建炎戊申六月癸亥作鉦永寶乾道中上臯畊者得古磚有文曰五鳳元年三月造以獻府牧洪文恵公文恵命鐫以為硯置案間意甚愛之然所著𨽻釋𨽻續皆不載豈以其篆體非𨽻字耶淳熈癸夘嵗三山陸氏鑿渠泄水得古磚有銘曰永安五年七月四日造作又一塼曰太康十年七月造盖吳及西晉物也今藏陸氏漏澤園漏澤園在縣南七里初崇寧三年二月有詔收𦵏枯骨凡寺觀旅櫬二十年無親屬及死人之不知姓名及乞丐或遺骸暴露者令州縣命僧主之擇髙原不毛之土収𦵏名漏澤園周以牆柵庇以土地所宜易生之木人給地八尺方塼二刻元寄之所知月日鄉里姓名者並刻之暴露者官給轊𦵏日給寓鏹及祭奠酒食墓上立峰有子孫親屬而願𦵏園中者許之給地九尺已𦵏而願改𦵏他所者亦聽禁無故輒入及畜牧者又立法郡縣官違戾者弛慢者失檢察者皆置之法久之有司奉行頗過至有分為三園良賤有别又𦵏日及嵗時設齋醮置吏卒䕶視守園僧以所𦵏多為最得度牒及紫衣遂有析骸以應數者久之始詔裁損自軍興多故遂益弛中興以來郡縣或自以意廣朝廷恵澤至今為利建炎初翟參政汝文為守時亦收四郊暴骨𦵏園中知山隂縣王朝議饎主之得骸千計内有異骨二皆相鈎連自頂至踵無分寸脫落釋氏謂之鏁子骨是也亦可異矣與漏澤同時又有居養院以恵養鰥寡孤獨安濟坊以濟疾病立法皆甚偹居養院最侈至有為屋三十間者初遇寒惟給紙衣及薪乆之冬為火室給炭夏為涼棚什器飾以金漆茵被悉用氊帛婦人小兒置女使及乳母有司先給居養安濟等用度而兵食顧在其後安濟坊徧遣諸醫療視月給俸上醫憚行乃共雇一俚醫之無賴者冐名以往多給庫錢冶藥吏肆為姦官稍檢校則監司走馬使者輒以沮敗德政刺刻死于安濟者相踵則又鈎竒言端坐而化自言莫報上恩于是有封處士者婦人封邑號者已而四方爭上其事朝廷悟其欺一切不報居養院人有與編民及卒伍訟雖理曲皆得其直去人甚苦之至宣和初徽宗皇帝察其弊乃詔居養安濟漏澤之法本以施恩困窮有司奉行失當資給過厚常平所入殆不能支窮民飽食煖衣猶有餘峙而軍旅之士廪食不繼或至逋逃四方甚非為政之道可裁立中制由是居養安濟之法寖廢不舉紹熈五年少監李公大性來為提舉浙東闕於㑹稽鎮塢山隂洄湧塘傍各置義塚㑹稽徐次鐸撰記大畧云越之流風凡民有䘮即議僑寄棺柩所積夙號墓園連嵗不登繼以癘疫而民不免于死亡公奉命東來一意全活飢者賑之以粟病者起之以藥死者遺之以棺荒政舉行畢力無倦復有意于埋胔掩骼之舉命次鐸走近郊枚數寄棺凡三千餘下令申飭曉告使人人知有送死之義且曰其有狥浮圖火化者助之緡錢姑從其私乃若無力歸藏請于官給所費規畫已定復命次鐸度地得二所其一鎮塢廣四十畝又其一洄湧塘傍十餘畝由是義冢之規立矣兩隅分峙男女以辨繚以周墻封其四圍畫圖傳籍備錄分藏閭里姓氏次第刻著申命緇黄以視墓室邱封廣列尚為後圖庻幾有以繼于此也自慶元改元夏迄于冬十月野處之棺官為覆藏者凡千二百九十有竒㨿籍可考至是澤及枯骨矣自今不燎于原不淪于川不暴于野是則公拳拳之志也㑹稽志巻十三
