body:
  text: 㑹稽志巻六宋施宿等撰陵寢紹興元年四月十四日奉隆祐皇太后遺誥斂以常服不得用金玉寳貝權宜就近擇地欑殯候軍事寧息歸葬園陵所製梓宫取周吾身勿拘舊制以為他日遷奉之便此欑宫之始也以是月十七日大殮遂治欑宫李回為總護使胡直孺為橋道頓遞使故事皇太后又嘗垂簾當以相臣為山陵使是時范宗尹當軸而止用執政為總護使他官亦不備置者以欑宫故比陵寢少異也自是用此為故事故不詳錄自四月至六月甫三十五日而欑宫吿成葢議者謂他日歸祔泰陵則山陵之制始當畢講今皆當畧於是總護使首辤所賜銀絹橋道頓遞使亦辭而乞受其半章誼在臺中劾之橋道頓遞使遂亦盡辭而公使錢每料纔支三百貫不得過三料葢不及千緡比故例省費幾四十萬貫方是時上距欽聖憲肅皇后山陵已三十餘年中更變故圖籍無在者而朝士多新進亦鮮能知於是以新江東轉運副使曽紆嘗為欽聖山陵使司官屬命為兩浙轉運副使専修奉欑宫使臣張宗吏人朱扆皆自言嘗經欽聖山陵差使省記當時施行次第亦命服役欑宫卜地在越州㑹稽縣然道路橋梁之類皆命越州所管八縣分地修營至紹興十三年六月徽宗皇帝顯肅皇后憲節皇后靈駕自行在發引初隆祐欑宫稱昭慈聖獻皇后欑宫至是以不可備稱帝后尊號詔以永祐陵欑宫為稱其後永思陵永阜陵永崇陵並用此為故事而欑宫自祖宗時有殿欑啟欑之名皆用􅓖字至顯仁皇太后祔永祐陵欑宫始並以欑字易之起居郎熊克著中興小厯云先是有持隂陽家說欲廣欑宫禁域為二十里有墓在其間者皆當徙去浙東帥臣王師心力言其不可時監察御史任文薦奉詔監掩􅓖宫就令按視於是獲免者七百六十有竒又薦獻之物舊取於民師心請以上供錢給其直從之濮王園廟濮安懿王在英宗皇帝時以塋為園即園立廟俾王子孫世襲濮國自主祭祀行之累朝紹興中以濮邸宗室有在逺未集行在者故久闕嗣王止以見在行髙者為主奉濮安懿王祠事久之乃復除嗣王濮園既阻絶廟祏寓㑹稽之天寧寺今為報恩光孝寺葢以英祖初詔有立廟京師之戒故止寓㑹稽嘗時講求亦詳矣十三年主奉祠事賀王士㑹請即光孝之法堂為廟而闢寺西隅南嚮為廟門如舊制置衛甚謹其香火官吏出入繇别門園令一人以濮邸諸王孫充嗣濮王奉朝請嵗以春秋來薦獻亦循舊制也大禹陵禹巡守江南上苗山㑹計諸侯死而葬焉猶舜陟方而死遂葬蒼梧聖人所以送終事最簡易非若漢世人主豫自起陵也劉向書云禹𦵏㑹稽不改其列謂不改林木百物之列也苗山自禹𦵏後更名㑹稽是山之東有隴隠若劍脊西嚮而下下有窆石或云此正葬處疑未敢信然檀弓註天子六繂四碑所以下棺則窆石者固碑之制度至其數不同或由繁簡異宜或世代悠逺所存止此皆不可知也窆石之左是為禹廟背湖而南嚮然則古之宫廟固有依丘隴而立者按皇覽禹塚在㑹稽山自先秦古書帝王墓皆不稱陵而陵之名實自漢始舊經云禹陵在㑹稽縣南一十三里祠廟府城城隍顯寧廟在子城内卧龍山之西南自昔紀載皆云神姓龐諱玉按唐書忠義傳實龐堅四世祖也京兆涇陽人魁梧有力明兵法仕隋為監門直閣李密據洛口寖逼東都王以闗中銳兵屬王世充擊之百戰不衂煬帝崩乃率萬騎歸唐時唐室新造諸将起於行伍髙祖以王隋之舊臣久宿衛習朝廷制度拜領軍武衛二大将軍俾為諸将模矱秦王尤所親倚常從征伐薛舉冦涇川拔髙摭舉死子仁杲勢益張秦王命梁實營淺水原賊将宗羅睺攻之甚力王於是奮擊士卒殊死戰秦王以勁兵𢷬其背羅睺大敗遂擒仁杲平隴西尋為越州總管威望甚著盗不敢犯其境武徳二年召還巴山獠叛除梁州都督悉討平之越州題名記與新唐書所載先後不同詳見馬萬頃所述王傳召為監門大将軍卒太宗為輟朝贈工部尚書幽州都督初王鎮越恵澤在民既卒邦人追懐之祠以為城隍神梁開平二年呉越武肅王上其事封崇福侯五代㑹要作開平元年紹興元年詔以駐蹕㑹稽踰年妖祲不作行殿載寧城隍崇福侯廟賜額顯寧封昭佑公三十年顯仁皇后靈駕渡江無虞加號忠順乾道五年加號孚應八年加號顯恵淳熈三年封忠應王後又加號昭順靈濟孚佑郡人奉祀甚謹以九月十二日為神生日享薦尤盛䕶國旌忠廟在子城内自昔陜西出兵祈禱三聖必獲顯應當睦冦作是邦得三聖隂祐遂建廟紹興元年宣撫處置使張奏據呉玠陳請乞於鳳翔府和尚原立三聖廟賜額旌忠封忠烈靈應王忠顯昭應王忠恵順應王所至廟祀一用是額崇善王廟在府衙蓬萊閣西五通廟在子城内呉越武肅王廟在府南四里三百二十六步本甚閎壮嵗久墮圮今僅餘四楹有巨碑舊在廡下今乃立荒園中皮光業之詞也具載唐長興七年呉越王棄宫館後二年嗣王建廟於越按長興後唐明宗年號止於四年而崩歴閔帝清泰帝凡三年而晉髙祖即位改元天福若不數閔帝清泰則七年乃天福元年劉恕呉越紀年稱天福元年七月乙夘立武肅王廟於東府今攷之碑與紀年雖不同其實皆嵗丁酉清泰廢閔帝為鄂王晉祖追貶清泰為庶人皆削其年號而天福改元以其年十一月則十一月以前皆長興七年矣漢髙祖削晉出帝開運之號稱天福十二年亦用此比也然武肅王實以壬辰嵗薨文穆王襲位壬辰葢長興三年不得云長興七年矣呉越王棄宫館後二年嗣王建廟於越也按五代史及劉恕紀年開皇紀呉越備史皆言武肅王以三年薨則碑為誤然碑當時立光業為其國丞相亦不應誤繆至此葢皆不可知光業日休子紹興中王裔孫詧叔廣言廟中神像雖從者及伶人皆坐示不可遷也旌忠廟在府南三里二百六十六步建炎四年十一月髙宗皇帝自建康東巡㑹稽大臣吕頥浩等建議請移蹕四明㑹金報踵至遂行命李鄴守㑹稽鄴嘗使金至是畏死不能守遂降金大酋烏珠在錢塘遣其下號帕克巴太師者為偽知州並檄鄴為偽同知日同視事於府出則並馬而行郡士民多懐忠憤然莫敢先發初大駕之行詔百司分半扈從而親兵輦官長入祗候亦止以三千人從行有衛士唐琦者不得在行中琦開封人資忠勇自誓與金偕死以報國㑹帕克巴太師出乃懷巨塼欲邀擊殺之復疑從騎衆恐不克成功顧視道傍有小閣乃趨上適俯見一人過即奮塼擊之不中中其騎從騎羣至遂執以見帕克巴鄴共坐問故琦大罵不絶曰吾欲碎爾首死作趙氏鬼耳帕克巴氣折曰大金兵數百萬汝殺我一人何益琦曰汝敢來為此州主故欲殺汝又顧鄴曰我請官一石五斗米尚不肯以負國汝受國厚恩何為乃爾豈人類耶金亟命闕之罵猶闕大駕再之㑹稽闕即為立廟且以其事聞請闕又郡闕詔移婺闕讀者凛然増忠義之氣闕乙己冬金大入塞太上皇内禪幸浙明年正月金兵徑犯京師議和於城下而還是年再犯京師明年春二聖出狩漠五月今天子即位又明年冬金深入渡淮已酉二月遂犯揚州天子幸杭其冬金分兩道冦江浙其一由武昌渡江犯洪州六宫百司衛從隆祐后遷於䖍以避之金自洪進兵西南至瀏陽西北至建昌撫其一由歴陽渡破建康陷太平廣徳進破杭渡錢塘江入越陷明州天子自越幸明自明航海幸温今年二月金人自明越而西復陷秀䧟平江達於鎮江並山鑿河通道建康卒以其衆並所掠呉越之人濟江而北裴回於淮南至於今去否所不得知也嗚呼金内侵六年國家之難生民之禍至此極矣前世未有也士大夫畏避至不敢誦言金為賊其能為吾宋仗節死難者與有幾侯以衛士武人生不知書遇亂憤發顧不能愛其死狙擊金酋慢罵降帥至死猶不絶口其義豈惟今之人所希見古書傳所載何以尚兹嗚呼偉哉崧卿時治兵在衢方道路梗絶旁郡縣行事往往不相聞知惟侯之事諜者爭相傳以為美談至一日十許告聞者相與嘆惜有為流涕者或恨不與之偕死已而崧卿守越凡在越之人類能言之參攷既審亟以其事聞天子愍嘉之詔議追褒而邦之人復相與請建祠宇以旌侯之忠以勸來者乃作今廟方須其成請額於朝且記其事於石未果而崧卿既以病免矣於其行日姑以不腆之酒禮於像貌之前而致吿焉後帥陳汝錫復以為言詔賜額曰旌忠隆興中帥呉芾増葺屬其客陳澤作修廟記今在廟中東嶽行宫在府東南四里一百六十二步保寧王廟在府東南四里二百八十六步助海侯廟在府西北三里三百一十六步越王廟在府西北二里興武侯廟在府西北四里一百三十七步鮑郎廟在府南二里二百四步愍孝廟在府東北二百七十九步孝子蔡定父革以傭書自給惟定一子命為進士建炎元年革以事逮捕繫獄年七十當贖吏持不可定祈哀太守願以身代不報㑹大雨雪定嘆曰生無益於親當以死繼萬一有司憐而釋之因自撰墓銘并訴牒一道寘諸懐服巾紵趨府橋下自湛而死太守翟公汝文聞之亟命出其父且給轊以塟定死後七年太守王公綯始克請於朝賜廟額曰愍孝㑹稽縣城隍廟闕舜廟在府城南七十里述異記云㑹稽山有虞舜巡守臺禹廟在縣東南一十二里越絶書云少康立祠於禹陵所梁時修廟唯欠一梁俄風雨大至湖中得一木取以為梁即梅梁也夜或大雷雨梁輒失去比復歸水草被其上人以為神縻以大鐵繩然猶時一失之政和四年勅即廟為道士觀賜額曰告成禹陵舊在廟旁今不知所在獨有當時窆石尚存髙丈許状如稱權廟東廡祭祠嗣王啟而越王句踐亦祭别室鏡湖在廟之下為放生池臨池有咸若亭又有明逺閣懐勤亭懐勤取建炎御製詩登臺望稽嶺懐哉夏禹勤之句南鎮廟在縣南一十三里周禮職方揚州之鎮山曰㑹稽隋開皇十四年詔南鎮㑹稽山就山立祠取其旁巫一人主灑掃且命多蒔松柏天寳十載封㑹稽山為永興軍毎嵗一祭以南郊迎氣日國朝乾徳六年詔問禮官五鎮見祭罷祭之由時以㑹稽山在呉越國乃下其國行祭事淳化二年秘書監李至言五郊迎氣之日皆祭逐方嶽鎮海瀆自唐亂離之後有不在封域者遂闕其祭國家克復四方間雖奉詔特祭未著常祀望遵舊禮就迎氣日各祭於所𨽻之州長吏以此為獻官從之其後立夏日祀南鎮㑹稽山永興公於越州越王廟在縣東南一十二里曹娥廟在縣東七十二里娥上虞人父旴能弦歌為巫祝漢安二年五月五日於縣江泝濤迎波神溺死屍不得娥年十四縁江號泣晝夜不絶旬有七日遂投江而死元嘉元年縣長度尚改葬於江南道旁為立碑焉墓今在廟之左碑有晉右将軍王逸少所書小字新定呉茂先師中嘗刻於廟中今為好事者持去國朝熈寧十年十月詔曹娥孝女墳廟載祀典又有朱娥者上虞民朱四女母亡養於祖母娥十嵗祖母與里中朱顔鬬被刃娥趣救之得免而娥連被數十刃絶吭而死治平二年太守章公闕以其事聞賜其家粟帛㑹稽縣令董階以娥配食曹娥至今在焉馬太守廟在縣東南三里八十步太守名臻字叔荐永和五年創立鏡湖在㑹稽山隂二縣界築塘蓄水水髙於田田髙於海各丈餘水少則泄湖溉田水多則泄田水入海塘周回三百一十里溉田九千餘頃㑹稽記云創湖之始多毁塚宅有千餘人怨訴臻被刑於市及遣使按復絶不見人閲籍皆先死者云唐韋瓘修廟記云開元中刺史張楚深念功本爰立祠宇久而陊敗今皇帝後元九年觀察使孟公崇大棟梁孟公簡也其在越乃元和中記云後元葢省文爾孔府君廟在縣南二十五里又謂之孔官廟按世説孔車騎少有嘉遁意年四十餘始應安東命未仕宦時常獨寝歌吹自箴誨自稱孔郎遊散名山百姓謂有道術