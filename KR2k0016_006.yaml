北望京洛遂縈咽而死因葬山頂然則洛思山者又為冢師墓也今兩存之劉剛墓在餘姚縣南八十里其妻樊夫人祔剛仕為上虞令有道術能召役鬼神政尚清靜嵗嵗大豐民受其恵其妻亦有道者事見葛稚川神仙傳葛仙翁墓在上虞縣西南四十里蒿公山之巔有石室髙丈餘狀如冢虞翻墓亦見舊經夏侯曽先地志在餘姚羅壁山下葢縣南十有八里丁固冢十道志編在㑹稽固山隂人少夢松生腹上謂人曰松字十八公後果為司徒又名司徒冢孔愉墓在山隂縣南二十九里愉仕至尚書左僕射世說所謂孔車騎乃其贈官也阮裕墓在嵊縣東九里裕字思曠以疾築室剡山闕金紫光祿大夫不就卒山遐墓在蕭山縣北一十一里遐簡之子濤之孫也歴餘姚令東陽太守卒於官許旼墓在蕭山縣東三十二里許詢之父旼晚居蕭山當是其墓郗愔墓在山隂縣西南二十五里謝安墓在上虞縣西北四十里史云安墓在建康梅岡此云安墓未詳按南史謝靈運父祖並葬始寧或是謝𤣥父子墓爾王羲之墓在諸暨縣苧羅山孔曄記云墓碑孫興公文王子敬之書也而碑亡矣支道林墓按世說在剡之石城山戴逵過之嘆曰徳音未逺而拱木已積石城今屬新昌是為南明山謝輶墓在山隂縣西三十三里晉太元中㑹稽内史夏靜墓亦見舊經夏侯曽先地志云在蕭山縣東螺山螺山者其形似也戴顒墓在剡縣北一里王僧達呉郡記顒死葬剡山今石表猶存故王龜齡詩云千年戴顒墓三字道傍碑也褚伯玉墓在剡縣白石山南史本傳云齊髙帝於是山立館居之伯玉常居一樓上及卒𦵏樓所謝康樂靈運墓在山隂縣西南三十二里靈運死建康葢歸葬於此羊𤣥保墓在蕭山縣西三十九里嘗為本郡太守楊素墓在上虞縣西北五里亦見舊經或謂素死長安又非越人疑有同姓字者爾徐浩墓在山隂縣南二十一里賀知章墓在山隂縣東南九里其地因名九里墓在山巔鄉人呼為賀墓康希銑墓在山隂蘭亭希銑㑹稽人歴饒海台睦四州刺史其碑顔魯公撰併書郡守呉奎得之王荆公及弟平甫賦詩而墓始著石昉墓在新昌黄壇按公弼家譜墓前有柘樹生而内向覆墓如葢每有登科者則柘生特枝一枝一人或二三枝則二三人云呉越遜王倧墓在㑹稽秦望山按備史倧疾殂東府以王禮葬焉秦望一名天柱聳特秀削倧之子孫多以文詞知名建炎初裔孫伯言自北邙遷奉累世之喪歸祔天柱名士多有挽詞蔡墓在上虞縣西十里世傳是蔡伯喈墓按邕固嘗避難至越然史載邕六世祖與其父及母死廬墓事不聞有墓在此也死獄中又不在越非漢蔡邕明矣太平御覽載人有夜坐論史忽有扣户自稱蔡邕字伯喈者人曰死王允獄中非子耶鬼曰彼自是東漢之蔡伯喈也吾姓氏適同耳以此推之殆亦此類姑存之近代冢墓冢墓舊經所載外餘隨訪求所得書之故無前後之次亦有未盡書者尚多當俟續書㑹稽縣太傅信王墳在㑹稽昌原村王諱璩以少保恩平郡王判大宗正始賜府於紹興府後罷大宗正府如故進少傅王薨遂贈太保信王以葬其加贈太傅則又慶元之六年云陸諌議軫墓在五雲鄉焦塢贈太傅陸都官珪墓在袁孝鄉贈至太尉今改葬本縣鷲峰寺前錢内翰希白墓在天柱峰下子集賢彦逺裔孫伯言祔沈少卿紳墓在雲門已上並見舊經陸發運寘墓在富盛鄉郎中沅祔發運墓陸左丞佃墓在陶宴嶺陸少師宰墓在雲門盧家㠗知郡淞通判涭並祔少師墓陸右師長民墓在上皋尚書塢參議静之提舉升之教授光之並祔右師墓蘇計議師徳墓在陶宴嶺吏部玭祔計議墓楊樞宻愿墓在何山知郡祜祔樞宻墓詹司諌亢宗墓在秦望山詹太博林宗墓在鹿里太監騤祔太博墓梁師諌仲敏墓在秦望山胡尚書直孺墓在秦望山齊賢良唐墓在昌原闕翰臨墓在昌原闕屯田瑩墓在浪港山傅編修堯咨墓在石棊山給事中崧卿左藏並祔編修墓王提舉然墓在五雲鄉中竈判官漻侍郎瀹並祔提舉墓王知郡饎墓在蔡村韓樞宻肖胄墓在太平鄉韓左師膺冑墓在太平鄉韓運使髦墓在太平鄉富樞宻直柔墓在古城富知府杞墓在古城張秘書淵墓在昌原尹侍郎暾墓在龍瑞前峰下未仕時嘗封和靖處士莫侍郎叔光墓在平水孝子蔡定墓在觀嶺下山隂縣魏忠憲王墳在山隂法華山王諱愷孝宗第二子也初自魏邸出判寧國府又判明州兼領雍州牧王薨有㫖宜於紹興善地權厝遂厝於天衣寺之法堂遣使軷祭且視窆焉陸知郡眷墓在黄祊齊尚書執象墓在昌原傅銀青傳正墓在承務鄉尚書墨卿祔銀青墓宋修撰煇墓在九里朱提學興宗墓在苦竹村王中書孝迪墓在九里陳中書過庭墓在黄祊嶺王特進俊乂墓在西山尚書佐祔特進墓司馬提舉棿墓在亭山侍郎伋監丞僖祔提舉墓吕顯謨正已墓在九里曽文清公墓在道樹大卿逄侍郎逮並祔文清墓杜太師墓在永昌鄉苦竹村孫威敏公墓在承務鄉陸太保昭墓在承務鄉左丞之祖四世葬此有陸氏大墓碑趙太師墓在承務鄉清獻公之祖與陸氏墳正相對亦有碑唐右史閎墓在蘭亭唐運使閎墓在古城石銀青元之墓在盛塘孫朝議瑞中寺正邦哲祔銀青墓石提舉繼曽墓在謝墅李太尉顯忠墓在天衣山嵊縣石祠部麟之墓在昇平鄉石尚書公弼墓在僊山諸暨縣定安郡王令詪墓在花山馬郎中純墓在陶朱鄉寺丞延之祔郎中墓廖都丞虞弼墓在陶朱鄉新安郡王士術墓在陶朱鄉姚太師舜明墓在長寧鄉參政憲祔太師墓安定郡王子濤墓在安俗鄉蕭山縣王兵部絲墓在縣西南八里王侍郎弗墓在廣福寺傍餘姚縣胡尚書沂墓在澄溪李荘簡公墓在姜山陳侍郎槖墓在化安寺趙知府彦嗣墓在鳳亭鄉趙知府師龍墓在石堰上虞縣趙知府彦䌈墓在五夫山鳳凰村豊郎中誼墓潘經略畤墓趙龍學繡墓新昌縣石尚書待旦墓在