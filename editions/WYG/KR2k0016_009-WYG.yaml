body:
  text: 㑹稽志巻九宋施宿等撰山府城卧龍山府治據其東麓𨽻山隂舊經云種山一名重山越大夫種所𦵏處太平御覽種山之名因大夫種以語訛成重也寰宇記隋開皇十一年越國公楊素於種山築城自隋迄唐即山為州宅吳越備史云遜王倧於卧龍山西寢後置園亭栽植花竹周徧髙下旦暮登臨訖于四時倧能為歌詩亭榭間紀録皆滿卧龍山名始見於此國朝康定初范文正公撰清白堂記云㑹稽府署據卧龍山之北足上有蓬萊閣嘉祐末刁景純撰望海亭記云越冠浙江東號都督府府據卧龍山為形勝山之南亘東西鑑湖也山之北連屬江與海也周連數里盤屈於江湖上狀卧龍也龍之腹府宅也龍之口府東門也龍之尾西園也龍之脊望海亭也先是越勾踐剏飛翼樓取象天門東南伏漏石竇以象地户陵門四達以象八風因山勢畚築為城一千一百二十步至唐人以樓址為望海亭其後亭閣峥嶸踵起相望與其山川暎帯號稱仙居元微之夸州宅示白樂天詩云謫居猶得近蓬萊樂天荅云大夸州宅似仙居微之題望海亭云湖山四面爭氣色曠望不與人間同東坡詩云卧龍盤屈半東州秦少㳺詩云共躡丹梯上卧龍他詩多不悉載山西北幽徑蔽虧傍皆叢篁灌木其地缺齾不整傳云大夫種墓曩因潮水穴山後失其尸也前太守申約束止樵採務在封殖以為軍府芘暎然百年喬木成章者可數園林竹樹雖敷榮擢秀大抵多比嵗所植也地出佳茗以山泉烹瀹為宜景祐中蔣吏部堂閔山序云府山一名卧龍為一境形勝予視事之明日見其竹樹零悴僅有半在問吏曰為昔人剪伐使然自謂非予守土此山殆將童矣於是申約束止樵採作閔山詩云東南亘羣山形氣或㫁續兹山窮嶄絶孤峙越之腹呼吏對泉石申禁䕶林麓熙寧十年程給事公闢植松千餘章於山上秦少㳺撰樂安公唱和詩序云昔樂安蔣公以山富草木樵蘇所採令於公府止之湖地沃衍田被豪奪為表於朝廷復之又廢山西淫祠引湖流為流觴曲水文山水閣棹歌之詩至今稱焉程公能述樂安公之志狂枝惡蔓斬薙以時秀甲珍芽無得輒取春秋佳日開池籞具舟楫與民共逰而樂之隆興二年吳給事闕卧龍山草木記云越城入山蜿蜒竒秀者卧龍山也山之陽州宅據其下是宜林木叢茂乃大不然驅鈴下卒輦糞壤除椔翳種竹萬竿桃李千本方將蓺茶於秋裁松於冬植花卉於春以盡復舊觀而予還朝矣飭吏枚數竹之數令所植外凡得十百餘根併列于碑隂大夫種墓舊亡其處輿地志云種山西缺處是也范公清白堂記云山巖之下獲廢井視其泉清而白色味之甚甘以建溪日鑄卧龍雲門之茗試之甘液華滋説人襟靈張伯玉蓬萊閣記自注卧龍山茶冠吳越山南舊傳白樓亭今遺址無所考山巔城隍祠其西南越王臺下為威果營營有烏龍井連營居民櫛比為卧龍坊舊經引孔曄㑹稽記云種山南有白樓亭江夏太守宋輔於此立學教授沛國豆儼避地至㑹稽聞陳業賢往候之不見臨去入交州留書繫白樓亭柱而别世説又云許𤣥度孫興公共於此商略古今賢達支道林聞之云二公故自有才情注白樓亭在山隂臨流映壑十道志云白樓山飛翼樓山南頭也白樓一作百樓葢種山之南先有白樓亭故山亦以此名信如志言飛翼樓山南頭今望海亭即其地也或云自山西百餘步出常喜門今尚有白樓堰云自吳越以後山以卧龍著故他名寖泯龜山在府東南二里二百七十二步𨽻山隂一名飛來一名寳林一名怪山舊經云山逺望似龜形故名越絶云龜山句踐所起逰臺也東南司馬門因以灼龜又仰望天氣覩天怪也臺髙四十六丈周五百三十步吳越春秋云城既成琅琊東武海中山一夕自來故名怪山寰宇記又云龜山下有東武里即琅琊東武山一夕移於此東武人因徙此故里不動山巔有巨人迹錫杖痕靈鰻井多寳塔逰臺一名觀臺唐徐季海詩云茲山昔飛來逺自琅琊臺孤岫龜形在深泉鰻井開李公垂詩云一峰凝黛當明鏡千仞喬松倚翠屏元微之詩云一峰噢伏東武小兩峰鬬立秦望雄自郡齋南望屹然相對其浮圖侵雲漢張伯玊有清思堂雪霽望飛來山詩云隠几髙堂上坐對飛來峰梵塔倚天半樓臺出雲中又題寺壁云一峰來海上髙塔起天心秦少㳺録寳林事實云越城凡三山能與秦望山為主客者卧龍寳林蕺山也其城南左右數十里疾馳屹立皆屬於秦望又率其左右之山因鑑水謁于越城卧龍為郡守所治蕺山少東不能正受秦望之謁葢越之形勢自卧龍而下未有如寳林者今寺名報恩光孝禪寺紹興初以濮安懿王園廟寓焉山舊傳有聖母閣灼龜公冡許𤣥度書堂迹皆泯以井有靈鰻一名靈鰻昔有老僧旦暮鑿是山䥴鏨不絶又加以火灼醋淬巖崖幾盡故蔣吏部堂詩云聞之有苾芻嵗久苦刓刻鑿聲響深崖火燼淬層壁平為土木基蔑有蒼翠色金粟千億身窣堵百餘尺蕺山在府西北六里一百七步𨽻山隂舊經云越王嗜蕺採於此山故名晉王右軍羲之故居也按羲之傳嘗在蕺山見一老姥持六角竹扇賣之羲之書其扇各五字姥初有愠色因謂姥曰但言是王右軍書以求百錢姥如其言人競買之佗日姥又持扇來羲之笑而不答今山下有題扇橋墨池鵝池戒珠寺寺有右軍祠堂唐衢州刺史趙璘直寺碑云句踐故城東北三里有山曰蕺蕺蔬類也傳云昔越君所嗜常採於此遂用名之火珠山在卧龍山隅小而圜絶類龍頷之珠為浙東提刑廨上有稽山閣西有識舟亭今廢陽堂山在府南二里二百四步𨽻山隂一名鮑郎山山西有鮑郎祠舊經云鮑郎東漢人名葢生好獵死𦵏於此兒怱夢郎更生急開棺視之尸儼然但無氣爾人事之頗有靈驗事見郡國記寰宇記蛾眉山在府東二百九步𨽻山隂白馬山在府東北三里三百一十六步𨽻㑹稽彭山在府北三里三百一十六步𨽻㑹稽舊經云昔彭祖隠居之城也有助海侯廟㑹稽縣㑹稽山在縣東南一十二里周禮揚州之鎮山曰㑹稽山海經云㑹稽之山四方上多金玊下多砆石勺水出焉史記云禹㑹江南計功而崩因𦵏焉命曰㑹稽㑹稽者㑹計也注禹到大越上苖山爵有徳封有功因更名曰㑹稽吳越春秋禹還大越登茅山以朝四方羣臣乃大㑹計治國之道内美釡山州鎮之功外演聖徳以應天心遂更名茅山曰㑹稽之山輿地志云㑹稽山一名衡山其山有石狀如覆鬴亦謂之覆鬴山十道志云㑹稽山本名茅山一名苖山一名塗山禹行天下㑹稽名山因地為名吳夫差入越王以甲楯五千保㑹稽山太平御覽㑹稽之山古防山也亦名茅山又曰棟山越絶云棟猶鎮也即揚州之鎮山三國志虞翻曰南山攸居實為州鎮隋開皇十四年詔㑹稽等山並就山立祠唐開元十四年封四鎮山為公㑹稽南鎮曰永興公唐地里志㑹稽縣有南鎮永興公祠即此山也自經史地志所著曰苖山曰茅山曰衡山曰釡山曰防山曰覆鬴又曰棟山亦曰南山實一山也東北接觀嶺其上有磐石屹立曰降仙臺一曰苗龍仙人臺永興公祠之側有茗隖淘沙徑思古亭遺址山南别峰曰石􅏛峰之下有唐齊抗書堂范蠡養魚池山西北五里即禹井禹廟今為告成觀又西百餘步有大禹寺菲飲泉山與宛委相接宛委山即禹穴號陽明洞天按舊經引吳越春秋東南天柱號宛委乃禹蔵書處在㑹稽山南三里則宛委别一山也又舊經云㑹稽山周回三百五十里葢總言東南諸山之𨽻㑹稽郡者如晉王彪之刻石山贊云㑹稽刻石山宋何𦙍傳云居㑹稽秦望山然則刻石秦望皆可以㑹稽山名之泊宅編云㑹稽東南巨鎮對案梅李尖山謂之筆案其周回六十里此又兼言寳山也然則㑹稽云者諸山之通稱爾秦望山在縣東南四十里舊經云泉嶺最髙者輿地廣記云秦望在州城南為衆峰之傑秦始皇登之以望東海宋何𦙍居㑹稽秦望山山有飛泉西起學舍即林成垣因巖為堵别為小閤室寢處其中又於山側營田二頃講隙從生徒㳺之太平御覽云山在州城正南涉境便見秦始皇帝登山以望南海自平地取山頂七里懸磴孤危峭路險絶攀蘿捫葛然後得至山上無甚髙木當由地逈多風所致山南有譙峴中有大城王無餘之舊都也句踐語范蠡曰先君無餘國在南山之陽社稷宗廟在湖之南山有三巨石屹立如笋龍池冬夏不竭俗號聖水傍有崇福侯廟山在府城南與今府治屹對謂之南山為宜今人以南鎮公祠在㑹稽山南即以唐所封鎮山遊為南山又為㑹稽山也吳越春秋云越王無餘國在南山之陽太平御覽以越王無餘之舊都繫之秦望山此為冒證咸平中陸㕘撰法華山碑云夏后氏廵狩越山方名㑹稽後世分而為秦望釐而為雲門法華其實一山然則秦望亦可以㑹稽名之自秦始皇登此山以望南海又陟天柱之髙峰以望秦中始有秦望望秦之名而秦望最著十道志秦始皇登秦望山使李斯刻石其碑尚存姚令威叢話云予嘗上㑹稽東山自秦望山之巔並黄茅無樹木山側有三石笋有水一泓别無他石笋上並無字以此訂之始皇所刻石不在此山明矣舊經㑹稽之别峰曰茅峴此山之南亦有譙峴茅譙音近似疑傳之訛也望秦山在縣東南三十二里舊經云秦始皇與羣臣登此以望秦中也一名天柱峰一名卓筆峰葢㑹稽山之别峰下有錢遜王倧墓或疑望秦山一名天柱峰即宛委山之一峰也然舊經以望秦山列秦望山之次今因之元微之望海亭詩云兩峰鬭立秦望雄自注兩峰謂秦望望秦二山王龜齡賦亦云山有秦望而望秦宛委山在縣東南一十五里舊經云山上有石匱壁立干雲升者累梯而至十道志石匱山一名宛委一名玉笥有懸崖之險亦名天柱山昔禹治水歌功未成乃齋於此得金簡玉字因知山河體勢水經云玊笥竹林雲門天柱精舍並疎山為基築林栽宇割澗延流盡泉石之好太平御覽云㑹稽石匱山上有金簡玉字之書夏禹發之得百川之理山下有棲神館唐改為懐仙館今為龍瑞宫道書云陽明洞天一云極𤣥太女之天山巔有飛來石其下葛仙翁丹井山南葉天師龍見壇太史公上㑹稽探禹穴史記注云禹至㑹稽因𦵏焉上有孔穴民云禹入此穴自舊經諸書皆以禹穴繫之㑹稽宛委山里人以陽明洞為禹穴今無所攷惟唐鄭魴書禹穴二大字元微之銘而魴序之然昌黎送惠師云嘗聞禹穴竒東去穿甌閩越俗不好古流傳失其真則禹穴不可定名久矣舊經引遁甲開山圖云禹治水至㑹稽宿衡嶺宛委之神奏玉匱書十二卷禹開宛委山得赤珪如日碧珪如月各長一尺二寸吳越春秋引黄帝中經云東南天柱曰宛委赤帝在闕其巖之巔承以文玉覆以磐石其書金簡玉字編以白銀皆瑑其文及禹廵衡岳血白馬而祭之夢見赤繡衣男子自稱𤣥夷使者聞帝使命于斯故來候之倚歌覆鬴之山顧謂禹曰欲得我神書者齋於黄帝皇巖之下三月庚子登宛委山發金簡之書按金簡玉字得通治水之理俚説不經故録之射的山在縣南一十五里舊經云山西石室乃仙人射堂也東峰上有射的遥望山壁有白㸃如射侯土人常以占穀貴賤語曰射的白米斛百射的𤣥米斛千其石室深可二丈遥望類師子口俗謂之師子巖太平御覽云射的山半石室之東髙巖臨潭有石的岫形其圓明視之如鏡唐李白詩云仙人居射的道士住山隂白鶴山在縣南一十五里一名箭羽山孔靈符㑹稽記云射的山西南水中有白鶴山此鶴嘗為仙人取箭曾刮土尋索遂成此山漢鄭𢎞少貧賤採薪為業嘗於山中得一遺箭羽鏃異常心怪之頃之有人覔箭𢎞以還之後遂得朝南風暮北風也鄭𢎞南北風事見樵風涇注石帆山在縣東一十五里舊經引夏侯曾先地志云射的山北石壁髙數十丈中央少紆狀如張帆下有文石如鷂一名石帆十道志云山遥望如張帆臨水謝惠連汎南湖至石㠶詩云漣漪繁波漾參差層峰峙南湖即今鏡湖也宋之問詩云石㠶來海上天鏡出湖中赤堇山在縣東三十里舊經云歐冶子為越王鑄劍之所越絶云赤堇之山破而出錫若耶之溪涸而出銅吳越春秋薛燭曰赤堇之山已合無雲文選張景陽七命云耶溪之鋌赤山之精赤山即此一名鑄浦山若蕢山在縣東十二里舊經云秦皇東逰於此供芻草俗呼遶門山寳山在縣東南三十里一名上皋山今欑宫山也東接紫雲山昔有龍憩山上紫雲乗之旁聫錫山産錫之所南抵下皋富盛山西北接龍尾若蕢諸山山崦有趙家嶼一名趙樂嶼西塘裏城今禁圍内陵兆所宅乃其地也山巔號白鹿尖新婦尖雞籠山五峰嶺其對案曰梅李尖自寳山東七里有巨石中圓竅深可一尺廣可四尺號鳯皇窠昔鳯生雙雛從此翔去今山下有上凰村下凰村亦名鳯林方勺泊宅編云㑹稽山為東南巨鎮周回六十里下瞰鏡湖有山横抱如几案案外尖峰曰梅李尖地理家謂之筆案當勺所著在宣和建炎中尚未卜宫陵也矧十餘里間憩龍雛鳯産錫蓄寳實儲慶錫羨於今日豈偶也哉自龍尾山五峰嶺青山等名皆舊經所不著上臯山即寳山也龔頥正稽古録紹興府攢宫號實山是也紫雲山在縣東南五十里舊經云昔有逰龍憩此山中常有紫雲起故以為名富盛山在縣東四十里下皋山在縣東三十里錫山在縣東五十里舊經云越王採錫於此舊傳山出鉛銀或坯鑿取之忽山嘯摧壓數十丈今迹存焉其後里人無敢採者此山去寳山不逺意寳山之名或取此白鹿山在縣東南二十九里越絶云在犬山之南若耶山在縣東南四十四里舊經云葛𤣥學道於此山晉謝敷傳後還南山若耶中宋何𦙍居若耶山山發洪水樹石漂㧞其室獨存山下有潭潭上有石號葛仙石舊經云葛𤣥所隠桐几化成白鹿三足共行兩頭各更食十道志云葛𤣥於此山升仙所服白桐几化為兩頭鹿一頭食草一頭望人何山在縣東南四十七里即何𦙍所居雞山在縣東南五十里俗稱雞籠山越絶云雞山在錫山之南句踐蓄雞於此將伐吳以食士也鶴鳴山在縣東南五十七里郡國志云山上時有鶴鳴洞浦山在縣東南二十四里舊經云即湖南龍尾山西南之趾陶宴嶺在縣東南四十四里舊經云陶𢎞景隠於此山有巨石髙數丈傳云昔為任公釣磯日鑄嶺在縣東南五十五里地産茶最佳歐陽文忠歸田録草茶盛於兩浙兩浙之品日鑄第一黄氏青箱記云日鑄茶江南第一華初平云日鑄山茗天真清烈有類龍焙昔歐冶子鑄五劒采金銅之精於山下時溪涸而無雲千載之逺佳氣不泄蒸於草芽發為英榮淳味幽香為人資飬也葛山在縣東一十里越絶云句踐罷吳種葛使越女治葛布獻吳王夫差也吳越春秋云句踐種葛於此採葛人歌曰嘗膽不苦味若飴令我採葛以作絲銅牛山在縣東南五十八里夏侯曾先志云射的山南銅牛山即越王鑄冶處舊注云昔銅牛見於靈汜橋人逐之奔入此山掘地視之悉銅屑也又云舊有黄牛於此山噉草樵人見之謂是民家所牧或驅之失所在太平御覽云事出孔􅁮㑹稽志㠙山在縣東七十里舊經云漢駱夫人學道於此昇仙有石室石井丹竈存焉㠙音豪上虞縣㠙山名同今兩存之雲門山在縣南三十里舊經云晉義熙二年中書令王子敬居此有五色祥雲見詔建寺號雲門今為淳化雍熙顯聖廣福唐孟東野詩云碧嶂幾千繞清源萬餘流蓬瀛若彷彿四野多泛浮杜子美詩云若耶溪雲門寺青鞋布襪從此始山有謝敷宅何公井好泉亭王子敬山亭智永禪師臨書閣土城山在縣東六里吳越春秋越王使相者求美女於國中得之苧羅山鬻薪之女西施鄭旦飾以羅縠教以行步習於土城教於都巷三年學服而獻吳王舊經引州僚記云越王作土城以貯西施即此山下有浣紗石犬亭山在縣東南三十里舊經云越王畜犬獵南山白鹿即此越絶云句踐畜犬獵南山白鹿欲得獻吳故曰犬山其髙為犬亭稱山在縣東北六十里舊經云越王稱炭鑄劒於此越絶云句踐時采錫於山為炭稱炭聚載從炭瀆至鍊塘各因事名之俗呼稱心山鄭𢎞山在縣東南三十里𢎞仕後漢為太尉鹿池山在縣東南八里鏡湖中舊經云山中昔有白鹿故名一云越王養鹿於此俗呼鹿墅山刻石山在縣西南七十里一名鵝鼻山自諸暨入㑹稽此山為最髙晉王彪之㑹稽刻石山詩云隆山嵳峩崇巒嶣嶤傍覿滄洲仰拂𤣥霄文命逮㑹風淳道遼秦皇遐巡邁茲英豪宅靈基阿銘跡峻嶠葢秦皇刻石頌徳宜在此山姚令威叢語云自秦望行小徑至一山俗名鵝鼻山頂有石如一屋挿碑其中文皆為風土所剥隠約就碑可見闕畫如禹廟沒字碑之類不知此石果秦石歟或云大篆小篆皆不可攷事見碑類叢語又云鵝鼻山險絶人罕至者得一採藥引之方至山西北屬山隂界太平山在縣東南七十八里晉謝敷隠居太平山中十餘年以母老還南山若耶中太平山有三一在㑹稽一在餘姚一在上虞上虞之太平山一名􅏛山惟餘姚之山最著謝敷所隠屬㑹稽或上虞未詳今繫於此從舊經也儲山在縣東南一百四十里周處風土記云越王供儲在此又云張瑶種田立廥倉於山中故名之俗稱粟山六山在縣北一十四里一名句踐山越絶書云句踐鑄劒銅不鑠埋之東坂其上生馬箠句踐遣使者種六山飾治為馬箠獻吳王即此地舊經云唐天寳六年改為句踐山今從越絶曰六山脊山在縣南四十三里姥山在縣東南一十五里山南二里又有姥嶺大白山在縣東南七十五里小白山在縣東南八十里茅峴在縣東南一十五里茅君隠於此一名玉笥出美玉其形如笥山陽一峰狀如香爐又謂之香爐峰茅峴與㑹稽山接舊經㑹稽山一名苗山亦名茅山疑只此山然舊經茅峴有香爐峯葢㑹稽山之别峯也今因之稷山在縣東五十三里舊經穢山一名稷山越王種菜於此後漢謝夷吾為穢鄉嗇夫即此越絶云稷山句踐齋戒臺也十道志云一名棕山隋書㑹稽郡有稷山重山㑹稽山葢稷山山之著者幹山舊經云山南有許詢宅十道志許詢宅側許公巖之南有落星石隂山舊經云秦始皇移在㑹稽山之北有隂山之稱横山在縣東三十四里舊經云山有草莖赤葉青人死覆之更活寰宇記載同一云神異經東方朔云少微山在縣東一十二里職方郎齊公唐居也顧内翰臨序職方集云鑑湖東北有山巋然公親率箕畚栽培其上而闢其下為寢疏泉為沼植花卉果蔬為圃與湖之西南㑹稽山禹祠相望為山水竒偉之觀自名其山曰少微山方干島在縣東南五里唐方干别墅也干咸通中居越中有詩云沙邉賈客喧漁市島上潜夫醉笋莊鄭谷題方干别墅云野岫分開逕漁家並掩扉今鏡湖中小山是已尚書隖在縣東南三十三里寰宇記云孔稚圭之山園也稚圭字徳璋㑹稽人仕宋為都官尚書穀來嶺十道志云舜耕於此天降嘉穀之處嶺以此名刺涪山在雲門南山不甚髙而登其上則見雲門陶宴諸山林立在下又山頂有池大旱不涸山隂縣塗山在縣西北四十五里舊經云禹㑹萬國之所按史記國語禹㑹諸侯於㑹稽執玉帛者萬國防風氏後至禹誅之史載仲尼之言曰越人得其骨節専車書曰禹娶於塗山注塗山國名左傳禹㑹諸侯於塗山杜預注在夀春縣東北説者云今濠州也蘇鶚演義云塗山有四一㑹稽二渝州也南舊江州三濠州四當塗縣又引文字音義云嵞山音塗塗古國名既為古國禹娶之宜矣自越絶等書皆云禹娶于㑹稽塗山應劭曰在永興北永興今蕭山縣也吳越春秋又兼載塗山之歌其説不經大氐渝濠宣越之塗山皆有禹迹葢禹之濬川雖嘗徧歴海内其㑹諸侯於㑹稽則信而有徴至娶婦處則好事者傅㑹於此非其實也又栁子厚山銘東坡廟詩乃在渝濠非此之謂侯山在縣西四里舊經云南湖侯山逈在湖中俗名九里山葢昔時去縣之數也孔愉少棲此山後官至車騎封侯論者以愉致侯之兆見於此晉孔愉傳愉山隂人為㑹稽内史在郡三年乃營山隂湖南侯山下數畆地為宅草屋數間便棄官居之山有孔太守廟蘭渚山在縣西南二十七里王右軍脩褉序云此地有崇山峻嶺茂林脩竹陳音山在縣西南四里一百五十步舊經引吳越春秋云范蠡進善射者陳音楚人也王曰盡子之道願子悉以教吾國人音曰道出於天事在於人人之所習無有不神於是乃使音教士習射於北郊之外三月軍士皆能用弓弩之巧音死王傷之𦵏於國西號其𦵏所曰陳音之山其冢悉畫騎射之形今對塘頭亭南湖中一山首北望者是也寰宇記以陳音山屬上虞縣非也亭山在縣西南一十二里舊經云晉司空何無忌為郡置亭於山上蜀阜山在縣北三十五里舊經云自蜀飛來帶兒婦二十餘人隨山而至善織美錦自言家在西蜀今忽至此或云句踐將伐吳置婦女於山以邀軍士後人以婦訛為阜也十道志云句踐以寡婦居此令軍人逰焉一名獨婦山法華山在縣西南二十五里舊經云義熙十三年僧曇翼誦法華經感普賢應現因置寺今為天衣禪院山有十峰咸平中裴使君莊各命以名一法華二衣盂三積翠四朝陽五雲門六倚秦七天女八猿嘯九起雲十月嶺山下二溪東北流冬夏不竭唐李邕碑云其峰五連其溪雙帯葢謂此也萬齊融碑云雙烏所以示兆今尚翔鳴舊經云山有雙烏雛長則送出之舊經法華山在㑹稽縣南四十里後正之容山在縣西南二十七里羊石山在縣西三十六里山有石如羊柯山在縣西三十一里人安山在縣北四十六里舊經云舊馬鞍山以形似馬鞍也天寳七年改為人安山鎚頭山在縣北四十一里以形似故名巫山在縣北一十八里舊經巫山一名梅山越絶書云巫山者越神之官死𦵏其上朱育對濮陽興曰越王翳遜位逃於巫山之穴越人薰而出之陸左丞農師適南亭記云梅山昔子真之所居也其少西有里曰梅市其事應史山西南有永覺寺梅子真泉適南亭竹徑茶隖石匱山在縣東南一十五里舊經云山形如匱禹治水畢藏書於此五峰山在縣南三十二里西余山在縣西北四十二里烏風山在縣西北四十九里聖女山在縣西二十九里茅巖山在縣西南三十三里石城山在縣東北三十里吳越備史乾寧三年錢鏐討董昌攻石城去越三十里即此今山下有石城里檀宴山在縣東十道志云謝靈運㳺宴處今人往往聞簫笙之音下馬山在縣北二十七里舊經云秦始皇息駕於此一名蝦䗫山按此山四面皆水非息駕之所疑其音訛為下馬遂有息駕之説梅里尖山其隂為梅仙隖多桃李棃梅來禽以梅福里得名自隖度一小嶺有異境煙水直至郡城與卧龍相直磑山有石泉在竹樹隂中甘寒可㵸茗山形如磑故得名六峰山有溪出山麓産楊梅居民百餘户頂里山有溪清澈居民二百餘户産楊梅與六峰埒其號何塔者尤竒戴兩山逺望若兩山其實一也居民二百户或云舊有戴于二姓居之何山有塔久廢今復營之頗增湖山之麗玉架山三峰如筆格故得名秀麗可畫花涇山多桃李及栁望之如錦繡包絡山谷直步山多蘚梅亦産楊梅下有溪入鏡湖徐山姚嶼昔小山財如岡阜多桑竹在鏡湖中彈丸山以其狀名下有方隖渡甔山兩山相類正如兩酒榼海山多桑竹下有居民三四十户以漁釣為業蜀山爾雅曰獨山謂之蜀山郡境多此名古語也鳯凰山在梅市鄉至小而具山形嘗有鳯集焉玉山在縣北三十三里舊經云唐貞元元年浙東觀察使皇甫政鑿此山為斗門入間泄水入江按唐書地志山隂縣北三十里有越王山堰皇甫政鑿山以畜泄水利與舊經相合即此舊經山隂縣北二十八里又一玉山乃重複今刪之琵琶山在縣南五里烏土山在縣西南四里三山在縣西九里地理家以為與卧龍岡勢相連今陸氏居之嘗發地得吳永安晉太康古甎疑昔人嘗卜築或嘗為寺觀云嵊縣剡山在縣北一里縣治處其坳山下園囿亭館白樂天沃洲記云東南山水越為首剡為面其山巔屹起小峰號白塔俗傳秦始皇東逰使人斸此山以泄氣今土坑深千餘丈號剡坑山北有戴顒墓大白山在縣西六十里舊經云此山峻極崔嵬吐雲含景與小白山接乃趙廣信煉九華丹登仙之處有白猿赤玃又有鳥似鷄文彩五色口吐緑綬長數尺號吐綬鳥雙石笋各長五六丈對立如門瀑泉飛下號瀑布嶺土人亦稱西白山按宋書禇伯玉隠身求志居剡縣瀑布山三十餘載揚州辟議曹從事皆不就意瀑布山之在剡即此華初平瀑布嶺詩序云在嵊縣西六十里福善所築蔚有靈氣昔産仙茗寰宇記瀑布嶺屬餘姚縣葢此山聫接餘姚縣界小白山在縣西六十里真誥云趙廣信陽城人魏末渡江來此山師李法成服氣又受師左君守中之道徹視五藏或入城市賣藥莫知其年嵗後白日升天山有丹井今存刻石山在縣南三十里十道志云一名穿山相傳以刻石為名不知文字所在昇明末縣人倪襲祖行獵見山上有文凡三處苔生其上刮苔視之其大石文曰黄天皇蕭字道成得賢師天下太平舊經云或言衛夫人碑墮此中因以為名唐寳厯元年觀察使元稹使人訪碑不獲山半有井井有蛟丹池山在縣東七十二里舊桐栢山唐天寳六載改為丹池道經云上有桐栢合生下有丹池赤水南岳真人云越有桐栢金庭與四明天台相連神仙之宫也真誥曰桐栢山髙一萬五千丈周回八百里四面視之如一其一頭在㑹稽東海際其一頭入海中是金庭不死之鄉在桐栢之中方四十里上有黄雲覆之樹則蘇紆珠碧泉則石髓金精其山臺盡五色金也經丹水而行有洞天從中過在剡臨海二縣之境按桐栢山在天台金庭山在剡書又以金庭為桐栢真誥所道一頭在㑹稽東海頭一頭謂入海葢其山隴聫屬故石鼓山在縣東五十里有石鼓神祠白樂天沃洲記云北對四明而金庭石鼓介焉諸暨縣有石鼓山名同各存之簟山在縣東三十一里有白巖神祠并龍潭祈禱有驗舊經云山遥望之如鋪簟動石山在縣東北五十里下臨溪有石數百天欲雨石必先動嶀山在縣北四十四里舊經引輿地志云自上虞七十里至溪口從溪口隨江上數十里兩岸峻壁極險乘髙臨水深林茂竹表裏輝映名為嶀嵊奔瀨迅湍以至剡也水經云嶀山與嵊山接其間􅐓澗懐煙泉溪引霧吹畦風馨觸岫延賞王元琳謂之神明境事見謝康樂山居記水經注又云嶀山有成功嶠嶠壁立臨江欹路峻狹不得併行行者牽木稍進不敢俯視嶠西有一孤峰飛禽罕至山頂樹下有十二方石地甚光潔嘗有採藥者㳂山見通蹊至此遝復更尋遂迷前路車騎山在縣東四十七里舊經云晉車騎將軍謝𤣥為㑹稽内史嘗於此山立樓居止後人因以為名水經云嶀山東北太康湖謝𤣥舊居右濵長江左傍連山平陵脩通澄湖逺鏡於江曲起樓樓側悉是桐梓森聳可愛號桐亭樓山中有三精舍髙甍凌虚垂簷帶空俯眺平烟杳然在下水陸寧晏足為避地之鄉江有琵琶圻圻有古冢堕水甓有隠起字云筮吉龜凶八百年落江中謝靈運取甓詣京師盛傳觀焉舊經引謝靈運經此有詩云曩基即先築故池不更穿果木有舊行壤石無逺延按此詩康樂還舊園作贈顔延年自注即始寧園也始寧今上虞縣有西莊别墅存焉然舊經載於此未詳嵊山在縣東三十四里水經云山下有亭亭帶山臨江松嶺森鬱了山在縣東北一十二里南有餘糧嶺其地産禹餘糧榆樹山在縣西北八十里梃山在縣西七十五里子周山在縣西北七十里葛峴山在縣西北二十里諸暨縣長山在縣西一里夏侯曾先地志云山髙五千餘丈其頂平博有石室可坐百人南范蠡壇陶朱公廟東法樂寺苧羅山在縣南五里輿地志云諸暨縣苧羅山西施鄭旦所居其方石乃㬠紗處十道志句踐索美女以獻吳王得之諸暨苧羅山賣薪女西施山下有浣紗石太平御覽云羅山今名苧羅山山足有王羲之墓孫興公文王獻之書碑今不存苧羅山一在蕭山縣今並存之衡山在縣西南二十里舊傳有彌勒佛古迹覆斗山在縣南五十里東白山在縣東九十里一名太白峰連跨三邑其在剡曰西白在東陽曰北白櫧山在縣西一十八里山多櫧木一名諸山金鵝山在縣南五十里舊經云昔有金鵝自此山飛入吳郡烏帶山在縣東北四十五里山出紫石英舊經云晉謝敷夜夢神人語曰當以珍寳相贈至明視床下有異石而瑩乃紫石英也舊名烏笪山梁武帝遣烏笪採石英終於此後人立廟祠之帶笪聲近葢俗之誤也杭烏山在縣北七十五里舊經云疊嶂七十二有石冡大石為門其平如削傍有杭烏刺史廟一峰特髙風雨晦㝠常聞樂聲號鼓吹峰又有池或時龍見句乗山在縣南五十里舊經云句踐所都也國語云越臣於吳吳更封越南至句乗即此地其山九層亦名九乗山南有句乗亭浮塘山在縣南四十五里九江山在縣北二十五里舊經云山有石室幽􅃉其四璧刻石為女人號靈女臺石鼓山在縣南五十里山下盤石如鼓扣之有聲山多黄精白术竹箭嵊縣有石鼓山名同各存之黄蘗山在縣東南九十五里以山多黄蘗故名大巖山在縣北九十里巖崖山在縣北五十里雞冠山在縣西五十里山形如雞冠出竒石其紋若星月花獸山有玉女冡一名髙冡細辛隴山在縣南九十八里山多細辛五泄山在縣西五十里自山五級泄水以至溪山川最為秀絶寳掌巖在縣東南四十五里寳掌禪師所居也一名千嵗巖禪師不知名氏自云生於周末當魏晉間由西域入蜀貞觀十五年開巖於此周顯徳二年正月遷化夀一千七十二嵗真儀在半巖去地四十九尺石室可容百