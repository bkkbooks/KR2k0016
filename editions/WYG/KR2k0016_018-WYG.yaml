body:
  text: 㑹稽志巻十八宋施宿等撰拾遺山川土宇志載之所不及然而不可佚也作拾遺桂林山十道志謝靈運著山居賦處或云始寧之東山也一云餘姚縣有楙林山即此桂訛為楙未詳夫山越絶云夫山大冢句踐庶子冢也獨山越絶云獨山大冢句踐自治以為冢也馬嘷山越絶云吳伐越逢大風車敗失騎士墮死疋馬啼嘷麻林山越絶云一名多山句踐伐吳種麻以為弓絃使齊人守之越謂齊人曰多故曰麻林多山以山下田封功臣姑中山越絶云越銅官之山也越人謂之銅孤凟孤一曰姑長二百五十步白鹿山越絶云在犬山之南豕山越絶云雞山豕山句踐以蓄雞豕將伐吳以食戰士也在民山西淔江以東屬越疑豕山在諸暨界太平御覽有雞豕山土山越絶云苦竹山句踐封范蠡子其僻居徑六十步因為民治田塘長千五百三十三步其冢名土山范蠡勤苦功篤故封其子於此秦伊山越絶云句踐客秦伊喜炤龜者因名其冢為秦伊山十道志有秦林山疑即此山也捧里山齊氏少㣲集云越之捧里山王孫羣居於山谷以千數其魁曰洞主為盗與人剽掠無異居者彈射之王孫知害將及乃登一大樹有小者躍而耳語洞主頷之小者登木杪借其勢一躍而出圍人之後有頃火作圍人散而救之王孫整衆而歸無可害黄山水經剡縣東蕇山南有黄山白石山三山為縣之秀覆斗山水經覆斗山周五百里北連鼓吹山大獨山水經上虞縣江外有漁浦湖湖有大獨山小獨山又有覆舟山澤蘭山水經在上虞縣重岫叠嶺參差入雲東箱山十道志云内有嵨山蓼山見十道志靈山十道志云山有石鼓任巖山見十道志連山華氏考古云連山蕭山縣西十二里秦始皇驅羣山於江上置不用鍾山南史杜京産傳永明中㑹稽鍾山有人姓蔡隠山中養鼠數千頭呼之即来遣之則去言語狂易時謂之謫仙不知所終日門山南史杜京産於㑹稽日門山聚徒教授陶𢎞景太平山日門館碑云構宇太平之東結架菁山之北意日門館實在菁山太平山之間也龍頭山水經云崖間有石井椒山郡國志越州椒山𨽻㑹稽縣春秋敗越於夫湫湫椒同史記吳世家夫差選精兵伐越敗之夫椒注云太湖中椒山也按太湖在浙西與此不合清化山許安世詩云淺淺溪流涵白日㣲㣲山路入青雲青蓮山楊塤詩云撥開瑟瑟青蘿帳尋得磷磷白石梯上林湖山謝景初題餘姚上林湖山詩云平湖瞰其中翠巘圍四垠仙居山謝景初觀仙居山瀑布云落泉下峭壁斗絶千萬丈曲嶺隔青林三里已聞響其傍有巨石平潤可俯仰郎官巖楊塤詩碧玉莫遮千嶂石黄金難買一溪雲歌鐘沸地徒誇盛爭似松風竟夕聞南林舊經南林在山隂縣南吳越春秋范蠡在越處女出於南林越王聘之問以劍㦸之術華氏攷古云處女善劔隠於南林句踐招訓戰士遇叟自稱袁公求較藝以䇿為劔而試之技窮投䇿化為白猿入林鳳林華氏攷古云在五雲門外世傳禹受圖籍是時麟逰其庭鸞結其巢鳳凰鳴飛依于林木防塢越絶云防塢越所以遏吳軍也嚴陵塢十道志云子陵避光武聘居此朱室塢水經云句踐百里之封西至朱室謂此然又以為浙江西岸未詳太康湖水經云嶀山下為太康湖今廢琵琶圻水經云圻有古冢墮水甓有隠起字云筮吉龜凶八百年落江中謝靈運取甓詣京咸傳觀焉横汀在上虞縣東山側晉謝氏所居故港在嵊縣逰謝鄉有康樂遺迹自港以東為康樂鄉港東即四明山東峁山屬餘姚新昌二縣大抵皆古剡中也港傍有髙塜曰小相公墓説者云謝氏祖墓也查瀆吳志王朗攻㑹稽分軍夜投查瀆道襲髙遷屯南津水經云孔靈符遏蜂山前湖以為埭埭下開瀆直指南津又作水楗二所以㑹北江得無淹漬之害石馳步述異記云上虞縣石馳步一云水次為步呵浦宋虞邱進從髙祖征孫恩戍句章城被圍數十日不戰身被數創至餘姚呵浦遂破賊張驃出南史本傳石瀃南史上虞令王晏起兵攻郡孔顗以東西交逼不知所為其夕率千餘人聲云東討寔趍石瀃岯崲湖謝靈運傳㑹稽東郭有回踵湖水決以為田太守孟覬不與又求始寧岯崲湖為田覬又堅執遂為讐隙西溪謝靈運山居賦有西溪南谷石堟石滂閔硎黄竹注云上田在下湖之水口名曰田口下湖在田之下處並有名西溪南谷分流谷彰水畎入田口西溪水出始寧縣西谷又云石滂在西溪之東從縣南入九里兩面峻峭水自上飛下北至外溪封墱十數里皆飛流􅌺激左右石壁縁竹閔硎在石滂之東溪逶迤下注良田黄竹與其南連界莆中也錢湖舊有菴熙寧中剏興福院初錢武肅王患目疾夢白衣人療之良愈旬日永嘉郡獻觀音像適符所夢因置之錢湖院水旱禱輒應葉表嘗識其事趙清獻公刋之石㹧湖鏡湖之别派字書有㹧無或云本狳字傳之訛也離渚唐康使君所居舜廟下溪在㑹稽縣東照水在㑹稽東南三里舊經云源出五雲鄉經縣界九十里西南入山隂南嶺北阜謝靈運山居賦云面南嶺建靈臺倚北阜築講堂傍危峰立禪室臨浚流列僧房南北兩居水通涯阻樂瀆村十道志樂野句踐以此野為苑吳越春秋句踐立􅁐於樂野今有樂瀆村三風村十道志孝婦孀居姑欲嫁之不肯姑自殺姑女告官官不明殺孝婦後人以婦之孝姑之仁女之罪足為鑒戒故曰三風村東土鄉在㑹稽縣東南七十里謝安傳棲遲東土義或取此鄉有里三其一曰謝公里雙童吳越備史光啟二年錢鏐以錢爽守雙童宋考功之問詩云溪邉逢五老橋下覔雙童巫里越絶云句踐徙羣巫出於一里舊經云在諸暨縣句踐得西施處梅福里在山隂縣梅市村十道志云梅福為里監門處也吳王里在州東南一里輿地志云吳闔閭伐越所次舍也淮陽里一名淮南宫舊經引夏侯曽先越志越王之宫汜蠡立於淮陽今㑹稽縣北三里甘滂巷北也越絶云離臺周五百六十步今淮陽里邱未詳百官里舊經云在上虞縣取舜平章百姓之義蜂扶里舊經云上虞縣北有漁浦湖傳是舜漁處村民繞湖亂居故名其地為蜂扶里其説舛上同粟里舊經云上虞縣粟里舜供儲在此非也孝家里太原汪知原僑居㑹稽剡縣以孝聞丁憂哀毁而卒宣帝嘉之改所居清苦里為孝家里中宿臺在山隂縣越絶書句踐興樂中宿又云中宿臺馬邱周六百里今髙平里邱謝安傳鄉人有罷中宿縣者還詣安問其歸貲答曰有蒲葵闕倍萬安取其中者捉之京師士庶競市價數中宿非此之謂殆其名偶同耳項里在山隂縣西南華氏攷古云項梁與籍居此故得名富中里舊經云富中大塘句踐治以為義田田肥美故曰富中也吳中賦富中之甿貨殖之選𢎞訓里在嵊縣水經云吳黄門郎楊哀明居𢎞訓里開瀆作埭埭之西作亭亭埭皆以楊為名昌園在㑹稽縣南園有梅萬餘株花時雪色可愛芬香聞數里居民以梅為生業唐陳諌石傘峰序云齊公舊居西偏昌元之精舍園當作元然齊祖之集又作昌源未知孰是毛平仲遊昌園賞梅詩云欲雪盡時擕酒去無人知處待花開桃園在嵊縣南三里舊經劉晨阮肇剡縣人入天台山遇仙此其居也林槩越中詩云綉被歌殘人竟逺桃花源靜客忘歸范蠡地國語范蠡曰昔吾先君固周室之不成子也故濵于東海海波環㑹稽三百里以為范蠡地史記句踐賜㑹稽山以為范蠡封邑木客越絶云木客大冡句踐父允常塜也初徙琅邪使樓船卒二千八百人伐松栢以為桴也一曰句踐伐善材文刻獻于吳故曰木客十道志句踐使木客入山求大木三年不得憂思作木客吟一旦神木自生合抱以獻吳王遂作姑蘇臺禦兒鄉國語云句踐之地北至禦兒東至節西至姑蔑注云嘉興縣今有禦兒鄉未詳水經浙江東逕禦兒注引郡國云語兒鄉在南界無餘所生也引萬嵗厯云吳黄武六年由拳西鄉有産兒墮地隨便能語云天明何欲清脚折金乃詔為語兒鄉非也禦兒之名逺矣國語云句踐之地北止禦兒是也安得引黄武為証哉葢無智之徒因藉地名生情穿妄爾郡國志云天名何欲清鶡路注金生與水經小異古冶在州東南舊經引㑹稽志銅牛鐡冶越王鑄劒之所以銅滓不生草木東冶嚴助傳閩王舉兵於冶南注㑹稽山名也今名東冶侯城在㑹稽縣東五十八里舊經云夏后氏少康封子無餘於越所都即此城也按史記少康庶子無餘封㑹稽以奉禹之祀文身斷髪披草菜而邑焉後二十餘世至允常舊經作三十餘世葢誤矣望烏臺王子年拾遺云越王入吳有丹烏夾王而飛故句踐之覇也起望烏臺以表其瑞宴臺在城東南舊經云吳王聞越王石臺之逰未嘗敢上以為畏法服威也任公子釣臺在稽山門外華氏攷古云昔海水嘗至臺下今水落而逺爾或云在南巖寺又云在陶宴嶺詳見南巖注逰謝鄉在上虞俗傳謝康樂舊逰也紹興初陳子髙克詩云雨裏落帆逰謝鄉寒聲古木共荒涼四山為我洗蒼玉况有故人歸上方故人汪彦章也時寓東山國慶院故云靈女臺在諸暨縣東北越臺李白詩云東嶺横秦望西陵拱越臺湖清霜鏡曉濤白雪山来張洎詩云我愛真人居髙臺倚寥泬陶朱公釣臺十道志云㑹稽縣南越王臺舊經云種山東北李公垂詩云伍相廟前多白浪越王臺上少晴烟竇鞏詩云鷓鴣飛上越王臺觀臺一名游臺越絶云句踐伐吳徙琅邪起觀臺周七里以望東海水經云越起靈臺於山上作三層樓以望雲物川土明秀號勝地賀臺水經云長湖山之西嶺有賀臺越入吳還而成之故名松花壇在雲門唐大厯中嚴維吕渭茶宴於此聨句云幾嵗松花下今来草色平遶壇烟樹老入殿雨花輕千人壇即禹陵也史記正義引㑹稽舊記云禹葬茅山有聚土平壇人功所作故謂之千人壇越州學舊址未詳齊賢良唐上成度支書云東南方國禹㑹為大嵗籍貢舉僅百餘人學校不修生徒佻闥比年二千石未遑斯制誠因農隙考制度庀工徒新先儒之宫東南士子豈不佩執事訓以風鄉黨乎以時攷之成度支悦守越天聖六年以迄九年也賢良前以進士起家首率其里人裒緡錢得二十餘萬欲市書入學以講肄之所未完故以此書諷之方是時學貢雖不廢其陋已甚慶厯四年詔諸路州府軍監各立學越大州其奉承詔令宜也今騐諸故府載籍文書則無所見按沈少卿紳撰越帥沈公生祠記云嘉祐六年吴興沈公大治學校新其宫居而尊勸之又張侍御伯玉撰新學記云始州將渤海刁侯擇地卜築繼以紫㣲吳興沈侯勇為之又易地于杭凡三年君侯至而成之今以題名參訂渤海刁侯乃景純也以嘉祐五年到吴興沈侯乃文通也以嘉祐六年到君侯乃章伯鎮也以治平二年到伯玉踵文通後以嘉祐八年到明年徙郡去而伯鎮繼之葢伯玉二年於此經理繕造亦有勞焉第落成不及其在官之日爾又按吴監簿事實云監簿名孜嘉祐治平間捨宅為學君子以為賢於賀監一等今學相傳乃監簿之故居也然則章伯鎮所成之學宫即監簿所捨宅爾以嵗月較之正合伯玉記不自書其功謙也然不及監簿捨宅則闕文爾孔子殿嘉祐六年建先乎此者未詳沈遯撰永福寺大像贊嘉祐六年長興公来治是州大治學宫取寳積舊殿為孔子殿按太守題名碑長興公即沈文通也夀樂堂在今通判南㕔熙寧中簽書判官㕔公事太子中舍張次山始建即簽判舊廨之南堂也東坡詩云張侯眼力覷天奥能遣荆棘化堂宇時東坡倅杭州因寄題焉越帥沈諌議立詩云㑹稽四面是湖山亭在湖山勝絶間其全篇見掇英集建炎兵火堂壊簽判丁君復作新之傅給事崧卿譔記云圬者王承福種樹郭槖駞以韓栁之傳黄四娘家花以少陵之詩希元作堂有刻石在甫六十年堂壊石亡非東坡詩盛行於世亦莫得而知之乃知文辭之行逺不朽於金石矣次山字希元建鄴人通川志有張次山字東喬海陵人官至承義郎知信州亦嘗厯太子中舍恐此姓名同爾民事堂王龜齡簽判日始剏龜齡詩序云堂名民事記天語也不才以敗官曠職為憂所幸主人甚賢同僚朝夕講論無非民事之要者因為賦以志之范蠡壇在諸暨縣南九里有陶朱公祠督䕶門十道志云晉中將軍王愔成帝拜為督䕶到郡開此門出入時人貴之因以為名梁元帝𤣥覽賦云御史之床猶在督䕶之門不修督䕶一作都督迎恩門唐昭宗乾寧二年董昌僭竊錢鏐率兵至越之迎恩門望樓再拜而諭之葢此門自唐有之申光門吴越備史云錢鏐攻亭山及申光門俗傳今常喜門是也五雲門古雷門也西漢王尊傳毋持布鼔過雷門注云㑹稽有雷門舊有大鼓聲聞洛陽舊經云雷門句踐舊門也重闕二層初吴於陵門格南上有蛇象而作龍形越又作此門以勝之名之為雷去城百餘步十道志云句踐所立以雷能威於龍也門下有鼓長丈八尺聲聞百里孫恩亂為軍人打破有雙鶴飛去晉傳亦載之唐詩云雷門曽化鶴謂此雷門後改為五雲門唐書董昌傳嘗閲兵於五雲門吴越備史錢鏐攻五雲門遂平越州實乾寧三年五月也廣平路治平末程給事師孟守郡喜遊山民為闢此路因以為名華氏攷古云在稽山門外一十里秦稽顔延年和謝靈運舊園云跂予間衡嶠曷月瞻秦稽孟浩然乆越中云未能忘魏闕空此滯秦稽禹㑹鄉在山隂縣西五十里唐鄭魴龍瑞宫碑云千川萬山皆禹之㑹注云讀如㑹稽之㑹東坡濠山詩云樵蘇巳入黄熊廟烏鵲猶朝禹㑹村葢濠山亦有一禹㑹也姚邱在上虞縣西四十里一名桃邱俗傳舜所生處傍有虞濵媯石風土記云舜生於姚邱媯水之内指石之東後人傅㑹其説非也虹漾村在上虞縣西南載初鄉有握登聖母祠東西各有二赤岸俗妄指以為舜生之祥孟村在始寧以孟嘗所居得名今仍多孟姓者顧墅在上虞縣江岸俗傳宋顧懽開學之所今訛為故墅西莊在上虞西南葛仙鄉傳云謝康樂之别墅也安石渚世説劉尹為㑹稽嘆曰我當泊安石渚下爾不敢復近思曠傍思曠阮裕也劉尹真長也諸越漢嚴助傳云㑹稽東接於海南近諸越北枕大江注謂越種非一故言諸越也春秋哀公十三年於越入吳杜預注云於越發語聲也舊經云周敬王時越王大鐔子允常允常拓土始大稱王春秋貶之號曰於越舊經未審何據當以杜注為是越絶别傳云越故治今大越山隂南斗也又云禹到大越山上漢汲黯傳奉使東越江摠修心賦云喜南斗之分次肇東越之靈秘十道志越州乃東越之地也賈誼云百越晁錯云楊越夏侯勝云駱越劉遷云千越並屬支部越絶别傳又云何謂越絶曰越者國之氏絶者絶也謂句踐時也橘園李公垂詩云園橘千株欲變金石橋在五雲寺前蘇子美送張行之云五雲寺下石橋邉六月溪風灑面寒今正炎天君獨往松間尋我舊題看或云石橋即靈汜橋未詳白塔在㑹稽縣東俗號入仙塜華氏攷古云嵇叔夜過越宿傳舍遇古伶官之魄得廣陵散曲終自指其葬處穴今猶存應天塔今報恩寺浮圖也吴越春秋范蠡謂句踐曰王之築城其應天矣義取此錢參政端禮譔報恩寺塔記云天降相輪故有應天之號恐别有證苦竹館唐劉長卿晚行次苦竹館詩云故驛花臨道荒村竹映籬太平館南史禇伯玉居剡中齊髙帝敕於剡白石山立太平館居之孔珪從其授道為於館側立碑黄閤舊經云黄閤故有銅漏王右軍書陸機漏賦厯代以為寳今不存雙闕舊經云城北門外雙木闕夾道闕樓内有築土漢時載長安土以為闕也美人宫在府東六里周五百九十步舊經云句踐遊於美人謂此文山水閣秦少游樂安公唱和序云文山水閣棹歌之詩公吏部蔣希魯也西寺世説許詢王修克法師並往㑹稽西寺誦説未詳何所俗以光相寺為西寺𤓰邱越有賀氏𤓰丘王氏橘園胡氏梅山永興市宋劉亮全景文孫超之進次永興市山隂市梁郭世通嘗於山隂市貨物誤得一千錢追還本主以半直與之委而去㑹稽太守孟覬察孝亷不就西陵砦皮光業譔錢武肅廟碑云漢漁浦黿石翼張下營蕭山西陵鱗次列砦五官廨一云五官省寰宇記云在州東二里舊經云五官省今清白堂南址也十道志云兩廂梁是句踐㕔事用者梁宋間以材為後堂梁俗傳千載之木能止心痛服者多愈剡源鄉在嵊縣舊傳戴安道所居也今訛源為元非是繼錦鄉在嵊縣以史氏所居得名先是史屯田給登科至其姪中大安民子兵部侍郎叔軻繼以科名顯瑞室在若耶山何𦙍所居也衡陽王元簡守㑹稽時𦙍築室若耶山山發洪水漂拔樹木此室獨存元簡令鍾嶸作瑞室頌以旌美之辭甚典麗石壁精舍十道志云上虞縣石壁山南對小山方正如樓世號鼓吹樓謝靈運有石壁精舍詩嶀山精舍水經云嶀山東北有太康湖晉車騎將軍謝𤣥舊居湖中築路趣山山中有三精舍萬巻堂在新昌縣石溪鄉先逹石待旦始剏堂貯書又為義學三區號上中下書堂使學者迭升之人以此勉勵成名者衆傍又置議善閣占山水之勝俗傳舊有題名碑韓王汝譔記杜祁公而下七十二人皆由此登科今無所攷石氏山齋晏元獻詩云書仙十閣壯儒宫靈越山川寳勢雄北館王右軍為㑹稽守子敬出戱見北館新壁白淨可愛取帚沾泥汁以為書壁為方丈二字觀者成市見太平廣記妙喜菴蔣希魯序云閏公越之大士於鑑湖中得唐妙喜菴遺址結茅而居之昔刺史李遜記云雲霞草樹横在一目即其地也予遂以昔寺名其菴云辨才香閣唐李褒題雲門香閣院云香閣無塵雪後天齊祖之雍熙寺記云普公歸老於辨才香閣香閣即雍熙之上方嵊亭十道志云自剡至此谿流湍險商客往來皆以裝束齊張稷為剡令至嵊亭生子因名曰嵊鐡限僧坊在雲門辨才禪師所居事見尚書故實華安仁有僧坊詩東坡詩都人踏破鐡門限黄金白璧空堆床光侯亭唐李訥尚書錢崔侍御於此皇甫秀才山亭孟東野詩云嘉賔在何處置亭春山巔説者云秀才皇甫冉也東武亭世傳龜山自東武飛来也因以為名元㣲之醉題亭上云役役閒人事紛紛醉簿書工夫兩衙盡留滯七年餘李公垂詩云蘭鷁對飛魚棹急彩虹翻影海旗摇闕李公垂詩云海榴花早開繁蘂光照晴霞闕碧烟望雲樓舊經云即句踐遊臺也杜鵑樓樓前植杜鵑花故名見李公垂詩注披雲樓齊祖之詩云元和文物盛羣賢曽借蓬萊住列仙畫入簾櫳烟外寺鑑摇臺榭水中天滿桂樓李公垂詩序云架樓州城西南臨眺於外盡見湖山别開外扉通杜鵑樓不啟重扄清夜開宴詩云為憐湖水通宵望不學樊楊却月樓五雲亭在卧龍山章伯鎮所創有留題新建五雲亭詩云卧龍東嶺冠雲霞亭面溪流對若耶西亭舊經云在州西北五里東亭在府橋東宋考功夜飲東亭詩云春泉鳴大壑皓月吐層岑光風亭舊經云在城東北二百里鏡光亭舊經云在㑹稽縣界東齋舊經云漢王朗為㑹稽郡守子肅隨在郡於東齋注易沈立越州圖序云刺史之居東齋西園皆燕游之最志省堂嘉祐五年沈起譔記云余自監察出通判㑹稽郡所居之署大亭錢氏建者予取廢材隙功治而闕之不逾月而告成涼堂見范文正清白堂記井儀堂錢伯通譔記云堂在蓬莱閣之上望海亭之下西樓其左西園其右成於嘉祐六年主人刁公景純也逍遥堂張伯玉寓興詩云旌麾千騎長風月一堂深渌波亭向集賢傳式詩一沼開芳鑑雙橋亘采霓知稼亭在蕭山縣景徳中知縣杜守一建傍有嘯雲菴今廢戴溪亭在嵊縣王龜齡詩云剡水照人碧剡山隨眼青吾來非雪興慙上戴溪亭相傳邑令姜仲開始建此亭改興盡今復其故臨川亭在蕭山縣林樞密希詩云山川圖寫幾時休再過蕭山嵗已周客枕夢來南又北此身大似一虚舟㑹景亭在蕭山溪口寺范文正公題溪口云求取㑹稽藏拙處白雲深處亦行春吴處厚詩云㑹景亭髙石作層虚懶亭在上虞縣懐謝軒在上虞縣紹興初邑令張彦聲建李莊簡公題詩云此日開軒懐謝傅直縁談笑破苻堅三清木寳在禹祠告成觀翟忠惠家傳云公妙於刻塑授法工師於㑹稽告成觀刻三清玉帝真武像神氣虚閑如與人接郡人謂之木寳潯陽公祠堂乃参政翟公也家傳云邦人塑公像於龍瑞宫能仁寺以射弧之日修梵供戸繪其像畫史至摹本立直以售孔郎祠晉孔愉也初愉隠新安山中改姓孫氏以稼穡為事信著隣里後忽捨去皆謂為神人為之立祠和㫖樓西溪叢話云紹興府軒亭臨街酒樓翟公遜為郡日為和㫖樓取西漢酒酤在官和㫖便人也翟忠惠家傳云富民諸葛氏即所居為樓嵗乆為物所憑公命闢樓為酒肆名曰和㫖梁武帝書堂在諸暨永福院之東華安仁詩云六龍未入雍州日曽負詩書卧白雲謂此又山隂法華山亦有武帝遺迹云與惠舉禪師同學也金堂玉室晉許邁傳邁嘗遺王羲之書云自山隂南至臨安多有金堂玉室仙人芝草左元放之徒漢末諸得道者皆在焉東坡九仙山詩云玉室金堂餘漢士桃花流水失秦人又詩云若逢逸少問金堂應與嵇康留石髓葢引用此事側理紙庫小説王右軍在㑹稽時桓温求側理紙庫中有五十萬盡付之又百衲琴云王右軍在㑹稽謝安乞牋紙庫内有九萬枚盡與之桓温云逸少不節東坡云右軍以紙五十萬與桓温何足道此史官之陋而魯直亦云爾何哉側理庫未詳何所以右軍守㑹稽時事故繫之望陵祠蘇鶚演義引述異記云㑹稽山有虞舜廵狩臺下有望陵祠聖母閣在龜山寳林寺錢遜王詩云有時風掣浪聲到半夜月排山影来紫英院傳燈録唐契真禪師到越州雲門初住鏡中紫英院亷帥裴肅請歸郭内句踐城東覺嗣寺智者院太平廣記越州山隂縣智者禪師院有一池師嘗贖生放之有鼍嘗食其魚師患之取鼍送向禹廟池中至夜復来師祝曰汝勿食我魚則從汝師亡鼍亦不見上省院在諸暨縣楊次公詩云西軒一泓水瑩淨碧琉璃天人舉目視中有魚龍知不知後人因以琉璃名軒西巖院在諸暨縣西有丁令威丹井迎山閣在上虞縣碧蓮堂在諸暨縣永慶院楊次公飛白書額三大字逍遥齋在諸暨縣簿治吴處厚譔記并書雲水院齊祖之詩云獨坐澗邉聴水落却来洞口看雲生蘸碧軒在鏡湖上今亡其處齊祖之詩云飛棟新成蘸碧軒㑹稽山脚照湖邉稽亭唐詩人多用之謂㑹稽山隂之蘭亭也宋之問三月三日云稽亭追往景睢苑勝前聞劉夢得送元曉歸越云重叠稽亭路或云雙林亦有稽亭葢名偶同爾句餘水經引謝康樂云山海經浮玉山在句餘東五里便是句餘縣之東山乃應入海具區今在餘姚鳥道西北何山北望具區也酈道元注水經云郭氏於地理甚昧姑録之水仙家唐人越中寒食云緑楊隂轉畫橋斜舟有笙歌岸有花盡日㑹稽山色裏蓬萊清淺水仙家可見當時景物畧與今同笋莊方干越中詩云沙邉賈客喧漁市島上潛夫醉笋莊潛夫乃干自謂也又西島言事云嵗計有時添橡栗生涯一半在漁舟今人但謂之方干島白波潭方干陪五大夫浮鏡湖云白波潭上魚龍氣紅樹林中鷄犬聲鏡亭白樂天對月懐元㣲之詩云思逺鏡亭上光深書殿裏凝虚館在上虞縣石曼卿有寄題蘇簿凝虚館詩今廢㑹稽志巻十八
