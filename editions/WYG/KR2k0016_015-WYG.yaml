  - {type: page-break, offset: 0, content: '', id: KR2k0016_WYG_015-1a, image: WYG0486/WYG0486-0318a.png}
body:
  text: 㑹稽志巻十五宋施宿等撰相輔杜衍字世昌山隂人也㓜孤及長舉進士為揚州觀察推官知平遙縣積遷至為戸部副使進天章閣待制出知荆南府涉河北都轉運使遷樞宻直學士知天雄軍召拜御史中丞㑹有詔與三司使副擇吏人能否有揚語於外曰衍奏請盡黥諸吏吏僅千餘人詣衍第諠譁明日入對願窮治即推吏首惡抵於罪衍出知永興軍遷龍圖閣學士知并州又徙永興以刑部侍郎同知樞宻院事遂為吏部侍郎樞宻使范仲淹嘗出衍門下時為參知政事數争事上前衍無愠色而仲淹益敬服之㑹契丹婿劉三嘏避罪來歸邊臣欲以官縻之諫官亦有請衍謂不可生事還之四年拜同中書門下平章事兼樞宻使集賢殿大學士衍為相革弊事以修綱紀尤抑絶僥幸凡内降恩澤者一切不與每積至十數必面納之由是僥幸寖不説衍善決大事初邊將議欲大舉以擊夏人韓琦亦以為可舉衍争以為不可兵後果不得出契丹與夏人争銀甕族大戰黃河外而雁門麟府皆警范仲淹使河東欲以兵從衍以為契丹必不來兵必不可妄出後契丹卒不來其婿蘓舜欽監進奏院祠神為御史劾奏又集賢校理王益柔作傲歌語涉指斥欲下御史按罪衍謂羅織獄今起都下矣執不可又諫官孫甫言丁度面求進用請屬吏衍不為置對又范仲淹富弼偕出宣撫言者遂攻之仁宗欲罷二人而衍又執以為不可遂疑其朋黨以尚書左丞出知兖州衍為相凡百日而罷去明年以太子少師致仕累遷太子太師封祁國公卒年八十贈司徒兼侍中謚曰正獻孫沔字元規㑹稽人也中進士補趙州司理參軍為人明敏果敢有材稍遷監察御史裏行景祐元年章獻太后服未除而禮官請用冬至日册后沔奏請俟祥禫别擇日出知衡山縣上書言時事以切直貶監衡州酒稅移通判知處州遷監察御史又知楚州召為右正言遷提㸃兩浙刑獄陜西轉運使居兩月即以天章閣待制為都轉運使知慶州遷龍圖閣直學士又遷樞宻直學士知明州移知秦州仁宗勉以邊事對曰秦州不足憂陛下當以南方為憂明日官軍以敗聞遂以沔為荆湖江西廣南安撫使未幾副狄青宣撫賊平遷給事中知杭州召兼樞宻副使契丹使請觀太廟樂沔折之曰廟樂皆歌詠祖宗功德使人如能留助吾祭乃可觀使遂不敢復請張貴妃薨追册為皇后命沔讀册故事正后翰林學士讀册沔既位右府力辭之不從及至柩前乃曰此册臣沔讀則可樞宻副使讀則不可置册而退時相取而讀之遂求罷職以資政殿學士知杭州遷大學士移知青州又遷觀文殿學士知并州在杭治姦僧猾民不少貸怨謗紛起卒以御史彈奏責寧國軍節度副使復光禄卿分司南京㑹恩除知濠州以禮部侍郎致仕韓琦作相薦之起為資政殿學士知河中府又以為觀文殿學士知延州道卒年七十一贈兵部尚書諡威敏陸佃字農師山隂人受經於王安石熈寧三年應舉入京適安石當國首問新政佃曰法非不善但推行不能如初意故反病民如青苗是也擢甲科授蔡州推官初置五路學官選為鄆州教授召補國子監直講王雱用事好進者至崇以師禮佃待之如平日以是在太學七年不徙官修定說文得入見神宗方議大裘佃考禮以對帝悅用為詳定郊廟禮文官時同列皆侍從獨以光禄丞居其間加集賢校理崇政殿說書進講周官帝稱善始命先一夕進藁同修起居注官制行擢中書舍人給事中哲宗立法安石之黨士多諱變所從㑹安石死佃率諸生哭而祭之識者嘉其無向背遷吏部侍郎以修譔神宗實録徙禮部數與史官范祖禹黃庭堅争辨大要多不肯詆安石庭堅曰如公言葢佞史也佃曰盡用君意豈非謗書乎以龍圖閣待制知潁州徙知鄧州江寧府甫至即省安石墓紹聖初治史罪落職知海州復集賢殿修譔移知蔡徽宗即位復為吏部侍郎上疏曰人君踐祚要在正始正始之道本于朝廷近時學士大夫相傾競進以善求事為精神以能訐人為風采以忠厚為重遲以静退為卑弱相師成風莫之或止正而救之實在今日神宗延登真儒立法制治而元祐之際悉肆紛更紹聖以來又皆稱頌夫善續前人者不必因其所為否者賡之善者揚焉願咨謀仁賢詢考政事惟其當之為貴則大中之政也遷吏部尚書拜尚書右丞佃執政持論多近恕每欲參用人才尤惡奔競嘗曰天下多事則須不次用人茍安寧無事時人之才無以大相逺但當以資歴序進少遲緩之則士知自重矣又曰今天下之勢如人大病向愈當以藥餌輔養之須其安平茍為輕事改作是使之騎射也轉左丞御史論呂希純劉安世復職太驟請加鐫抑且欲更懲元祐餘黨佃為帝言丐勿窮治乃下詔申諭揭之朝堂䜛者用是詆佃曰佃名在黨籍不欲窮治正恐自及耳遂罷知亳州數月卒年六十一紹興初追復資政殿學士佃著書二百餘巻埤雅禮象諸書今傳於世陳過庭字賔玉山隂人中進士第政和中為祠部吏部右司員外郎使遼過庭初名揚庭辭日徽宗改名焉時或傳遼主苦風痺又箭損一目過庭歸證其妄且勸帝飭邊備遷太常少卿起居舍人宣和二年進中書舍人纔七日遷禮部侍郎又遷御史中丞兼侍讀睦冦竊發過庭言致冦者蔡京養冦者王黼竄二人則冦自平又朱勔父子本刑餘小人交結權近竊取名器罪惡盈積宜昭正典刑以謝天下由是罷知蘄州旋謫海州團練使黃州安置三年得自便欽宗立以集英殿修撰起知潭州未行以兵部侍郎召在道除中丞初入見帝諭以國家多難每事當悉意盡言於是節度使范訥丐歸環衞過庭因言自崇寧以來建旄鉞者多不由勲績請除宗室及將帥立功者餘並如訥例又乞辨宣仁后誣謗姚古擁兵不援太原陳其可斬之罪七竄諸嶺表進禮部尚書擢右丞中書侍郎議遣大臣使金人耿南仲以老聶昌以親辭過庭曰主憂臣辱願効死帝固遣南仲昌及城陷過庭亦行因被留不還建炎初以資政殿大學士提舉太平觀四年六月薨於金而明年贈開府儀同三司謚曰忠肅李光字泰發一字泰定上虞人少入太學登崇寧五年進士第調衢州開化縣令知平江府常熟縣朱勔方以花石得幸勢焰薫灼光不為屈械繫其奴勔怒監司為移光知吳江以避之光挺挺自若勔亦不能害也宣和二年召為太常博士五年遷司封員外郎因進對極論時事語及用事大臣黜知桂州陽朔縣明年召為司勲員外郎遷符寶郎金犯塞徽宗已有東幸意當國者不知計所出光慨然建白以謂為今之計惟傳位東宮則敵氣自沮欽宗即位擢右司諫光首論宦官譚稹梁方平喪師辱國梁師成締交蔡京王黼表裏蒙蔽罪皆當誅遷侍御史極論蔡攸朱勔姦惡請正典刑有彗出寅艮間議者謂外裔滅亡之證光言春秋書災異以戒人君不聞歸之外裔所論尤激切疏奏耿南仲力排之謫汀州監酒稅建炎三年高宗自臨安移蹕建康以宣為藩屏除知宣州光到郡乃繕城池聚兵糧籍諸縣之鄉兵謂之義社南陵有水軍叛光遣騎兵銜枚夜擊之賊潰十一月金人奪馬家渡南牧郡縣皆不能支光獨力修守備金人不敢入境四年盜戚方破寧國傅城下光設牙帳于南壁躬撫士卒賊分兵百道來攻光隨宜應之凡被圍二十八日援兵至解去除徽猷閣待制知臨安府徙婺州入為吏部侍郎上疏乞車駕親征漸圖興復進吏部尚書大將韓世清本苗傅黨久駐宣城至擅發倉庫招聚捕逃拒朝命不受光請先其未發除之授淮西招撫使親授宻指遂假道擒世清以歸除端明殿學士知建康府大臣為都督有所施設光不以為是大臣方怙權不聽光上疏辨論且請去徙知湖州平江府召為禮部尚書復以舊職知台州改温州又徙洪州以吏部尚書召遂除參知政事秦檜新得政藉光舊望以鎮服中外時金方通和檜欲稍撤淮甸武備光極言立國不可去兵檜以為害和議爭於上前光毅然不撓因丐去章九上除資政殿學士知紹興府檜嗾言者攻之改提舉臨安府洞霄宮安置藤州瓊州昌化軍紹興二十五年内徙郴州二十八年檜死始以南郊赦恩復官聽自便行至蘄州卒年八十三追復資政殿學士謚莊簡初光過宋都從劉安世講學得精微故於死生禍福之際無所屈撓初在鄉里聞趙鼎南遷頗戚戚謂鄉人曰若光得謫命即日青鞋布襪行矣卒蹈其言及再涉瘴海處之怡然在瓊寓居雙泉蘓軾所常㳺也自號博物居士日講周易一卦因著易傳十巻行于世子孟博年二十四中紹興五年進士第三人從光逺謫卒於瓊姚憲字令則父舜明仕至徽猷閣待制别見兄宏寛皆以博學知名憲以父任補承務郎監臨安府糧料院秀州海鹽縣丞歴衢州龍㳺宣州宣城縣丞知臨安府仁和縣車駕駐蹕臨安仁和為赤縣事尤煩劇憲資敏强日未晡吏己散去獄為之久無繫囚秩滿監進奏院知秀州秀之土豪錢安國居大澤中重湖深阻舍匿亡命為奸盜州縣莫敢詰憲至部擒安國及其主黨窮治置于法焚其巢穴州里遂安浙西大水蘓常為甚憲請輸粟萬斛以賑之上嘉其能賜勅書奬諭除提舉浙西常平茶鹽公事遷提㸃刑獄又以直秘閤知平江府時羣盜毛鼎等出没海道為商賈居民之害名捕弗獲朝命專以属憲不數月悉禽之除兩浙轉運判官進直敷文閤知臨安府再進直顯謨閤入權戸部侍郎改權工部侍郎兼臨安府少尹兼權給事中真拜工部侍郎賜同進士出身為左諫議大夫御史中丞皆兼侍讀自權工部侍郎至是皆不出一歳間其超擢如此遂拜端明殿學士簽書樞宻院遷中大夫參知政事監修國史俄以端明殿學士提舉江州太平興國宮又落職南康軍居住起提舉江州太平興國宮知太平府未行徙泉州復端明殿學士知江陵府卒年六十三其在江陵前帥頗厲威嚴治盜不稍貸憲繼其後嘗語客曰故帥得賊則殺不復窮竟奸盜屏迹自僕至獲盜少付之有司在法當誅者初未嘗輒貸一人而羣盜已稍出矣僕平居雖雛卵不敢妄殺今寧以疲輭不勝任去安忍濫及無辜哉人以此益推其長者侍從姚勔字輝中山隂人舉進士第歴永康令重親猶在父母每以榮其親為言勔乃請納禄以太子中允致仕遇郊封父母父母請回官封及勔祖父母特從之元祐初召為秘書丞太常丞右正言數日為左正言奏御史中丞趙君錫雷同俯仰無所建明遷起居舍人再遷起居郎中書舍人改寶文閤待制國子祭酒請外以本職知明州紹聖初言者論其阿附呂大防范純仁謫知信州論不己落職以奉議郎主管杭州洞霄宮再貶水部員外郎分司南京卒勔以孝行著每省先墓素衣步出城門且行且霣涕至墓見者為之感動顧臨字子敦㑹稽人中説書科為國子監直講遷館閤校勘同知太常禮院受詔編修經武要略臨喜論兵神宗召問兵學臨對兵以仁義為本出權湖南轉運判官提舉常平廣惠倉議事戾執政意罷去尋除同判武學進集賢校理開封府推官出知潁州入為吏部郎中秘書少監以直龍圖閣為河東轉運使元祐二年擢給事中時軍器少監蔡碩得罪臨論其兄確失教確坐貶知安州朝廷事囬河拜天章閤待制河北都轉運使知制誥蘓軾等言臨封駁論議有古人風宜留置左右不報臨至部請因河勢回使東流復召為給事中遷刑兵吏三部侍郎兼侍讀為翰林學士紹聖初以龍圖閣學士知定州徙應天河南府中人梁惟簡嘗祇事宣仁閤得罪過洛轉運使郭茂恂狥時宰意劾臨與宴集奪職知歙州尋斥饒州居住徽宗即位追復元職臨元祐末睹時事一變語待制姚勔曰安得還鄉食煮鵞炙鰌子已而果俱貶人歎其先識石公弼字國佐新昌人舉進士調衛州司法參軍漣水丞知廣德縣召為宗正事主簿入見言朝廷比日所為直詞罕聞頌聲交至未有為陛下廷争可否者願崇忠正以消䜛佞通諫諍以除壅蔽徽宗善之擢監察御史進殿中侍御史大觀初除右正言遷左司諫公弼初名公輔改賜今名太史保章正朱汝楫冐俸得罪内侍失察者皆不坐公弼言是皆矯稱詔㫖安得勿論由是並置罪遷侍御史言蘓杭造作局盛請革技巧稍罷進奉帝納之徙太常少卿起居郎遂拜御史中丞執政言國朝未有由左史為中執法者帝曰公弼嘗為御史矣水官趙霆開直河議已而決壊鉅鹿法當斬霆善交結但削一官猶為太府少卿公弼論為失刑乃出霆京西轉運使遂劾蔡京罪惡昭著章數十上京罷相猶提舉實録公弼復言京盤旋輦轂無去志願持必斷以銷後悔竟謫京杭州公弼進兵部尚書兼侍讀尋以樞宻直學士知揚州改襄州京復輔政陷以深文責秀州團練副使台州安置遇赦還卒從弟公揆字道任高宗時為侍御史極論樞宻使秦檜朋比章亦十餘上檜再相遂坐廢終于家傅墨卿字國華山隂人以大父恩補太廟齋郎嘗為蘄州蘄水揚州江都縣尉歴知池州壽春府入朝為庫部駕部員外郎實録院修撰徙大理卿將作監擢起居舍人中書舍人遂拜翰林學士給事中宣和四年以禮部尚書持節册立高䴡王楷有功還賜同進士出身進龍圖閤學士靖康元年春為京城東壁守禦使出知舒州提舉杭州洞霄宮建炎中守正奉大夫致仕嘗奪職至是追復墨卿比凡三至高䴡初為書狀官中為副最後為使其為使時所過郡縣輒為守令道上德意以寛宥為務罪囚及當死者多得減釋官吏有責罸編置亦貸除之高麗至今有廟祠初墨卿尉江都往來山陽深為節孝處士徐積所知或問積所為知墨卿者曰方欽聖昇遐楚之官吏寓客皆集服臨郡庭下惟傅尉容稱其服吾是以賢之姚舜明字廷輝嵊縣人舉進士為相州臨漳主簿登州平牟令知平江府崑山秀州華亭二縣後為河東經畧安撫司幹辦公事宣和二年冬盜發睦州青谿連陷杭睦衢婺處歙六州以舜明通判婺州遂權州事招集流亡兵數千人穿賊境以入郛晨登義烏門治城壁飛矢雨集舜明親率從兵以石擊賊既而引兵出戰賊遂大潰又賊帥洪載衆四十萬據處州不下舜明訪得其母妻令載所厚范淵往諭禍福載即解甲來降平賊之功于時為冠除直秘閤提㸃兩浙刑獄又為福建路提舉公事欽宗即位擢監察御史偽楚之變舜明挺節不汚高宗初除知衢州尋為提㸃江南東路刑獄公事建炎三年冬有㫖與防遏司措置盜賊屯於信州除知江州兼本路安撫制置使李成擁衆三十萬至城下舜明布列將士召募敢死晝夜接戰賊衆斃踣不可勝計又開門奮擊生擒其將王林等賊攻益急舜明輒以計襲破其營池州安撫大使呂頥浩率楊惟忠王變巨師古鋭欲解圍㑹師古兵敗援路遂絶經冬及春飢餓枕籍將士至食妻子終無有降賊意及力益困遂舉兵決戰大破賊寨以出時議謂舜明藐然孤壘制賊橫潰使不轉入東南其功居多頃之召為右司員外郎除直龍圖閤發運副使還為左司郎中復以秘閣修撰充江淮荆浙都督府隨軍轉運使除權戸部侍郎曹成馬友據湖湘間反側未定命舜明往招撫遂以二賊入朝韓世忠劉光世駐軍江上朝廷以舜明計臣俾置司建業以總經費調發犒賞百須以給總領之置自兹始丐閒除集英殿修撰提舉江州使太平觀進徽猷閣待制卒子宏寛皆博學强記知名於時著書數百巻暮子憲參政事贈舜明太師張宇發字叔光㑹稽人舉進士調和州含山主簿温州瑞安河南府登封兩縣丞監炒造丹粉所京東排岸司靖康初元以李綱薦召對除都官員外郎金人再犯闕詭執和議要大臣宣諭兩河上以命聶昌耿南仲皆辭惟中書侍郎陳過庭請行於是宇發為副拜徽猷閣待制已而分過庭往河北而宇發往河東㑹金情中變駕北狩兩人皆已銜命在道遂縶留異域聲問阻絶紹興十三年前禮部尚書洪皓還朝言宇發自蔚州殁於雲中皓見其櫬旅寄荒寺㩦至燕山授僕人徐禹功使葬焉因再疏請褒贈時相秦檜沮抑事不果行檜薨皓子翰林學士遵言宇發執節殁身南北隔逺訃不及時未蒙贈䘏於是詔贈左朝請大夫職賜如故仍以致仕遺表恩官其子孫焉傅崧卿字子駿墨卿從父弟省試第一擢甲科除辟雍正改婺州州學教授遷國子正充校正御前文籍以憂去職服除召為考功員外郎兼太子舍人方士林靈素得幸造符書號神霄録自三公輔臣以下皆從靈素師授崧卿與曽幾獨不行被譖出為鄂州蒲圻縣丞高宗初除知太平州數日罷久之召為中書門下省檢正諸房公事詔問羣臣居建康與趨鄂岳吳越孰便崧卿以建康古建國宜定基本以濟中興為對金渡江上自越將幸四明崧卿殿後乘障盡死力以為浙東及衢信州防禦使明年罷防遏使除直龍圖閣知越州上自永嘉還越供億用度崧卿乞悉從蠲減雖中㫖有不便輒執奏皆賜可改知婺州召拜秘書監兼權戸部侍郎尋除宣諭淮南東路左僕射呂頥浩都督江淮荆浙諸軍事崧卿以徽猷閣待制充參謀官頥浩還行在以崧卿管都督事尋權知建康府有言使淮南日奏事失實降秩提舉洪州玉隆觀頥浩安撫荆湖南更辟參謀官詔復集英殿修撰固辭不拜乆之召為中書舍人詔以强敵入冦將親撫六師崧卿入對言留都管鑰旁郡輔翼當及鑾輿未發亟圖之庶無後慮上稱善進給事中兼史館御史常同論其懐姦如王安石罷歸崧卿謂鄉人曰王公名世大儒言者以僕比之但有媿耳怡然不少動崧卿自國家多事常慷慨欲以功名自見與客言及國事輒憤詫或至流涕覽鏡見齒髪衰落歎曰吾遂無以報國家而死乎在上前論議尤感激未及大用而卒時人惜之有樵風溪堂集六十巻奏議十五巻西掖制誥三巻又作夏小正傳最行於世陳槖字德應餘姚人舉進士調寧州州學教授不赴後為台州工曹攝天台臨海黃岩三縣皆有異政呂頥浩秦檜翟汝文共薦召對除監察御史出為江西轉運判官徙知台州丁内艱服除趣召入對論時政以備邊安民為先除司勲郎轉右司郎官明年遷左司尋權刑部侍郎詔侍從言得失槖所陳六事皆切時病金人比歳入冦不得志遂歸我河南地請和槖方陳其不可且曰金情變詐己事之驗也宜嚴守戰之備秦檜方力主和議異已者皆斥槖亦以徽猷閣待制知潁昌府方行金果渝盟徙知廣州又徙婺州告老遂致仕槖平居簡黙宴坐或終日莫能窺其際居鄉自處如布衣遇出謁率以兩夫負一轎無他從者及門手持刺以授閽人云梁仲敏字元功山隂人宣和初上舍兩優釋褐調泰州海陵主簿淮寧府儀曹改秩授鎮江管内安撫司福建路轉運司幹辦公事通判温州紹興三年春召為太府丞遷太常丞除駕部員外郎出知臨江軍移知永州提㸃福建路刑獄公事禮部侍郎周葵荐召對擢監察御史遷右司諫遂拜右諫議大夫踰年除敷文閤待制提舉江州太平興國宮遂致仕贈寶文閣學士仲敏居諫職久所論毫髪無隠或未聽必反復開陳以冀聽納方金入塞大將有遯者仲敏力請誅之大將坐逺斥士氣乃奮晚家居尤篤風誼及卒邦人思慕之胡沂字周伯餘姚人宣和末補太學諸生圍城之難獨閉戸肄業如故紹興初擢進士甲科調秀州軍事推官宣州衢州教授末年執政薦沂醇粹有守召對除秘書省正字遷校書郎歴吏部右司郎官孝宗即位召為國子司業擢殿中侍御史龍大淵曽覿除知閤門事言路多觀望喑黙沂與諫議大夫劉度獨極論乞擯斥不聽即力匄去上顧沂厚亦終不許霖雨淹時沂言維夏兹始正陽用事而隂沴乘之寒未退聽殆隂盛而陽不勝所致劉向京房等論雨水川溢皆謂蒙蔽壅塞憎疾忠善之應今得無有是上深奬納尋以直顯謨閤再奉祠召除宗正少卿踰年擢起居郎冬靁上疏陳祖宗納諫任相事願以為法言甚懇切明年兼侍讀除中書舍人遷給事中時上銳欲恢復沂每對輒以飭邊備毋開兵端為言遷吏部侍郎兼權吏部尚書請外除徽猷閣待制知處州以疾奉祠召還拜太子詹事上注意宮僚前己選用王十朋陳良翰至是沂與周操繼之徙給事中兼侍講除權禮部尚書仍兼兵部踰年試禮部尚書升侍讀沂頻歳屢遷其領詹事皆如初丐間除龍圖閣學士提舉江州太平興國宮尋卒沂天資端厚立身有本末尤善知人孝宗嘗問翰苑闕官誰可沂以汪應辰周必大龔茂良對曰是皆不徒能文者他所稱引後多知名謚獻簡唐閲字進道山隂人少為學刻苦夜未嘗卧手寫不勝其富冩資治通鑑逾歳而畢字皆精楷舉進士調明州定海主簿揚州州學教授召對為勅局删定官主管官告院徙國子監主簿遂為丞頃之除秘書郎屢遷都官司封司勲員外郎兩浙歳饑詔以閲為浙東檢察賑濟州縣抑配豪右往往閉糴閲奏儲粟之家宜勿限以價勿計以數則趨利之徒將傾囷競售不待低價而價自平民饑不相保小兒遺棄衢路而法三歳以下迺許異姓收育閲請雖及十歳權聽民鞠養以為己子孝宗皆可之於是所全活者甚衆拜國子司業俄遷起居舍人卒閲年少嗜學至老彌篤通貫該洽諸儒稱焉尤長於春秋左氏嘗倣遷固史例以周為紀列國為傳又為表志贊五十一巻號左史傳於世王佐字宣子山隂人十八補太學生二十有一以南省高選奉廷對為第一授承事郎簽書平江軍節度判官㕔公事未赴召為秘書省校書郎時秦檜專政其子熺以前執政提舉秘書省館中或趨附之以為捷徑佐獨簡黙嚴重未嘗妄交一語嘗語同舍曰三館故事丞相與赤縣尉均為學士安得妄自屈哉熺聞不能平嗾言者論去之檜死熺斥起家拜秘書郎兼玉牒所檢校官遷尚書吏部員外郎右司郎闕以佐兼領秦檜妻王氏陳乞舊所得恩數之未周者自稱冲真先生佐駁之曰妾婦安得此稱向者誤恩有司不能執為失職今當追正然王氏封兩國夫人蓋祖宗以寵親王之配及外家尊属者何可輒引以階僣紊當併奪之執政不能聽但寢其請而已後王氏死卒奪先生號紹興二十九年二月拜起居郎以臺評罷知永州徙知吉州皆有治聲除直寶文閣逾年徙知明州隆興初張浚荐除中書門下省檢正諸房公事兼權戸部侍郎力辭不允仍兼侍講湯思退以首相領江淮都督請以佐參其軍謀思退去位佐亦罷參謀以直寶文閤知宣州徙知建康府妖人朱端明崔先生挾左道與軍中不逞輩謀不軌共約以春大閲日起事佐得其隂謀一日坐帳中決事命捕為首者至前略詰數語即責短狀判斬之而流其徒數人於嶺外餘置不問僚属方候見于客次無一人知者見佐擲筆乃異之而妖人已誅矣佐方閲案牘治他事延見賔僚乃退無一毫異于常日又徙知平江隆興二府未赴㑹知上元縣李允升坐賄前事未作已丐尋醫去而䜛者謂佐縱有罪坐削官居建昌軍䜛者去上察守臣連坐未有佐比且數思其才復官主管台州崇道觀俄起知饒州又復直寶文閤知揚州入對留為宗正少卿兼戸部侍郎史正志為發運使坐奏課不實謫并罷佐逾年主管台州崇道觀起為福建路轉運判官徙知潭州連進秘閣修撰集英殿修撰淳熈六年正月郴州宜章民陳峒竊發俄破道州之江華桂陽之藍山臨武連州之陽山縣旬日有衆數千郴道連永州桂陽軍皆警佐奏乞荆鄂精兵三千未報佐度不可待而見將校無可用者流人馮湛適在州召與語曰君能有功不特雪前罪且遂為朝廷用北鄉恢復自此始矣湛請行佐曰請行易耳今當不俟奏報以兵相付既受此命即以羣盜授首為期一有勿任軍法非佐敢貸也遂檄湛帶原官權湖南路兵馬鈐轄統制軍馬即日令湛自選潭州廂禁軍及忠義寨凡八百人即衙都塲誓師遣行仍命凡兵之分屯諸州縣者皆聽湛調發違慢皆立誅又出軍令牌付湛軍士所過有秋毫擾民及臨敵不用命或既勝而攘賊金帛使得竄逸者皆必行軍法上奏以擅遣湛待罪且請亟發荆鄂軍又私念湛有善戰名賊必遯入廣南思得勁兵遏其衝而廣南非所部未有以為計㑹受命節制討賊軍馬而前一日又奉詔㑹合諸路兵乃合二命為一稱節制㑹合諸路兵馬檄廣南摧鋒軍兵官黃進張喜分屯要害賊知湛至而廣南守備已嚴乃驅載所掠輜重由間道歸宜章轉運司聞之即移諸州以為賊已窮蹙自守巢穴毋以備禦妨農佐得報乃檄轉運司及諸州以為賊未嘗敗何謂窮蹙其巢穴旁接三路七郡林箐深阻出入莫測何謂自守復奏言遣馮湛之後事方有緒若更弛備賊必更猖獗愚民且有附和而起者非細事也因堅乞前所請荆鄂軍從之己而果聞賊方作箭鏃甚盛遣人入谿峒買毒藥之可為藥箭者佐又奏向者連州受賊首李晞降賞犒備足未幾復亡去為賊今陳峒之次首領是也以此知不一意討捕容其不死湖廣之憂未艾俟誅賊首而貸脅從未為晚也上獨是佐䇿命佐躬至軍前節制佐即日戒行師徒不譁耕隴市肆之人莫有知者既至宜章命湛以四月二十三日移屯何卑山湛請進兵日不答惟給以合符曰符至即行耳一日夜半始發兵符命湛及鄂州軍統領夏俊明日詰旦分五路進兵賊初詐降實欲繕治柵寨阻險以抗官軍佐得其情督兵甚峻及馳入隘口賊果立柵寨未及成聞官軍至狼狽出戰既敗又退失所憑乃皆潰走遂奪空岡寨駐兵十二渡斬陳峒李晞以下誅獲無遺詔以佐忠勞備著超拜顯謨閣待制俄徙知揚州平江府遂知臨安府遷闕部侍郎兼知臨安府進權工部尚書而京尹猶如故兼侍讀久之進侍讀遂權戸部尚書知淳熈十一年貢舉尹京逾三年㑹子病卒力乞奉祠命以寳文閤直學士出守佐復申前請得提舉江州太平興國宮以歸執母喪服除提舉隆興府玉隆萬壽宮鳳翔府上清太平宮卒贈銀青光禄大夫弟公衮字吉老亦以進士起家盜刼其母墓獄成盜不死公衮手殺之仕至左司郎中莫叔光字仲謙山隂人始舉進士調信州永豐縣尉試學官中選歴明州滁州州學教授又中博學宏詞科除勅局刪定官徙國子博士召試除秘書省校書郎升秘書郎兼皇孫平陽郡王教授除著作佐郎光宗初兼權工部員外郎改兼皇子嘉王府贊讀升著作郎頃之兼權起居舍人明年除起居舍人兼權中書舍人紹熈二年春雷雪交作詔侍從兩省具闕失先是歸朝官除節鉞全臺論列不從中司一論樞宻使即譴去叔光奏此最闕失大者又言女謁漸行近習典政等事詞皆剴切人所難言布衣俞古上書將以指斥被竄叔光詣執政白不可尋有㫖筠州聽讀叔光即繳奏言方求言弭灾異不宜有罪言者之名事竟寢遷起居郎遂拜中書舍人兼權吏部侍郎外戚李孝純除閤門宣贊舍人帶御器械叔光言賔贊扈帶極右列清近之選孝純屢遭譴罸不宜冒居上即日從之除權吏部侍郎兼秘書監卒叔光外醇和中實耿介入西掖纔三嵗論駁至數十事先是内侍多自正使轉橫行遙郡非故事也命過叔光悉奏罷之神仙越范蠡字少伯徐人也事周師太公望好食桂飲水為越大夫佐句踐破吳後乘輕舟入海變名姓適齊為䲭夷子皮後百餘年見陶為陶梁君財累億萬號朱公復棄之蘭陵賣藥後人世世見之云事載劉子政列仙傳漢梅福字子真九江壽春人少學長安明尚書穀梁春秋為郡文學補南昌尉復棄官歸壽春居家常以讀書養性為事至元始中王莽顓政一朝棄妻子去九江至今傳以為仙其後人有見於㑹稽者變姓名為吳門市卒云今山隂之地有山曰梅山有鄉曰梅鄉有里曰梅里圖經載㑹稽志云吳市門即此也事載前漢書列傳并圖經魏伯陽㑹稽上虞人高門之子性好道術不肯仕修真潛黙養志虚𤣥博贍文辭通諸緯候入山將弟子三人作神丹丹成知弟子心不盡乃試之曰丹今雖成當先服之入口即死獨有一弟子曰吾師非凡人也服此而死將有意耳亦乃服丹即復死餘弟子不服乃共出山為求棺木伯陽即起將服丹弟子而去因逢人入山伐木故作於鄉里寄謝二弟子作參同契五相類凡三巻其説似解周易實假爻象以論作丹之意事載葛稚川神仙傳薊子訓不知所由建安中客濟隂宛句有神異之道流名京師士大夫乘風向慕之乃駕驢車詣許下既到公卿以下候之者常數百人皆為設酒脯終日不匱後因遁去遂不知所止去之日唯見白雲騰起從旦至暮如是數十處時有百歳翁自言兒童時見子訓賣藥于㑹稽市顔色不異於今後人復於長安東霸城見之與一老翁共摩挲銅人相謂曰適見鑄此已近五百歳矣顧視見人而去猶駕昔所乘驢車也見者呼之曰薊先生小住並行應之視若遲徐而走馬不及於是而絶事載後漢書方術傳吳劉綱字伯經下邳人初居四明山後為上虞令師事白君受道歴年道成邀親故㑹别飲食畢登大皂筴木上去地十餘丈舉手而别忽然飛入雲中妻樊夫人亦有道術俱昇天今白水觀乃其遺迹云事載葛稚川神仙傳及白水觀碑趙廣信陽城人魏末渡江入剡小白山受李法成服炁法又受師左君守𤣥中之道内見五藏徹視法如此七八十年周旋郡國或賣藥出入人間人莫知也多來都下市井作九華丹丹成遂乘雲駕龍白日登天事載真誥虞翁生㑹稽人受仙人介君食日精法以吳時隠狼五山兼行雲炁回形之道精思積久形體更少如童子後乘雲昇天事載真誥晉葛𤣥字孝先丹陽句容人從左元放受九丹金液仙經常服餌求長生能絶穀連年不饑曽㳺㑹稽有賈人從海中還過神廟廟使主簿語賈人曰今欲因寄一書與葛仙公可為致之主簿因以函書擲賈人船頭如釘著板拔不可得還達㑹稽輒以報仙公仙公自往取之即得也語弟子張恭曰吾不得治作大藥今當作尸解去八月十二日日中時當發至期衣冠入室而卧氣色不變弟子等燒香守之三日三夜夜半中忽大風起發屋折木聲響如雷燭滅良久風止然燭失仙公所在但見衣在而帶不解以其學道得仙故號曰葛仙公今㑹稽有仙公釣磯及鍊丹井具在事載葛稚川神仙傳及晉書葛稚川傳及舊經葛洪字稚川仙公從孫以儒學知名性寡慾不好榮利閉門却掃究覽經籍尤好神仙導養之法初仙公以鍊丹秘術授弟子鄭君稚川就鄭君悉得其法咸和初選為散騎常侍固辭不就聞交趾出丹砂求為勾漏令乃止羅浮山鍊丹在山積年優㳺閒養著述不輟著内外篇凡一百一十六篇自號抱朴子因以名書年八十一卒顔色如玉體柔軟舉尸入棺輕如空衣世以為尸解得仙輿地志云上虞縣蘭芎山葛稚川所棲隠也今㑹稽有仙公遺迹至多稚川葢亦嘗至焉事載晉書列傳及舊經許謐字思𤣥少知名儒雅清素博學有才章簡文皇帝久垂俗表之顧與時賢多所儔結少仕郡主簿功曹史王茂𢎞蔡道明辟從事不赴選補太學博士出為餘姚令入為尚書郎郡中正䕶軍長史雖外混俗務而内修真學宻授教記遵行上道挺分所得乃為上清真人少子静泰乆居㑹稽禹井山頗遵承家法傳受經書云事載真誥梁陶𢎞景字通明丹陽秣陵人十歳得葛稚川神仙傳晝夜研尋便有養生之志齊高帝作相引為諸王侍讀永明中脱朝服挂神武門上表辭禄許之勅所在月給茯苓五斤白蜜二升以供服餌止於句容之句曲山立館號華陽隠居仙書云眼方者壽千歳𢎞景晚年一眼有時而方梁大同二年卒年八十五顔色不變香氣累日諡貞白先生按内傳言先生嘗遐遁東邁改名氏曰王整官稱外兵今㑹稽陶宴嶺有先生遺跡嶺由此得名又上虞縣釣臺山夏侯曽先地志言先生嘗乘槎釣於山下潭中事載南史隠逸傳及内傳并圖經嚴青㑹稽人遇神人授素書一巻曰汝骨應得長生青言我不識書當奈何神人曰不須讀也但以潔器盛之置高處耳并教服石髓法受之無他佳器惟有飲壺乃用以盛所授書眼便見其左右常有數十人侍之治病救患但以所授書到其人家所病便愈百姓尊奉之後斷穀不食一年入小霍山仙矣事載葛稚川神仙傳不著時代高僧竺潛字法深隠剡山晉哀帝兩遣使致之至建業簡文尤師禮之劉惔見于簡文坐中嘲曰道人亦㳺朱門乎潛曰君自見朱門耳貧道以為蓬戸還山支遁求買沃洲小嶺世説作因又就深公買印山潛曰欲來當給不聞巢由買山而隠也支遁字道林入郯中謝安守吳興以書抵遁曰山縣閒静計不減剡幸副積想王羲之在㑹稽聞遁名見之乃定交遁還剡路由稽山羲之詣遁延住靈嘉寺入沃洲小嶺建精舍晚移石城山棲光寺至山隂講維摩許詢為都講賔主之辨相尋無窮世説又載諸人士及林法師並在㑹稽西寺講王茍子在焉許椽便往西市與王論理共決優劣有遺馬者受之有譏之者遁曰吾愛其神駿有餉鶴者曰冲天之物寧當為耳目之玩乎遂放之世説云支公好鶴住剡東山山去㑹稽二百里嘗經餘姚塢曰謝安石相從至此未嘗不移旬今觸情是愁耳殁葬塢中于法開逰石城住元華寺又移白山靈鷲寺與支公争色空義弟子法威最知名開嘗使威出都當還山隂世説作使過㑹稽曰道林正講小品將無往過之耶威曰諾旣至遁方捉麈威致難攻之遁曰君乃受人寄載來耶竺法崇有律學精於法華經居剡之葛峴山茅茨澗飲孔淳之訪之信宿不去神思頓豁竺法曠晉興寧中東㳺禹穴放情山水至若耶愛孤潭欲就岩為廬孝武帝欽其為人迎至京師止長干寺以師事之竺道壹依止虎丘學徒蟻慕若耶山有白道猷者以詩寄之曰連峯數千里脩林帶平津雲過逺山翳風至梗荒榛茅茨隠不見雞鳴知有人閒步踐其徑處處見遺薪始知百世下猶有上皇民壹得詩欣然往訪猷信宿而歸嘗從都下還東山經吳中雪下未甚寒諸道人問在道所經壹公曰風霜固所不論乃先集其􅆭澹郊邑正自飄瞥林岫便已皓然釋道慧餘姚人讀逺公傳慕其為人逰廬山卜居西林三年王式辨三相義慧詰難之詞句煥顯又就學猛公猛講誠實為張融所難使慧當之挫其鋒氣融大服褚澄謝超宗皆加敬焉釋慧基自錢塘渡江棲㑹稽山隂法華寺學者千人元徽初即龜山建寶林寺啓普賢懴法高士劉瓛周顒張融並摳衣問道釋曇斐㑹稽剡人少棄家事慧基洞明方等身經善莊老儒墨之書㳺方考究經典疑義還鄉居法華臺寺學徒甚盛衡陽孝王元簡廬江何𦙍師事之張融周顒並從其㳺同時有沙門明慶者餘姚人戒行明白多藴藉帛僧光或曰曇光永和初至江東石城山下行數里坐石坎中夢種種惡三日見山神言移章安寒石山以宅施光光就樹結廬久而成寺寺名隠岳釋𢎞明㑹稽山隂人止雲門寺誦法華經瓶水自滿有童子自天而下供使虎無時入室自卧起嘗有一小兒來聽經明為説法俄不見又有山精來指笑明捉得以帶繫之久不得脱曰放我我不敢復來於是釋之後住永興紹𤣥寺又住栢林寺釋法慧持律甚嚴隐禹穴天柱峯誦法華經足不履人間者三十年為周顒所師禮王公貴人得識一面以為美談釋曇翼有卓行誦法華經隠秦望西北峯結菴號法華精舍澗飲三十年同㳺曇學者亦有竒操即秦望之地為菴號樂林精舍又有道敬者王右軍之後有道學持律甚嚴釋僧䕶㑹稽剡人住石城山隠岳寺寺北有青壁千餘尺䕶每至其下輒聞管絃聲或發光怪即發誓願就青壁鐫十丈佛像以齊建武中用工經年纔成面像䕶俄疾臨終誓曰再生當就吾志釋僧祐剡縣佛像祐受凖式先是建安王聞始豐令陸咸剡溪之夢以僧䕶所造石像奏有詔祐董其事天監十五年告成舊説祐宣律師前身也曇降法流二法師辭恩愛棄妻子輕舉入山外縁都絶魚肉不入口糞掃必在體人見之絶嘆而法師處之夷然西京光宅寺慧忠國師諸暨人自受六祖心印居南陽白崖山黨子谷道行聞于帝里唐肅宗徵赴京待以師禮諡大證禪師大珠慧海禪師姓朱氏依越州大雲寺道智和尚受業初至江西㕘馬祖於言下自識本性馬祖嘉其頓悟入道要門論告衆云越有大珠圓明光透無遮障處也禹迹寺契真禪師與溈山祐和尚同在百丈山稟受懐海大宗師㫖得全心印後㳺羅浮有越人禮請師歸浙東俄届雷門初住鏡中紫隂院後住覺嗣寺北廊開元寺西廊兩禪院大中初重興龍興寺大慶尼寺覺嗣寺皆師之力勅改覺嗣為大中禹迹寺令本道移師歸禹迹聚徒北廊院壽九十七造塔于鏡湖南岸賜號證明之塔諡大觀禪師清化全付禪師抵宜春仰山禮南塔為涌和尚印可安福縣為建禪院聚徒本道上聞賜名清化後還故國吳越文穆王特加禮重晉天福二年錢氏戍將為師闢雲峯山建院亦以清化為名筠州洞山良价禪師㑹稽人禮五洩山黙禪師披剃㳺方首謁南泉次㕘溈山旣到雲巖見曇晟禪師問無情說法乃述偈呈雲巖辭去因問貌得真話涉疑後過水覩影大悟前㫖越州沙門曇彦見報恩光孝禪寺千歳和尚寶掌禪師中印土人生周末當魏晉時自西域居常不食唯服鈆汞而已一日示衆曰吾欲住世千歳今六百七十三歳矣因號千歳和尚唐貞觀中周㳺二浙至諸暨里浦山下遇一老人問欲何之師曰訪地修行吾將老焉老人曰循山之隂林嶂幽聳中有石室名里浦巖盍往居之值中秋師抵巖下見其山秀泉潔月白風清為頌有行盡支那四百州此中偏稱道人㳺之句遂結茒以居宴坐十七年一日屈指一千七十二歳矣語其徒惠雲曰吾將謝世以還丹授汝今諸暨有寶掌巖㑹稽刺浮山明覺寺有千歳和尚塔又有千歳洗骨池法華寺𤣥儼律師諸暨人落髪𨽻懸溜寺從光州諮要受戒探頥律範遇上京崇福意律師及融濟律師印可徧𢎞四分著輔篇記羯磨述章光州岸公命𢎞般若撰金剛義疏即法華寺建置戒壇招集律行傾衣鉢琱鐫僧䕶僧祐所造石佛像開元二十六年恩制度人採訪使潤州齊澣迎師於丹陽令親度諸僧躬受具戒自廣陵迄於信安緇黃道俗受法者殆出萬人雲門靈一律師持律甚嚴以清高為世所推姚郃贈之以詩曰童子病來烟火絶清泉還齒過齋時師能詩劉長卿嚴維郎士元皇甫冉皆以詩與之往來靈徹上人字源澄㑹稽湯氏子雖受經論尤好篇章從嚴維學詩抵吳興與皎然㳺皎然以書薦於包闕李紓上人之名由是而颺貞元中西㳺京師名振輦下得罪徙汀州入㑹稽歸東越吳楚間諸侯多賔禮招迓之終於宣州開元寺門人遷之建塔於越之山隂天柱峯有詩二十巻劉禹錫為序徹自廬山歸沃州權德輿有序送其行海慧大師仲休越人精習天台教而禪寂頓悟不接人事李文靖公連以其名上得紫衣海慧之號間作詩不出其教有山隂天衣十峯詠郡人錢易為之序蕭山大眼師晝夜不寐目晴愈光人因以大眼目之法華從朗法師居蕭山祇園寺年踰百歳門常晝掩每誦蓮經衆鳥銜花匝坐潘閬一日謁之仍閉門不納閬留詩于門云門掩多年生緑苔想師心地似寒灰勞心擾擾休來此我是閒人尚不開咸潤法師上虞人習天台教觀依錢塘㑹法師講席遂究其㫖景徳四年邑令裴煥請演教於等慈繼徙隆教永福聽法者動以千數得法成名者二百餘人塔在等慈東廡今㑹稽永福寺有受業弟子碑師能詩有五洩山三學院十題編于綴英象田梵卿禪師旣受具即入台之東掖山謁法真大師處咸聽天台教一日論經王義法真歎曰子得𤣥妙于性相之外更衣謁長蘆秀禪師未契即往投子山謁青禪師居三年青示寂遂往東林謁照覺揔禪師發露底藴從容問荅心凝神釋遊鍾山居第一座入室常數百人結菴徑山菖蒲闕住秀之海慧温之靈峯越之象田象田久廢至師乃復興今為名刹得法弟子行持住㑹稽雍熈四明雪竇護聖道行一時佛智端裕禪師蕭山人吳越王逺孫祝髪于大善寺得法于圓悟禪師克勤勤住京師天寧萬壽諸方讙言㑹下有真師子兒能大哮吼他日為叢林標凖者指裕言也住丹霞虎丘徑山育王有語録傳世裕出王家狀貌瓌異鬚髪不受刀但以小剪去之不然則出血亦異事也象田了演禪師少依東山廣化聽秀禪師夜㕘即有省發遍謁諸方宗師俱不契徑趨衡陽投大慧禪師宗杲一見器許杲謂其徒曰若輩如針刺窻微見光影耳演乃一踏鴻門兩扇開者也自臨安崇先移住象田繼移靈隠伎術漢謝夷吾字堯卿㑹稽山隂人少為郡吏學風角占候太守第五倫擢為督郵使收案烏程長夷吾望閤伏哭而還白倫曰竊以占候知長當死逰魂假息非刑所加月餘果有驛馬齎長印綬上言暴卒倫為司徒令班固為文荐夷吾曰推攷星度綜校圖録探賾聖秘觀變歴徵占天知地與神合契豫刻死日如期果卒勅其子曰漢末當亂必有發掘露骸之禍使懸棺下葬墓不起墳韓說字叔儒㑹稽山隂人博通五經尤善圖緯之學舉孝廉數陳災眚光和元年十月說言于靈帝云其晦日必食乞百官嚴裝帝從之果如所言中平二年二月又上封事尅期宮中有災至日南宮大火吳範字文則㑹稽上虞人以治厯數知風氣聞於郡中孫權起東南範委身服事每有災祥輒推數言狀權欲討黃祖範曰不如明年戊子劉表亦死明年生禽祖劉表竟死範又曰歳在甲午劉備當得益州備卒得蜀權與呂蒙謀襲闗羽以問範範曰得之權與魏為好範曰宜為之備盛兵西陵範曰後當和親終皆如言介象字元則㑹稽人有諸方術吳大帝聞之徵象到武昌從象學蔽形之術試還後宮及出殿門莫有見者又使象作變化種𤓰菜百果皆立生可食大帝與論鱠魚何者最美象曰鯔魚為上先主曰此出海中安可得象乃作方埳汲水滿之垂綸得緇魚先主曰恨無蜀薑作韲象書一符以著青竹杖中使人閉目騎杖至成都買薑薑到厨切鱠適了大帝為介起第宅以御帳給之求去不許自言某月日病大帝使左右以一梨賜之象便死大帝殯埋之發視其棺無尸後弟子見象在葢竹山中晉嚴卿㑹稽人善卜筮鄉人魏序欲暫東行荒年多抄盜令卿筮之卿曰君東行必遭暴害之氣而非刼也宜禳之可索西郭外獨母家白雄狗繫著船前求索止得駮狗卿猶恨其色不純當餘小毒及六畜輩耳序行半路狗忽作聲甚急比視已死其夕序墅上白鵞數頭無故自死而序家無恙齊孔靈産㑹稽山隂人宋泰始中罷晉安太守有隠遁之志於禹井山立館事道精篤頗解星文好術數齊高帝輔政沈攸之起兵靈産白高帝曰攸之兵衆雖强以天時㝠數而觀無能為也高帝騐其言擢遷光禄大夫以簏盛靈産上靈臺令其占候餉靈産白羽扇素隠几曰君有古人之風故贈君以古人之服當世榮之顧歡字景怡隠於剡天台山好服食不與人通每旦出戸山鳥集其掌取食弟子鮑靈綬門前有樹大十圍上有精魅數見歡印樹樹即枯死山隂白石村多邪病村人告訴求哀歡往村中為講老子病者皆愈又有病邪者問歡歡曰家有何書荅曰惟有孝經而已歡曰可取仲尼居置病人枕邊恭敬之自差也而後病者果愈齊高帝輔政得為揚州主簿及踐祚乃至稱山谷臣進政綱一巻復詔稱美東歸賜麈尾素琴年六十四卒於剡山㑹稽志巻十五
