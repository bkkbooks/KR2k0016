body:
  text: 㑹稽志巻十九宋施宿等撰雜記顧長康從㑹稽還人問山川之美顧云千巖競秀萬壑爭流草木䝉籠其上若雲興霞蔚王逸少作㑹稽初至支道林在焉孫興公謂王曰支道林拔新領異胷懐所及乃自佳卿欲見否王本自有一往雋氣殊自輕之後孫與支共載往王許王都領域不與交言須臾支退後正值王當行車巳在門支語王曰君未可去貧道與君小語因論莊子逍遥遊支作數千言才藻新竒花爛映發王遂披襟解帶留連不能巳孫綽賦遂初築室畎川自言止足之分綽遂初賦叙稱經始東山建五畎之宅齋前種一株松栢手自壅治之髙世逺時亦隣居世逺髙柔字也語孫曰松樹子非不楚楚可憐但永無棟梁用耳孫曰楓栁雖合抱亦何所施阮光禄在剡裕字思曠巳見曽有好車借者無不給有人葬母意欲借而不敢言阮後聞之歎曰吾有車而使人不敢借何以車為遂焚之支道林許􅁺諸人共在㑹稽王齋頭支為法師許為都講道林時講維摩詰經支通一義四座莫不厭心闕道壹曰風霜固所不論乃先集其慘澹郊邑正自闕岫便巳皓然王修齡嘗在東山甚貧乏陶胡奴為烏程令王胡之字修齡琅邪臨沂人廙之子胡奴陶範小字也送一船米與之卻不肯取直答語王修齡若飢自當就謝仁祖取食不須陶胡奴米戴安道既厲操東山而其兄欲建式遏之功謝太傳曰卿兄弟志業何其太殊戴曰下官不堪其憂家弟不改其樂許𤣥度隠在永興南幽穴中每致四方諸侯之遺或謂許曰嘗聞箕山人似不爾耳許曰筐篚苞苴故當輕於天下之寳耳郄超每聞欲髙尚隠退者輒為辦百萬資并為造立居宇在剡為戴公起宅甚精整戴始往舊居與所親書曰近至剡如官舍謝靈運好戴曲柄笠孔隠士謂曰卿欲希心髙逺何不能遺曲葢之貌孔淳之魯人隠上虞山巳見謝曰將不畏影者未能忘懐並世説太尉賈充問㑹稽夏統曰卿頗能作卿土地間曲乎統曰先公惟寓稽山朝㑹萬國授化鄙邦崩殂而葬恩澤雲布聖化猶存百姓感詠遂作慕歌孝女曹娥年甫十四貞順之徳過越梁宋其父墮江不得屍娥仰天哀號中流悲歎便投水而死父子喪屍後乃俱出國人哀其孝義歌河女之章伍子胥諌吳王言不納用見戮投海國人痛其忠烈為作小海唱今欲歌之衆人僉曰善於是以足叩船引聲喉囀清激慷慨大風應至含水潄天雲雨響集叱咤讙呼雷電晝暝集氣長嘯沙塵煙起王公以下皆恐止之乃巳㑹稽郡貴重望計及望孝盛族出身不減祕著宋泰始七年太守蔡興宗欲舉山隂孔仲智子為望計郭平原次息為望孝仲智㑹土髙門原平一邦至行欲以相敵㑹明帝别敕用人二選並寢南史虞寄年數嵗客有造其父遇寄於門嘲曰郎中姓虞必當無智寄應聲曰文字不辨豈得非愚客大慙入謂其父此子非常人文舉之對不是過也南史隋煬帝幸汴時越土進耀花綾有紋突起特有光彩絲女乘樵風於石帆山下收野蠶繭繰之絲女夜夢神人告曰禹穴三千年一開汝所得野蛾繭即江淹書槖中壁魚化之絲織為裳必有文彩既織成果有光彩人間不敢服遂進之南部煙花録越州秘色磁器世言錢氏有國日作之輙用故云秘色按陸魯望集越器云九秋風露越寒開奪得千峰翠色来好向中霄盛沆瀣共嵇中散鬭遺杯乃知唐已有秘色非錢氏為始今耀州陶器名曰越器吳筠字貞節華隂人通經誼美文辭舉進士不中去居南陽倚常山天寳初召至京師南逰天台觀滄海與有名士相娱樂文辭傳京師明皇遣使召見大同殿與語甚悦勅待詔翰林獻𤣥綱論三篇帝常問道對曰深於道者無如老子五千言復問神仙治錬法對曰此野人事積嵗月求之非人主宜留意未幾漁陽事作乃復東入㑹稽剡中唐陳閲㑹稽人以能冩真人物子女等本道薦之𤣥宗開元中召入供奉每令冩御容妙絶當時𤣥宗射豬鹿兔鷹等并按舞圖真容皆受詔冩貌又太清宫肅宗真容匪唯龍顔鳳姿日角月宇之狀而筆力遒潤風彩英逸合符應瑞天假其能也國朝閻令公之後一人而已今咸宜觀天尊殿内畫一上仙圖及當時供奉道士等真皆其蹤也李舟好事嘗得相舍煙竹截以為笛堅如鐡石以遺李謩謩吹笛天下第一自教坊請假至越州公私更宴以觀其妙時州客舉進士十人同㑹鏡湖欲邀李生相約各一客㑹中有一人不遑他請其隣居有獨孤生年老乆處田野人事不知至是遂應命到㑹李生捧􅅇一發之後昬曀皆霽髣髴如有鬼神坐客贊歎獨孤生乃無一言李生以為輕已意甚忿之良乆又作一曲無不賞駭獨孤生又無言召者甚悔誚責之獨孤生不答伹㣲笑李生曰公如此是輕薄為復是好手獨孤生乃徐曰公安知僕不㑹坐客皆驚李生改容謝之獨孤曰公試吹涼州至曲終獨孤生曰亦能妙然聲調雜夷樂得無有龜兹之侣乎李生大駭曰丈人神絶某亦不知本師實龜兹人也又曰第十三疊入水調足下知之乎李生曰某實不覺獨孤生乃取吹之李生更有一笛拂拭以進獨孤視之曰此都不堪用執者粗通耳乃換之曰此至入破必裂得無恡惜否李生曰不敢遂吹聲發入雲四座震慄至第十三疊歇示李生謬誤之處敬伏將拜及入破笛遂敗裂不復終曲李生再拜衆散明旦李生并㑹客皆往候之至則唯茅舍尚在見太平廣記出逸史唐僖宗西幸之年有㑹稽山處士孫位隨駕止蜀位有道術兼工書畫皆妙得筆精曽於應天寺門左壁畫天王部從鬼神竒怪斯存筆勢狂縱三十餘年無有敵者景煥其先亦専書畫嘗與翰林歐陽學士烱迺忘形之友一日聨騎同逰兹寺偶畫右壁天王以對之渤海某作歌行一篇有草書僧夢龜後至請書之於壁成都號為應天三絶㑹稽謝𤣥卿好呼吸延年之術常作東郭先生導引法服仙人五明散年近百嵗而精力不衰後採藥至五泄溪偶得一路前有石門夾道皆生桃枝細竹飛泉鳴籟響亮空山可三四里石壁曲轉蒼翠臨雲又數百步值一横溪俯臨峻壁淙湍激溜上有石梁纔可並足乃匍匐而度至前轉寛班班若有人路連崖重嶂畧無斷缺多生㯶桂髙樹凌霄䝉籠隠靄披拂左右稍聞鐘磬尋之而去忽遇神女數人逍遥林下被服纎麗姿艶䒠穠𤣥卿乃前拜之皆相視而笑謂曰非謝卿乎相望乆矣乃引𤣥卿登一峻嶺絶磴危壁互相承掩遂至一處豁然平敞玉堂朱閣炳煥其中云此東華夫人所居也徐鉉述祖先生墓誌序云門生彭汭登第補本郡司倉掾嘗與社祭齊于郡之延慶院獨處一室既寢後而精爽不寧展轉至四鼓乃得寐夢一白衣書生入戸謂汭曰某嘗述少文詞在此室司倉當見之也汭辭以未見書生曰試為讀之言訖而去及寤猶四鼓因呼僕秉燭周視墻壁間意謂有留題者而都無所見唯戸扇下有石方尺餘塵土䝉之視彷彿有賀監字乃知此是也祀事罷移置㕔前以水滌之文字依然即進士許鼎所撰祖先生墓誌也問主僧云十年前院側數十步官置瓦窰掘地得之而掌役者軍吏也不曉其所自但見有文因惜不毁而置此按賀監以天寳二載始得還鄉既而天下多事遂與世絶止於吳越故老亦不能知其所終㣲彭子之夢則賀監輕舉之迹與祖君髙尚之節皆湮沒矣其誌云通河先生祖君名貫字子元范陽人性寛平州里莫見其喜怒長短頗覽書尤工詩句天才黙識少有倫侣葢修黄老之術初賀監得攝生之妙近數百年不死負笈賣藥如韓康伯近在天台山升遐徧於人聴元和已亥年先生遇之謂曰子寛中柔外可以語至道也候今嵗遇爾於小有乃授斷榖丹經先盟而授之吞一粟則十年不飢一日謂門人曰賀公之期至矣乃沐浴委化龍圖閣直學士燕肅著海潮論曰觀古今諸家海潮之説多矣或謂天河激湧亦云地機翕張盧肇以月激水而潮生封演云月周天而潮應挺空入漢山湧而濤隨析木大梁月行而水大源殊派異無所適從索隠探㣲宜伸確論大中祥符九年冬奉詔按察嶺外嘗經合浦郡沿南溟而東過海康厯陵水陟恩平住南海迨由龍川抵潮陽洎出守㑹稽移蒞句章是以上諸郡皆沿海濵朝夕觀望潮汐之候者有日得以求之刻漏究之消息十年用心頗有凖的大率元氣嘘吸天隨氣而漲歛溟渤往来潮順天而進退者也以日者重陽之母隂生於陽故潮附之於日也月者太隂之精水乃隂故潮依之於月也是故隨日而應月依隂而附陽盈於朔望消於朏敷尾切魄於上下弦息於輝朒故潮有大小焉今起月朔夜半子時潮平於地之子位四刻一十六分半月離於日在地之辰次日移三刻七十二分對月到之位以日臨之次潮必應之過月望復東行潮附日而又西應之至後朔子時四刻一十六分半日月潮水亦俱復㑹於子位於是知潮當附日而右旋以月臨子午潮必平矣月在夘酉汐必盡矣或遲速消息之小異而進退盈虚終不失於時期矣或問曰四海潮平来皆有漸唯浙江濤至則亘如山岳奮如雷霆水岸横飛雲崖傍射澎騰奔激吁可畏也其漲怒之理可得聞乎曰或云夾岸有山南曰龕北曰赭二山相對謂之海門岸狹勢逼湧而為濤耳若言狹逼則東溟自定海吞餘姚奉化三江侔之浙江尤甚狹逼潮来不聞濤有聲也今觀浙江之口起自纂風亭地名屬㑹稽北望嘉興大山水闊二百餘里故海商舶船怖於上潬水中沙為潬徒旦切惟泛餘姚小江易舟而浮運河逹于杭越矣葢以下有沙潬南北亘連隔礙洪波蹙遏潮勢夫月離震兊他潮以生惟浙江水未泊月經乾巽潮来已半濁浪堆滯後水益来於是溢於沙潬猛怒頓湧聲勢激射故起而為濤耳非江山淺逼使之然也宜哉燕公以大中祥符九年為廣東提㸃刑獄又嘗知越州移明州故能考論其詳如此有海潮圖亦其所作兩浙田稅畝三㪷錢氏國除朝廷遣王贄均兩浙雜税王贄悉令畆出一斗使還責擅減税額王贄以謂畝税一斗者天下之通法兩浙既已為王民豈當復循偽國之法上從其説至今畝稅一斗者自王贄始惟江南福建猶循舊額葢當時無人論列遂為永式贄尋除右司諌終於京東轉運使有五子皋凖覃鞏罕凖之子珪為丞相其他亦多顯者豈惠民之報歟紹興元年十一月上虞縣丞婁寅亮上封事先正有言太祖舍其子而立弟此天下之大公也周王薨章聖取宗室子育之宫中此天下之大慮也仁宗皇帝感悟其説制詔英祖入繼大統文子文孫宜君宜王遭罹變故不斷如帶今有天下者獨陛下一人而已恭惟陛下克巳復勤備嘗艱難春秋鼎盛自當則百斯男屬者椒寢未繁前星不䊮孤立無助有識寒心天其或者深惟陛下追念祖宗公心長慮之所及乎崇寧以来諛臣進説推濮王子孫以為近屬餘皆謂之同姓致使昌陵之後寂寥無聞奔迸藍縷僅同民庶臣恐祀豐于昵仰違天鑒藝祖在上莫肯頋歆此二聖所以未有回鑾之期黠敵所以未有悔禍之意中原所以未有息肩之時也欲望陛下於子行中遴選太祖諸孫有賢徳者視秩親王使牧九州以待皇嗣之生退處藩服更加廣選宣祖太宗之裔才武可稱之人升為南班以備環列庶幾上慰在天之靈下係人心之望臣本書生白首選調垂二十年今將告歸不敢終黙位卑言髙罪當萬死惟陛下裁赦寅亮字陟明永嘉人早㳺上庠有聲南渡後始為上虞丞髙宗皇帝車駕駐㑹稽陟明扣閽抗疏首發大計上讀之歎寤富直柔時在西府從而薦之即令召對改官除監察御史未幾㑹秦檜用事寅亮不能諧附故不復用以死孝宗即位史浩輔政以為當有褒顯如范鎮故事上曰此皆出太上本意豈可論臣下之功遂止孝宗聖孝如此王翿者字文輝開封陳留人徙湖之安吉登崇寧五年進士第厯主客員外郎太府少卿方建炎三年冬十一月車駕東廵海道翿為浙東提㸃刑獄李鄴知越州鄴者前參知政事邴之兄當奉使金人冒金兵而前矢中其顙執政以為必能死守故留鄴守越以捍金付兵幾萬人府庫亦多留越鄴實懦比金至杭不復為守禦計隂遣人與金通北人入境率官奉迎之翿前揣知其情以廵所部寨柵為名之旁郡比鄴降金入㑹稽乆之亦遁去翿乃歸遂權州事有苦竹溪土豪胡人參與弟木香等聚郡道自稱鄉兵至近郊翿開東門納之初不能節制郡人固以為憂人參等肆掠奪翿亦大憂不知所出時以謀於郡人又不能用人參因逼翿具奏以已力戰勝金復州城為功翿不從雖不得已草奏然頗以實言人參遣木香逼請不已翿竟不可人參怨怒且懼外兵至乃刼請翿至其所駐禹跡寺東省院欲與俱去翿又不從使數人曵之出翿堅坐不起遂腰斬之子鎬年二十二奮起搏賊亦見殺皆肆諸寺門將官曹績亦俱死績有子聞變從外馳至伏父尸䑛血號慟不止賊白刄交下終不顧遂抱父尸以死翿雖無他才能智畧以制羣盗然自拔去不預李鄴附金之事及人參刼請奏功若屈從以冀倖賖死朝廷方艱難時亦未必深責翿不敢欺卒以實奏豈不知將死猶能如此亦不為無可稱矣事聞翿自朝請郎贈朝請大夫鎬自將仕郎贈文林郎録其孤二人然其後卒不振父子至今藁殯梅山本覺寺亦可哀矣曽怘中書舍人鞏之孫以新通判温州權浙東安撫司主管機宜大宇建炎四年金人入州境安撫使李鄴降金郡官多遁去其懦者從鄴請降怘獨慷慨誓死不肯下拜被執愈奮起罵敵敵怒併執其妻子喻使降則全其家且富貴之怘罵不止遂死闔門數十口皆死惟一子崈尚幼其乳母於亂尸中救䕶乆乃蘇然亦刀痕被體殆天全其嗣也金退部使者宋公煇聞于朝崈以死事孤命官石景術字慎思應舉年省試治周禮試官考校義巻兩副一則該博而詞不工疑其為老儒一則詞義整齊疑其少年試官念欲取老者未決夕夢一書生来見絀往反乆之覺而與同官言皆笑或不以為然取巻子衆觀亦如前議是夕試官五人皆同夢異而竟取疑為少年者榜出即石景術也狀貌乃夢中所見王介甫欲嫁姪女與之吕吉甫聞其事意其必貴遽以女適景術介甫怒由是吉甫罷參政出知揚州景術曽作詞曹郎官上監司太守後無疾死介甫姪女嫁葉致逺者是也清尊録紹興三年大理評事石邦哲言近偽徐王李㪍帝姬阿易之来遣使迓之絡繹于道有以見陛下之親睦既察其詐付之有司又有以知陛下之明斷臣聞漢光武之誅王郎雖或者疑其為成帝遺體而猶誅之葢惡人之惑衆而偽者莫辨也唐代宗之詔母后嘗曰寧被百罔冀得一真葢懼人之避辠而真者莫是也李㪍阿易之是也播告四方恐尚皇族有自金中脱身南歸宜令州縣驗實許以推賞庶得其真以茂本支庚申詔禮部遍牒諸路中興小厯初紹興八年除光為參知政事右從政郎楊煒寓行在聞之曰此吾鄉先生也今得位必盡行所學乆之無所聞時朝廷方與金人議和煒不以為是以書責光感其言遂引去二十二年煒為黄巖令有聲蕭振知合州薦煒改秩俄有縣吏得煒書有詆時相語以告浙東提刑秦昌時昌時以聞于朝詔送大理寺獄具煒除名送萬安軍編管兄選人炬亦連坐羈置邕州振罷仍落徽猷閣待制池州居住中興小厯畢景儒仲荀言其先人天聖中為㑹稽税官夏夜暴風震霆而無雨空中有人馬聲終夜方息闔城皆聞之明日禹廟令申州是夜二鼓殿門闗鎖忽自掣開風霆自殿中起直西南去州遣官驗之百里間林木禾稼皆顛仆新昌石佛螺髻上有靈芝香聞數十步夜有光煜然何徳楊稱言嘗登山遥望見之有大虵環守不可輙近陸左丞夫人大觀庚寅在京師病累月醫藥莫效雖名醫如石藏用輩皆謂難治一日有老道人狀貌甚古銅冠緋氅一丫髻童子操長柄白紙扇從後過門自言疾無輕重灸立愈延入問其術道人探囊出少艾取一甎灸之夫人方臥忽覺腹間痛甚如火灼道人遂徑去曰九十嵗追之疾馳不可及後二十餘年年八十三乃終又二十年孫提刑濟監三江鹽場偶飲酒於一士人毛氏忽見道人衣冠及童子悉如夫人平日所言方愕然道人忽自言京師灸甎事言訖遂遁去遍尋不可得毛君云其妻病道人為灸屋柱十餘壯脱然愈方欲謝之不意其去也世或疑神仙以為渺茫豈不繆哉㑹稽天寧觀老何道士喜栽花釀酒以延客居於觀之東廊一日有道人狀貌甚偉欵門求見善談論喜作大字何欣然接之留數日乃去未幾有妖人張懐素號張落拓者謀亂乃前日道人也何亦坐繋獄以不知謀得釋自是畏客如虎杜門絶往還忽有一道人亦美風表多技術觀之西廊道士曰張若水介之来謁何大怒曰我坐接無賴道人幾死於囹圄豈敢復見汝耶因大罵闔扉拒之而此道人葢永嘉人林靈噩也旋得幸貴震一時賜名靈素平日一飯之恩必厚報之若水乘驛赴闕命以道官至蘂珠殿校籍視殿修撰父贈朝奉大夫母封宜人而老何以嘗罵之朝夕憂懼若水為排解且以書慰之始少安觀中人至今傳以為笑老葉道人龍舒人不食五味年八十七八平生未嘗有疾居㑹稽舜山天將寒必増屋瓦補牆壁使極完因下帷投簾多儲薪炭杜門終日及春乃出弟子曰小道人極愿慤嘗歸淮南省親至七月望日隣有住菴僧召老葉飯飯已亟辭歸問其故則曰小道人約今日歸矣僧笑曰相去二三千里豈能必如約哉葉曰不然此子平日未嘗妄也僧乃送之歸及門小道人已弛擔矣客每訪之拱揖甚謹然不肯多語或黙作意欲扣其所得纔入門即引入臥内燒香具道其遇師本末若先知者亦異矣夫石道叟公轍鄉里名士有朱夷行希言歿於東都朱兄通直昌言字逹可聞赴告質産迎其喪不足則貸於閭里未辦方憂不知所為而道叟已送柩在門矣於是道叟為太學諸生夷行病疫逺客無親黨在都道叟獨謁醫為治療既不起則空其囊為具棺歛買舟載之歸初道叟未四十得眼疾至是舟行遇大熱疾遂劇幾喪明夜夢夷行如平生曰目疾奈何有爾朱先生藥其效如神覺而異之明日至京口岸濵有二人者自相語曰爾朱何義也公憶昨夢即叩之其人曰前小衖中有賣爾朱先生眼藥者不知所謂聊復論之耳道叟因相與訪求之不百步已至其處欵門求藥出百許貼皆細如芥子問其直曰貼須三錢爾因盡買之服未數日瞳人如著氷舟行至東則視瞻已清明復初矣其後年八十手自校書燈下作牛毛小楷如年少書生豈𡨕報歟道叟紹興初以特奏名第一人賜同進士出身仕至大宗正司主管宗室財用云王性之讀書真能五行俱下往往它人纔三四行性之已盡一紙後生有投贄者且觀且捲俄頃即置之以此人疑其輕薄遂多謗毁其實工拙皆能記也既卒秦熺方恃其父氣燄熏灼手書移郡將欲取其所藏書且許以官其子長子仲信名亷清苦學有守號泣拒之曰願守此書以死不願官也郡將以禍福誘脅之皆不聴熺亦不能奪而止鄭鼎之字從革事親至孝建炎庚戌敵入㑹稽鼎之父七十餘臥病不能避去家人奔散鼎之獨衣冠侍父煑粥藥進之兵至即泣訴曰老父病革不能去乞全餘命兵亦為歔欷捨去至者數輩乃相戒勿入孝子門父子卒皆無恙王公衮母墓為盗所發有司薄其罪公衮手斬盗首詣州自言兄佐請納所居官以贖其罪時王侍御十朋為簽幕賦詩以美之云臣子大節孝與忠父母仇讎天不同賢哉㑹稽王孝子感慨有古烈士風松楸一夕盗破冢親獲䑕輩聞之公有司守法貸其命孝子銜恨無終窮誰謂書生膽如許貌若尫羸中甚武手斬凶人提髑髏謂死生寃詣公府君不見齊襄内行世所羞春秋賢之縁復讎又不見子胥鞭尸報父怨太史為之作佳傳君今枕戈志已伸更須移孝為忠臣它年當作傅介子誓斬樓蘭雪國耻翟參政汝文守㑹稽以擅放逋賦自顯謨閣學士降為直學士謝表曰敢若秦人坐視越人之瘠既安劉氏故知晁氏之危一時皆傳誦之綦内相崈禮自㑹稽奉祠去謝表曰雜宫錦於漁蓑敢忘君賜話玉堂於茅舍更覺身榮秩滿再奉祠又表謝曰欲掛衣冠尚低回於末路未先犬馬儻邂逅於初心皆傑作也蘭亭之㑹自右軍謝安而次四十一人至唐大厯中朱迪吕謂吳均等三十七人經蘭亭故地聨句有賞是文辭㑹歡同癸丑年之句東坡和陶詩云再遊蘭亭黙數永和必有此事梁王籍字文海天監中為湘東王諮議參軍隨府㑹稽郡至若耶溪賦詩云蟬噪林逾靜鳥鳴山更幽劉孺見之擊節不能已已王荆公以為兩句意同乃晉以後人病别取古句風定花猶落對之信為竒絶也唐竇庠作于闐鐘歌送靈徹上人歸越序云靈嘉寺鐘案越中記此鐘本于闐國寺鐘因風雨失鐘所在有天竺僧過于闐識此鐘于越靈嘉寺至今鎖在寺樓靈嘉寺今福慶寺是也詩云海中有國傾神功烹金化成九乳鐘精氣激射聲冲融䕶持海底諸魚龍聲有感神無方連天雲水無津梁不知飛在靈嘉寺一國之人皆若狂東南之美天下傳瓌文萬狀無雕鐫有靈飛動不敢懸鎖在危樓五百年有時清秋日正中繁霜滿地天無風一聲洞澈八音盡萬籟悄然星漢空徒言凡質千鈞重一夫之力能振動大鳴小鳴須在君不擊不攷終不聞髙僧訪古稽山曲終日賞之言不足手提文鋒百錬成恐刜此鐘無一聲髙駢寄越僧詩云輕堅笻杖竹一枝有九節寄與沃洲僧閒步青山月至今笻杖以九節為貴戴叔倫贈秦系詩云北人歸欲盡猶自寓蕭山閉戸不曽出詩名滿世間系居蕭山今不知其地矣近時徐師川過上藍莊詩云詩名空復滿世間白髯蕭蕭今老矣用叔倫語也越人俚語謂乆不得見者曰恰似菖蒲花難見面按施肩吾詩有古相闕花則俚語亦乆矣越漁者楊父一女絶色為詩不過兩句或問胡不終篇答曰無奈情思纒繞至兩句即思逺不斷有謝生求娶焉父曰吾女宜配公卿謝曰諺云少女少郎相樂不忘少女老翁苦樂不同且安有少年公卿也翁曰吾女詞多兩句子能續之稱其意則妻矣示其篇曰珠簾半牀月青竹滿林風謝續曰何事今宵景無人解與同女曰天生吾夫遂偶之後七年春日楊忽題曰春盡花隨盡其如身是花謝曰何故為不祥句楊曰吾不乆於人間矣謝續曰役来説花意不過比容華楊即瞑目而逝後一年江上煙光溶曵見楊立於江中曰吾本水仙謫居人間後儻思之即復謫下不得為仙矣三鄉題云予家本若耶溪東與閨中同志者紉蘭佩蕙趨幽閒人境不得已從人不幸良人已失邈然無依命筆聊書絶句名姓二九子為父後玉無瑕弁無首荆山石往往有以筆墨非女子之事名姓故隠而不書詩曰昔逐良人西入關良人身沒妾東還謝娘衛女不相待為雨為雲歸舊山李舒解曰二九十八也十加八木字子為父後木下子李字玉無瑕去其㸃也弁無首存其廾也王下廾弄字也荆山石往往有者荆石多韞玉當是姓李名弄玉也蕭山王兵部絲嘗發地得小青石版甚薄上刻詩三首八分小字甚工妙詩云揺漾越江春相將采白蘋歸時不覺夜出浦月隨人又曰家寄征河岸征人乆逺逰不如潮有信每日到沙頭又曰乘曉南湖雲參差波浪痕前洲在何處孤恨與誰論不知何人詩也唐黙字存中㑹稽人博極羣書文辭髙古陸農師列為上客為臨川法掾逰從甚久每愛其詩曰茅屋不聞雪紙窻宜讀書又曰山林誤採槍旗信却怪枝頭雪未消禱雨云下僚應有隨車喜遥見枝頭少女風送髙彦應云莫似君家三十五時来不寄一行書皆竒句也出漁隠叢話越州應天釋希圓姑蘇人所居琅邪山山下有井井有鰻􅢵魚水有盈縮與江潮相應甚靈多怪按爾雅山有穴為岫徐季海詩云孤岫龜形在乃不成語葢謝𤣥暉云䆫中列逺岫已誤用此字季海承誤耳按楚詞云收恢台之孟夏恢大也台即胎也言夏氣大而育物季海詩云髙閣無恢炱直言無暑氣耳似不合古語爾雅云夏為長嬴嬴即恢台也若言髙閣無長嬴可乎能奴登切獸名熊屬足似塵鹿絶有力故有絶人之才者謂之能能奴来切三足鱉也今於来字韻中用法士多瓌能乃是僧似鱉耳然魏晉人作詩多如此借韻至老杜韓退之無復此病耳壯大壯之壯牡牝牡之牡杜詩中規模稱牡哉必壯字誤書爾魏晉人用字亦多如此葢取字勢易工不復問字之根源如古人書槁橋直直皆不成字僧宗昻住㑹稽能仁寺有故相寓寺中已而復相宗昻被勅住持郎官馬子約題詩法堂壁上曰十年衰病臥林泉鵷鷺羣飛競刺天黄紙除書猶到汝固知清世不遺賢義井在府東二里下為大井袤丈上設三井口以受汲覆以大亭遇旱嵗不減尤宜染練義者葢以衆所共汲為名今世俗置産以給族人曰義莊置學以教鄉曲子弟曰義學設漿於道以飲行旅曰義漿闢地為叢冡以藏暴骨曰義冡東坡先生讁黄州取諸郡所餉酒者置一器中以觴客曰義樽近時州縣衆力共給役曰義役皆與衆同之意又俚俗有義父母義子孫義兄弟衣加攔曰義攔以髲作髻加首曰義髻此又不可曉也雲門僧彦強仲皎皆能詩強且死作詩云一間茅屋元無主付與山頭野火燒放筆而逝皎作送春長短句畢竟年年用著来何似休歸去詩家多許之雲門僧行持髙僧也初住雍熙退院結菴西谷有詩云快活有時無奈句遶菴長嘯兩三聲其髙逸如此雲門雲泉菴僧廣勤字行之能詩亷宜仲布嘗作墨梅贈之勤答以詩云筆端造化如東君著物不簡亦不繁宜仲大稱之以為非僧詩也翟公巽參政守㑹稽日命工塑真武像既成熟視曰不似不似即日毁之别塑今告成觀西廡小殿之像是也道士賀仲清在傍親見之而不敢問政和後道士有賜玉方符者其次則金方符長七寸闊四寸靣為符背鑄御書曰賜某人奉以行教有違天律罪不汝貸結於當心每齋醮則服之㑹稽天寧萬壽觀有老道士盧浩真者嘗被金符之賜予少時親見之㑹稽志巻十九
