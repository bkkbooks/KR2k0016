body:
  text: 㑹稽志巻五宋施宿等撰戸口舊經具錄兩漢地理郡國志晉地道記太康地志及宋齊隋唐户口然領縣多寡與今不同前漢㑹稽一郡兼閩浙而有之後漢則東浙與閩皆在焉呉又頗包江東至呉錄領縣乃兼有明州之境宋齊州郡志亦然是則前代户口之數不可用於今也惟唐志載開元二十三年户部帳可以較登耗其曰領縣七者時新昌猶未置也今斷自唐始開元户部帳户九萬二百七十九口五十二萬九千五百八十九國朝大中祥符四年户一十八萬七千一百八十丁三十二萬九千三百四十八㑹稽户三萬四千七十六丁三萬五千五百八十五山隂戸二千一百七十一丁三千八百剡戸三萬二千五百七十八丁五萬五千六諸暨户四萬九千六十二丁七萬七千五百六十七蕭山戸二萬三千八十六丁三萬九千四百五十三餘姚户二萬一千六百三丁四萬一千九百一十三上虞户五千一百四十一丁二萬八千二百五十七新昌户二萬三丁四萬七千七百六十七元豐九域志主户一十五萬二千五百八十五客户三百三十七嘉泰元年主客户二十七萬三千三百四十三丁三十三萬四千二十中小老幼殘疾不成丁一十萬七千七十二㑹稽戸三萬五千四百六丁四萬一千七百八十一不成丁一萬四千三百七十八山隂戸三萬六千六百五十二丁四萬六千二百二十七不成丁一萬五千七百六十七嵊縣户三萬九千七百九十二丁五萬三千五百七十七不成丁一萬七千四百七十八諸暨戸四萬二千四百二十四丁五萬六千四百二十一不成丁一萬八千五百二十七蕭山戸二萬九千六十三丁三萬五千一百六十八不成丁九千四百七十五餘姚户三萬八百八十三丁三萬二千一百四十五不成丁一萬二百三十四上虞户三萬三百三丁三萬二千三百一十九不成丁九千四百五十八新昌户二萬八千八百二十丁三萬六千三百八十二不成丁一萬一千七百五十五賦稅夏户人身丁錢舊管三萬六千七百六十五貫二百六十九文足今催五萬三千五百八十二貫六百六十八文省㑹稽四千六百一貫四百三十文今催六千二百二十四貫八百八十文山隂五千一百三十七貫八百一十三文今催六千三十八貫九百九十二文剡縣五千八百八十九貫八百五十文今嵊縣催七千四百一十二貫七百二十八文諸暨八千四百三十七貫一百五十文今催一萬三百一十四貫七百五十二文蕭山二千四百五十六貫六百六十六文今催二千九百三十三貫六百五十六文餘姚三千三百三十一貫八百六十文今催五千四十七貫六百八十九文上虞三千二百九十八貫二百文今催五千一百二十六貫七百二十文新昌三千六百一十二貫三百文今催一萬四百七十三貫二百五十一文紬舊管九千一百六十四疋三丈八尺四寸三分今催八千六百一疋三丈三尺四寸六分六釐㑹稽一千四百六十九疋二丈二尺一寸五分今催一千三百八十八疋一丈一尺一寸五分山隂一千八百二十八疋一丈三尺七寸今催一千七百九十四疋七尺五寸五分五釐剡縣九百二十疋二丈六尺三寸今嵊縣催九百二十九疋一丈四尺四寸一分諸暨一千四百五疋三丈八尺三寸今催一千一百六十六疋一丈四尺四寸一分一釐蕭山九百八十七疋一丈八尺八寸今催一千四疋二丈六尺二寸三分餘姚九百二十九疋一丈二尺五寸八分今催九百七十疋三丈五尺三寸八分上虞一千三百三十五疋三丈七尺今催一千八十六疋一丈一尺四寸三分新昌二百八十七疋二丈九尺六寸今催二百六十一疋三丈二尺九寸絹舊管九萬八千二百四十六疋四尺五寸今催九萬九千八百九疋二尺一寸九分四釐六毫㑹稽一萬一千一百六十六疋二尺七分今催一萬三千七百一十八疋二尺一寸五分五釐山隂一萬七千六百九十四疋三丈八尺九寸今催一萬七千二百四十七疋一丈九尺四寸剡縣一萬一千三百六十七疋三丈二尺六寸今嵊縣催一萬三千二百二十四疋八尺四寸四分三釐諸暨二萬八百二十疋二丈二尺今催一萬八千六疋二丈八尺六寸三分六毫蕭山一萬三十八疋四尺一寸七分今催一萬四百八十八疋三尺九寸一分三釐餘姚一萬一千八百一十疋三丈七尺今催一萬二千四百二十二疋一丈七尺五寸五分上虞一萬三千九十九疋二丈一尺今催一萬二千四百四十九疋一丈八尺一寸三分三釐新昌二千二百四十八疋一丈六尺七寸六分今催二千二百五十二疋三丈三尺八寸七分綿舊管五萬八千九百八十一屯四兩四錢八分九釐七毫五絲今催四十一萬二千二百五十二兩七錢一分七釐九毫五絲㑹稽七千七百四十二屯二兩五錢九分七釐五絲今催五萬三千四百一十兩九錢二分九釐七毫五絲山隂九千一百二十二屯四兩三錢八分五釐今催六萬七千五百三十六兩一錢三分四釐七毫五絲剡縣五千九百七十七屯一兩六錢五分今嵊縣催四萬八千五百七十四兩五錢六分六釐二毫五絲諸暨一萬一千五百二十九屯三兩四錢八分今催八萬四千四百四十三兩一錢六分八釐七毫五絲蕭山五千九百二十九屯四兩二分今催四萬一千八百八十四兩四錢五分七釐八毫五絲餘姚六千六十八屯四兩今催五萬六千二百四十三兩七錢八分一釐二毫五絲上虞六千九百七十二屯二兩二錢五分五釐今催四萬六千一百九十七兩二錢五分五釐三毫五絲新昌五千六百三十九屯一錢九分今催一萬三千九百六十二兩四錢二分三釐秋苗米舊管二十四萬九千二百二十石五斗六升七合九勺今催二十五萬二百六十五石二升七合七勺㑹稽額管三萬七千九百五十石七斗八升七合四勺撥充職田學糧欑宫買過田免納石五斗九升一合三勺坍江逃絶等九百一十石三斗三升合催三萬五千六百四十二石八斗六升六合一勺山隂額管四萬六千五百三十三石六斗六升五合二勺撥充職田等二百五十六石一斗六升五合九勺坍江逃絶七百四十五石八斗合撥催四萬五千五百三十一石六斗九升九合三勺嵊縣額管二萬四百三十五石一斗五升一合九勺坍溪五百七石七斗三升合催一萬九千九百二十七石四斗一合九勺諸暨額管三萬六千一百七十八石一斗九升三合一勺坍江逃絶等一千七百八十一石一斗三升合催三萬四千三百九十七石六升三合一勺蕭山額管三萬一千六百三十石五斗四升一合七勺撥充職田學糧九百一十五石一斗一合坍江逃絶等四百七石六斗一升合催三萬三百七石八斗三升一合七勺餘姚額管三萬二千五百七十五石五斗一升七勺坍江海移􅖀海塘等九百三石五斗一升合催三萬一千六百七十二石七勺上虞額管三萬七千八百九十七石六斗六升一合五勺合零就整三百三十四石二斗三升坍江等三千四十六石二斗四升合催三萬四千五百一十七石一斗九升一合五勺新昌縣額管七千六十三石五斗三升五合二勺合零就整等一百一十五石一斗七合七勺坍溪二百八十八石九斗一升合催六千六百五十九石五斗一升七合五勺舊額之外創増和買一十萬疋係經建炎三年十一月紹興二年九月八年二月淳熈八年閏三月紹熈元年二月五次蠲減之數㑹稽一萬三千二百四十三疋九尺二寸山隂一萬四千七百四十三疋二丈七尺九寸嵊縣一萬七千九十八疋二丈二尺五寸諸暨一萬八千八百五十五疋二丈二尺四寸蕭山一萬四千二百六十一疋八寸餘姚七千七百疋七尺上虞七千二百九十七疋三丈五尺八寸新昌六千七百九十九疋三丈四尺四寸役錢一十六萬七千九百二十八貫九百五十文㑹稽一萬八千七百四十三貫八十八文山隂二萬二千一十三貫九十八文嵊縣二萬一千九百七貫七百三十文諸暨二萬六千三百七十八貫八十一文蕭山一萬三千九百一貫四百一十文餘姚三萬九千四十四貫五百七十七文上虞一萬三千九百五十一貫九百八十六文新昌一萬一千九百八十八貫九百八十文水陸茶錢八千八貫二百三文㑹稽二千八百八十八貫六百五十八文山隂一千八百五十一貫三百一十六文嵊縣七百四十貫一百一十七文諸暨八百三十貫文蕭山三百二十一貫三百三十三文餘姚二百九十二貫九百一十三文上虞八百五十二貫八百六十六文新昌二百三十一貫文小綾二千五百疋折錢一萬五千四百二十二貫五百文㑹稽二百五十疋折一千五百四十二貫二百五十文山隂二百五十疋折一千五百四十二貫二百五十文嵊縣二百五十疋折一千五百四十二貫二百五十文諸暨六百疋折三千七百一貫四百文蕭山六百疋折三千七百一貫四百文餘姚二百疋折一千二百三十三貫八百文上虞二百疋折一千二百三十三貫八百文新昌一百五十疋折九百二十五貫三百五十文湖田米六萬六千三石七斗四升三合一勺㑹稽二萬六千二百六十四石五升山隂三萬二千六百八十九石五升三合一勺諸暨四千二百一十石三斗二升蕭山二千八百四十石三斗二升職田米一萬五千九百九十九石五斗㑹稽四千六百二十一石九斗四升山隂四千二百八十四石九斗嵊縣三百三十三石七斗諸暨一千四百一十一石五斗八升蕭山二千八百八十六石九斗七升餘姚一千八十五石四斗七升上虞一千三百七十四石九斗四升折變㑹稽免折變紹興三十二年本府奏㑹稽縣十七十八十九都皆欑宫所在請有以寛䘏之十月三日詔㑹稽三都人户二稅不得支移折變常賦外免其他差使至隆慶二年本府又申浙東和買本府既重而㑹稽視諸縣為尤重欲乞用永安縣優䘏舊例盡蠲一縣支移折變五月六日詔從之折帛錢三十三萬四百三十二貫六百二十八文係将人户鹽稅紬綿絹丁鹽和買絹數内科折每紬一疋折納一丈三尺三寸綿一兩折納五錢丁鹽稅絹一疋折納八尺和買一疋折納一丈和買每疋折錢六貫五百文它絹若紬每疋並折七貫文綿每兩并耗折四百六十文山隂六萬四千一十五貫一百八十文嵊縣五萬三千五百三十四貫五百三十五文諸暨七萬五千五百三十七貫一百二十六文蕭山四萬三千六百六十八貫四百八十四文餘姚三萬五千五百七十六貫六百五文上虞三萬九千三百一十三貫八百文新昌一萬八千七百八十六貫八百九十文折紬綿四萬一千五百三十一兩每紬一疋數目折納一丈三尺三寸以綿一十七兩折紬一疋惟山隂以折帛之餘盡折為綿不輸本色葢㑹稽既免折變當時折紬之綿無自出又不欲偏科它邑故盡以歸山隂麥及糯米亦然故山隂折變視他邑為重山隂一萬二百兩嵊縣五千二百一十九兩諸暨七千七百八十六兩蕭山五千七百四十六兩餘姚五千七百九十七兩上虞五千六百二十七兩新昌一千一百五十六兩折稅絹麥六千六百九十九石三斗六升一合諸縣科敷等第不同然皆以二石四斗一升折絹一疋山隂一千六百三十三石三斗四升嵊縣二百九石五斗諸暨七百二十石蕭山一千一百四石九斗九升餘姚一千六百四十二石七斗九升六合上虞一千二百八十九石九斗五升新昌九十七石七斗八升五合折苗糯米一萬九千六百六十二石八斗三升八合諸縣科敷等第不同然皆以一石折苗一石一斗一升山隂五千一百石一斗八升嵊縣四百八十三石四斗諸暨三千九百一十石六斗一升蕭山二千九百四十八石二斗八升九合餘姚三千三百三十石八斗八升六合上虞三千六百三十五石四斗