body:
  text: 㑹稽志巻十一宋施宿等撰泉府城清白泉在府西清白堂側范文正記云西巖下獲廢井泉甘色白淵然丈餘引不可竭王十朋賦云啜茗於清白之堂潄齒於清白之泉三汲泉在卧龍山麓泉甚淺不過有水數斗然汲盡巳復滿未嘗竭也舊在陸左丞園内今析為二其一歸陸參議靜之其一歸司馬監丞僖㑹稽縣子真泉在梅山本覺寺泉味甘寒亷博士布嘗為書子真泉三大字或疑子真隠吳市門不應在㑹稽然子真方避禍棄妻子變姓名豈常在吳市門者故今㑹稽多有子真遺迹鄭公泉在縣五雲鄉去葛仙翁釣磯為近以鄭𢎞得名水經云在若耶溪東方數丈冬温夏凉輿地志云若耶鄭𢎞所居之側有鄭公泉𢎞雖居台輔常思故居曽病困思得泉水家人馳取飲少許便差泉有二脈滴瀝出石罅味極甘宜茶石之上為行路而泉注溪中非山僧野叟不能知其處雲門泉在雲門山唐僧靈一詩云泉源新湧出洞澈映纎雲范文正公詩云林無惡獸住山有好泉來菲飲泉在大禹寺側王龜齡詩云梵王宫近夏王宫一水清涵節儉風越俗不知王好惡泉名恰在酒名中真珠泉在少㣲山齊祖之家山十詠泉其一也苦竹泉在秦望山側曽文清墓林多苦竹泉出其下泓潔宜茶傅公泉在射的山給事中傅公崧卿先墓因地坎窪鑿池瀦水每上冢以煎茗浣祭器池縱五尺衡六尺深半衡之數泓潔甘美遇旱不涸士夫咸謂可以方公清德遂目之曰傅公泉山隂縣半月泉在法華山天衣寺側唐李公垂詩云殿湧全身塔池開半月泉姚氏叢語云泉隠巖下雖月圓池中只見其半最為佳處紹興初僧法聰鑿開巖上名曰滿月甚可惜也嵊縣偃公泉在明心院側僧仁偃施水於此得名王龜齡詩云泉自何時得得名從偃公誰能繼張陸為載水經中沸泉在溪坑一穴周二三尺常如湯沸自下滚起四時不竭餘姚縣姜女泉在姜山泉流清洌常有木葉蔽其上或去葉泉濁華清泉在縣北陳山元豐中楊景模顧臨來游酌泉賦詩於此龍泉在靈緒山龍泉寺上王荆公絶句所謂天下蒼生望霖雨不知龍向此中蟠也有大字刻泉旁盖後人倣公書非真筆髙宗皇帝廵幸時嘗泊御舟于寺前江中識者以為龍蟠之䜟白水泉在縣西南四明鄉山壁環繞峭立上有溪流四十二條自絶頂投空而下冬夏水聲不絶新昌縣象泉在慧雲寺姚祐云飲鹿花開壮此山遊人多作慧泉看杖錫泉在縣東沃洲山下唐僧靈澈之故迹井府城鰻井在寶林山舊經云井有靈鰻一或時出現墨客揮犀云越州應天寺鰻井一在磐石上其髙數丈井纔方數寸乃一石竅唐徐浩詩云深泉鰻井開即謂此鰻時出游人取之置懷袖間了無驚猜如鰻而有鱗兩耳甚大尾有刃迹相傳黄巢嘗以劍刺之凡鰻出遊越中必有水旱疾疫之災鄉人嘗以此候之華安仁攷古云飛來山下石井大如盆盂無耗溢有二鰻文彩煥爛世言下徹滄海好事者以彩綫懸錢探之極兩紽不得其所止錢王井井凡數十大抵多在五雲稽山門外以石甃水髙於地霖潦不溢大旱不涸方暑時行路甚以為恵傳以為吳越王時所浚盖不可攷然至今俗謂之錢王井葛仙丹井在雲門淳化寺佛殿西廡之外僧房中泉味甘寒冠一山唐顧况詩云野人愛向山中宿况在葛洪丹井西門前有箇長松樹半夜子規來上啼即此井也松已槁死六十年前故老猶有見之者唐詩人又有句曰月在山中葛洪井晁文元公愛賞之今有松偃蹇夭矯如龍正覆井上若䕶此泉者真可異也但僧軰頗􅆷其小枝為可惜耳陸太傅丹井在法雲寺佛殿前少東太傅昔以直集賢院守鄉邦晚謝事居寺東魯墟故廬辟糓煉丹專汲此井用之辟糓十餘年容鬂氣力皆不衰丹已八轉忽變化飛去太傅乃洗爐鉢水飲之數日不疾而逝又以餘水分諸孫飲者三人中大佖年八十六祠部傅年九十承奉倚年八十三方井在通判北㕔卧龍山足齊祖之有新井詩今名卧龍泉㑹稽縣禹井在縣東南㑹稽山山海經注㑹稽郡山隂縣南山上有禹井水經云山東有硎去廟七里謂之禹井葛仙翁井在縣東南禹穴側宋之問詩云著書惟太史鍊藥有仙翁華安仁攷古云葛稚川鍊丹於宛委山下有遺井大如盆盂其深尺許清泉湛然歐冶井在劍浦山齊唐錄鑄浦事云歐冶子始鑄神劍之所有淬劍大井存焉山隂縣何公井在雲門山西梁何𦙍所居也宋之問詩云樵徑謝村北學井何巖東蛟井舊傳井有三蛟故名嵊縣蛟井在縣南穿山下井有蛟故名近井有鎮市居民烟火數百家趙廣信井在縣西小白山仙人趙廣信鍊九華丹於此諸暨縣鴟夷井在净觀院側嘉祐中吳處厚廟碑云陶朱公俗傳諸暨人今净觀院其故居也鄉曰陶朱井曰鴟夷皆以公得名丁令威井在縣東北咸通寺側硯水井在永福寺梁武帝讀書堂井尚存蕭山縣金泉井在縣西今為居民徐氏園每縣務醖酒取汲於此士大夫家釀亦多用之故縣多名酒所謂釀泉為酒泉香而酒冽者信有之潘井在縣西南七里井髙於路數尺其水可掬寒暑未嘗竭漢地里志注云蕭山潘水所出東入海意水源或出於此寰宇記云疑浦陽江之别名上虞縣舜井在縣西北三十五里興教寺傍有象田或者以為的對金罍井在縣南一里天慶觀東廡晉太康中獲金罍於上虞縣即此井也焦家井舊經云昔焦贑卜地穿此井水味甚甘柴家井在縣西一十里蕭家井在縣東一里等慈寺本梁蕭氏所捨宅也龍頭山井在縣東山崖間水經云石井冬夏常冽清泉南帶長江北連上陂新昌縣石井在縣東天姥山下齊公井在縣南五里南明山之東麓俗云齊相井唐齊顗所居山中有十五題井其一也按齊顗不為相俗傳誤也洞㑹稽縣陽明洞天在宛委山龍瑞宫舊經云三十六洞天之十一洞也一名極𤣥太女之天唐觀察使元稹以春分日投金簡於此詩云偶因投秘簡聊得泛平湖穴為探符坼潭因失箭刳白樂天和云去為投金簡來因挈玉壺洞外飛來石下為禹穴傳云禹藏書處一云禹得玉匱金書於此史記司馬遷探禹穴注云禹廵狩至㑹稽因𦵏焉上有孔穴民間云禹入此穴水經云山東有硎深不見底東遊者多探其穴今無攷詳見宛委山風洞在刻石山遇隂雨聞鼔樂聲玉洞在劍浦山齊祖之詩云白石洞間路吾家在其中琴窗與書閣一半是雲封嵊縣金庭洞天在縣東南天台華頂之東門也道經云越有金庭桐柏與四明天台相連神仙之宫也唐裴通記云剡中山水之竒麗金庭洞天為最其洞即道門所謂赤城丹霞第六洞天也按上清經洞天在天台桐柏山中辟方四十里其北門在此小香爐峯頂人莫見之又云晉王右軍家于此山書樓墨池舊制仍在南齊道士禇伯玉於此置金庭觀乃右軍之家也通留詩云寂寂金庭洞清香發桂枝魚吞左慈釣鵞踏右軍池華云周王子晉善吹笙為鳳凰聲從浮邱登嵩髙而羽化緱山去後主治天台華頂號白雲先生往來金庭風月之夕山中有聞吹笙者諸暨縣玉京洞在洞巖吳處厚詩云秉燭攜笻步步前玉京迢遞訪神仙四時自有壺中景一罅都迷物外天時刁景純同遊仙巖洞在五泄山宋禧留題云翠巖仙洞白雲深躡石捫蘿一訪尋縣令劉述禱雨於此亟應有詩云英英洞口雲觸石纔一縷須臾徧空山霈然作霖雨餘姚縣潺湲洞在四明山陸龜䝉皮日休有唱和石人洞在縣東北石人山洞北向髙廣各六尺許常若掃溉其石壁如粉昔有浮屠裹粮持炬而入越信宿出洞中􅃉杳不可窮其底聞櫓聲而迴吳山洞在縣東北吳山面滄海巨浪激撞巖石嵌空旁産牡蠣上虞縣薔薇洞在東山李白詩云不到東山久薔薇幾度花白雲他自散明月落誰家我今攜謝妓長嘯謝人羣欲報東山客開闗掃白雲王性之記云謝文靖攜妓游戱之地雖草莽䝉塞然古色不改宛有六朝氣象仙姑洞在縣東南一名鳳鳴洞昔有仙人乗鸞鶴來下後人立廟祠之號鳳鳴洞主洞濶丈餘周數十步髙十餘丈雙崖峭立懸石如磬飛瀑濺沫常若風雨嵗祈禱有驗新昌縣真溪洞在縣東洞髙四尺濶三尺深不知其底有持炬入者僅數十步風自洞出疾甚炬滅竟不得入匝洞舊植碧桃花時可愛今桃蹊寝廢石㑹稽縣窆石在禹祠舊經云禹𦵏于㑹稽山取此石為窆後人覆以亭屋有古𨽻不可讀宣和中楊時有題名秦少㳺禹廟詩云一代衣冠埋窆石千年風雨鏁梅梁葛仙石在縣東若耶溪葛稚川常投竿坐憩于此謝康樂兄弟皆常遊每至此酬唱忘歸華安仁詩云聞說風流謝客兒鴒原相應日忘歸仙翁遺迹雲深處攜手行吟送落暉秦始皇坐石在㑹稽山南輿地志云方石數丈是始皇坐其兩邊方石八所是丞相巳下坐盖俗傳云爾酒甕石在射的山足三石品峙其狀如甕舊經云巨石三在鏡湖東時人謂之秦皇酒甕石齊祖之鑄浦録云絶湖而濟巖壑相望雙石若瓿號秦皇酒甕華安仁攷古集云若耶溪傍雙石如甕而大世言始皇之所遺也今甕石實有三與齊華二公所記不合以舊經為正西施石在若耶溪一名西子浣紗石唐王軒詩云嶺上千峯碧江邊細草春今逢浣紗石不見浣紗人宋之問云越女顔如花越王聞浣紗國㣲不自寵獻作吳宫娃一行霸勾踐再笑傾夫差一朝還舊都艶粧驚若耶杜牧詩云西子下姑蘇一舸逐䲭夷東坡詞云五湖聞道扁舟歸去仍攜西子姚令威叢語云嘗以此問王性之性之云西子自下姑蘇一舸自逐䲭夷不可云范蠡將西子去也吳越春秋云吳亡西子被殺如宋之問詩中所述則西子平吳後還會稽也説不同俱存之雲溪友議郭素儗王軒事怪僻今不取岑石在刻石山越絶云秦始皇三十七年以正月甲戍到大越取浙江岑石長丈四尺南北面廣六尺三寸東面廣四尺西廣尺六寸刻石于東山上其道九曲去越二十一里落星石在曹娥江髙七八尺每江潮至石輒不沒舊傳云星殞而結石也舊經落星石有二一在㑹稽一在餘姚皆星殞所化也按曹娥江乃二邑接境此石居江之中流屬㑹稽縣今繫于此歐陽文忠嘗得吳越國封落星石為寶石山其制稱寶正六年知其嘗改元也然落星石吳越地間有之其制所封石未詳石傘在㑹稽山之别峯唐顧况銘云亭亭石傘有物有名如盖若傾如芝一莖石傘山東山銜日宫石傘山西山銜月宫南巒北阜首出屹䧺齊抗於峯下置書堂後為精廬今夀聖院有齊相書屋遺址存焉元和初楊於陵與其屬來遊賦詩刻石熈寧初元厚之留題云竒峯如傘見遙青玉笥山頭地有靈三徑荒涼丞相隠一篇清絶放夫銘抗裔孫唐有石傘書堂詩見少㣲集飛來石在禹穴側石上有唐宋名賢題名碑鄉云賀知章題名在龍瑞宫此石所鐫者研朱石在宛委山側華初平云葛稚川既仙去遺朱研於玉笥山得丹砂之力嵗久彌大今為一巨峯鳳凰窠石在寶山西石有一圓竅深一尺廣四尺俗傳鳳毓二雛自此而能翔傍有上鳳村下鳳村新婦石在縣東㑹稽之巔石旗在白鶴山側山有石屋砥平可容數十人建炎中士大夫避地于此多得全形如張旗故名猢猻石在射的山下臨樵風涇涇水漲石常不沒里人以此候水之分寸蝦蟆石在宛委山與龍瑞宫對昔宫廩失粟蹤跡莫知盗者有方士言竊食者朝山之異物也羽流信之命工鑿石口果驗山隂縣羊石在縣西吳越偹史光啓二年錢鏐使游奕崔則守羊石磨鏡石在鏡湖任昉述異記云鏡湖世傳軒轅氏鑄鏡湖邊因得名今軒轅磨鏡石尚存石畔常潔不生蔓草吳虎臣漫錄云湖以鏡名恐不然盖鏡湖之水平如鏡面唐人詩中謂之天鏡者是也湖之上源名平水亦此義石城在石城里吳越偹史乾寧三年錢鏐討董昌攻石城去越三十里即此嵊縣石床在縣北謝靈運垂釣於此馬蹄石在縣東北傳云秦始皇東巡經此馬蹄所踐跡也諸暨縣石屏在五