body:
  text: 㑹稽志巻二宋施宿等撰王越之為國始於夏后帝少康之時封庻子於㑹稽以奉守禹之祀至春秋定公時越始見於經哀公時越始來初呉楚皆僭自王而越亦稱王允常勾踐之時越益大與呉楚爭衡北伐齊晉又六世乃為楚所滅秦併天下裂為郡縣至漢髙帝時以閩君摇為越王王閩越故地而以㑹稽等郡封劉賈為荆王賈既死無後漢復立劉濞為呉王兼有㑹稽之地濞反誅國除為郡歴後漢至三國時孫䇿孫權皆嘗封㑹稽侯孫氏之有江左實本於此東晉咸和二年封琅琊王昱為㑹稽王興寧元年復封昱為琅琊王食㑹稽宣城如舊而封昱子昌明為㑹稽王昱即帝位是為簡文帝其後昌明又為儲嗣而㑹稽之為王國猶不廢故内史領郡事而置邸建康孝武太元六年作新宫帝移居㑹稽王邸是也太元十七年乃徙封琅琊王道子為㑹稽王義熈元年封臨川王子脩之為㑹稽王宋受禅罷㑹稽郡府而㑹稽復為郡齊梁因之至陳後主乃封第八子荘為㑹稽王魏至周齊皆遥封故不錄隋開皇元年文帝封子秀為越王未幾徙封於蜀煬帝大業中封元徳太子昭之子侗為越王江左承西晉諸王開國並以户數相差為大小三品陳武帝受命自永定訖於貞明唯衡陽王昌特加殊禮命至五千户自餘大國不過二千户小國則千户隋唐以下封建之制寖廢不復唐有天下太宗封子泰為越王後徙封魏而封幼子貞為越王肅宗封子係為越王天復元年五月以鎮東等軍節度浙東西道觀察處置等使守侍中彭城王錢鏐為越王天祐元年改封呉王梁開平元年進封呉越王龍徳三年加封呉越國王寵以古列國之禮後唐同光二年復申前命同光三年始受封册建國焉天成四年又以兩鎮節鉞及杭州越州大都督府長史移授其世子元瓘以示優崇長興三年三月王鏐卒諡曰武肅子王元瓘立晉天福六年九月王元瓘卒諡曰文穆子王佐立開運四年六月王佐卒諡曰忠獻弟王倧立未幾胡進思廢王倧與羣臣迎立其弟俶漢乾祐元年王俶立是為忠懿王周顯徳四年四月亦嘗追封世宗長子宗誼為越王皇朝開寳二年申命俶為呉越國王而命俶子惟濬為杭州越州大都督鎮海鎮東等軍節度使太平興國三年四月俶朝京師五月乙酉表獻所部十三州八十七縣詔以俶為守太師尚書令兼中書令淮海國王唐季中原多故征伐自諸侯出故有天下兵馬大元帥之名已而藩鎮割據僭叛相仍唯錢氏守藩稱臣三世五主有國百年中更五代迄於本朝職貢未嘗少缺彼善於此猶為有足言者故歴序其本末云本朝端拱元年四月詔改封冀王元份為越王嘉祐四年十二月追封豫王昕為越王英宗皇帝即位追封呉王徳昭為越王徽宗皇帝命皇弟偲為太傅鳳翔山南西道節度使鳳翔牧兼興元牧兼神霄玉清萬夀宫使越王至欽宗即位授皇叔太師永興成徳軍節度使雍州牧兼真定牧越王越州奏牘公移於知州前列越王銜下書在京二字雖扈從北狩猶仍其故至紹興十年以後方省去都尉都尉漢秩二千石與太守等吾丘夀王為東郡都尉不復置太守武帝賜之璽書曰任四千石之重是也越絶外傳漢文帝前九年㑹稽并故鄣太守治故鄣都尉治山隂舊經云文帝九年山隂為都尉治葢本於此然按漢制國置中尉郡置都尉當文帝時呉㑹稽皆呉王濞封國漢固不當為置太守都尉又漢紀景帝中二年秋七月始更郡守為太守郡尉為都尉則文帝時其官稱亦未應有太守都尉之號也漢書地理志云西部都尉治錢塘又越絶外傳漢文帝前十六年太守治呉郡都尉治錢塘故舊經云山隂都尉徙治錢塘而不及太守徙治事通典云今金華縣漢烏傷縣地後漢末分為長山縣二漢置西部都尉然則西部固屢徙矣班固漢人不載西部徙治本末而越絶外傳獨載之詳如此何也又舊經云元鼎五年又立東部都尉治冶按武帝紀元鼎六年秋東越王餘善反殺漢将吏遣横海将軍韓説等出㑹稽㑹樓船将軍楊僕等擊之元封元年東越殺王餘善降詔曰東越險阻反覆為後世患遷其民於江淮間遂虚其地兩粤傳功臣表皆云元封元年始平東越其承誤如此通典云東部今臨海是也三國志太平二年二月以㑹稽東部為臨海郡按朱育云東部都尉治冶陽朔元年又徙治鄞或有冦害復徙治句章然則東部亦屢徙矣又按西漢書地理志㑹稽郡南部都尉治回浦兩粤傳漢五年立無諸為閩越王主閩故地都冶顔師古云即候官縣是也漢徙其人江淮間有遁逃山谷間者頗出立為冶縣地屬㑹稽郡後漢改為候官都尉後復分冶地為㑹稽東南二部尉東部治臨海西部治建安舊經乃不載㑹稽南部都尉葢疎畧也後漢紀順帝陽嘉元年海賊曽旌冦㑹稽殺句章鄞鄮三縣長攻㑹稽東部都尉按漢百官志建武六年省諸郡都尉并職太守無都尉之役古今注曰建武六年八月省都尉官應劭曰每有劇賊郡臨時置都尉事訖罷之又省闗都尉惟邊郡往往置都尉及屬國都尉稍有分縣治民比郡都尉佐太守掌武職甲卒至此乃有分縣治民按建安十二年分東候官之地為建安縣以屬南部都尉此殆是也又安帝永初四年初置長安雍二營都尉官注云扶風都尉居雍虎牙都尉居長安獻帝即位省扶風都尉桓帝永夀元年初置泰山琅琊都尉官注云郡冦賊不息故置延禧五年罷琅琊都尉官八年罷泰山都尉官皆事訖罷之如應注云如屬國邊郡都尉其廢置亦書之甚詳葢陽嘉元年㑹稽東部都尉亦臨事乃置事訖罷之初平中全柔以董卓之亂棄官東歸詔即拜為㑹稽東部都尉三國志芮良張紘輩皆嘗為㑹稽東部都尉亦以兵興後置也通典所載二漢置西部都尉理烏傷後漢改冶縣為候官都尉又分冶為東南二部凡此皆不常置故其治亦往往屢徙至隋大業二年詔復置都尉官大業七年勅都尉鷹揚與郡縣相知追捕羣盜後此往往不復見云内史内史本周官其見於春秋者荘公三十二年周内史過僖公十六年周内史叔興見於傳文公元年天王使叔服來㑹葬見於經傳曰王使内史叔服來㑹葬之類是也秦因之掌治京師秦又置中尉掌徼循京師漢皆因之而不革髙帝初置諸侯王地既廣大且至千里得自治其國有大傅輔王内史治國民中尉掌武職丞相統衆官羣卿大夫都官如漢朝漢為置丞相其御史大夫以下皆自置呉楚七國反景帝懲之令諸侯王不得復治國改丞相曰相省御史大夫廷尉少府宗正博士官損謁者郎中令太僕以下員秩武帝改漢内史為京兆尹中尉為執金吾故王國内史中尉如故員職皆朝廷為署不得自置成帝綏和元年又省内史更令相治民加郡太守中尉如郡都尉皆秩二千石其紹封削絀者中尉内史官屬皆以率減晉元帝渡江迺沿後漢郡國之制建㑹稽以為國復前漢之舊置内史以治國民王留京師而内史實行郡太守事受察於揚州刺史其後㑹稽内史地望寖重故王述自前㑹稽内史擢為揚州刺史而皇子道子為琅琊王領㑹稽内史事宋永初二年正月乃罷㑹稽郡府而内史復為太守太守㑹稽自秦置守漢因之其後更守為太守尉為都尉或以都尉行太守事在漢末三國時亦有以丞功曹行郡事者東晉改為内史至宋乃復為太守焉隋為總管復又改都督唐初亦沿隋制久之乃為浙東觀察使皇朝為知越州事中興初陞州為紹興府則又稱知紹興府事今掇秦漢太守以下姓名及行事之顯者著於篇秦殷通二世元年㑹稽假守漢嚴助㑹稽呉人武帝時拜㑹稽太守數年不聞問賜書曰制詔㑹稽太守君厭承明之廬勞侍從之事懐故土出為郡吏㑹稽東接於海南近諸越北枕大江間者闊焉久不聞問具以春秋對毋以蘇秦從横助恐上書謝願奉三年計最朱買臣字翁子呉人武帝時邑子嚴助貴幸薦為中大夫東越數反覆拜㑹稽太守上曰富貴不歸故鄉如衣繡夜行今子何如買臣頓首謝詔買臣到郡治樓船備糧食水戰具須詔書到軍與俱進初買臣免待詔常從㑹稽守邸者寄居飯食及拜太守買臣衣故衣懐其印綬步歸郡邸直上計時㑹稽吏方相與羣飲買臣入室中守邸與共食食且飽少見其綬守邸怪之前引其綬視其印㑹稽太守章也守邸驚出語上計掾吏皆醉大呼曰妄談耳其故人素輕買臣者入内視之還走疾呼曰實然坐中驚駭白守丞相推排陳列中庭拜謁買臣徐出户有頃長安廏吏乗駟馬車來迎遂乗傳去将兵與韓說等俱擊破東越有功入為主爵都尉任延字長孫南陽宛人更始元年拜㑹稽都尉時年十九迎官驚其壮及到靜泊無為唯先遣饋禮祠延陵季子時天下新定道路未通避亂江南者皆未還中土㑹稽頗稱多士延到皆聘請髙行如董子儀嚴子陵等敬待以師友之禮掾吏貧者輒分俸祿以賑給之省諸卒令耕公田以周窮急每時行縣輒使慰勉孝子就餐飯之呉有龍丘萇者隠居太末志不降辱王莽時連辟不到掾吏白請召之延曰龍丘先生躬徳履義有原憲伯夷之節都尉洒掃其門猶懼辱焉召之不可遣功曹奉謁修書記致醫藥吏使相望於道積一嵗萇乃乗輦詣府門願得先死備祿延辭讓再三遂署議曹祭酒萇尋病卒延自臨殯不朝三日是以郡中賢士大夫爭往宦焉第五倫字伯魚京兆長陵人建武二十九年拜㑹稽太守躬自斬芻養馬妻執炊爨受俸裁留一月糧餘皆賤貿與民之貧羸者㑹稽俗多淫祀好卜筮民常以牛祭神百姓財産以之困匱倫移書屬縣巫祝有依託鬼神詐怖愚民案論之有妄屠牛者吏輒行罰百姓以安永平五年坐法徴老小攀車叩馬號呼相隨日裁行數里倫乃偽止亭舍隂乗船去及詣廷尉吏民上書守闕者千餘人慶鴻洛陽人慷慨有義節位至㑹稽太守所在有異蹟張霸字伯饒蜀郡成都人永元中為㑹稽太守表用郡人處士顧奉公孫松等並有名稱其餘有業行者皆見擢用郡中爭厲志節習經以千數道路但聞誦聲霸始到越賊未解郡界不寧乃移書開購明用信賞賊遂束手歸附不煩士卒之力童謡曰棄我㦸捐我矛盜賊盡吏皆休馬稜扶風茂陵人和帝時轉㑹稽太守治有聲馬臻永和五年為太守創立鏡湖在㑹稽山隂縣兩界築塘蓄水水髙丈餘田又髙海丈餘若水少則洩湖灌田如水多則閉湖洩田中水入海所以無凶年其陂塘周迴三百一十里都溉田九千餘頃㑹稽記云創湖之始多淹冢宅有千餘人怨訴臻遂被刑於市及遣使按覆總不見人籍皆是先死亡者然越人至今廟祀之殷丹為㑹稽太守時郡有孝婦以誣見殺連旱二年丹到郡刑訟女祭婦墓天應時澍雨成公浮為㑹稽太守久之徴還京師劉寵字榮祖東萊牟平人拜㑹稽太守山民愿朴乃有白首不入市井者頗為官吏所擾寵簡除煩苛禁察非法郡中大化徴為将作大匠山隂縣有五六老叟龎眉皓髪自若耶山谷間出人齎百錢以送寵寵勞之曰父老何自苦對曰山谷鄙生未嘗識郡朝他時吏發求民間至夜不絶或狗吠竟夕民不得安自明府下車以來狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言邪勤苦父老為人選一大錢受之陳業上虞人為㑹稽太守潔身清行志懐霜雪貞亮之信同操栁下遭漢中微委官棄祿遁迹黟歙以求其志髙邈妙蹤天下所聞故桓文遺之尺牘之書比竟三髙王朗㑹稽太守孫䇿字伯符呉郡富春人建安二年詔䇿為騎都尉襲爵烏程侯領㑹稽太守孫權字仲謀䇿之弟曹操表權為討虜将軍領㑹稽太守顧雍字元歎呉郡呉人孫權領㑹稽太守不之郡以雍為丞行太守事討除冦賊郡界寧靜吏民歸服呉吾粲字孔休呉郡烏程人黄武元年遷㑹稽太守淳于式為㑹稽太守孫權遣陸遜討破丹陽賊帥遂部伍東三郡強者為兵羸者補户得精卒數萬人式表遜枉取民人愁擾所在遜詣都稱式佳吏曰式意在養民是以白遜濮陽興字子元陳留人為㑹稽太守樓𤣥字承先沛郡鄿人為㑹稽太守滕𦙍字承嗣北海劇人為㑹稽太守所在見稱每聴辭訟斷罪法察言觀色務盡情理車浚天璽元年為㑹稽太守在公清忠值嵗荒旱民無資糧表求賑貸皓謂浚欲樹私恩誅之郭誕孫皓時為㑹稽太守晉紀瞻字思逺丹陽秣陵人愍帝時除㑹稽内史時有詐作大将軍府符收諸暨令令已受拘瞻覺其詐便破檻出之訊問使者果伏詐妄諸葛恢字道明琅琊陽都人愍帝詔為尚書郎元帝以經緯須才承制調為㑹稽太守臨行帝置酒謂曰今之㑹稽昔之闗中足食足兵在於良守以君有莅任之方是以相屈恢曰天下喪亂風俗陵遲宜尊五美屏四惡進忠實退浮華帝深納焉太興初以政績第一詔曰㑹稽内史諸葛恢莅官三年政清人和為諸郡首宜進其位班以勸風教令増恢秩中二千石周札字宣季義興陽羨人遷右将軍㑹稽内史虞潭字思奥㑹稽餘姚人明帝詔為冠軍将軍領㑹稽内史徴拜尚書事見人物門何充字次道廬江灊人成帝時除建威将軍㑹稽内史在郡甚有徳政薦徴士虞喜拔郡人謝奉魏顗等以為佐吏孔愉宇敬康㑹稽山隂人成帝時為鎮軍将軍㑹稽内史加散騎常侍事見人物門孔安國字安國愉之子再為㑹稽内史領軍将軍事見人物門王舒字處明丞相導之從弟成帝時将徴蘇峻出舒為外援授撫軍将軍㑹稽内史秩中二千石舒上疏辭以父名音雖異而事同求換佗郡於是改㑹字為鄶舒不得已而行在郡二年而峻作逆假節都督行揚州刺史事庾冰奔舒舒率衆俱渡浙江顧衆顧颺等起義軍以應舒峻聞乃赦庾亮諸弟以恱東軍呉興太守虞潭率所領屯苞亭並不敢進舒遣子允之以精銳三千邀賊於武康破之斬首數百級賊悉委舟步走時臨海新安諸山縣並反應賊舒分兵討平之陶侃立行臺上舒監浙江東五郡軍事賊平以功封彭澤縣侯王允之字深猷舒之子咸康中為衛将軍㑹稽内史未到卒王述字懐祖司徒渾之族穆帝時遷㑹稽内史莅政清肅終日無事王愉字茂和述之子為㑹稽内史王羲之字逸少司徒導之從子穆帝永和中為右軍将軍㑹稽内史事見人物門王凝之羲之之子左将軍㑹稽内史江虨字思𤣥永和中為䕶軍将軍出補㑹稽内史加右軍将軍郗愔簡文帝輔政為輔國将軍㑹稽内史遷都督徐兖青幽揚州諸軍事領徐兖二州刺史轉冠軍将軍帝踐祚就加鎮軍都督浙江東五郡軍事因居㑹稽謝𤣥字幼度奕之子孝武帝時授散騎常侍左将軍㑹稽内史時呉興太守晉寧侯張𤣥之亦以才學顯自吏部尚書與𤣥同年之郡而𤣥之名亞於𤣥時人稱為南北二𤣥論者美之事見人物門謝琰字瑗度太傅安之子孫恩逃海島朝廷憂之以琰為㑹稽内史都督五郡軍事王藴字叔仁孝武定皇后之父都督浙江東五郡鎮軍将軍㑹稽内史加散騎常侍藴素嗜酒及在㑹稽略少醒日然以和簡為百姓所恱劉牢之㑹稽太守王薈衛将軍㑹稽内史謝輶㑹稽人㑹稽内史裴松之傳琅琊王茂之㑹稽謝輶南北之望虞嘯父征東将軍㑹稽内史孔靖字季恭㑹稽山隂人以字稱虞嘯父為㑹稽内史季恭求為府司馬不得及髙祖定桓𤣥以季恭為内史使齎封板拜授季恭便舟夜還至即叩扉告嘯父並令掃拂别齋便入郡嘯父聞桓𤣥敗震懼請罪季恭慰勉使安明旦乃移季恭到任務存治實勅止浮華剪罰遊惰冦盜止境内清肅宋孔靖之子歴顯位侍中㑹稽太守孔靈符靖之子為㑹稽太守豫章王子尚撫軍長史劉懐敬彭城人武帝以舊恩累見寵授至㑹稽太守謝方明陳郡陽夏人伯父呉興太守邈賊至被害方明告邈門生義故掩討手自刃之時荒亂之後吉凶禮廢方明合門遇禍資産無遺營舉凶事平世備禮無以加也永初三年為丹陽尹有能名轉㑹稽太守江東民户殷盛姦吏蜂起符書一下文攝相續又罪及比伍動相連坐邑里驚擾方明濶略苛細務存綱領緩民期㑹莫敢犯禁除比伍之坐判久繫之獄東土至今稱詠之承代前人不易其政有必宜改者則以漸移變無迹可尋褚淡之字仲原為㑹稽太守景平二年富陽縣孫氏聚合門宗謀逆其支黨在永興縣潛相影響縣令羊恂率吏民拒戰力少退敗賊遂盤據直攻山隂淡之自假凌江將軍以山隂令陸邵領司馬王茂之為長史孔欣謝苓之並參軍事賊遂摧鋒而前淡之遣陸邵督帶㦸公石綝廣武将軍陸允以水軍拒之又别遣行參軍漏恭期率步軍與邵合力淡之率所領出次近郊恭期等與賊戰於柯亭大破之羊𤣥保泰山南城人景平間為㑹稽太守太祖以𤣥保亷素寡欲故頻授名郡為政雖無幹績而去後常見思不營財利處家儉薄孟顗字彦仲平昌安丘人元嘉中為㑹稽太守張茂度呉郡呉人名與髙祖同以字稱元嘉十八年除㑹稽太守素有吏能在郡縣職事甚理卒官諡曰恭子竟陵王誕字休文元嘉二十六年授都督㑹稽東陽新安臨海永嘉五郡諸軍事安東将軍㑹稽太守給鼓吹一部元凶弑立以浙江東五郡立㑹州以誕為刺史顧琛為太守廬江王褘字休秀元嘉二十六年遷冠軍将軍為㑹稽太守世祖即位復為太守加撫軍将軍顔峻為東揚州刺史張裕㑹稽太守張暢字少徴呉郡呉人為㑹稽太守卒官孔顗字思逺㑹稽山隂人永光元年為尋陽王子房右軍長史加輔國将軍行㑹稽郡事晉熈王昶字休道世祖時為東中郎将㑹稽太守尋監㑹稽東陽臨海永嘉新安五郡諸軍事孝建元年立東揚州即昶為刺史東中郎将如故進號右将軍宗室思考被遇歴朝官極清顯為㑹稽太守王翼之字秀弼琅琊臨沂人徽之之孫官至御史中丞㑹稽太守顧顗之孝建元年為義陽王昶東中郎長史寧朔将軍行㑹稽郡事沈懐文字思明王子尚