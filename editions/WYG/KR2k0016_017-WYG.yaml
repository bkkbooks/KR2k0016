body:
  text: 㑹稽志巻十七宋施宿等撰草部㑹稽之産稻之美者紫珠便糧􅢸散黄秈音仙字書云秔稻也今㑹稽獨有黄秈之名它無以秈名者徽饒之間例謂小米為秈與此不同秔貫烏黏秔貫越人謂芒為黏下同其蚤熟曰蚤白稻一名囬犂望烏黏蚤白宣州蚤一名下馬㸔蚤占城蚤占城土人皆謂之金成不知何義也一名六十日相傅云唐太宗伐占城國得其種國史佯符五年上以諸路㣲旱則稻悉不登遂遣使福建取占城稻三萬斛分給江南兩浙三路轉運使令擇民田之髙卬者分給蒔之謂之早稻仍出種法示民其次則曰白婢暴紅婢暴八十日三者亦占城之屬秋初乃熟其收晚於早占城八月白紅􅢸紅蓮子上稈青一名中秋勻赤殻大張九小張九紅黏白稻泰州紅黄巖硬稈白輭稈白三者亦占城之屬午内青絲青蝦便撩撒它榖浸近兼旬芽而後撒此一種但浸一夕遽撒之也攂泥烏冷水烏山郷地寒處所宜種也下路烏紅占城八月乃刈似婢暴而晚葉裏藏謂禾秕挺然出穗之上與它稻異其得霜乃熟曰寒占城見霜稻狗蜱稻九里香七月始種得霜即熟曰黄稑後種先熟曰稑説文云稑疾熟也再熟曰魏撩刈稻之後餘樝再熟稬之屬曰長黏稬一名白稻稬師姑稬黄秈稬髙脚稬海漂來稬仙公稬旱稬陸種如粟光頭稬謂秃芒也光頭白稻稬紅黏稬自知稬暴之不變非其主不知也定陳稬晚稬一名紅􅢸稬汁釅而清馬融云今之宜城㑹稽稻米清似宜城以為酒名蓋諸􅐕為酒不如稻稬之清也紫珠稬赤殻稬金釵稬粒細多汁亦占城之屬凡五十六種職方氏云揚州荆州其穀宜稻是也山隂會稽山澤所殖大槩如此雖不盡無幾矣若通屬邑言之當不止此博詢逺考尚以俟後之君子穄稷也會稽謂之穄粟穄非粟也吕氏春秋曰飯之美者有陽山之穄髙誘曰闗西謂之􅓱冀州謂之䵖苦見反廣雅云䵖穄也字書云䵖􅓱也又云􅓱穄也釋本草者云楚人謂之稷闗中謂之􅓱先儒以為粟類或言粟之上者其辭疑而未决蓋未始深究耳大抵稷穄􅓱䵖一物而四名各因其俗為之名耳沈存中筆談云稷乃今之穄也齊晉之人謂即積皆曰祭乃其土音無他義也齊民要術精博可愛於此乃置而不辯崔寔曰􅓱黍之秫熟者一名穄亦非也今吳越澤國唯山鄉髙原有種穄者而謂之穄粟以其米頗類粟也蓋嘗考之今㑹稽山鄉所種穄其苗類黍其穗如稻殊與粟異米大於粟稈大於指而髙詩云黍稷稻粱禾麻菽麥是為八榖董仲舒云禾是粟苗汜勝之種殖書云禾即是粟説文曰禾嘉榖也粟嘉榖之實也八榖巳有禾不宜云稷復是粟明矣本草有稷而不載穄亦明稷即是穄也爾雅云粢稷郭璞注云今江東人呼粟為粢然則郭亦誤意稷為粟也按周禮疏云爾雅言粢稷者為稷是五榖長在器曰盛簠盛稻梁簋盛黍稷故曰粢盛總而言之六榖皆是粢故小宗伯云辨六粢之名物是也豈謂稷為粟哉又疏云月令中央土食稷與牛五行土為尊故知稷是五榖長許慎説文亦云稷為五榖之長韓子曰黍為五榖之長祭先王以為上盛他有類此者亦各因其説為主然以稷名粢當以爾雅為正蚤粟二月中種夏熟名蚤黄粟其别曰椎頭蚤粟晚粟五月種秋熟一名丹糠粟皮色微紅稬粟與晚粟同熟爾雅曰衆秫郭璞注云黏粟也大要稬粟為秫稻秫為稬黍稷粟皆曰秫内則有稻醴黍醴粱醴則粱亦有秫本草注云凡黍稷粟秫秔稬是也今越人不復辨秔粟皆謂之稬今從其俗木粟稈大徑寸苖如蘆髙丈餘粒比粟殊大皮黒性黏亦是秫爾鄉民但用作粢入秋始熟蓋亦黍屬北方宜黍其髙可蔽人畜野獸故北人謂之黍林越人名曰木粟以其似粟而髙大也齊民要術所引木稷木禾亦此義也月令孟秋農乃登穀注云黍稷之屬及是始熟疏云鄭司農注先種後熟曰穜後種先熟曰稑而不見穀名後鄭引詩云黍稷穜稑意黍稷皆有穜稑云百箭粟秋熟似稗而米糲性踈解鄉民以和稬粟作飯取其黏解相濟羊角粟一名章家蚤牛繩稬粟與百箭粟同時椎頭稬粟穗短而大以醸勝他粟白稈粟以稈白得名毛粟如狗尾草色黄米白他粟皆無毛本草惟青粱黄粱白粱有毛陶隠居云凡云粱米皆是粟類唐注云出蜀漢商浙間亦種之然則亦黄粱耳丁鈐粟穗生兩岐狀如丁鈐烟脂稬粟苗稈穗皆赤殆亦丹黍之屬也灰粟樹葉皆如灰藋苖頭如丹髙丈許米如莧子或云灰粟即苜蓿漢使採其種西域天子益種離宫旁者西京雜記曰苜蓿一名懐風或謂光風其花有光彩故名苜蓿懐風甖子粟本草云和竹􅄋煮作粥食之極美一名象榖一名米􅇸一名御米花紅白色似髇箭頭中有米嵩陽子曰其花四葉有淺紅暈子今醫家皆用其殻治滯下之疾而本草於本條内不載烏禾似稗見本草㑹稽鄉民直謂之稗子嵗不熟則民蓺之以代糧與黄稑同時其收倍而多熟汜勝之書曰稗既堪水旱種無不熟之時又特滋茂蕪􅁾良田畝得二三十斛宜備凶年稗米𢷬取炊食之不減粱米又可釀作酒酒勢美釅尤踰黍秫魏武使典農種之頃收二千斛斛得米三四斗嵗儉可磨食之豐年可飯牛馬漢志曰種榖必雜五榖以備災害廣雅曰大麥麰也小麥䅘也説文曰麥金也金王而生火王而死故月令仲秋乃勸種麥孟夏農乃登麥大麥立夏前熟新榖未登民屑麥作飯頼以濟飢故月令仲秋乃勸種麥毋或失時鄭𤣥注云麥者接絶續乏之榖尤宜重之西漢云士食半菽亦如今之屑麥飯也曰晚大麥穗長而子多與小麥齊熟曰六稜麥曰中蚤麥曰紅黏稬麥堪作酒皆大麥之别曰小麥小滿前熟曰蚤白麥曰松蒲麥秃芒如松房曰娜麥穗如大麥而米則小麥也皆小麥之别曰蕎七月種九月熟然畏霜得霜輒枮秋無霜則蕎大熟凶年民飢有教以寄種蕎者於麥隴間雜下蕎子麥苖未長而蕎巳刈是嵗霜晚蕎熟民頼以濟然浙東蓺麥晚有至九月者故土人亦或刈蕎而種麥董仲舒曰春秋他榖不書至於麥禾不成則書之此以見聖人於五穀最重麥禾也楊泉物理論曰粱者黍稷之總名稻者溉種之總名菽者衆豆之總名也先儒曰大豆胡豆也疏本草者大要指烏豆為大豆爾生民之詩曰蓺之戎菽戎菽即大豆后稷之所殖也爾雅曰戎菽謂之荏菽豆角謂之莢其葉謂之藿其莖謂之萁今淮潁間謂豆田為角田蓋以此會稽所産其植者曰烏豆白豆青豆褐豆赤豆菉豆茶闕豆赤小豆白小豆五月烏豆豌豆七日豆一名毛豆三收豆黒豆之小者廣志云重小豆一嵗三熟是也其蔓生曰羊角豆白豆黒者曰白眼豆一名鵲豆言班駮似鵲紫花者結實而芽紫曰紫眼豆皆一種爾其莢可蒸食蠶豆江豆刀鞘豆莢長尺餘豆顆大於棊子苽米彫壺也周官云魚宜苽疏云謂同是水物相宜爾其根生臺曰菰英是也吳中菰米為多㑹稽菰菜亦富而米絶少西京雜記云會稽顧循事母至孝母好食彫壺飯循常躬自採擷家近大湖湖中自生彫壺無復餘草竹本出會稽所謂會稽之竹箭者葢二物也戴凱之竹譜曰竹之别類有六十一焉蓋總而言之也今會稽之産曰早筀曰晚筀曰黄筀曰緜筀曰箭箭之别名曰篠箭為矢材故亦謂矢為箭爾雅曰䈚箭萌音徒哀反周禮有箈菹筍菹鄭康成云竹萌曰筍箭萌曰箈音迨曰䈥竹曰慈竹酉陽雜爼云䈥竹筍未成時竹堪為弩絃慈竹夏月經雨滴汁下地生蓐似鹿角色白食之巳痢曰水竹曰桃枝竹作篾殊韌堪織簟書云篾席黼純孔安國云篾桃枝竹也曰石竹桃枝石竹小而宻人家多植之以當籬援謝靈運山居賦云水竹依水生甚細宻吳中以為宅援然水竹大者圍數寸其細宻乃不能如桃枝石竹也曰黄苦曰青苦曰白苦曰紫苦是四苦亦出山居賦曰頓地苦堅中可以為矛曰掉顙苦節疎曰湘簟苦曰油苦曰石班曰烏末曰淡竹曰刼竹今會稽煮以為紙者皆此竹也苦竹亦可為紙但堪作㝠錢耳曰湘班曰金竹一名閃竹曰角竹曰紫竹曰油竹曰木竹堅中曰方竹曰公孫竹髙不盈尺可為几案之玩篠之葉曰箬凡此非土産則不録爾雅曰莽數節桃枝四寸有節㔂堅中簡筡中一疏一數一虚一實亦以見竹之類不一也黄魯直以為竹種類至多而著為書如竹譜之類皆不詳欲作竹史一書竟不果成山海經曰竹六十年易根易根必花實而枯死實落土復生六年而成疃了作穗似小麥竹花曰復死曰䈙丈九切唐末隴西民饑相食是年忽山中竹皆放花結子色紅而纎舂治作飯香美珍於秔稻民相挈就食如市或雜葷肉食之輒中毒嘔􅎪有斃者自此竹皆立枯政宣間越州竹生花徐州柏生花太師蔡京賀表云獨挺嵗寒之節誕敷朝艶之容百蕚勻紅耀鶴棲之舊􅆬七枝競翠佇鳳實以來儀議者謂竹生花則實而枯非可賀也竹性亦喜東南引生故古之種法云斸取東南引根於園角西北種之乆之自當滿園語曰西家種竹東家治地言其滋引而生來也漢書曰齊魯千畝桑渭川千畝竹此其人皆與千户侯等荇爾雅曰莕接余亦或謂之鳬葵故㑹稽人亦謂之荇菜叢生水中莖如釵股葉在莖端隨水淺深陸機爾雅疏云接余上青下白鬻其白莖以苦酒浸之脆美可案酒蘋韓詩曰沈者曰蘋浮者曰藻蓋藻萍類也似槐葉生道旁淺水中與藻雜至秋則紫今會稽謂之馬藻亦呼紫薸藻水草之有文者生乎水下而不能出水之上孔子曰管仲鏤簋而朱紘山節而藻棁説者以為藻取其文蓋藻非特為取其文亦以禳火今屋上覆橑謂之藻井取象於此風俗通曰殿堂宫室象東井形刻作荷菱所以厭火與此同義海藻爾雅曰􅙛海薻如水藻而大似髪黒色生深海中陳藏器本草以為爾雅所謂綸似綸組似組東海有之正為二藻也善療瘤癭夫頸處險而癭今汝洛間多焉而浙右閩廣山嶺重阻人鮮病之者按本草海藻昆布青苔紫菜皆療瘤癭結氣被海之邦食此故能療之也蔆一名芰屈到嗜芰即此是也亦名薢茩説文云楚謂之芰秦謂之薢茩越人謂小者為刺菱大者為腰菱今俗但言菱芰諸草木書亦不分别惟武陵記云四角三角曰芰兩角曰菱其花紫色晝合宵放隨月轉移猶葵之随日也越中所産進羅文菱最大即所謂腰菱也虞蓼此即蓼之生水澤者也詩曰其鏄斯趙以薅荼蓼荼陸草也蓼水草也以薅荼蓼則髙下無所不治且因暑雨化之則草不復生而地美蓋非特去草之害亦以醲其田疇故荼蓼朽止於是黍稷茂止也月令季夏燒薙行水利以殺草如以熱湯可以糞田疇可以美土疆此之謂也詩曰未堪家多難予又集於蓼蓼言辛苦也吳越春秋曰越王念復吳怨卧則切之以蓼冬則抱氷夏則附火其刻志如此芡葉似荷而大生而有芒刺越人云荷華日舒夜歛芡花晝合宵放此隂陽之異也方言曰北燕謂之䓈青徐淮泗之間謂之芡南楚江淮之間謂之雞頭或謂之雁頭周官籩人加籩之實菱芡栗脯所謂籩豆之實水陸之品也今山隂梅市之雞頭最盛有一户種及十八里者然亦有數等小白皮最佳大白皮中白皮其皮頗堅難齧黄嫩又太輭皆不逮也其柄又可為葅甚美越人謂之藕梗其實芡柄耳苹一名蓱無根而浮常與水平故曰苹也會稽謂之薸言無定性漂流隨風而巳周官萍氏掌水禁鄭氏云以不沈溺取名蓋使之㡬酒謹酒也月令季春日萍始生舊説萍善滋生一夜七子一曰萍浮於流水則不生於止水則一夕生九子故謂之九子萍淮南子曰夫萍樹根於水木樹根於土天地之性也世説楊華入水化為浮萍不知信否水仙本名雅蒜元祐間始盛得名黄魯直張文潛皆極稱之魯直初以為可比梅故曰乞與江梅定等差既而曰但枝不及梅耳故又曰只比江梅無好枝今山隂此花有兩種一曰水仙一曰金盞銀臺金盞銀臺香既差減格韵亦稍下故徐師川水仙詩曰金盞銀臺何足比也園丁以為此花六月并根取出懸之當風八月復種之則多花或曰多糞之花自多又曰但勿移三四年數灌溉之而巳不必他法也荷總名也華葉等名具衆義故以不知為問謂之荷也昔人正名百物有是哉故曰萬物有成理而不説郭璞以為芙渠一名芙蓉按説文未發為菡􅣿巳發為芙蓉芙蓉華之號也蓋亦通曰芙蕖毛詩傳云荷芙蕖也其華菡􅣿説文以為其華曰芙蓉其秀曰菡􅣿其實曰連蓮之茂者曰華今其的中有青為薏皆倒生兩芽一成芰荷一藕荷也又生一芽為華蕅荷帖水生蕅者也芰荷無蕅巻荷也與華偶生出乎水上亭亭如繖是亦謂之伎荷薏音意伎立也山隂荷最盛其别曰大紅荷小紅荷緋荷白蓮青蓮黄蓮干葉紅蓮千葉白蓮大紅荷多藕小紅荷多實白蓮藕最甘脆多液千葉蓮皆不實但以為翫耳出偏門至三山多白蓮出三江門至梅山多紅蓮夏夜香風率一二十里不絶非塵境也而遊者多以晝故不盡知藕爾雅曰其本蔤其根藕蓋莖下白蒻在􅅺中者曰蔤藕偶生又善耕泥引長故藕之文从耦名之亦曰藕趙辟公雜記曰藕能移鯉能飛龍能守越人皆六七月間藕最佳謂之花下藕又特出羅文在禹廟前他皆不逮其梢纎細者可和芥為菹甚美芹詩曰觱沸檻泉言采其芹水菜也一名水英爾雅謂之楚葵列子以為客有獻芹者鄉豪取而嘗之蜇於口慘於腹也芹實嘉蔬今和芥或以醯醬和之為菹絶妙列禦冦之言殆出北方未嘗食芹者爾越城白馬山産芹最美蓴字一作蒓泮宫曰思樂泮水薄采其茆茆即蓴也乆食大宜人合鮒魚食之佳尤宜老人葉如荇菜而紫莖大如箸柔滑可羮齊民要術云蓴性易生水深則莖肥而葉少小淺則葉多而莖瘦陸士衡云吳中有千里蓴羮但未下鹽䜴爾然蕭山湘湖之蓴特珍柔滑而腴方春小舟采蓴者滿湖中山隂故多蓴然莫及湘湖者或云温病起者勿食犯之輒死蘜爾雅曰蘜治蘠今之秋華鞠也月令季秋云蘜有黄華曰有者非其有之時也春秋傳曰有者不宜有也周官后蠶服鞠衣鞠衣色黄象鞠鞠蓋華於隂中其華則又中之色也故鳥獸草木之名孔子欲學者之多識而記禮者以為衣服在身而不知其名為罔也㑹稽昌安門内朱通直莊有佳菊數十種劉寄奴治金瘡其詳見宋武帝紀此其得名之始也本草總云生江南中禹錫注云出越州日華子主治心腹痛止霍亂暴下今鄉民每腹痛輒煮飲其汁亦多騐馬兠鈴本草日華子注云越州七八月採玉芝出陶宴嶺一名鬼臼一名山荷葉一名唐婆鏡花色正紅生葉下故又名羞天花其根一嵗生一臼取其臼以麫如餛飩皮裹炊熟吞之日三枚可以辟穀令人精神旺而力不衰蓋仙藥也本草注云亦出會稽一名九臼忍冬一名老翁鬚一名金銀藤一名毛藤一名鷺鷥藤一名鴛鴦藤出秦望山鵞鼻山三山及鏡湖中水涯香如荼蘼茉莉之屬亦可植園圃軒檻為架承之治疽瘡解百毒有竒效醫家類能言之故不詳載蕨爾雅曰蕨虌初生無葉可食狀如大雀拳足黄魯直詩云蕨芽新長小兒拳蓋此意齊魯曰虌廣雅曰蕨紫藄非也爾雅曰藄月爾郭璞注云藄即紫藄也似蕨可食郭注亦非也今會稽山間有一種似蕨而毛紫色土人謂之蕨藄亦謂之毛蕨乃不可食鄉人但以藏繭及藉楊梅取其性疎而不浥􅉱也蕨青而藄紫故曰紫藄也今㑹稽人以蕨配笋為茹尤珍美東坡詩云慚愧春山筍蕨甜是也大蓼一名馬蓼莖大而赤生水澤中髙丈餘説文云蘢天蘥也詩曰山有扶蘇隰有荷華山有橋松隰有游龍蓋一名遊龍橋髙也遊縱也以縱故謂之龍上聳曰橋山海經曰其上多喬木而鄭讀曰槁誤矣山隂池澤所在有之葛性柔韌蔓生可衣女事之煩縟者故葛覃引以為賦蓋知稼穡之艱難則可以為王矣知女功之勤勞則可以為王后矣夫禮后織𤣥紞今乃親葛事如此者蓋王后親蠶以勸女功之正事親葛以勸女功之餘事絲麻者本事也葛者餘事也葛所以為絺綌也今五雲門外有葛山焉吳越録曰越王種葛於此其民歌曰嘗胆不苦味如飴令我採葛以作絲是也蕺蕺山所産最多葉似蕎麥肥地亦能蔓生莖紫赤色多生山谷隂處吳越春秋云越王嗜蕺嘗採於此故以山名本草云闗中謂之葅菜齊民要術亦有蕺葅法然生擷之少有臭􅂔凶年民斸其根食之諺曰豐年惡爾臭荒年頼爾救菰菜菰蔣草也江南呼為茭草秣馬甚肥爾雅云出隧蘧蔬郭璞注云似土菌生菰草中今江東啖之音同氍㲣蓋一名出隧也張揖云氍㲣毛席取其音同本草注云生江東池澤菰葑上如菌葑是菰根嵗乆浮在水上者葑越人讀如諷刺之諷暴乾可供然燒吕氏春秋曰菜之美者越路之菌是也今謂之茭首蓋茭心生臺至秋如小兒臂其白如藕而軟美異常每年移根濯洗極潔種之則無黒脉經年不種則黒脉生矣本草名菰首乃知俗謂之茭首亦有所本昌蒲今㑹稽有一種葉有脊如劍謂之雁蕩昌蒲生石上節疎宻當不止一寸九節也今人多以拳石或沙中種之為几案之翫陶貞白言真昌蒲古人謂之蘭蓀四月五月亦作小釐花也今東間溪側又有名溪蓀者根形􅂔色極似石上昌蒲而葉正如蒲無脊俗亦呼為昌蒲誤矣此物但能辟蚤蝨不堪服食即今之水昌蒲一名白昌一名昌陽韓退之云訾醫師以昌陽引年是也此物種之易茂但須嵗一移種則根大不然漸小周禮朝事之豆有昌本靡臡説者謂昌本昌蒲根切之四寸為菹左傳饗有昌歜白黒形鹽服氏云昌歜昌本之菹然四寸切之恐非溪蓀之根不如是之大則通謂之菖蒲可也香草之類大率多異名所謂茝即今之白芷是也蕙即零陵是也芸今七里香是也葉類豌豆作小叢生其花極芬香經秋葉間㣲白如粉汗辟蠧殊騐蒲萄盛於西北㑹稽有漿水馬腦二種味亦佳魏武有言末夏涉秋尚有餘暑酒醉宿酲掩露而食甘而不飴酸而不酢庾信言北地園種户植接䕃連架今會稽雖富有此果然俗乃謂不利主人果成主多徙去故居室忌種之又俗謂梓芭蕉皆不利主民廬了無一本惟士大夫園宅及僧寺乃時有之凌霄花天下凌霄藤必依大樹獨西都富鄭公園歸政堂前一株不附他木而生髙三四丈嵗着花數百晁以道寄季申詩云故園多謝凌霄木直到丹霄上上頭蓋指此也今山隂最多有一嵗三着花者三白草出鏡湖澤畔初生不白入夏葉端方白農人候之以蒔田三葉白苖畢秀矣菘性陵冬不彫四時長見有松之操故其字㑹意而本草以為久耐霜雪也舊説菘菜北種初年半為蕪菁二年菘種都絶蕪菁南種亦然蓋菘之不生北土猶橘柚之變於淮北蕪菁即蔓菁似菘而小有臺一名葑一名須爾雅曰須薞蕪也方言曰陳楚之間謂之豐趙魏之郊謂之大芥其紫華者謂之蘆菔一名來菔所謂温菘是也來菔言來麰之所服也今浙西種蕪菁者寖多臨安亦盛惟越土不宜漢桓帝詔曰横水為災五榖不登令所傷郡國皆種蕪菁以助民食此可以度凶年救饑饉往嵗會稽嘗有人種乃不生根乆亦變為菘張石史文潛詩云蔓菁至南皆變菘其美在上根不食是也䪥種法一本率七八支諺曰葱三䪥四言種葱者三支一科䪥即四支之多者科輒圓大故䪥本難㧞古以㧞䪥譬强宗乃取此義爾雅曰䪥鴻薈即此是也葱亦薤屬齊民要術以為種葱良地三翦薄地再翦八月止不止則葱無袍而損白蓋葱青謂之袍會稽園夫蓺葱有兩等其小而美者曰太官葱韭者乆也一種永生説文曰一種而乆者故謂之韭内則曰膾春用葱秋用芥豚春用韭秋用蓼葱與芥隂物也韭與蓼陽物也𤓰性惡香尤忌聞麝麝氣觸之乃至一蔕不收詩曰綿綿𤓰瓞大曰𤓰小曰瓞爾雅曰𤓰曰華之桃曰膽之華取譬於華膽取譬於膽禮為天子削𤓰副之巾以絺為國君削𤓰華之巾以綌蓋華若草木之華副絶而不屬華析而不絶墨子曰甘𤓰苦蔕天下物無全美也越有銀𤓰握青𤓰筭筩𤓰握青謂其小可藏握中銀以色名筩以狀名又有蜀阜𤓰圖經越有蜀阜山豈以是得名與吳桓王時㑹稽嘗有五色𤓰出述異記莧有紅莧白莧紫莧三色今會稽園蔬但白莧爾傳曰青泥殺鱉得莧復生今人食鱉忌莧其以此乎紅莧一名馬齒莧本草云節葉間有水銀每莧十斤可得水銀多至十兩水銀曰汞會稽謂草芽亦曰今人呼刺菜之類是也凡草大率多汞故曰今夫挺然茂擢者汞使之然也故曰汞貢而上鈆㳂而下豈獨草為然哉苦蕒即苦􅛧字書云苦􅛧江東人呼為苦蕒野生今會稽市中所賣乃園蔬肥嫩不澁與萵苣不逺然野苦蕒擷五六過則味益甘滑反勝種者舊説云蠶婦忌擷苦蕒手有苦蕒氣令蠶蛾青爛食之者亦忌入蠶室蓋苦蕒氣能損蠶今人多不以為意何也􅛧音巨亦作苣杜少陵詩序有云苦苣馬齒掩乎嘉蔬則苦苣當非美茹矣薑字林云薑御濕之菜茈音紫生薑也潘尼云南夷之薑博物志云妊娠不可食薑令子盈指生犍為州谷及荆揚之土陶𢎞景云乾薑今唯出臨海章安兩三村解作之蜀漢薑舊美荆州有好薑並不能作乾者今綿州乾薑為天下第一臨海乃不聞出乾薑豈以緜薑大售故不復作邪薑畏日而喜露故薑棚覆以干干亦苕之屬也葉旁銛利若干戚之干故得名夜冷露零則干巻而薑濡日出書燠則干舒而䕃濃性與他草木異故越人種薑必覆以干蒜一名葫取其條上子初年種之成獨子葫明年則復其本也廣志曰蒜有胡蒜小蒜黄蒜長苖無科王逸曰張騫周流絶域始得大蒜葡萄苜蓿南人或謂之齊葫又有澤蒜齊民要術有種澤蒜法或作齏以噉鱠此物煮羮臛極美足為饌中之俊陶云不中煮自當是未經試耳本草謂能伏邪惡禮云膳於君有葷桃茢葷菜所以辟凶邪也近世以炙癰疽率得竒效其法切蒜如崇寜錢厚置患處灼艾丸其上痛則易蒜可至百壯初覺即灸蚤灸無不愈者會稽山間又有鹿木治疽神良取根以醇酒煎飲之藴毒悉解蓋叢灌小木爾葉如水楊而長近花處則葉圓花為穗色紫茄一名落蘇越人乃止謂之落蘇酉陽雜爼云嶺南茄子宿根成樹髙五六尺又云花時取葉布行路以灰規之人踐之子必繁謂之嫁茄子四時纂要以十二月晦嫁樹齊民要術以元日及上元日嫁李亦此意也今㑹稽有水茄亦名銀茄云是新羅種形如雞卵隋大業末名茄子為崑崙紫𤓰出芝田録黄魯直詩云君家水茄白銀色殊勝垻裏紫膨脝蜀人生疎不下箸吾與北人俱眼明是也莎釋草云臺夫湏可以為笠又可以為蓑疏而無温詩曰臺笠緇撮又曰南山有臺莎之别種曰侯莎此草易茂嵗嵗繁滋薙之一日巳復生㑹稽人惡之常苦其不能去然北方以罕有貴之唐河南西士曹有莎㕔晏元憲在許亦作庭莎記是也其根亦見本草謂之莎根今俗乃謂之香附子木部楸釋木云大而皵楸小而皵榎述異記云越人多橘柚園嵗出橘税謂之橙橘户中山又有楸户著名楸籍者也舊説椅即是梓梓即是楸蓋楸之疏理而白色者為梓梓實桐皮曰椅其實兩木大類同而小别也傳曰橋者父道也梓者子道也然今越人不喜種楸云不利人家惟僧居則否十道志云越城多種豫章樹每風雨時聞鐘鼔聲今無復存豫章即梓也松其為木也最夀郭氏𤣥中記曰松脂淪入地中千嵗為茯苓抱朴子曰松樹三千嵗皮中聚脂如龍形名曰飛節芝玉策記曰千嵗之松望之如偃蓋今㑹稽惟卧龍乃蕺山絶頂僅有數樹為百年之木耳榖惡木也而取名於榖者穀善也惡木謂之榖則甘草謂之大苦類也本草曰楮一名榖陶氏云即今構木誤矣先賢以為皮斑者是楮皮白者是榖有瓣者曰楮無瓣者曰構古之剡藤名天下今剡中楮紙寖有佳者亦不在徽池之下桃之品不一上原之金桃御桃擺核桃十月桃廟山之早緋紅桃湖南之大緋紅桃蕭山之水蜜桃唐家桃邵黄桃杏桃川桃晚秋桃孩兒面桃諸暨烏石之鷹觜桃諸家園中有崑崙桃扁桃矮桃之類不可悉數又有碧桃白桃緋桃二色桃皆千葉花不實今鏡湖之西如花涇容山諸處彌望連岡接嶺皆桃李畧無雜木方春時花盛發如錦繡裹山谷照水如雲霞恍然異境邦人踏青時競出皆走東湖故有不知者甘棠釋木云杜甘棠甘棠今之杜棃也又曰杜赤棠白者棠樊光云赤者為杜白者為棠市人多蒸熟賣之越人目為棃頭蓋其實不如北方之美爾然㑹稽非棃所出姑舉大槩如桃源之水蜜棃紅麋棃木柵之馮家梨映日紅破塘之青消棃河塔之五朶棃東闗之葫蘆梨諸暨烏石之蚤稻棃滿殿香棃卄兩棃孝義之蜜棃雪棃白水之黄匾棃黄麋棃前塘之趙抝棃上金之麻盫棃是也自烏石以下皆諸暨地名梅一名柟杏類也越州昌原梅最盛實大而美項里容山直步石龜多出古梅尤竒古可愛緑蘚封枝苔鬚如緑纓疎花㸃綴其上夭矯如畫山谷間甚多樹或䕃數十步好事者移植庭檻縱不槁苔蘚亦輒剥落蓋非凡物也今江湘二浙四五月之間梅欲黄落則水潤土溽礎壁皆汗蒸欝成雨其霏如霧謂之梅雨沾衣服皆敗黦故自江以南三月雨謂之迎梅五月雨謂之送梅轉淮而北則否梅至北方多變而成杏故人有不識梅者地氣使然也賈思勰曰按梅花早而白杏花晚而紅梅實小而酸杏實大而甜梅可以調羮杏則不任此用世人或不能辨言梅杏為一物此則北人不識梅也越中又有映水梅其實甚美而頰紅消梅其實脆而無滓其始傳於花涇李氏故或謂之李家梅越人謂鴨脚子為杏而謂杏為杏梅棗棘大者棗小者棘蓋若酸棗所謂棘也於文重束為棗並束為棘蓋棗性喬棘則低矣故其制字如此蕭山縣有白蒲棗水菱棗馬棗亳州棗木棗諸暨有棘子其實圓九花九實謂之九熟棗近城亦有之然不及也石榴舊説以枯骨置枝間石壓其根則結子繁盛今越中石榴葡萄斫枝挿土中輒生不須種也郡齋舊有海榴亭李公垂有詩宋考功在㑹稽亦有玩郡齋海榴詩李義山詩有云山榴海栢枝相交恐海榴各是一種橘如柚而小白花赤實蓋亦渡淮而變考工記所謂橘踰淮而北為枳橙亦橘屬若柚而香物類相感志曰葉有兩刻缺者是也杜荀鶴送人遊越詩云有園皆種橘無渚不生蓮栗味鹹北方之果也有莍蝟自裹國語曰婦䞇不過棗栗以告虔也今諸暨孝義有茅㮚榛㮚筆談云茅則莊子所謂狙公賦芧者此文相近之誤也或謂諸暨有三如曰如錦之桑如絲之布如拳之㮚柿之别亦多今㑹稽所產有紅柿牛心柿烟脂柿系紅柿八月白柿重暈柿花柿木柿丁香柿及長紅團紅白紅之名又有緑柿㑹稽謂之椑故有油椑馬蹄椑文選有梁侯烏椑之柿殆此類歟上虞有蠟柿亦椑之别也古云柿有七絶一夀二多隂三無鳥窠四無蟲五霜葉可玩六嘉實七落葉肥土楊梅異物志曰楊梅如彈丸味酸蓋昔人未識㑹稽楊梅今出項里何塔六峯塘裏其品之最佳者曰官長梅色深紫香味俱絶曰線梅一名稜梅其實有紋隆隆如線故名色尤紫實大核小亦可亞官長梅也曰烏漤梅色黒而韵下曰孫家梅色紅而酢越人多漬以糖或鹽以案酒曰聖僧梅色白曰白蔕梅曰何塔蚤梅曰金家晚梅曰三線梅斯為下矣方楊梅盛出時好事者多以小舫往遊因置酒舟中髙飣楊梅與樽罍相間足為竒觀婦女以簪髻上丹實緑葉繁麗可愛又以雀眼竹筥盛貯為遺道路相望不絶識者以為唐人所稱荔支筐不過如此李釋木云休無實李言李有美䕃可休則無實可食故道旁之李所以不食者苦也郭璞云休無實李一名趙李痤接慮李今之麥李駮赤李其子赤也西京雜記曰漢武上林苑有朱李黄李紫李緑李青李綺李青房李車下李顔囬李合枝李羌李燕李猴李鄴中記曰華林園有春李冬華春熟廣志有黄建李青皮李馬肝李然則李之屬其品為多㑹稽有蠟李麥熟李迎𤓰李皺李白淡李紫末李五夫有風山李蠟𤓰李諸暨有井亭李餘姚有粉翠李茄李其實類茄七夕後始熟柰晉起居注嘉柰一蔕十五實或七實生於酒泉西京雜記曰漢上林苑有白柰緑柰武帝内傳有圓丘之紫柰㑹稽有果名棎亦柰屬也方棎花開時鏡湖上容山項里間亦數百樹為園春花特甚亦可喜也其佳品曰馬面棎林禽與柰絶相似但差小所謂來禽吳越時有錢仁俊貶於㑹稽所居有林禽一本枯巳十年及是茂盛多實已而仁俊果復用山茶酉陽雜爼云山茶葉如茶樹髙丈餘葉大盈寸色如緋十二月開一説山茶似海石榴出桂州蜀地亦有然今㑹稽甚多昌安朱通直莊有樹髙三四丈者蜀地乃絶少成都海雲寺僅有一樹每嵗花發則蜀帥率郡僚開燕賞之邦人競出士女絡繹於路數日不絶梔子諸花少六出者惟梔子花六出陶貞白言梔子翦花六出刻房七道芬香特甚相傳即西域薝蔔也今㑹稽有二種一曰山梔生山谷中花瘦長香尤竒絶水梔生水涯花肥大倍於山梔而香差減近嵗有千葉梔六月初始盛韓退之云芭蕉葉大梔子肥蓋謂水梔也藥亦用之然必用山梔牡丹歐陽公花品序云牡丹出丹州延州東出青州南出越州惟洛陽者天下第一王文公有越人以幕養花詩二首吳越時錢傳瓘為㑹稽喜栽植牡丹其盛若菜畦其成叢列樹者顔色葩房率皆絶異時人號為花精㑹稽光孝觀有牡丹亦甚美其尤者名醉西施熙寜間程給事公闢鎮越嘗領客賞焉公與坐客皆賦詩刻石觀中詩存而花亡曹娥廟前牡丹二株亦不凡雖單葉而着花至數百苞至今存杜鵑花以二三月杜鵑鳴時開一名映山紅一名紅躑躅㑹稽有二種其一先敷葉後着花者色丹如血其一先着花後敷葉者色差淡近時又謂先敷葉後着花者為石巖以别之然鄉里前輩舊但謂之紅躑躅尚未謂之石巖不知石巖之名起於何年荆公送黄吉父歸臨川詩云亦見舊時紅躑躅為言春至即傷心則江西亦謂之紅躑躅也越人多植庭檻間結縛為盤盂翔鳳之狀惟法華山奉聖寺佛殿前者特異樹髙與殿簷等而色尤紅花正發時照耀楹桷牆壁皆赤舊例花苞欲拆時寺僧先期以白郡守府倅率郡僚徃燕其下邦人亦競出乆之寺僧厭其擾隂戕之今枯已二十年郡齋有杜鵑樓今廢李公垂有詩自注云樓前植杜鵑因以為名王性之詩云杜宇啼時花正開是也法華雲門諸山皆有之上虞縣南有釣䑓山山足二石筍特起五六十尋其顛皆有花春夏照爛望之有若人立而飾其冠冕者自國朝太祖太宗真宗遏宻之時花枯瘣者皆三載乃復此齊賢良唐所記也蟲部蜂有兩衙應潮其主之所在衆蜂為之旋繞如衛誅罸徴令絶嚴有君臣之義一名蠟蜂蠟生於蜜而天下之味莫甘於蜜莫淡於蠟崖蜜生崖石空中山隂法雲寺僧云毗村民家墓木空中有蜂集焉嵗得蜜甚多或嫉之投燎焚之蜂衛其主不去盡死亦可異也螢月令季夏曰腐草為螢一名挾火一名據火一名熠燿一説螢非熠燿熠燿行蟲爾今卑濕處有蟲如蠶蠋尾後載火行而有光俗謂之熠燿越人謂此物多則有年又謂入人室則有客至蝶蛺蝶粉翅有鬚一名胡蝶列子曰烏足之根為蠐螬其葉為胡蝶胡蝶胥也嘗見園蔬其葉有為蝶者三分二巳蝶矣其一尚葉也又嘗見山隂澤中木葉化蝶亦如此干寳曰稻成蛬麥成蛺蝶豈虚語哉蠶陽物也惡水淮南子曰蠶食而不飲蟬飲而不食蝣不食不飲再蠶謂之原蠶一名魏蠶以晚葉養之先王禁焉淮南子曰原蠶再登非不利也然王者之法禁之為其殘桑也鄭云蠶為龍精月直大火則浴其種是蠶與馬同氣物莫能兩大禁原蠶者為害馬歟然則原蠶有禁非特欲以䕶桑又以害馬故也今蠶負馬迹亦其騐歟土人謂之夏蠶亦曰熱蠶亦曰晚蠶自世衰道㣲先王之禁不行而民間一嵗至有三蠶者矣是以蠶弱而馬耗也蠶書曰飼蠶勿用雨露濕葉蓋蠶性惡濕大抵春蠶多四眠餘蠶皆三眠越人謂蠶眠為㓜謂之㓜一㓜二㓜三㓜大蠶死則謂之眠熟故諱之而謂之㓜魚部鯔色黒如緇衣故曰鯔魚本草云生江海淺水中今㑹稽瀕海處皆有之魚之最美者故吳王與㑹稽介象論鱠之美乃䧟地置鈎餌果得鯔焉侍中徐景山云􅆩嗜鯔魚乃不避死餘姚瀕海以桃花時為絶勝鱸鏡湖中小者纔數寸許最珍海鱸絶有大者煮熟則韌瀹以沸湯亟取乃肥美可食張季鷹為齊王東曹掾在洛見秋風起因思吳中菰菜蓴羮鱸魚鱠曰人生貴適意耳遂命駕歸鯉今㑹稽池澤中亦十餘斤魚惟鯉最夀有至千嵗者故曰詹何之釣千嵗之鯉不能避也越人謂鯉之小者為鯉花鱸之小者謂鱸靸鯽之小者為鯽核鱧之小者為醴賸鮎之小者為鮎箆皆莫詳其義鯽一名鮒吕子曰魚之美者洞庭之鮒鮒小魚也故易曰井谷射鮒莊子曰車轍中有鮒魚焉鏡湖中鯽纔數寸酉陽雜爼曰東南海中祖州鯽長八尺食之宜暑而避風潯陽有青林湖大者亦二尺可止寒熱越人謂鯽喜聚遊鯽言相即鮒言相附蕭山湘湖之鯽珍美為越中之冠鱓舊説是荇苓根所化又云是人髪所化今其腹中自有子不必盡是變化也府學大成殿前池中有鱓其大㡬二尺圍嵗旱池涸有見之者後漢楊震傳有冠雀銜鱣魚集講堂前注云冠雀鸛也鱣鱓也蓋古字多通用鱨性浮而善飛躍故一曰揚今黄鱨魚是也陸璣曰今黄頰魚燕頭魚身頰骨正黄魚之有力解飛者一名黄揚舊説魚膽春夏近下秋冬近上土人謂之黄鱨亦曰白條魚鱅鰱鱮也弱鱗而色白北土皆呼白鱮西征賦曰華魴躍鱗素鱮揚鬐傳曰連行魚屬以其性旅行也上林賦有鰫魚音常容反注云似鰱而黒然則二物也六韜曰緡隆餌重則嘉魚食之緡調餌芳則庸魚食之鱅庸魚也魚之不美者㑹稽諸暨以南大家多鑿池養魚為業每春初江州有販魚苖者買放池中輙以萬計方為魚苖時飼以粉稍大飼以糠糟乆則飼以草明年賣以輸田賦至數十百緡其間多鱅鰱鯉青魚而已池有僅數十畝者旁築亭榭臨之水光浩渺鷗鷺鵁鶄之屬自至植以蓮芡菰蒲拒霜如圖畫然過者為之躊躇漢書曰水居千石魚陂與千户侯等蓋謂此也石首魚本草云和蓴作羮開胃益氣加鹽暴乾食之名為鮝音想土俗愛重以為益人雖乳婦在蓐亦可食至為之語曰此飬人之魚也炙食之主消𤓰成水魚初出水能鳴夜視有光又野鴨頭中有石云是此魚所化舊説北人有寓南海者夜視糞筐中有光燭之但魚頭耳去燭復然以為不祥及啓食奩窺其餘臠亦有光益恐明日詢之土人乃知此海魚之常近嵗舟行蕭山道中晦夕潮汛甚大溢入漕渠鹹水為船頭所激爍爍有光以篙擊水迸散如星火嶺表異物志云遇夜隂晦海波如燃水有月即不復見海中魚蝦置暗處則有光又引木𤣥虚海賦云隂火潜然本草固巳言之蔡謨食彭蜞瀕死歎曰讀爾雅不熟㡬為勸學所誤事類於此春魚似石首而小嵗以仲春至豈以此故得名歟鹽浥而乾之名曰含肚見大業拾遺記越人饁耕以含肚鮝為上饌傭耕者至有置不敢食包裹歸為親養者或不設則皆不樂梅魚小於春魚而頭大最先至一曰當名麋魚以善爛得名比目魚一名鞋㡳魚爾雅云東方有比目魚焉不比不行其名謂之鰈音牒説文云音土盍反土人謂之箬魚以其形似箬也上林賦一名魼音去魚反注云比目魚也狀似牛脾細鱗紫色鮆爾雅云鮤鱴刀注云今之鮆魚也亦呼為魛魚然有二種魛魚堪鱠亦曰刀鮆説文云飲而不食刀魚也九江有之今當塗建業瀕江所產甚美㑹稽謂之江鮆其小者謂之海鮆春時子多而肥為差勝耳銀魚浙河以北所產大如指此州所有僅如箸末然軟美過之博物志謂吳餘鱠魚云是孫權食鱠棄其餘水中化為魚也樵風涇酒甕山下間有之甚一大烏鰂舊説烏鰂有矴遇風則虯前一鬚下矴一名䌫風魚風波稍急即以鬚黏石為䌫遇大魚輒噀墨周其波以衛身害若小鰕魚過前則吐墨涎惹之南越志曰烏賊懷墨而知禮其腸名鱁鮧宋明帝好食蜜漬鱁鮧然古所謂餹蟹如何𦙍嗜餹蟹鍾􅖺謂蟹之將餹躁擾彌甚之類皆謂糟蟹耳當時語如此沈存中以為蜜漬鱁鮧之比又云北人嗜甘故魚蟹加糖蜜皆非也好食蜜漬鱁鮧乃宋明帝豈北人闕淮浙貢酒漬車螯柱謂之蜜丁曽子開有蜜丁詩然實未嘗用蜜也蜜鱁鮧類此史官妄加漬字爾水母一名蝦䖳閩人直曰䖳大小不等形如覆㡌而無口眼今三江斗門海浦潮退人可拾取常有蝦寄其上方其浮泛水上人欲捕之輒歘然而沒乃是蝦有所見爾越絶書曰海鏡蠏為腹水母蝦為目也然其性暖能愈河魚之疾或以蝦醋如鱠食之最宜亦物類相攝爾蟹酉陽雜爼云蟹八月腹内有芒真稻芒也長寸許向東輸與海神未輸芒不可食燒其殻能致䑕會稽往嵗有蟹菑小蟹無數相糾結大如三斗器随潮入浦散入瀕海諸鄉食稻為盡螟蝗之害不加於此國語云越王與范蠡謀吳曰今其稻蟹不遺種蓋謂此也蝦字書云長鬚蟲也海中有蝦鬚長二丈海蝦𢷬潑生食以案酒殊俊快河蝦殻强可烹食爾越人謂杜鵑曰社豹社豹啼時漁人賣小蝦名社豹蝦又有小蝦大如糠覈曰糠蝦蝦蟆背有黒㸃身小能跳食百蟲善鳴與蟬蜍不類本草云蝦蟆一名蟾蜍非也酉陽雜爼云鸛影抱蝦蟆聲抱今里俗聞其春鳴謂之聒子其子謂之科斗大盡先生前足小盡先生後足蟾蜍腹大背黒皮上多痱磊跳行舒遲其肪塗玉則軟刻削如蠟本草所謂能合玉石者也今其一種似蝦蟆而長踦瞋目如怒謂之鼃越王揖怒鼃而武士歸之即此是也周禮蟈氏注云蟈今御所食蛙也漢書曰丞相擅減宗廟羔莬鼃此何等物而漢人以供玉食及宗廟之薦邪然則北人未嘗不喜食之韓文公詩以為南烹恐或不然齊㑹稽孔稚珪不樂世務宅中草沒人春日蛙鳴僕射王晏鳴笳鼓造之聞蛙聲曰此殊聒人耳答曰我聴卿鼔吹殆不及此晏有愧色又有竹蛙春中能升髙而鳴吐白沫如斗大懸竹樹間沫中皆小黒子大抵蛙之屬皆吐生也又有蛤蚧亦蛙之屬或名丰蛤本草云生嶺南山谷及城墻或大樹間長四五寸尾與身等形如守宫一雄一雌常自呼其名曰蛤蚧最䕶惜其尾或見人欲取之多自齧㫁其尾首如蝦蟆背有細鱗如蠶子土黄色今秦望諸暨山谷間皆有之捕者必以月之上寅曰不然則往往藏穴中不出鳥部鵲淮南子曰太隂所建蟄蟲首穴而處鵲巢向而為蘆又曰蟄蟲鵲巢皆向天一蓋鵲巢向天一而背嵗也先儒以為鵲巢居而知風蟻穴居而知雨嵗多風則去喬木巢旁枝故能髙而不危也古謂七夕鵲上天河為橋雖未必然今山隂七夕鵲絶少見鸛禽經曰鸛俯鳴則隂仰鳴則晴拾遺記曰鸛能聚水巢上故人多聚鸛鳥以攘却火災然往嵗㑹稽市火相去甚逺忽有熛燄如流星獨焚倉西鸛巢鸛飛鳴空中竟不能救又不知何異也鵞左氏曰鄭翩願為鸛其御願為鵞舊説言江淮謂羣鸛旋飛為鸛井則鸛善旋飛盤薄霄漢與鵞之成列正異故古人陣法或願為鵞或願為鸛也㑹稽戒珠蘭亭有右軍養鵞池存焉鶌鳩釋鳥云鶌鳩鶻鵃今江東亦呼鶻鵃左傳曰鶻鳩氏司事先儒云鶻鳩春來秋去故為司事一名鳲鳩月令所謂鳴鳩拂其羽者是也一名鷽鳩莊子所謂蜩與鷽鳩笑之者是也蓋此似山鵲而小釋鳥曰鷽山鵲也故此一名鷽鳩又其短尾青黒色多聲故此一名鳴鳩也陸璣云鶻鳩一名斑鳩似鵓鳩而大鵓鳩灰色無綉項隂則屏逐其匹晴則呼之語曰天將雨鳩逐婦者是也斑鳩項有綉文斑然故曰斑鳩則與此鶻鳩全異璣之言非今此鳥喜朝鳴故一曰鶻嘲也凡鳥朝鳴曰嘲夜鳴曰㖡禽經曰林鳥以朝嘲水鳥以夕㖡㖡音夜字見龍龕手鏡鵜釋鳥云鵜鴮鸅郭璞曰今之鵜鶘也好羣飛沈水食魚故名洿澤鵜形似鶚而大人足其鳴自呼頷下胡大如數升囊因以盛水貯魚一名淘河一名洿澤㑹稽不常有有輒大水土人占之頗騐鷓鴣自呼其名常向日而飛飛數隨月蓋若正月一飛而止畏霜露早晚稀出有時夜飛飛則以木葉自覆其背臆前有白圓㸃文多對啼志常南向不思北徂本草曰鷓鴣形似母鷄鳴云鈎輈格磔㑹稽諸暨山間頗多鷺一名舂鉏步於淺水好自低昂故曰舂鉏也方言鶡鴠謂之獨舂與此同意鶡鴠亦其鳴聲如舂鷺色雪白頂上有絲毿毿然長尺餘欲取魚則弭之山隂瀕水人家多畜之皆馴不去惟白露一日必籠之不然飛去鷰之往來避社而嗛土不以戊已籋口布翅岐尾齊人呼鳦蓋取其鳴自呼故曰鳦也一名𤣥鳥蓋取其色之𤣥故曰𤣥鳥也一名鷾鴯目之所不宜處不給視雖落其實棄之而走其畏人也而襲諸人間此燕安之道也舊説紫胷輕小者謂之越燕胷斑黒聲大者謂之胡燕胡燕土人謂之社鷗多巢村墟人家門外其為巢有極長者山隂人家每候燕多社前到但不入人屋爾必候𤣥鳥至之日乃入而營巢黄鳥黄栗留也一名倉庚一名皇齊人謂之摶黍亦或謂之黄袍常葚熟時來啄桑間亦應節趨時之鳥也凡詩言黄鳥者興也言倉庚者賦也斵木釋鳥云鴷斵木郭璞曰口如錐長數寸常斵木食蟲因名云此鳥有大有小有褐有斑褐者是雌斑者是雄又有青黒者頭上有紅毛生山中土人呼為山斵木大如鵲鴨鶩也尸子曰野鴨為鳬家鴨為鶩不能飛翔如庶人守耕稼而已周官庶人執鶩工商執鷄工商欲其知時又上之所畜也故執鷄庶人雖亦上之所畜欲其不散遷而已故執騖説苑曰鶩無他心故庶人以為摯物類相感志云雞鶩伏卵忌磨若聞礱磨之聲則不生矣曲禮曰庶人之摯匹匹鶩也今雄鷄能鳴其雌不能鳴䳄鶩能鳴其雄不能鳴脊令釋鳥曰䳭鴒雝渠盖雀之屬飛則鳴行則摇大如鴳長脚尾腹下白頸下黒如連錢故杜陽人謂之連錢㑹稽人呼為雪姑其色蒼白似雪鳴則天當大雪極騐杜鵑一名子規一名怨鳥夜啼達旦血漬草木凡始鳴皆北向啼苦則倒懸於樹説文所謂蜀王望帝化為子嶲今謂之子規是也至今寄巢生子百鳥為哺其雛尚如君臣云爾雅曰嶲周即此鳥也越人謂之謝豹顧况詩云緑樹隂中謝豹啼又名射豹戴勝釋鳥云鵖鴔戴鵀郭璞曰鵀即頭上勝今亦呼為戴勝一名戴鵀頭上有毛花成勝故曰戴勝也三月飛在桑間蓋蠶生之候月令所謂戴勝降于桑是也越人云降桑遇金日主穀賤烏説文曰烏孝鳥也象形益都耆舊傳曰張霸為㑹稽太守舉賢勸講一郡慕化道路但聞誦聲野無遺冦民語曰城上烏鳴哺父母府中諸吏皆孝友王子年拾遺録云越王入國有丹烏夹王而飛故勾踐起望烏臺以紀其瑞燕烏釋烏曰燕白脰烏廣雅云純黒而反哺者謂之烏小而腹下白不反哺者謂之鴉烏白項而羣飛者謂之燕烏白脰烏也雅烏鸒也山隂又有一種名寒鴉比常鴉頗小嵗十月自西北來其陣蔽天及春中乃去秦太虚樂府云寒鴉萬㸃流水繞孤村不至越者殆不知也獸部兎口有缺吐而生子故謂之兎兎吐也舊説兎者明月之精視月而孕故楚辭曰顧兎在腹言顧兎在月之腹而天下之兎望焉於是感氣禮曰兎曰明視其以此歟説文無兎字以免為兎兎生自口出宜有留難吐而後免故字又通為免獺似狐而小青黒色膚如伏翼水居食魚自祭其先記曰獺祭魚然後漁人入澤梁是也獺取鯉於水裔四方陳之進而弗食世謂之祭魚山隂澤居亦時見之羊禮云羽鳥曰降四足曰漬曰漬者謂死相瀐漬而善耗敗也六畜之死皆善耗敗而羊為甚禮曰羊曰柔毛柔毛謂其不疾瘯蠡也詩曰羊牛下來先羊後牛者羊性畏露晚出而早歸常先於牛㑹稽往嵗販羊臨安渡浙江置羊艎版下羊齧船茹舟漏而沈溺者甚衆至今人以為戒牛詩曰爾牛來思其耳濕濕濕濕言潤澤也蓋牛之為物病則耳燥安則温潤而澤故古之視牛者以耳舊云牛相壁堂欲濶膺廷欲廣豪筋欲就雋骨欲垂挿頸欲髙排肋欲密尾不用至地頭不用多肉角欲得細身欲得圓眼欲得大口方易飼鼻廣易牽倚欲如絆馬行欲如羊形欲如巻懸啼欲如八字亂睫好觸龍頸突目好跳毛拳角冷有病毛少骨多有力跂胡有夀常有似鳴有黄戎右曰贊牛耳桃茢牛耳無竅以鼻聴也盟者聴於神人故執牛耳而正以不聽為戒中州􅨗潼取酥酪以雍酥為冠今南方亦皆作而㑹稽者尤佳㑹稽諸邑又推諸暨為冠蓋吳中酥雖絶多大抵味淡不可與㑹稽班也晉王武子指羊酥示陸士衡云卿江東何以敵此疑當時南方未有酥酪也猫䑕善害苖而猫能捕䑕去苖之害故字從苖記曰迎猫為其食田䑕也迎虎為食田豕也今海州猫最佳俗云海州猫曹州狗猴吕子曰狗似玃玃似母猴母猴似人猴善候其字從侯白虎通曰侯候也楚人謂之沐猴舊云此獸無脾以行消食栁子厚云猿好踐稼蔬所過狼籍山之小草木必凌挫折撓之㑹稽山間陸種如豆麥胡麻萊服蔬果竹萌之類多為殘毁天衣寺僧法聰令捕一老猴被以衣巾多為細縫使不可脱縱之使去老猴喜得脱跳趨其羣羣望而畏之皆捨去老猴趨之愈急相逐日行數十百里其害遂稍息藥石部紫石英本草但云生太山山谷陶貞白云㑹稽諸暨石形色如石榴子掌禹鍚云生太山或㑹稽十道志云謝敷少時遊諸暨烏帶山夢神語云當以千千萬萬相遺旦至主人林下有異色石乃紫石英主人云出此山敷遂往採掘得其穴所獲甚多元和郡志亦云烏帶山出紫石英或以為烏豆山或以為當讀如烏竪或以為字當作笪未知孰是也今諸暨楓橋山間每雷雨後民競往採之然必祠神而後入山蓋用謝敷故事但土豪為壟㫁民得石多歸之他人未易得也自此至婺州地産紫石英甚多但不如諸暨之瑩潔有光彩爾都下及吳中藥肆所賣紫石英皆此石也婺州雙林寺輒謂之飯石以神其説太一餘糧按本草太一餘粮及禹餘粮一物而以精粗為名㑹稽王屋澤潞諸山皆有之嵊縣了溪有餘粮嶺産禹餘糧故得名紙王右軍為㑹稽内史謝公一作桓温就乞陟釐紙一作側釐庫内有九萬枚一作五十萬悉與之以此知㑹稽出紙尚矣剡之藤紙得名最舊其次苔牋然今獨竹紙名天下他方效之莫能彷彿遂掩藤紙矣竹紙上品有三曰姚黄曰學士曰邵公學士以太守直昭文舘陸公軫所製得名邵公以提刑邵公䶵所製得名三等皆又有名展手者其修如常而廣倍之自王荆公好用小竹紙比今邵公様尤短小士大夫翕然效之建炎紹興以前書柬往來率多用焉後忽廢書簡而用劄子劄子必以楮紙故賣竹紙者稍不售惟工書者獨喜之滑一也發墨色二也宜筆鋒三也巻舒雖乆墨終不渝四也性不蠧五也東坡先生自海外歸與程得孺書云告為買杭州程奕筆百枝越州紙二千幅常使及展手各半汪聖錫尚書在成都集故家所藏東坡帖刻為十巻大扺竹紙居十七八米元章禮部著書史云予嘗硾越州竹光透如金版在由拳上短截作軸入笈畨覆一日數十紙學書前輩貴㑹稽竹紙於此可見㑹稽竹有宜為矢者其竹名箭自漢以來乃併謂矢為箭雖裔夷逺域地不産竹或用栁或用楛為矢然彼人亦謂矢為箭則竹矢之著於天下可知又今樂部笙率以㑹稽卧龍山竹為貴蔡中郎得柯亭椽竹為笛亦㑹稽也㑹稽之竹其美如此今為紙者乃自是一種收於筍長未甚成竹時乃可用民家或賴以致饒唐舒元輿有悲剡藤文顧逋翁有剡紙歌近時米元章薛道祖曽文清皆有越州竹紙詩附於後舒元輿悲剡藤文剡溪上緜四五百里多古藤株枿逼土雖春入土脉他植發活獨古藤氣候不覺絶盡生意予以為本乎地者春到必動此藤亦本於地方春且死色遂問溪上人有道者云溪中多紙工斤斧斬伐無時劈剥皮肌以給其業噫藤雖植物者温而榮寒而枯飬而生殘而死亦將似有命於天地間今為紙工斬伐不得發生是天地􅂔力為人中傷致一物疾癘之若此異日過數千百郡洎東雒西雍厯見書文者皆以剡紙相誇予竊哀見枯藤之死見職正由此此過固不在紙工且今九牧士人自專言能文章户牖者其數與麻竹相多聴其語其自安重皆不啻握驪龍珠雖茍有曉悟者其倫甚寡不勝衆者皆歛手無語勝衆者果自謂天之文章歸我遂輕傲聖人道使周南召南風骨入於折楊皇華中言偃卜子夏文學陷入於淫靡放蕩中比肩握管動盈數千百人數千百人筆下動數千萬言不知其為謬誤日月以縱自然殘藤命易甚桑葉波流塵踏未見止息如此則綺文妄言軰誰非書剡紙者邪工嗜利曉夜斬藤以鬻之雖舉天下為剡溪猶不足以給况一剡溪者耶以此恐後之日不復有藤生於剡矣大抵人間費用苟得著其理則不枉之道在則暴耗之過莫由横及于物物之資人亦有其時時其斬伐不為夭閼予謂今之錯為之文者皆夭閼剡溪藤之流也藤生有涯而錯為文者無涯無涯之損物不直於剡藤而巳予所以取剡藤以寄其悲顧逋翁剡紙􅁔雲門路上山隂雪中有玉人持玉節宛委山裏禹餘粮石中黄子黄金屑剡溪剡紙生剡藤噴水搗為蕉葉稜欲冩金人金口偈寄與山隂山裏僧手把山中紫羅筆思量㸃畫龍虵出正是垂頭搨翼時不免向君求此物薛道祖和書便瑩滑如碑板古來精紙惟聞蠒杵成剡竹光零亂何用區區書素練細分濃淡可評墨副以溪岩難乏硯世間此理誰復知千里同風未相見薛道祖咏筆研間物研滴須琉璃鎮紙湏金虎格筆湏白玉研磨湏墨古越竹滑如苔更加一萬杵自封翰墨鄉一書當千户曽文清公竹紙三絶句㑹稽竹箭東南美來伴陶泓住管城可惜不逢韓吏部相從但説楮先生㑹稽竹箭東南美化作經黄紙叠層舊日土毛無用處剡中老却一溪藤㑹稽竹箭東南美研席之間見此君為問溪工底方法殺青書字有前聞鹽鹽㑹稽亭户煎鹽法以海潮沃沙暴日中日將夕刮鹻聚而苫之明日又沃而暴之如是五六日乃淋鹻取滷然後試以蓮子每用竹筒一枚長二寸取老硬石蓮五枚納滷筒中一二蓮浮或俱不浮則滷薄不堪用謂之退滷蓮子取其浮而直若三蓮浮則滷將成四五蓮浮則滷成可用謂之足蓮滷或謂之頭滷然石蓮試以滷取最後升者為足蓮足蓮乃可騐滷有無足蓮者必借人巳騐蓮滷較蓮之輕重者為之然後為審閩中之法以雞子桃仁試之滷味重即正浮在上滷薄則二物側浮與此相類編竹為槃槃中為百耳以篾懸之塗以石灰纔足受滷燃烈焰中滷不漏而槃不焦灼一槃可煎二十過淋下滷水或以他水雜之但識其舊痕以飯甑蓋之於中㧒去面水至舊處元滷盡在所去者皆他水或以甑箄隔之亦可以他物則不可分矣孔融論云弊箄不能救鹽池之滷意蓋指此練化術云飲食過鹹以飯箄竹數條炙之着其中則汁便淡蓋未易以理推也元豐中盧秉提㸃兩浙刑獄㑹朝廷議鹽法秉謂自錢塘縣湯村場上流睦歙等州與越州錢清場等水勢清淡以六分為額湯村下接仁和縣湯村場為七分鹽官場為八分並海而東為越州餘姚縣石堰場明州慈溪縣鳴鶴場皆九分至岱山昌國又東南為温州雙穗南天富北天富十分著為定數蓋自岱山及二天富皆取海水煉鹽海賦所謂熬波出素者也自鳴鶴西南及湯村則刮鹻以淋滷以分計之十得六七鹽官湯村用鐡盤故鹽色青白而鹽官鹽色或少黒由㬠灰故也湯村及錢清場用竹槃故色少黄竹勢不及鐡則黄色為嫩青白為上色黒則多滷或有泥石不宜乆停若石堰以東雖用竹槃而鹽色尤白以近海水鹽故爾後來法雖少變公私所陳大抵不易盧法鹽之品至多前史所載夷狄間自有十餘種中國所出數十種今公私通行者四種一者末鹽海鹽也河北京東淮南兩浙江南東西荆湖南北福建廣南東西十一路食之其次顆鹽解州鹽澤及晉絳潞澤所出京畿南京京西陜西河東褒劍等處食之又次井塩鑿井取之益梓利䕫四路食之又次崖鹽生於土崖階成鳯等州食之惟陜西路顆鹽有定額嵗為錢二百三十萬緡自餘盈虚不常大約嵗入二千餘萬緡唯末鹽嵗自抄三百萬供河北邉糴其他皆給本處經費而巳縁糴買仰給於度支者河北則海末鹽河東陜西則顆鹽及蜀茶為多唐越州有蘭亭監官場五曰㑹稽東場㑹稽西場餘姚場懷逺場地心場配課鹽四十萬六千七十四石一斗今為鹽場四㑹稽之三江曹娥山隂之錢清餘姚之石堰是也日鑄茶日鑄嶺在㑹稽縣東南五十五里嶺下有僧寺名資夀其陽坡名油車朝暮常有日產茶絶竒故謂之日鑄然茶之尤者顧渚蜀岡䝉頂皖山寳雲皆見於唐以來記録或詩章中日鑄有名頗晚吳越供奉中朝土毛畢入亦不聞有日鑄則日鑄之出殆在吳越國除之後歸田録云草茶盛於兩浙兩浙之品日注第一青箱記亦云越州日鑄茶為江南第一范文正公汲清白堂西山泉以建溪日鑄卧龍雲門之品試之云甘液華滋悦人襟靈茶經餘姚茶生瀑布嶺昔號仙茗大者殊異與襄州同按今㑹稽產茶極多佳品惟卧龍一種得名亦盛㡬與日鑄相亞卧龍者出卧龍山或謂茶種初亦出日鑄蓋有知茶者謂二山土脉相類及蓻成信亦佳品然日鑄牙纎白而長其絶品長至三二寸不過十數株餘雖不逮亦非他產所可望味甘輭而永多啜宜人無停滯酸噎之患卧龍則芽差短色㣲紫黒類䝉頂紫筍味頗森嚴其滌煩破睡之功則雖日鑄有不能及顧其品終在日鑄下自頃二者皆或充包貢卧龍則易其名曰瑞龍蓋自近嵗始也其次則天衣山之丁堄茶陶宴嶺之髙隖茶一曰金家隩茶秦望山之小朶茶東土鄉之雁路茶㑹稽山之茶山茶蘭亭之花隖茶諸暨之石筧茶餘姚之化安瀑布茶此其梗槩也其餘尤不可殫舉日鑄他書及土人皆用此鑄字蔡君謨東坡先生詩帖墨迹皆然惟歐陽公著歸田録則書為日注疑公自有所據其後亦有書作注者蓋自歐陽公始也布帛葛之細者舊出葛山屬㑹稽當句踐時使國中紅女織布以獻於吳其歌曰嘗胆不苦味若飴令我採葛以作絲弱於羅兮輕霏霏又曰葛之蔓兮舒長條為絺為綌纎且調當暑是服輕飄飄其精如此而後之葛布頗無聞者梁劉孝綽有謝越布啓曰比納方綃既輕且麗珍邁龍水妙越島夷考其所稱非葛不敢當也以其總稱越布故不得强名之今越人衣葛出自閩賈然則舊邦機杼或者乆不傳矣苧之精者本出苧羅山屬諸暨下有西子浣紗石蓋俗所謂苧紗者於此浣之以故越苧最為得名夏侯開國吳都賦曰纎絺細越青箋白紵舊經載諸暨三如有如絲之紵而郡國十道志苧或作蓴疑必有一誤故不載而樂府因是有白紵歌詞今外諸邑獨暨陽尤能以苧為布雖不逮舊蓋苧羅遺俗云白疊布自一種杜子美詩所謂光明白㲲巾者也晉令曰士卒百工毋得服越疊蓋舊惟出於越今無之繭布爾雅云袍襺也禮記玉藻纊為緼為袍左氏傳曰重衣裘其注釋皆謂新緜今諸暨之俗絍緝蠒緒纎如絲縷織之成匹蓋狀似絁而密縝過之雖名為布其實帛也古有蠒紙蓋以蠒為之蘭亭亦蠒紙書也今非獨無能製者亦不復見矣山後布頗有名一名縐布亦出於諸暨縣其初緝麻為縷縠始見於吳越春秋勾踐始得西施鄭旦飾以羅縠是也以故錫貢舊有輕容生縠數十年來縠頗出於蕭山縣雖未臻絶妙然與吳中機工畧相當矣絹舊總稱吳絹今出於諸暨者曰花山曰同山曰板橋其輕勻最宜春服邦人珍之或販鬻頗至杭而止以故聲價亦不逺也蕭山紗以暑伏織者為上秋織者為下冬為尤下蓋霜燥風烈則絲脆帛地不堅為衣易敝故賣紗者必曰此夏紗也㑹稽志巻十七
