body:
  text: 㑹稽志巻七宋施宿等撰宫觀寺院道士所居為宫觀僧則曰寺院宫古者上下通稱如父子皆異宫儒有一畝之宫觀本闕之名仙人好樓居故道士亦稱之南北朝又有闕館闕𤣥壇者今都下醴泉萬夀集禧之類皆有道院以處其徒此外如丈人觀等亦或有之然不多置也寺本官置之名後漢浮屠初至洛陽館於鴻臚寺及建精舍因冐寺名曰白馬寺隋更其名曰道場若歐陽詢所撰西林道場碑是也唐初復曰寺院五代以來寺院特盛江南吳越閩楚建寺度僧不可勝計今以㑹稽一郡攷之凡梁開平以後稱造某寺賜某額皆錢氏割據時為之非真中國之命也故其多如此及地入輿圖乃有勅賜額宣和初既以僧尼為徳士徳女乃併改寺院為宫觀僧揣知必不久皆仍舊扁止易一字以應命而藏其舊字及還寺院名則復其初今㑹稽如戒珠寺等猶可辨也宫觀府城天慶觀在府東南五里一百二十步𨽻㑹稽唐之紫極宫也梁開平二年改真聖觀大中祥符元年正月改曰承天觀時天書事猶未興也初景徳五年正月即祥符元年乙丑左承天門天書降戊辰改元大中祥符以其日為天慶節二年十月十四日詔曰朕以欽崇至道誕錫𤣥符率土溥天期福祥之咸被靈壇仙館俾興作以攸宜庶昭清静之風永洽淳熙之化式營仙館以介民禧宜令州軍府監闗縣擇地建道觀一所並以天慶為額葢用節名也惟西京稱天慶宫餘悉為觀於是州以承天應詔五年閏十月九日詔曰近者告期中夕降聖皇闈昭示誨言備聞帝胄尊考聿隆於顯號奉先式煥於丕圖鴻緒發源既彰於累積綿區式教用表於欽崇天下州府軍監並於天慶觀置聖祖殿其殿内尊像及侍從並令玉清昭應宫降様其後遂著令諸州給閒田供齋厨藩鎮十頃餘七頃五頃官吏之官罷任並朝拜禁乗馬出入於天慶節士庶燒香庭中殿在觀之昊天殿北建炎初罷玉清神霄萬夀宫詔迎長生清華像赴觀建炎三年十一月髙宗皇帝駐蹕癸亥列聖御容至自東京亦迎赴天慶奉安云報恩光孝觀在府東三里九十四步𨽻㑹稽陳武帝永定二年捨宅建名思真觀太平興國九年州乞改額乾明以從聖節祝至尊夀詔俞其請崇寧二年改崇寧萬夀政和三年改天寧萬夀置徽宗本命殿號景命萬年殿紹興七年改報恩廣孝十二年又改今額專奉徽宗皇帝香火初天聖間章獻明肅皇后遣殿中使脩建用玉清昭應宫别殿小様將成羨材尚多中使謂主觀道士曰當為奏陳别建道院於東偏道士唯唯而已他日復言之又不對中使不懌遂已道士者惜不知其姓名必賢者也天長觀在府東南六里一百六十六步𨽻㑹稽唐天寳三載秘書監賀知章辭官入道捨宅置號千秋觀七載改今額初開元十七年從羣臣請以八月五日上降誕日為千秋節觀葢用節名後改千秋節為天長地乆節觀名從之觀常有客道士携草屨數十緉坐觀門有過者輒與之已而得屨者或有脚疾或骭瘍著之皆頓愈競相傳布而道士已失所在故至今俚俗謂天長為草鞋宫殿上像設竒古傳以為唐代所塑如麻姑浮丘伯皆他宫觀所無郡人謂之土寳又殿中有小銅鐘範製甚竒聲尤清圜逺聞非凡鐘比嘗撲損匠者鋸為大罅聲仍如故汝隂王亷潜作八分書於鐘上惜其不為人所知今徙於他所矣開元宫在府南四里一百二步𨽻山隂唐開元二十八年建宫舊極閎廣後多為民居所侵今所謂甲子巷者乃開元之六十甲子殿也㑹稽縣告成觀在縣東南七里政和四年二月敕改禹祠為告成觀靖康初元翰林學士翟公汝文守㑹稽作三清於正殿因設醮祭其青詞曰臣聞昊天有目之所共睹尚絶形容上聖衆妙之所圓成孰能體象敢以凡情之見解妄慕浩刼之高明深慮愚冥自貽誅譴伏念臣叨䝉覆幬粗識薫脩每嘆𤣥像之不傳莫慰羣倫之生敬力求繪素仰肖光儀用志厯年僅成兹事今者甫塵丹陛獲遂夙心竊惟髙上至極之尊必示淵黙無為之相冩三清之垂拱用仿神威具萬徳之莊嚴出臨霄極儻獲上通帝所克簡聖衷乞即頒降諸天普同供養咸瞻睟表永有依歸臣尚恐粉墨既焚閟藏雲闕復命工師再刻崇建琳宫流傳飈歘之姿安奉告成之宇庶存下士以廣真㳺臣誓願厯刼始終歸誠道䕃生身嗣續祗命𤣥科非敢萌纎毫僥福之心直以盡頂踵報天之實自稱小兆臣翟汝文又作真武像尤極精緻説者謂得天人粹温之氣而隂威肅然初建殿於西北隅後以奉安御書碑移殿西廡下南向殿之西南有井能愈疾一郡所崇事也餘具禹廟事中龍瑞宫在縣東南二十五里有禹穴及陽明洞天道家以為黄帝時嘗建候神館於此至唐神龍元年置懐仙館開元二年因龍見改今額宫正居㑹稽山南峰嶂遒崒其東南一峰崛起上平如砥號苗龍上昇臺苗龍者不知其名唐初人善畫龍得道仙去大抵龍瑞尤宜煙雨中望之重峰疊巘圖畫莫及故邦人舊語曰晴禹祠雨龍瑞舊有道士魏景暉能琴有行業紹興中郡幙洛人李樸贈之詩云惟有彈琴魏道士抱琴横膝對斜暉朱希真敦儒頗稱之千秋觀在縣東南五里乾道四年八月安撫使史丞相浩奏移天長觀舊額建其中為三清殿兩廡分享前代髙士東廡曰髙尚之士西廡曰列仙之儒凡四十一人故俗謂之先賢堂前有閣曰鏡湖一曲亭曰懐賀嵊縣金庭觀在縣東南七十二里孝嘉鄉道經云王子晉登仙是天台山北門第二十七洞天桐柏山洞中三十五里見日月下見金庭壁四十里唐髙宗時賜名金庭觀宣和七年改崇妙觀舊傳王右軍捨讀書樓為觀初名金真館後改金真宫至宋齊間禇伯玉居此山三十餘年後㳺南嶽霍山復歸謂子弟曰吾從此去十旬當逝及期而終年八十有六史言齊髙帝迎之辭疾勅於剡白石山立太平館居之與圖經少異真誥云上虞吳曇者得許承一瓢贈伯玉伯玉亡授弟子朱僧標歴代寳之可受一斛唐先天間遣女道士詣金庭觀投龍因見此瓢遂持以進今觀之東廡有右軍肖像又有墨池鵝池桃源觀在縣城内東北四十步唐武徳八年置號太清觀後廢漢乾祐三年重置仍改今額諸曁縣乾明觀在縣西二里紹興二十六年道士陳師惠建請於朝移舊乾明觀額餘姚縣廣福觀在縣東七十步舊號聖祖下院其址在縣城内天聖中建熙寧三年用治平徳音賜夀聖觀額廢於建炎兵火縣以弓手舊營易其址廣縣治紹興二十五年道士張襲明即所易新址重建三十二年以避太上皇帝尊號例改今額祠宇觀在縣南七十里四明山漢人劉剛及妻樊夫人上昇之地古有祠宇觀唐明皇天寳三年以其地險逺移觀於瀑布下故俗謂之白水宫本朝政和六年詔建玉皇殿蠲其雜賦初唐末有髙士謝遺塵隠於是山之南雷今有大雷峰亦不知南雷何在嘗至吳中謂陸魯望曰吾山有峰最髙四宂在峰山每天宇澄霽望之如牖户相傳謂之石窻故茲山名曰四明山中有雲二十里不絶民皆家雲之南北每往來謂之過雲有鹿亭有樊榭有潺湲洞木實有青櫺子味極甘而堅不可卒破有猿謂之鞠侯於是魯望與友人皮襲美各賦詩九篇傳於世然今雖山中居人皆不知此異境果在何處與華山之華陽武陵之桃源無異葢神仙所居可聞名而不可到也或謂山圍八百里四面皆七十峰其説出於近世莫可得而攷按今明州盖以此山得名而山實屬㑹稽之餘姚縣正如眉州本以峨眉山得名而山乃屬嘉州之峨眉縣也又華州以華山得名華山髙五千仞華州乃不見而同州反見之故語曰世間多少不平事却被同州㸔華山亦此類也上虞縣天慶觀在縣南一里太康中獲金罍於上虞觀井國朝祥符二年詔天下立天慶觀縣亦許之故賜今名新昌縣鼓山真聖觀在縣西四里寺院府城開元寺在府東南二里一百七十步節度使董昌故第後唐長興元年吳越武肅王建奏以開元復為大善寺而以此為開元寺葢處一州之中四旁逺近適均重閎廣殿脩廊傑閣大鐘重數千觔聲聞浙江之湄佛大士應真之像皆雄峙工緻冠絶他刹嵗正月幾望為燈市傍十數郡及海外商估皆集玉帛珠犀名香珍藥組繡髹藤之器山積雲委眩耀人目法書名畫鐘鼎彛器玩好竒物亦間出焉士大夫以為可配成都藥市建炎庚戍北騎侵犯既退羣盜投隙而至遂焚不遺一椽今七十年雖繼興葺尚未能復初武肅王有浙東以董昌第為開元而以昌生祠為天王院及是同時廢於火亦有數焉大中禹跡寺在府東南四里二百二十六步晉義熈十二年驃騎郭將軍捨宅置寺名覺嗣唐㑹昌五年例廢大中五年僧居𤣥詣闕請僧契真復開此寺并置禪院於北廡詔賜名大中禹跡且命契真居所置禪院寺門為大樓奉五百阿羅漢甚壯麗初釋氏自達磨至慧能以來傳禪宗然禪院皆寓律寺至百丈山懐海始創為禪居乃不復寓律寺契真亦懐海弟子是時禪寺雖創尚未盛行故猶寓禹跡北廡為禪院而已凡寺院冠以大中二字皆廢於武宗而復于宣宗者惟祥符非是紹興末曾文清公卜居於越得禹跡東偏空舍十許間居之手種竹盈庭日讀書賦詩其中公平生清約不營尺寸之産所至寓僧舍蕭然不蔽風雨惟食奉祠之禄假三兩老兵給使令始終如一日公詩有曰手自栽培千箇竹身常枕籍一床書葢寓居時所賦也延慶院在府東南五里二百二十六步唐大中十二年台州刺史羅招權捨宅建崇報院在府東二里一百九十四步開運四年司農卿周仁邈之妻許及其子從徽捨宅建名報恩後改今額大中祥符寺在府東北三里二百步唐中和二年僧可瑠建號中和水陸院後改稽山羅漢院周廣順三年改保聖寺開寳七年改法雲寺大中祥符元年改今額圓通妙智教院在府東南三里一百五十步開寳八年少卿皮文燦捨地建號觀音院方唐之末皮日休避地吳越死焉其子光業為其國丞相裔孫公弼仕國朝亦通顯文燦光業諸孫仕於其國者新唐書據小説以為日休誅死葢誤也熈寧間太守趙清獻公具奏以禱祈之地賜額圓通紹興初車駕駐蹕宣賜御書金剛經板乾道八年府又以禱旱疫有應聞於朝加額妙智初有興福院與圓通隣久廢僅有一佛殿至是用主僧善超請併興福入圓通或云圓通本興福之觀音懴堂後寖盛别為院而興福日衰至無一僧乃併有之事之廢興有如此者亦可一嘆也永福院在府東二百五十八步晉天福四年吳越文穆王建名光明院大中祥符元年改今額慶厯八年七月初五日朝㫖永充天台教院有重建院記隆敎院在府東一里三百四十六步大平興國元年觀察使錢儀建號無礙浴院大中祥符元年改賜今額景徳院在府東南六里七十四步唐天祐四年建鏡清開寳三年改福清院大中祥符元年改今額有十六觀堂趙侍郎不流之先嘗寓居侍郎實生於此及來為守興葺之明教院在府東南五里四十六步建隆元年錢塘縣令林仁憲捨宅建號彌陀院大中祥符元年改賜今額旌教院在府東南四里一百九十四步周顯徳二年錢承裔建號法華懴院開寳三年改憲臺永夀院大中祥符元年改今額院舊植杏甚茂至今為杏花寺長慶院在府東南一里二百二十八步宋永徽二年建本晉尚書陳囂竹園因號竹園寺唐㑹昌五年毁廢周顯徳五年僧徳欽重建號廣濟院大中祥符元年七月改賜今額善法院在府東南四里二百二步晉天福七年吳越建為尼院號永寧本朝大中祥符初改今額熈寧八年併尼院入大慶以為僧院紹興初秦魯國賢穆大長公主寓第院中掊地得金塗銅塔夀昌院在府東南五里一百四十六步漢乾祐三年建觀音吉祥院開寳三年建佛殿景徳二年改今額廣福院在府東南六里七十六步大平興國元年温州刺史錢偁之子熙暕捨園建號俱院俱西域語也葢錢氏所名及治平四年正月一日英宗皇帝受徽號徳音私造寺觀及三十間以上有佛像者以聞賜名夀聖夀聖葢英宗誕節名也故僧寺名夀聖者所在有之一州或至十數初前代及本朝有以誕節名寺觀者如千秋天長天清承天乾元之類雖間有之然不多也至夀聖始遍及天下崇寧間蔡京請郡置一寺觀名天寧萬夀葢權輿於此紹興三十二年六月髙宗皇帝内禪移御徳夀宫上尊號曰光堯夀聖太上皇帝是嵗十二月詔寺院宫觀祠廟及鄉里坊巷官私亭館名有犯夀聖及徳夀字者並回避又詔天下寺觀名夀聖者皆改為廣福云法濟院在府東南四里九十六步至道元年邑人陳建捨園為台州萬年山廨院天禧三年賜院額悟本院在府東南三里三十四步唐乾符二年張希劉審言共捨宅置號鏡水院開寳七年改明心院又賜今額佛屋户上有題捨錢人姓名墨髙去木一分許葢嵗久風雨摧剥木朽而字以墨覆故獨不動世傳華州西溪有亭葢杜子美詩所謂鄭縣亭子者杜書板上墨字挺起尤髙葢此類也福果院在府東南三里三十四步右𨽻㑹稽大善寺在府東一里二百一十步梁天監三年民黄元寳捨地錢氏女未嫁而死遺言以奩中資建寺僧澄貫主其役未期年而成賜名大善屋棟有題字云天監三年嵗次甲申十二月庚子朔八日丁未唐開元二十六年改名開元後唐長興元年吳越武肅王别創今開元乃復大善舊名建炎中大駕廵幸以州治為行宫而守臣寓治於大善及移蹕臨安後復以行宫賜守臣為治所然嵗時内人及使命朝欑陵猶館於大善乾道中蓬萊館成乃止獨太常少卿按行陵下寓館焉慶元三年十一月寺僧不戒于火一夕煨燼惟羅漢天王堂浴堂經院庫堂僅存寺有塔亦俱焚或發其塔中地得石刻乃越州龍興寺宋太始元年唐大中元年造塔大宋淳化三年十一月火焚塔寺俱盡景徳元年重建石刻中間多㫁闕不可盡讀按龍興寺與今龍興橋相近或謂提舉廨舍是也疑龍興塔俱焚後人取廢塔所𦵏舍利佛國益以他舍利𦵏于大善塔耳以棟上字觀之則大善自建寺以來未嘗有被焚之事亦未嘗名龍興也報恩光孝禪寺在府南二里二百二十二步宋元徽元年製法華經維摩經䟽僧遺教等與法師惠基于寳林山下即龜山亦名飛來山建寳林寺時有皮道與捨宅連山造寺山之巔有石岫岫有靈鰻禱雨多應旁有巨人跡錫杖痕㑹昌毁廢乾符元年重建因改為應天寺晉末沙門曇彦與許詢𤣥度同造甎木二塔未成詢亡久之岳陽王將至彦預告門人曰許元度來也岳陽亦旱承誌公宻示至州即入寺尋訪彦望而曰許元度來何暮昔日浮屠今如故王曰弟子姓蕭名􅊫師何故以許元度呼之彦曰未達宿命焉得知之遂握手命入室席地王忽悟前身造塔之事宛若今日由是塔益加壯麗崇寧三年八月詔改崇寧萬夀禪寺三月八日又改崇寧為天寧每嵗天寧節郡寮祝聖於此紹興七年改報恩廣孝禪寺俄又改廣孝為光孝專奉徽宗皇帝香火葢以本天寧祝聖之地也舊有長老滋須者有高行㑹改當十錢為當五郡守召須及能仁長老宻告之且曰聞二寺方大興造有未還瓦木工匠之直而蓄當十錢多可歸急償之明日文字一出皆大折閲矣二人既歸能仁呼知事僧告以將赴他郡之請凡有負者皆即日償之於是出千餘緍與之抵夜乃畢得者皆喜明旦遣侍僧問天寧則曰長老歸自郡齋即以疾告閉方文門熟睡至今猶未起也及令下須始以當五之數償負能乃大媿服大能仁禪寺在府南二里一百四步本晉許詢捨宅號祗園寺後廢至吳越王時觀察錢儀復建號圓覺寺咸平六年從知州事兵部員外郎康戩之請用承天節名改賜承天寺政和七年上后土號曰承天効法厚徳光大后土皇地祗詔天下承天僧寺皆改為能仁寺葢避后土號也是嵗詔建神霄玉清萬夀宫以僧寺壯麗富贍者改建而越以能仁為之石刻御製宫碑奉安法堂上作朱漆樓閣嚴䕶正殿左奉長生大君右奉青華帝君侍立真人各二人側殿奉韓君丈人又繪左右仙伯及從官於兩序殿柱以金龍絡之殿庭為醮壇殿門立二十四㦸用鍮石頭鑽金龍纒朱漆桿其桿上青下緑彩畫雲鶴蛟龍仍綴五色帯五條每帯綴一銅鈴通長一丈二尺八寸殿上設威儀金鉞玉斧五明扇九天寳葢神鏡錦繖飛空霓旌真境十絶靈旙朝天朱幢仙境降節紫金垂露如意尺十種各二築亭行符水名仁濟亭講堂名道紀堂經藏名雲章寳室貲産名道業天寧天應天符寧貺元成節各設醮醮多至千二百位自京師降青詞朱表御香守閽及洒掃用禁軍文書入疾置守臣雖前二府但稱勾􅃹百步内禁襍户及屠肆街衢責地分人掃除車擔及庖厨宴集音樂采捕刑獄之具皆有禁道士知宫副知宫皆降勅差名曰長貳氣焰熏灼監司守臣通書啓送迎交謁如等夷方是時泗守葉黙建昌守陳并秀守蔡巒皆為神霄道士所訟得罪至流竄嵗用名香朱丹幣帛酒醴華果不可勝數紙札尤多一取以千計皆池表歙表之類不許以他所産充數猶退易不已遇特設齋道士襯錢自三十千至三百率無虚月靖康内禪始稍减削建炎中興赦書遂命神霄復為僧寺遷像設於天慶觀而能仁寺復故州又有能仁院故郡人謂能仁寺為大能仁寺云戒珠寺在府東北六里四十七步蕺山之南本晉右將軍王羲之故宅或曰其别業也門外有二池曰鵞池墨池其為寺不知所始陳太建二年有僧定光來寓寺中耳過其頂擎銀像長立不卧寺之中為卧佛殿有所謂十大弟子者哀泣其旁或候氣或捫足而佛之父母亦在焉僧惠迪言方政和間道家盛時有道士詰僧曰寺院皆祝夀之地乃為此狀何也當聞於州毁之有僧出曰比見道宫進天寧節祝聖疏首列道徳經若干巻經中乃云上将軍處右戰勝以喪禮主之死而不亡者夀強梁者不得其死死之徒十有三以其生生之厚是以輕死民至老死不相往來如此類皆何等語汝乃殊不避何也道士掩耳而去寺有上方院熙寧中郡守程公師孟與法雲長老重喜來逰喜能詩乃擬程公體坐上立成曰行到寺中寺坐觀山外山程公大喜又有竹堂雪軒宇泰閣皆一郡登覽之勝李參政漢老有雪軒詩曰四山環繞翠岧嶤想見凌晨雪未消八萬四千脩月手不知何處琢􅌦瑶人推絶唱宇泰紹興中為士子肄業之地常十餘人䇿名巍科者相踵葢山川之秀有以相之寺南百步有題扇橋葢買扇老姥所居云光相寺在府西北三里三百七步後漢太守沈勲公宅東晉義熙二年宅有瑞光遂捨為寺安帝賜光相額給事中傅公崧卿退居北海里第去寺最近數杖屨過之能仁院在府西北三里三百三十七步開寳六年觀察使錢儀建太平興國二年吳越給地藏院額大中祥符元年改承天政和七年五月改賜今額事在大能仁寺篇廣教院在府西六里二百二十七步蕺山東麓院後山壁刻字有曰唐景福元年嵗在壬子准勅建節度使相國隴西公生祠堂其年十二月十六日興功開山建立葢董昌生祠也昌敗祠廢後唐天成四年吳越王錢鏐夢神人求祠宇或言祠本古天王院有魚池因建天王院大中􅖤符元年七月改通教院天聖初避章獻明肅皇后父名又改今額建炎末與開元寺同時廢于火紹興中院僧惠迪募縁再建佛殿西北隅山壁有陸少師題名石刻云盧駿元王源之吳廷瞻曹季明沈永道孫元禮陳志行陸伯鈞自戒珠寺雪軒過竹堂登上方尋徑到此政和八年三月二十八日元鈞題盧公名天􅂹西安人以儒學進名重當世後避天字改名襄字贊元終于吏部侍郎時為浙東提㸃刑獄少師時為淮西提舉常平詠道名時升為部酒官有文學盧公遇之如交友逰覽必與俱後以子貴贈至太師吳國公妙明院在府北三里一百七步開寳五年鎮海軍都指揮使陳志建吳越給光讚般若院額大中祥符元年七月改今額佛殿東南有八角石井舊常有大珠夜風雨晦㝠輒出照殿上及廊廡盡明或濬而索之勿得建炎兵亂有北客來居墜小兒死焉珠遂絶不出院本甚廣今非復舊址矣觀音教院在府西北三里一百二十七步乾道九年有沈安中者捨所居請於府移㑹稽縣界圓通妙智教院舊額建右𨽻山隂㑹稽縣泰寧寺在縣東南四十里周顯徳二年建初號化城院又改為證道院建中靖國元年太師陸佃既拜尚書左丞請以為功徳院改賜名證慈米芾書額寺門外築亭曰顯慶紹興初詔卜昭慈聖獻太后欑宫遂以證慈視陵寺而議者謂昭慈將歸祔永泰陵因賜名泰寧禪寺其後永祐永思永阜永崇四陵修奉皆在其地故泰寧益加崇葺云淳化寺在縣南三十里中書令王子敬所居也義熙三年有五色祥雲見安帝詔建雲門寺㑹昌毁廢大中六年觀察使李褒奏再建號大中拯迷寺淳化五年十一月改今額寺有彌陀道場杭僧圓照書額門外有橋亭名麗句亭刻唐以來名士詩最多先唐時雲門止有此一寺今裂而為四雍熙者懴堂也顯聖者㸔經院也夀聖者老宿所棲庵也或謂雲門寺本面東主秦望而對陶宴等山如列屏障㑹昌廢寺後止存一小殿面南未毁遂因附益以為寺非復舊址而舊址乃多犁以為田紹興中准僧勅為雍熙副院嘗因牛足陷得小銅維衛佛像于田中葢古雲門寺地也凡寺額冠以大中者捨大中祥符外皆唐宣宗時所復㑹昌廢寺雍熙院在縣南三十一里一十步初僧重曜于雲門拯迷寺之西建懴堂號凈名庵開寳五年觀察使錢儀俶之弟廣之為大乗永興禪院懴堂在今佛殿後法堂前當時觀音像猶在雍熙二年十月改賜今額紹興元年六月賜故尚書左丞陸公為功徳院陸氏功徳院本在證慈至是證慈改為泰寧奉櫕宮乃改賜是院時方立法應賜功徳院者不許用有勅額寺院惟雍熙特賜院有吳越忠懿王在國時所貽書石刻其一曰報雲門山净名菴長老重曜今差人齎到白乳茶三十斤稜瓷香爐一隻衙香五斤金花合盛重五十兩仍支見錢一百千文足陌可親入懴保安遣此示諭不具押字付其二曰報越國雲門山净名庵長老重曜昨據節度使錢儀申所請為官中入懴保安事具悉師心鏡絶塵衣珠無纇脩釋氏務三之訓得净名不二之宗洎掛錫寳坊棲真玉笥節使素欽於景行逺有闕聞國家因罄于精誠遂可其請况竒峰正聳炎景斯煩非坐非行頗勞精進傾心引領尤媿忠勤今則再賜到乳茶三十斤乳香三十斤至可領也夏熱想得平安故兹告諭想宜知之不具押字付長老重曜此亦可略見錢氏下書境内之體錢氏自周世宗及宋興之後益務尊戴中朝然其書猶不能無竊擬書詔之意故具載之院額錢惟治所書院前橋亭曰好泉亭亭扁葢陸少師所題取范文正公詩林無惡獸住巖有好泉來之句又有牧庵朝陽亭及范丞相純仁兄弟章樞宻楶曾舍人鞏晁侍讀説之江少卿緯亷博士布題名錢氏據舊史雖封吳越國王然初不言㑹稽别稱越國於此見之史魏公家有當時金書法華經稱錢儀為判㑹稽府則又有㑹稽府之稱矣吳越備史又云遜王移居東府似又稱東府也顯聖院在縣南三十里周顯徳二年於拯迷寺石壁峰前建㸔經院乾徳六年賜號雲門寺至道二年九月改今額院後有王子敬筆倉實一眢井有經藏甚靈異中間院常無主僧者久之郡牧毁其法堂以脩園館然經藏猶如故今院復小葺絶無産業僧童賴經藏以給云廣福院在縣南四十里晉天福六年建初名上菴熙寧三年六月以治平徳音賜夀聖院額隆興元年例改今額雲門四寺相比廣福最在其上小而秀䆳可喜傍又有雲泉雲峰菴皆幽勝大禹寺在縣南一十二里梁大同十一年建㑹昌五年毁廢明年重建寺自唐以來為名刹西偏有泉名菲飲有亭覆之紹興中王編修鈺題大字刻