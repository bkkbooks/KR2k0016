御書閣奉安仁宗皇帝天聖四年六月十二日宣賜御書篆文天章之寺鐫刻四字牌額又紹興八年三月壬寅降到高宗皇帝御書蘭亭序石刻一本賜浙東安撫使孫近有近題䟦勒石蘭亭曲水右軍書堂及畫像至今皆在或謂仁宗書此額時本書真宗御集閣為天章之閣既成聖意未愜再書之前本遂不用有内侍奏章獻明肅皇太后言越州天章寺天下名山今欲乞皇帝更書一寺字易閣字以賜越州太后與上皆欣然許之此四字是也故老所傳如此天衣寺在縣南三十里晉義熈十三年髙僧曇翼結庵誦法華經多靈異内史孟凱請置法華寺至梁恵舉禪師亦隠此山武帝徴之不至有翼公所頂戴紫檀十二面觀音及梁昭明太子遺舉公金縷木蘭袈裟紅銀藻瓶紅銀瑠璃鉢至今具在又有金銅維衛佛像本西域阿育王所鑄浮海而至梁武以施山中儀相甚偉今奉於西序宣和初詔改僧為徳士寺院為宫觀銅鐃銅像期以十日盡輸官俄復命惟輸鐃而銅像悉獲存故維衛像至今嚴奉焉寺有十峰堂以山之十峰為堂名山下又有雙澗故曾文靖公詩云布襪青鞋蹋欲無㸔山㸔水未成疎十峰雙澗尤竒處萬壑千巗總不如淳熙七年詔以皇子魏惠獻王薨欑於山中設置衛守且嵗時加恩澤有差云法雲寺在縣西北八里本名王舍城寺久廢吳越王時有大校廵警見其地有光景乃復興葺開寳七年改名寳城寺中允陸公仁旺及弟大卿闕捨園地以益之大中祥符中改額法雲建中靖國元年大卿之孫拜左丞請為功徳院毎嵗度僧一人建炎初金人入冦有三騎至寺主僧道亨不勝憤閉寺門擊殺之尸諸門金人後騎至遂焚寺道亨婺州人在法雲四十年度弟子三十二人寺焚復營葺不少挫未成而卒其後自修契彛繼之乃成道澤又建觀音殿鐘樓經藏往時有重喜者不知何郡人為童子時擁篲掃廊忽渙然有省遂能詩有傑句元豐中居法雲嘗作詩曰地爐無火客囊空雪似楊花落嵗窮拾得斷麻縫破衲不知身在寂寥中本覺寺在縣西北一十五里梅山後唐清泰三年節度經略副使謝思恭捨宅建號静明寺寺有雲峰堂以曾文靖公詩得名亦有曾公手書行記寺後有適南亭可以望海郡牧程給事建陸左丞作記又有子真泉智度寺在縣西北四十五里後唐天成三年建周顯徳元年吳越改旃檀寺大中祥符元年七月改賜今額靈秘寺在縣北五十里梁大同十年將軍毛寳捨宅建㑹昌毁廢大中五年重建寳夀院在縣西三十五里唐大順二年建天禧三年造殿號清化院景徳二年改賜今額寳嚴院在縣西一百二十五里晉開運二年建純一禪師夀塔漢乾祐元年吳越給清化純一塔院額大中祥符元年七月改賜今額奉聖院在縣南二十五里唐開元十六年建為𤣥儼律師度僧戒壇院㑹昌毁廢漢乾祐二年吳越重建改明恩院大中祥符元年七月改賜今額延福院在縣西六十里新安鄉牛頭山之麓晉天福三年置開寳六年錢氏給安國院額大中祥符元年七月改賜今額建炎中廢於火紹興五年重建乾道五年始畢工有石菴惑禪師安禪之地景徳初贈太傅陸公軫與鄉士數人肄業於此嘗遇大雪絶食累日陸公禱山神明日獲二麂焉聞者嘆異及陸公直集賢院來守鄉邦遣衙致祭書堂在寺之西北隅今寺僧猶能識其處牛頭山産石可作假山其小碎者取為盆山尤宜草木皆蔥蒨耐久與崑山所出相埒東坡先生所謂盆山不見日草木自蒼然是也寳夀院在縣西一百二十里唐貞元三年建周廣順三年吳越給永豐院額大中祥符元年改賜今額長夀院在縣東北一十五里晉天福六年鄒彦超建周廣順二年吳越給願果院額大中祥符元年七月改賜今額廣濟院在縣西北五十五里晉天福六年于古福夀院基上建號聖夀院開運元年改嘉宥院大中祥符元年七月改賜今額報恩院在縣西一百二十三里乾徳四年竇珍捨地建號彌陀院大中祥符元年七月改賜今額廣利院在縣西一百二十里清化山開寳九年栁公訓捨宅建吳越給清化西塔院額大中祥符元年七月改賜今額慈恩院在縣西一百二十二里後唐長興二年謝君彦捨地建晉天福七年吳越給永安院額大中祥符元年七月改賜今額延夀院在縣西八十二里後唐天成四年建號普安院大中祥符元年改賜今額等慈院在縣西一百十二里晉天福三年僧道山建號天長院大中祥符元年七月改賜今額資教院在縣西一百二十一里晉天福七年建漢乾祐元年吳越給城山院額大中祥符元年七月改賜今額慶夀院在縣西六十五里開寳七年邵仁造捨山建號烏石院大中祥符元年七月改賜今額集善院在縣西北二十五里太平興國元年建上方院在縣西北九十一里晉天福二年建香林院在縣西四十五里漢乾祐三年建號寳林院治平三年二月改賜今額青蓮院在縣西南七十里唐乾符元年建號蓮華院治平三年二月改賜今額報恩院在縣西三十五里唐乾符三年建崇寧五年重建華藏院在縣西南二十五里唐咸通四年觀察使王龜建號華院治平三年改賜今額安康院在縣西北九十三里後唐長興三年建福安院在縣西北九十二里後唐長興元年於古棲隠寺基上建號資福院治平元年改賜今額保安院在縣西北五十一里晉開運元年建號休寧院治平三月改賜今額安隠院在縣西北一十里隋開皇十三年建唐武徳中重修㑹昌毁廢後唐清泰元年高伯興等重建號安養院治平三年改賜今額崇教院在縣西九十里梁大同元年建尋廢周顯徳五年鎮海軍都指揮使薛温重建號新興塔院治平三年改賜今額東一百步有越王城普香教院在縣西北五十三里乾徳三年於古靈隠寺基上建開寳三年吳越給觀音普聞院額開寳六年改賜今額鷲臺院在縣西四十五里晉乾祐三年建號重臺院治平三年二月改賜今