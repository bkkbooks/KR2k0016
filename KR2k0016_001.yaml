body:
  text: 㑹稽志巻一宋施宿等撰越越在唐虞時禹平水土制九州而越為揚州之域職方氏東南曰揚州其山鎮曰㑹稽釋云㑹稽在山隂舊經云塗山在山隂縣西北禹㑹萬國之所在左傳哀公七年魯大夫曰禹合諸侯於塗山執玊帛者萬國杜預注云塗山在夀春東北説者遂疑塗山非㑹稽今塗山之名有四㑹稽夀春之外復有渝州之塗山杜子美賦禹廟詩者文字音義云嵞音塗山古國名夏禹娶之今之宣州當塗縣也杜預獨指夀春之塗山為禹合諸侯之地宜必有據然按史記夏本紀贊曰禹㑹諸侯江南計功而崩因塟焉命曰㑹稽㑹稽者㑹計也裴駰注引皇覽曰禹冢在山隂㑹稽山上㑹稽山本名苗山在縣南去縣七里越傳曰禹到大越上苗山大㑹計爵有徳封有功更名苗山曰㑹稽家語孔子曰昔禹致羣臣於㑹稽之山防風氏後至禹殺而戮之其骨專車封禪書曰禹封泰山禪㑹稽由是論之禹既合諸侯於㑹稽庸詎知魯大夫所謂塗山非㑹稽與至夏后氏少康封庶子於㑹稽以奉守禹之祀文身斷髪披草萊而邑焉後二十餘世至於允常允常之時與呉王闔廬戰而相怨伐允常卒子勾踐立是為越王舊經云春秋貶之號為於越按春秋定公五年書於越入呉杜預曰於發聲也西漢云太伯初奔荆蠻荆蠻歸之號曰勾呉顔師古云勾呉亦猶於越也太伯至徳初無貶詞特從其俗爾公羊云於越者未能以名通也榖梁范氏注云春秋即其所以自稱者書之然竊有疑焉越於是時猶未預中國㑹盟未嘗與中國通也經書於越入呉非越自稱明矣豈書於經者乃呉王告同盟之詞與哀公二十一年越人始來二十三年魯始使越據此可知且以勾踐為君而種蠡為臣果未能以名通者乎定公十四年呉伐越越子勾踐禦之陳於檇李勾踐患呉之整也使死士再擒焉不動使罪人三行屬劍於頸而辭曰二君有治臣奸旗鼓不敏於君之行前不敢逃刑敢歸死遂自剄也師屬之目越子因而伐之大敗之靈姑浮以戈擊闔廬闔廬傷将指取其一屨還卒於陘去檇李七里夫差使人立於庭茍出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越哀公元年呉王夫差敗越於夫椒報檇李之役也遂入越越子以甲楯五千保㑹稽使大夫種因呉太宰嚭以行成呉子将許之伍員曰勾踐能親而務施施不失人親不棄勞與我同壤而世為仇讎姬之衰也日可俟也介在蠻夷而長冦讎以是求霸必不行矣弗聴三月越及呉平呉越春秋謂呉封地百里於越國語曰勾踐之地南至于句無今諸暨有句無亭北至于禦兒今嘉興有禦兒鄉西漢功臣表兩粤傳有語兒侯東至于鄞西至于姑蔑今太末地也廣運百里勾踐乃與范蠡深謀二十餘年竟滅呉報㑹稽之恥北渡兵於淮以臨齊晉號令中國以尊周室致貢於周周元王使人賜勾踐胙命為伯諸侯畢賀乃徙都琅邪漢書地理志云琅邪越王勾踐嘗治此起觀臺有四時祠呉越春秋亦云越王於此起觀臺周七里以望東海勾踐卒子王鼫與立王鼫與卒子王不夀立王不夀卒子王翁立王翁卒子王翳立王翳遜國逃於巫山之穴越人薫而出之王翳遜國之賢君葢呉太伯之儔也王翳卒子王之侯立王之侯卒子王無疆立按此勾踐至無疆實六世舊經云五世者誤也王無疆時興師伐齊西伐楚與中國爭彊當楚威王之時越北伐齊齊威王使人説越王於是越遂釋齊而伐楚楚威王興兵而伐之大敗越殺王無疆盡取故呉地至浙江北破齊徐州而越以此散諸族子爭立或為王或為君濱於江南海上服朝於楚後七世至閩君摇佐諸侯平秦漢髙帝復以搖為越王以奉越後東越閩君皆其後也㑹稽郡秦始皇二十五年大興兵使王前羽遂定荆江南地降越君置㑹稽郡治呉二十六年初并天下用廷尉李斯議分天下以為三十六郡郡置守尉監郡守掌治其郡有丞尉掌佐守典武職甲卒監御史掌監郡漢興髙皇帝六年以其地封劉賈為荆王黥布反荆王賈死之無後十二年封劉濞為呉王王三郡五十三城孝景帝四年呉王濞反誅乃復為㑹稽郡越絶外傳曰漢孝景五年㑹稽属漢属漢者始并之也舊經云後復属江都國江都王建有罪國除乃更為郡按漢書地理志廣陵國注江都易王非廣陵厲王胥皆都此并得鄣郡而不得呉劉貢父云然則㑹稽不得云屬江都也呉朱育以强記稱且距漢未逺仕本郡門下書佐太守濮陽興問漢封諸侯事而育所對亦止言劉賈為荆王濞為呉王濞誅乃復為郡治於呉亦不及属江都事也前漢志領縣二十六後漢順帝永建四年分浙江以東十四縣為㑹稽郡治山隂東晉為㑹稽國改太守為内史宋武帝永初二年罷㑹稽郡府復為㑹稽郡齊梁陳因之隋為呉州改越州尋罷州為㑹稽郡依漢制置太守以司𨽻刺史相統治唐武徳四年為越州天寳元年復為㑹稽郡乾元元年復改為越州越州越州隋大業置古㑹稽郡也因國為名置刺史焉按漢武帝紀元封五年初置刺史部十三州顔師古曰漢舊儀云初分十三州假刺史印綬有常治所以秋分行部所察六條秩六百石於是乃復禹貢九州之名而増以周之幽并與漢所開之朔方交趾以為十三州也㑹稽自昔常𨽻揚州晉玉羲之為㑹稽内史王述為揚州牧檢校郡事羲之恥之求分㑹稽為越州不果遂稱疾去郡誓墓終身不仕其後至隋而㑹稽卒為越州葢本於此宋齊梁陳㑹稽自為東揚州刺史不復受察於揚州雖寖異古制然猶未至盡廢刺史之職或以刺史行太守事如曰東揚州刺史領㑹稽太守是也隋制舊有兵處刺史帶諸軍事以統之如曰都督㑹稽等郡諸軍事是也或加使持節隋唐而降支郡皆稱刺史但領一州而以州統縣與他州等故又於此置總管府以統其屬州隋文帝初平江南改曰呉州大業中遂改為越州尋罷州置郡以刺史十四人巡察畿外諸州所察六條畧如漢制唐武徳四年復為越州置總管領州如故未久改總管為都督自是改更不常郡則曰太守州則曰刺史其實一也至乾元元年遂為越州大抵越州其實與㑹稽郡同非復如漢十三州之重刺史亦非復古之部刺史但以總管都督御制一道爾紹興府建炎三年十月庚申車駕自杭州巡幸御樓船渡浙江壬辰幸越州四年四月癸未御舟自温台回駐蹕越州明年正月一日改元紹興越州官吏軍民僧道上表乞賜府額昔唐徳宗以興元元年巡幸梁州改梁州為興元府於是朝廷用興元故事改越州為紹興府初車駕幸揚州駐蹕逾年又嘗經郊祀然未嘗建為府則紹興葢特恩也車駕既移蹕臨安首命前參知政事資政殿學士張守知府事故守謝到任表曰矧是肇新府號乆駐蹕聲履勾踐之故棲厲嘗膽抗戈之志想神禹之遺跡服卑宫菲食之勞又謝賜行宫充本府治所表曰廣厦千間已免震凌之患土階三尺尚存簡素之風皆言上駐蹕之久而宫室無所増葺也浙東提㸃刑獄曽㬇舊為史官見日厯所書紹興二年正月車駕移蹕臨安閏四月戊戌詔紹興府行宫復作府治上曰時方艱難若不賜與則須别建賜之所以寛民力也州額初題越州大都督府既賜府額當題云紹興大都督府而右朝奉大夫呉説乃題云大都督紹興府議者或非之歴代屬郡㑹稽郡自漢順帝時還治山隂其所領山隂鄮烏傷餘暨諸暨太末上虞剡餘姚句章鄞章安永寧東候官猶十四縣其地南踰閩越西限浙江東北至海而止提封數千里粤自秦漢常為都㑹晉渡江後三呉之豪請都㑹稽雖不果亦足見當是時㑹稽最號富實常為本根之地故諸葛恢為㑹稽帝謂曰今之㑹稽昔之闗中也宋書史臣曰江左以來根本於揚越又云㑹土帶海傍湖良疇數十萬頃膏腴上地畆直一金鄠杜之間不能比也又袁宏漢紀許子将曰㑹稽富實䇿之所貪以此論之㑹稽自古以富實名者徒以鏡湖之利也今民盗湖為田湖廢幾盡按晉宋間謂㑹稽為㑹土三國志謂呉郡㑹稽為呉㑹二郡張紘謂收兵呉㑹則荆揚可一孫賁傳云䇿巳平呉㑹二郡朱桓傳云部伍呉㑹二郡是也前輩有讀㑹字為都㑹之㑹或者以為不然今姑蘇有呉㑹館葢承其誤後漢末孫䇿略平江左渡浙江自領㑹稽太守䇿卒曹操又表其弟權為㑹稽太守以統江左諸郡三國志云䇿渡浙江以其屬呉景為丹陽太守孫賁為豫章太守孫輔為廬陵太守朱治為呉郡太守而䇿自領㑹稽太守是也孫權謂虞翻曰孤有征討事未得還府卿復以功曹為吾蕭何守㑹稽耳興平四年䇿乃分章安永寧之地置松楊縣呉錄云取松楊木為名又置始平縣改章安曰羅陽縣至呉孫亮太平二年又置臨海縣立㑹稽東部為臨海郡以臨海始平松楊羅陽四縣屬焉於是㑹稽始有屬郡初後漢建安中孫氏分東候官之地立邑即以年號為名曰建安縣據續通典云孫䇿建安十二年立按是時䇿已死又置南平漢興二縣以屬㑹稽南部都尉至孫休永安三年遂割㑹稽南部為建安郡孫皓寳鼎元年又以漢末以來分烏傷太末之地所立新安豐安長山呉寧遂昌永康定陽并烏傷太末凡九縣置東陽郡至晉又分臨海郡之松楊羅陽東陽郡之遂昌凡三縣立永嘉郡乃今處州晉既平呉立東候官為晉安郡分𨽻揚州東晉以㑹稽郡為王國併𨽻揚州宋永初二年正月罷㑹稽郡府遂復為郡孝建元年立為東揚州統㑹稽東陽新安臨海永嘉五郡大明三年以揚州所統六郡為王畿而東揚州直為揚州以豫章王子尚為刺史加都督八年冬復以王畿諸郡為揚州而㑹稽還為東揚州統郡如故永光元年秋八月始改是年為景和元年東揚州併揚州梁普通六年復以㑹稽東陽新安臨海永嘉五郡及建安晉安二郡立東揚州大寳二年湘東王繹承制以陳霸先為都督㑹稽東陽新安臨海永嘉五郡諸軍事東揚州刺史領㑹稽太守承聖三年以陳蒨都督㑹稽十郡諸軍事㑹稽太守陳永定三年改永嘉郡為縉州尋省東揚州併屬揚州又分建安晉安二郡權立閩州天嘉元年以徐度為使持節都督㑹稽東陽臨海永嘉新安新寧信安建安晉安九郡諸軍事鎮東将軍㑹稽太守天嘉三年侯安都破留異東陽平六月以㑹稽東陽臨海永嘉新安新寧晉安建安八郡置東揚州以揚州刺史始興王伯茂為鎮東将軍東揚州刺史光大二年割東揚州晉安郡為豐州隋開皇九年平陳改東陽揚州曰呉州置總管府煬帝大業元年正月廢諸州總管府尋改呉州為越州改東陽郡為婺州又改永嘉郡為處州尋改為栝州而廢臨海郡大業三年四月壬辰改州為郡越州曰㑹稽郡婺州曰東陽郡栝州曰永嘉郡唐武徳四年平李子通改㑹稽郡為越州置總管府改東陽郡為婺州永嘉郡為栝州復故臨海郡為海州復故建安郡為建州又以剡縣立嵊州并析置剡城縣析故句章縣地置姚州鄞州以烏傷縣地為綱縣置綱州并析置華川縣析信安縣置衢州以龍邱縣地置縠州并析置白石縣以縉雲縣地置麗州以松楊縣置松州以桐廬分水建徳三縣置嚴州五年以永嘉縣置東嘉州并析置永寧安固横陽樂成四縣屬焉是嵗改海州為台州七年改總管為都督府廢姚州入餘姚縣來屬廢綱州入烏傷縣更名義烏屬婺州廢嚴州以桐廬縣屬睦州八年廢鄞州以鄮縣來屬廢縠州以白石縣入信安縣廢麗州為永康縣屬婺州廢松州為松楊縣貞觀元年廢東嘉州省横陽永寧二縣以永嘉安固二縣併𨽻栝州廢嵊州以剡縣來屬是嵗始命併省分天下為十道越州督越婺泉建台栝六州𨽻江南道髙宗上元二年又分栝州之永嘉安固兩縣置越州垂拱二年又析婺州之常山信安龍邱復置衢州景雲二年分天下為二十四都督府以統其屬州越州所督不滿十州定為中都督府既而以其權重皆罷之開元二十一年分𨽻江南東道開元二十六年採訪使齊澣奏割鄮縣置明州天寳元年改越州為㑹稽郡温州為永嘉郡而栝州為縉雲郡台州為臨海郡明州為餘姚郡建州為建安郡衢州為信安郡乾元元年復改㑹稽郡為越州縉雲郡為栝州信安郡為衢州永嘉郡為温州餘姚郡為明州東陽郡為婺州臨海郡為台州新定郡為睦州領越睦衢婺台明處温八州治越州𨽻浙江東道大厯十四年廢浙江東道建中元年復置二年復廢貞元三年復置浙江東道領越婺台明衢處温七州而睦州𨽻浙江西道皇朝因之紹興元年升為紹興府所領州如故歴代屬縣前漢志㑹稽郡治呉領縣二十六呉曲阿烏傷毗陵餘暨陽羨諸暨無錫山隂丹徒餘姚婁上虞海鹽剡由拳太末烏程句章餘杭鄞錢塘鄮富春冶回浦舊經云光武改回浦曰章安以冶立東候官分章安立永寧縣通典云永嘉本漢治縣地後漢改為章安續通典云漢書東甌舉國内徙乃以其地為回浦縣屬㑹稽郡後更名章安又以章安之東甌鄉為永寧縣隋為永嘉縣初西漢以粤反覆險阻為後世患遷其民江淮遂虚其地後有逃遁山谷者稍出立為冶縣顔師古注云越王冶鑄之地後又名為東冶縣後漢光武時又曰東候官今閩縣是也言東以别其西如閩縣居候官之東故曰東候官以此又知候官之名已久治之地不一後因其名以為縣也一云秦立胡候之官於此故名通典云後漢分冶地為㑹稽東南二部都尉此為南部都尉東部今臨海是也大抵南至晉安東至章安皆冶縣地詳而言之則閩越為冶而東甌為回浦原其本皆粤地也順帝永建四年陽羨人一作陽羨令周嘉上書以呉越一國周旋一萬一千里以浙江山川險絶求得分置遂分浙江以西為呉郡以東為㑹稽郡三國志呉朱育云永建四年劉府君上書以浙江之北為呉郡㑹稽還治山隂舊經云領山隂鄮烏傷餘暨諸暨太末上虞剡餘姚句章鄞章安永寧東候官十四縣治山隂又分上虞南鄉為始寧縣初平三年分太末縣置新安縣分烏傷南鄉為長山縣興平二年分諸暨之大門村為漢寧縣又分章安之南鄉為松楊縣建安四年孫氏分太末立豐安縣又分信安立定陽縣建安二十三年分太末立平昌縣晉志曰遂昌呉分永寧立南始平縣今之天台又分烏傷之上浦為永康縣分章安立臨海縣改章安為羅陽縣餘暨曰永興縣漢寧曰呉寧縣呉少帝太平二年以㑹稽東部為臨海郡分臨海南始平松楊羅陽四縣屬焉續通典云孫䇿於建安十二年分東候官之地立邑即以年號為名曰建安縣屬㑹稽南部都尉三國志云永安三年以㑹稽南部為建安郡而縣為屬孫皓寳鼎元年分㑹稽為東陽郡以烏傷太末新安豐安長山呉寧平昌永康定陽九縣屬焉而㑹稽領山隂永興諸暨上虞餘姚句章始寧郯鄞鄮十縣晉地道志宋州郡志領縣皆十隋平陳廢山隂永興上虞始寧為㑹稽縣併餘姚鄞鄮入句章縣及剡諸暨統縣四唐武徳四年以剡置嵊州并析置剡城縣析句章之餘姚置姚州析句章之鄞置鄞州七年輔公祐平廢姚州以餘姚縣來屬析㑹稽立山隂縣八年廢鄞州為鄮縣嵊州為剡縣並來屬省山隂縣復入㑹稽凡統縣五垂拱二年復置山隂縣儀鳳二年復置永興縣開元二十六年割鄮縣置明州天寳元年改永興為蕭山縣大厯二年因刺史薛兼訓之奏省山隂縣七年刺史陳少遊復奏置焉貞元元年刺史王密奏置上虞縣元和十年又省山隂入㑹稽縣十年復置梁開平中錢鏐析剡縣立新昌縣皇朝因之領㑹稽山隂蕭山諸暨上虞餘姚剡新昌八縣宣和三年方臘既平七月丁夘詔越州剡縣改名嵊縣與睦州改嚴州歙州改徽州及睦州清溪縣改淳安衢州龍游縣改盈川皆同時也廢州㑹稽郡漢領縣二十六至漢末六朝而降析㑹稽所𨽻縣為郡今為州軍二十四㑹稽一郡獨領漢故縣餘暨諸暨山隂餘姚上虞剡凡六亦可謂盛矣至唐初以州境獨大於它州故析剡縣為剡城縣立嵊州析餘姚縣為姚州武徳七年廢姚州復以餘姚縣來屬貞觀元年廢嵊州復以剡縣來屬廢縣漢順帝時分上虞南鄉為始寧縣隋平陳廢興平二年分諸暨大門村為漢寧縣呉改為呉寧縣寳鼎元年割𨽻東陽郡後復併入諸暨今縣有大門里或云即其地也唐武徳四年析剡為剡城縣武徳七年廢入剡縣乾道八年分諸暨之楓橋鎮為義安縣淳熈元年廢入諸暨縣初户部侍郎方公滋以吏事著一時典藩數十年所至有聲績其置縣雖承史蒋二公之後然卒成之者方公也亦嘗為客言析縣之利它日當愈見不可復併矣然曽未幾時遂為後守所撤取官署等以建僧寺人頗議之至或謂有大姓居邑中方為鎮時擅事權握利柄役服小民無敢與較故大不利於建縣云分野㑹稽禹貢揚州之域周禮保章氏以星土辨九州之地所封封域皆有分星以視吉凶星紀呉越也漢書地理志曰呉地斗分野也今之㑹稽九江丹陽豫章廬江廣陵六安臨淮郡盡呉分也又云粤地牽牛婺女之分野也其君禹後帝少康之庻子封於㑹稽虞翻曰㑹稽上應牽牛之宿當少陽之位東漸巨海西通五湖南暢無垠北渚浙江南山攸居實為州鎮是也然左傳哀公元年呉伍員曰勾踐與我同壤呉越春秋呉王夫差亦曰越之與呉同土連域然則呉越同壤其來尚矣按晉書天文志曰自南斗十二度至須女七度為星紀於辰為丑呉越分曰揚州而㑹稽入牛一度春秋元命苞曰牽牛流為揚州分為越國左傳昭公三十二年夏呉伐越史墨曰不及四十年越其有呉乎越得嵗而吴伐之必受其凶漢永嘉中嵗星熒惑太白聚牛女之間識者以為呉越之分其後孫䇿孫權實有江左晉太元間苻堅将入冦石越對曰今嵗在呉分天道不順已而堅果敗去及陳叔寳将亡有星孛於牽牛以此攷之則斗牛之分呉越同之班固别而言之恐亦未然風俗㑹稽自夏禹巡守㑹諸侯方是時㑹不於嶽而於㑹稽則㑹稽風俗之美固巳可見矣少康之子封於㑹稽葢禹之五世孫也夏都平陽少康中興盛王其封子不於近甸而於㑹稽則㑹稽為當時重地美俗又愈可見故其民至今勤於身儉于家奉祭祀力溝洫乃有禹之遺風焉粤自漢晉竒偉光明碩大之士固已繼出東晉都建康一時名勝自王謝諸人在㑹稽者為多以㑹稽諸山為東山以渡濤江而東為入東居㑹稽為在東去而復歸為還東文物可謂盛矣宋興杜正獻趙清獻繼起全名大節著在國史内相陸左丞與弟祠部以儒術重姚待制以孝行著陳中書以忠節見於宣和靖康之間而李參政傅給事以議論操守顯於建炎紹興以來其他未易悉數故今之風俗好學篤志尊師擇友弦誦之聲比屋相聞不以殖貲貨習奢靡相髙士大夫之家占産皆其薄尤務儉約縮衣節食以足伏臘輸賦以時不擾官府後生亦皆習於孝弟亷遜劉宗向以官遜其弟黄章以官遜其叔父至於士之居喪不為墨衰居處飲食一用古制送終不惑釋氏祭先不徇俚俗者已十餘家往往相慕效以不及為恥其間或有事干謁自衒鬻則其長老必嚴戒之無敢肆者州境并至京地里東至慶元府慈溪縣界一百五十七里西至臨安府錢塘縣界一百三十八里南至台州天台縣界二百九十五里北至海一百一里東西二百三十二里南北四百四十七里至東京二千四百七十里一西京二千八百七十里城郭築城之法城身髙四丈城濶五丈上斂二丈若城身髙三丈五尺則趾濶四丈三尺七寸上斂一丈七尺城外築瓮城去大城十五步瓮城圓一面包城髙厚與大城之數相等也瓮城外鑿壕去大城三十步上施釣橋凡為三壕第一重濶二十步深二丈水深四尺至七尺第二第三重遞減五尺壕之内岸築養馬城去大城五步髙八尺址濶五尺上斂二尺自上三尺開箭牕外至壕垠留一步埋設鹿角大城上每三十步置馬面敵樓各一座女牆相去各十步凡樓櫓之法曰垂鐘版曰拐子木曰伏兔子曰手把腰楅曰鷹架曰踏空版曰扠柱版曰䕶柱版曰猢猻柱曰鄣水版曰馬面曰梯曰馬垠踏道曰娥眉甎踏道曰笆曰草椁曰牛革曰氈曰大小索曰鐵鴈鈎此其名數之大略也並塞控扼之地人人習知故其築城也易為力而堅緻可守内地既非臨邊又郡邑安固無冦盜之虞者久雖興版築或出草創故略書梗槩欲在官者知城池之不可忽如此劉忠顯以其久在兵間身履西陲要害之地至於城壁制度尤其所悉故在㑹稽修葺郡城雖用功不多而冦至可以無恐使他人為之雖有才智亦未必能也羅城周回一十四里步二百五十熈寧中郡守沈立為㑹稽圖其叙如此而舊經云四十三里者非也厥今州城以步計之八千八百二十有八按度地法步三百六十是為一里舉今步數總歸於里亦二十有四餘步百八十八較之圖叙所損六十有二宣和初劉忠顯治城禦方冦嘗稍縮其西隅然則今所損步或者自是時也舊經有云城不為壕今城外故有壕但不甚深廣耳皇祐中有詔濬湟太守王逵始治其事舊經成於祥符不及知也城之四面髙厚之數則舊經大略如之舊經城東面髙二丈四尺其厚三丈西面髙一丈六尺其厚八尺南面髙二丈一尺其厚一丈八尺北面髙二丈二尺其厚二丈六尺故老云後雖間有墮圯尋復繕治舊北面在不能甚加損也城門九東曰都賜門有都賜埭山門之名葢久矣見南史何𦙍傳曰五雲門東南曰東郭門有東郭埭曰稽山門正南曰殖利門有南埭西南曰西偏門有陶家埭曰常喜門州城至此與子城㑹門在其上葢九門之一也正西曰迎恩門北曰三江門凡城東南門有埭皆以䕶湖水使不入河西門因渠漕屬於江以達行在所北門引衆水入於海子城舊經云子城周十里東靣髙二丈二尺厚四丈一尺南面髙二丈五尺厚三丈九尺西北二面皆因重山以為城不為壕塹嘉祐中刁約守越奏修子城記云城成髙二十尺北因卧龍山環屬於南西抵於堙尾凡長九千八百尺城之門有五熈寧中沈立為越州圖序云楊素築子城十里越絶書云越王臣於呉故城北向以東為右西為左小城周三里七十步陸門四水門一呉越春秋云小城周千一百二十步一員三方西北飛翼樓以象天門東南伏漏石竇以象地户陵門四達以象八風又云城南近湖去湖百餘步㑹稽治山隂以來此城即為郡城按今子城陵門亦四曰鎮東軍門曰秦望門曰常喜子城門曰酒務橋門水門亦一即酒務橋北水門是也其南秦望門去湖亦僅百步雖未必盡與古同然其大略不相逺矣由秦望門而入直北曰蓮花橋又北走即府治所也秦望門街之東曰雄節營曰五通廟曰酒務坊曰夏麥倉曰都酒務街之西曰第七營曰第四營曰車水橋巷曰提舉司幹辦公事㕔循城而西曰念三營繇酒務坊而東經豐宜館今為察判㕔三聖廟之前東走酒務橋門繇車水橋巷而西過橋之南有大池曰龍噴池池正方可三十畆池北曰僉判㕔池西曰社壇自此西走踰大郎橋㑹於常喜門蓮花橋北街之東曰司理院西曰卧龍坊繇卧龍坊而西數百步西南走威果營又數百步抵城隍廟路及西園南趨清泠橋出常喜門府治之南左曰提刑司幹辦公事㕔曰作院右曰通判南㕔舊為判官㕔熈寧間張大山新建判官㕔夀樂堂東坡先生為賦詩者即此是也其後至淳熈間以舊通判南㕔為武提刑治所故南㕔遂徙於此繇府治而右手詔亭下少西曰府院曰下馬院繇府治而左頒春亭下東走即鎮東軍門街之北曰簽㕔少東曰通判北㕔南豐曽先生倅越時有卧龍齋見於元豐類藁宣和間禁臣稱龍天君主等字或撤其扁堂亦尋廢桂堂在便㕔之南呉興施宿所建今紳袁尚書起巖書其扁又有緑橘亭亭記顔魯公所書事見碑隂今亭與石皆不存街南曰通判東㕔此即舊所謂通判南㕔今為添差通判㕔學校宋興學校之制皆因前代惟州郡自唐末五代喪亂學宫盡廢有司廟祭先聖而已猶有廢而不舉者仁宗皇帝天聖初賜兖州學田又命藩郡皆得立學其後列郡多亦有請悉可之稍増賜之田如兖州由是學校殆遍天下然法制猶未具也慶厯中范仲淹輔政議興學校本行實以取士於是宋祁等合議請士皆土著而教之於學校然後州縣察其履行則學者修飭矣乃下詔州若縣皆立學本道使者選部屬官為教授三年而代官不足取於鄉里有學業者士須在學三百日乃聴預秋賦凡隠匿喪服或嘗犯刑或虧孝弟有状或兩犯法經贖或為鄉里害或假户籍或父祖犯十惡或工商雜類或嘗為僧及道士皆不得與士齒有司方奉行㑹仲淹罷於是學校之令皆弛然州郡多自置學聘名儒主之若李覯孫復石介姜潛王令輩其尤著者也神宗熈寧四年罷詩賦帖經墨義士各占治詩書易周禮禮記一經兼論語孟子義而論䇿如故然亦未遑學校也終神宗一朝三舍之法止行於太學而已崇寧初始議頒太學三舍之法於天下京師置辟雍諸路置提舉學事州並置教授提學嵗中遍行諸路通判嵗中遍行諸縣貢士皆給驛劵然猶止以科舉三分之一為貢士大觀末始盡罷科舉悉由學校陞選辟雍備置長貳以下如太學引恵民河以為璧水植木森茂為舍千八百間然當時議者以謂學制太嚴士失私養故相張商英以為利近不利逺利富不利貧利少不利老又因詔有司講求元豐學法中書舍人蔡肇言於衆中曰既行元豐安用辟雍肇雖以此被黜然議者皆然之至宣和三年始罷辟雍省其司成以下官天下舍法皆罷復科舉取士然齋課以八日試經義十八日試論二十八日試䇿鼓之節昕三昬四講五食六陞堂七還齋八集九學門以昕皷啟昬皷闔學之列職以學正舉行學規學錄佐正糾不如規者齋諭佐長導諭諸生及學規齋規行罰各五等今尚有遵行者若釋奠之制則有六一曰時日謂春秋上下日二曰齋戒謂散齋三日致齋二日三曰陳設謂前三日設次前一日坤闕之類四曰省饌五曰行事六曰樂請行事凝安之樂作三成止詣罍洗門安之樂作詣文宣王神位前明安之樂作洗爵畢再詣神位前成安之樂作今尚不廢惟樂多闕矣議者謂方三舍之法行士子無敢以秃巾短後之服行道上者遇長上無敢不避道拱揖者茶肆酒壚無敢輒遊者市人不逞者醉者或凌嫚之士子皆避去無與較者則亦不可以為無補於教養惟痛禁元祐學術凡曽上書直言在籍者皆入自訟齋非自陳改過不許預舍選賢者至恥於入學又學規以訕謗朝政為第一等罰之首非古者不毁鄉校之義天下至今歎息云學在府南五里三十六步教授直舍在學之東縣學縣學昔者所在或有之至慶厯興學始議州縣皆立學而不果行崇寧中乃著為令凡縣學以時選試取其尤者升州學為外舍生凡縣學設學長一人視州學教授諭一人直學一人齋長齋諭各一人長諸生選特奏名進士無則選老成有經行者充生員大縣五十人次縣四十人小縣三十人其教養選試之法同州學至宣和二年與州學舍法俱罷然至今天下縣亦多有學而㑹稽諸邑為盛㑹稽縣學在縣南竹園巷山隂縣學在縣南柴場坊嵊縣學在縣西一百步舊經云至聖文宣王廟在縣東南一百步學始創於縣令晉陵丁寳臣實慶厯八年也臨川王平甫安國為記今不存獨寳臣所撰碑及興學五言尚在宣和中盜起焚毁建炎元年縣令應彬建孔子殿後三年蜀郡范仲将始置廊廡又明年淄川姜仲開始大之汝隂王性之銍為之記乾道癸已今丞相謝公深甫尉剡時與主簿栝倉江濤増葺仍立諸生課試之法甚備有邑人周汝士記諸暨縣學在縣西淳熈六年知縣李文鑄建舊縣西有夫子廟唐天寳中令郭密之遷於長山下晉天福庚子令趙湜移縣東一里皇朝景祐四年尉劉述重建慶厯四年始詔州縣立學明年令冦仲温増造頗為全備李君以其地嵗有水患故遷焉蕭山縣學在縣南門外二十步舊經在縣西三十步餘姚縣學在縣東一里五十步元豐元年知縣事黄鑄立建炎兵燬惟學獨全余端禮趙子肅趙公豫相繼新之慶元五年施宿剏直舍為致齋考試之地築牆垣作外門買田置書甚備有尚書樓公鑰記上虞縣學在縣東南六十五步新昌縣學在縣東南社稷社以勾龍配稷以后稷配自京師達於郡邑嵗再祭春以春社秋以秋社前一月檢舉闗所屬前祭三日散齋宿於正寝不弔喪不問疾不作樂不行刑不書獄不與穢惡致齋一日質明赴祠所凡祭外皆禁前祭二日設行事執事官次牽牲詣祠所祭日丒前五刻設神位於壇上席以莞陳幣篚籩豆俎簠簋罍洗犧尊象尊太尊山尊著尊壺尊皆加冪前祭一夕晡後省饌祭日丒前五刻行事官等各就次掌饌者實饌贊禮者引初獻省視陳設乃各就次易祭服以次行二獻行禮禮畢引初獻飲福受胙還次亞獻以下皆受胙再拜送神瘞幣乃退此其大畧也其詳有司存焉方政和間頒大成樂於天下祭社稷皆有樂贊者請初獻行禮則寧安之樂作八成止引詣壇盥洗則正安之樂作詣神位前則嘉安之樂作送神則寧安之樂復作一成止自建炎紹興以後樂器多亡工亦不敢習矣三代之社所謂以松以柏以栗先儒以為立社各以所宜木按齊有櫟社楚有枌榆社正與先儒之說合今㑹稽惟樟楊楊木種多此一種名松楊二木最夀且茂神祠梵字及民廬往往有之或至數百年庇地數畆竊意社稷壇壝之傍皆當種藝以合所宜木之意社在府城南二百九十步諸縣社稷古者諸侯建國各有社稷雖曹滕邾莒五十里之國皆與齊晉符不獨諸侯也有民人則有社稷矣故一邑之小亦有之魯之費楚之豐皆邑之有社者也而國朝之制縣社稷祠祭與郡等㑹稽八邑皆有社稷焉㑹稽縣社在縣南禮禋坊慶元二年知縣事王時㑹重修有記山隂縣社在縣南柴場嵊縣社在縣北一百一十五步舊經云在縣西南一十五步諸暨縣社在縣北舊社稷壇在縣南三里政和間令陳瑞禮依新式増築壇五風雲雷雨師附焉淳熈丙申令熊克别築五壇於縣西墉之外慶元四年令趙彦權始遷於此蕭山縣社在縣西一百步舊經在縣南二百步餘姚縣社在縣西二里舊在縣南一里上虞縣社在縣西一里二十五步舊在縣南四十步新昌縣社在縣西南一里貢院貢院在城西錦鱗坊卧龍之隂郡治之西北㑹稽東南㑹府而試士舊無定處太師史公浩得地於爽塏丞相蒋公芾繼之銳欲鳩僝㑹奉祠去乾道九年資政殿學士錢公端禮始克成之東西重廡為屋百楹考閱有㕔宴止有房謄書糊名兩舍對峙中門外門規制屹然選舉盛觀此邦自承平時所未見也既成迺合在官在泮之士賦詩讌飲以落之而禮部尚書胡公沂又為之記距今三十年矣聞之耆舊住舍法時郡學西北隅是為試所迨復科舉更寓諸暨大雄寺城東延慶寺最後寓光相寺亡慮十數自貢院之新士皆樂其宏敞然近嵗桉几猶櫛比葢㑹稽儒學日盛而試者日寖多矣毎舉以名上禮部一十有九又用近制别取可補上庠者在嵗辛酉所取至一百四十有八人云教場教閱之法有二一曰營法二曰陣法所謂營法者六軍營索四十有八前軍赤後軍黒左軍青右軍白左虞候黄右虞候綠經索五百尺圍索二百尺街索五十尺定營工二十四人内十二人掌經索圍索各一又十二人掌經索街索各一並以木杙自隨子壕砦六人執隨營索色旗一木椎一都壕砦一人掌營盤一椎一杙一黄天王旗一據營地中然後子壕砦乃分執其事設幙布車浚壕立柵所謂陣法者其别有六一曰方陣四鼓舉白旗則為之二曰圜陣五鼓舉黄旗則為之三曰曲陣一鼓舉黒旗則為之四曰直陣三鼓舉青旗則為之五曰銳陣一鼓舉赤旗則為之六曰互陣互變視大将黄旗周麾則為之此教閱之大畧也大将之誓辭則曰今與将士同習戰陣明視旗麾審聴金鼓出入分合坐作進退不如令者軍有常刑自承平以來帥守入教場多帽帶皁衫如古輕裘緩帶之意亦或巾幘戰袍犀玊束帶略與将士同服以示臨戎與常日不同各一說也然自副總管以下名位雖髙皆持梃趨庭以軍禮見尹龍圖洙守平凉狄樞密青時為副部署平日相與甚厚惟教閱及出邊則狄公一切以偏裨自處尹公或辭之狄公則曰今法所云一階一級全歸服事之儀十字自祖宗以來著之孰敢忽哉蘇端明軾守中山有王光祖者為副總管春大閱蘇公常服坐帳中将吏則皆戎服奔走執事光祖自謂老将恥之稱疾不至蘇公召書吏将奏劾之光祖震恐立出竊謂凡為元帥者當法蘇公而亞将雖貴亦當以狄公為法以光祖為戒也教場在府南五里一百五十步古城古城在會稽南三里餘地理志云越王勾踐自呉還范蠡所築既臣於呉故城北向街衢市邑悉在城北呉越春秋曰呉封地百里於越東至炭瀆西止周宗南造於山北薄於海越王曰寡人欲築城立郭分設里閭欲委屬於相國於是范蠡乃觀天文擬法於紫宫築作小城周千一百二十步一員二方西北立為飛翼之樓以象天門東南伏漏石竇以象地户陵門四達以象四一作八風外郭築城而缺西北示服事呉也越絶云山隂大城者范蠡所治也大城周二十里七十二步不築北面滅呉以後徙治姑胥臺外傳云蠡築陸門三水門三缺西北圖經云城南近湖百許步㑹稽治山隂以來此城即為郡城其齋㕔廊省門閤相傳是范蠡遺制有五官廨東齋督䕶開黄閣雙木闕夾道闕樓内有築土傳云漢時載長安土所為闕北有雷門勾踐舊門也重闕二層勾踐小城越絶云山隂城也周二百二十三步陸一作木門四水門一今倉庫是宫臺一作室處也周六百二十步柱長三丈五尺三寸圖經作三丈髙三尺霤髙丈六圖經作二丈七尺宫有百尸髙丈二尺五寸寰宇記故城勾踐小城山隂是也東郭外南小城越絶云勾踐冰室去縣三里此下言縣凡皆山隂勾踐食於冰厨一曰冰室者所以備終也陽里城越絶云范蠡城也西至水路水門一陸門二北陽里城越絶云大夫種城也取土西山以築之徑百九十四步名為南安㑹稽山上城越絶云勾踐與呉戰大敗棲其中因以下為牧魚池其利不租舊經越王城在縣東南一十里勾踐為夫差所敗以甲楯五千保於此城也十道志云城天門也天門當閉開必致虎嘗觀呉之勝越越雖大敗猶以甲楯五千保險拒之故得不亡此與漢伐宛無異宛以得存者亦以中城不下故也豈獨以納賂請盟而得存哉及呉之亡也乃束手請如越之事呉者事越豈可得哉夫差非能存亡國勾踐亦非忍於滅呉各因其勢而已故表出之為後世守國者之戒㑹稽山北城越絶云子胥浮兵以守城是也舊經呉王城在㑹稽縣東一十里夫差圍勾踐於㑹稽山伍員築此城以屯兵苦竹城越絶云勾踐伐呉還以封范蠡子其僻居徑六十步因為民治田塘長千五百三十三步其冢名土山范蠡苦勤功篤故封其子於是去縣十八里舊經在山隂縣西南二十九里侯城舊經云在㑹稽縣東五十八里史記云夏后氏少康封子無餘於越所都即此城也越王城舊經云在縣西南四十七里舊經越王墓有古城村今城雖不可攷然地名猶曰古城也故剡城在嵊縣四十五里唐武徳四年置嵊州及剡城縣八年廢蕭山越王城在縣西九里夏侯曽先地志云呉王伐越次查浦越立城以守查呉築城於浦東以守越以越在山絶水乃贈之以鹽越山頂有井深不可測廣二丈餘中多魚乃取鯉一雙以報呉呉知城中有水遂解軍而去其山四旁皆髙隠然有城塹遺址其中坦平井泉湛然西陵城在蕭山縣西一十二里皮光業呉越武肅王廟碑云漁浦黿石翼張下營蕭山西陵鱗次列砦則西陵即王屯兵之所今城基在明化寺之南居民猶有得其斷磚遺甓者初武肅王既都錢塘僭名西都以為西陵非吉語遂改曰西興云嵩城在上虞縣西北六十里其城斷絶横亘數里乃古壘也晉史載安帝隆安間孫恩自海攻上虞朝廷遣劉牢之袁崧築扈瀆壘沿海備恩嵩城之名當始於此簽㕔簽㕔舊名都㕔在儀門東南都㕔葢幕職官聨事合治之地帥藩則通判亦在焉在祖宗時郡有簽署嘉祐末以英宗嫌名改為簽書判官公事判官掌書記推官支使是為幕職日集於都㕔錄事司户司法司理參軍是為曹官各有職業自國初以來雖小有増損大槩不越此崇寧四年始命州縣倣尚書省六部為六案曰士案户案儀案兵案刑案工案而常平免役案知雜案開折司皆如故政和三年因之遂行分曹建掾之法三京司錄事一員司士曹事司户曹事司儀曹事司兵曹事司刑曹事司工曹事各一員五曹各置掾一員惟刑曹三員二員推鞫一員議法大藩至小郡軍監以次減省凡十等最下六曹共止三員而司錄及掾皆不置然天下増闕猶五百有竒吏額増三之一建炎元年始悉罷曹掾而幕職以下悉如祖宗舊制吏額亦汰省復其故先是宣和二年懐安軍奏今尚書省公相㕔改作都㕔内外都㕔並行禁止欲将本軍都㕔以簽㕔為名詔從之且命諸路依此此簽㕔得名之始也府廨府治據卧龍山之東麓是為鎮東軍節度唐制越州舊號義勝軍後改為威勝軍乾寧三年曰鎮東軍即子城之東以為軍門榜曰鎮東軍呉郎中說書㕘政王公綯立居府治之東東向大河即舊經所謂簟膠河也橋曰府橋橋之北曰恵風亭今為公庫酒肆直恵風亭北曰東亭今曰蓬萊館古以為餞客之地唐人如宋考功輩有東亭詩史魏公改築因更名然邦人猶謂之府庫亭由軍門而西百二十三步折而北曰譙門榜賜大都督紹興府闕呉郎中說書王文公皇祐中於此題東望詩云越山長青水長白越人長家山水國建炎二年翟公巽始制漏器篆銘其上直譙門曰儀門或云其下即謝夷吾墓夷吾知時将亂戒子弟懸棺塟焉直儀門曰設㕔紹興元年九月髙宗駐蹕㑹稽以州治為行宫㑹當郊祀之嵗乃行明堂大禮即以設㕔為明堂前期下詔有曰朕将來宗祀明堂遵用皇祐二年四月詔書合祭天地並配祖宗葢以太祖太宗配上帝一時緜蕝之儀實在此地焉舊經云晉太元中謝輶為郡守掘郡㕔柱下深八尺得古銅罍可容數斗封題作越王字甚分明是今𨽻書輶以范蠡厭勝之術遂埋之今不識處㕔西壁有顔魯公書康希銑斷碑王荆公集呉長文新得顔魯公壊碑詩云魯公之書既絶倫嵗久更為時所珍王平甫詩云呉卿獲此喜驚座朝昬把玩過明珠是也設㕔之後曰蓬萊閣元㣲之州宅詩云我是玉皇香案吏謫居猶得住蓬萊蓬萊之名取此故錢公輔詩云蓬萊謫居香案吏此語昔自㣲之始後人慷慨慕前修髙閣雄名由是起程給事公闢為守時秦少游猶未第來客焉數登蓬萊賦詩有次公闢韻云林聲槭槭動秋風共躡丹梯上卧龍路隔西陵三兩水門臨南鎮一千峯湖吞碧落詩爭發塔湧青冥畫幾重非是登髙能賦客可憐猿鶴自相容張伯玉州宅詩序云越守王工部至和中新葺蓬萊閣成畫圖來乞詩工部乃王逵也設㕔之東為便㕔元微之夸州宅詩云四面常時對屏障一家終日在樓臺又云繞閣烟嵐新雨後滿山樓閣上燈初便㕔之後曰使宅建炎四年車駕再幸越州以州宅充行宫紹興元年移蹕臨安賜行宫充本府治所使宅之前曰清思堂張伯玉清思堂晝坐詩云白雲無事不肯去幽鳥有時還自來熈寧間趙清獻公亦有題清思堂詩今堂乃獻公便㕔重屋之後畧無所見以前人題咏考之恐非今處便㕔之東曰青隠軒政和間王公仲巖作直青隠軒之北曰招山閣閣之下曰棣蕚堂洪内翰邁所名且自為記初内翰兄文恵公嘗守越取綸誥中語名之閣之東為複道以陟山麓曰采菊少北有亭曰晚對便㕔之東少下為府簽㕔唐崔元翰判曹食堂壁記云越號中府連帥監六郡督諸軍設官之制劇曹皆二人紀綱之職亦分為兩以統其事食堂之制陋而不稱太子少師皇甫公來臨是邦始更而廣之後二嵗御史大夫崔公又為之備食器増食物云按題名越帥皇甫温崔昭也葢大厯九年至十一年儀門之外兩廊為吏舍儀門之西南嚮列署五為安撫司簽㕔唐呉蛻鎮東軍監軍使院記曰元帥彭城王平難帝命兼而鎮之上将軍汝南周公監䕶之乃命軍吏揆日經始累月工畢重門列楹顯敞豐博東廂西序窈窕深邃越城之中稱為一絶時天復元年辛酉為設厨為省馬院為甲仗庫為公使錢庫公使錢庫之西北為公使酒庫㕔之兩廊為複屋曰走馬閣東廊為使宅之便門西廊曰架閣庫西廊之西曰軍資庫直軍資庫北曰清白堂范文正公清白堂記府治據卧龍山南之北上有蓬萊閣閣之西有涼堂堂之西有巖巖之下獲廢井泉清而色白淵然丈餘引不可竭因署其堂曰清白堂又建亭其側曰清白亭時康定元年二月也紹興初髙宗迴蹕越州昭慈聖獻皇后崩於西殿西殿即今清白堂也清白堂之西曰賢牧堂以記攷之當是清白堂之故址越人即以建范文正公祠堂者也其後史文恵公以趙清獻公並祀至方侍郎滋又以丞相朱忠靖公趙忠簡公㕘政張公守内翰翟公汝文配焉賢牧堂之西北曰極覽亭淳熈七年㕘政李公彦穎建極覽亭西南曰白涼館白涼館西南曰城隍廟由蓬萊閣而北少西焉經井儀堂故址錢公輔有井儀堂記登卧龍山絶頂曰望海亭沈立越州圖序云刺史之居蓬萊閣望海亭東齋西園皆讌樂之最者舊經飛翼樓在州西三里髙一十五丈范蠡所築以壓强呉也今望海亭即其遺址飛翼一作龍翼輿地志云種山有大夫種墓後潮水穴山失其尸今山西缺處是也故元微之望海亭詩云嵌空古墓失文種兀怪石疑防風是也刁約記云祥符末州将髙公紳植五桂於亭前易其名曰五桂後四十五年予假守訪舊迹亭與桂俱廢乃廣故基縱横増四丈餘而亭始葺以元㣲之嘗有此亭詩復名曰望海時嘉祐辛丑仲冬既望由蓬萊閣而西曰崇善王廟卧龍山神祠也梁貞明三年呉越武肅王奏立直使宅之北曰望􅋖亭紹熈甲寅趙侍郎不流所建南依巖石北望梅山及海際諸山望􅋖者以梅福嘗隠故名之使宅之東北曰觀風堂曹徽猷泳所建由觀風堂而北少東焉曰觀徳亭王尚書希吕所建習射於此始曰堵如王給事信為守書今額改焉或云即越王臺故址舊經云越王臺在種山東北唐李垂詩云越王臺上少晴烟竇鞏詩云鷓鴣飛上越王臺由觀徳亭而西歴桃蹊梅塢出使宅之北南走城隍廟下為西園便門西園府西園之新葢自樂安公蒋堂初景祐三年冬公實始來數月政成郡以無事迺闢金山神祠作正俗亭以淫祀斥其神即其祠以建亭既又為曲水閣鑿渠引湖水入屈折縈紆激為湍流䦜臨其上有流觴亭茂林亭並取永和蘭亭故事後六年而向公傳式來時有綠波亭此亭前所未見始見於向公詩又於城上起望湖樓按向公淥波亭詩云城上興崇構林端露半梯注云園枕郡城予因建樓其上以望湖山也間又有清曠亭見郡人齊唐詩耆舊云在城隍自是以後扁榜位置更易不常莫得盡攷而西園如故也今西園有飛葢堂不詳其始舊榜云宣和書學博士徐兢書堂後有池曰王公池池繇太守王逵而名園故有池方錢氏有國時分守子弟窮極僣假有後庭棹謳鳬鴈之樂實起於池中其後稍堙於是王公之來因浚城隍始復闢之泓渟澄涵皎若墜鏡自是為竒觀矣池北有亭曰漾月堂之前四亭對峙史文恵公所建者冬瑞春榮秋芳夏䕃直堂之南為橋橋外有亭曰水竹循橋而西有數逕詰屈相通於竹叢亂石間得立石如里堠者二及其上所紀亭宇亦皆史公所建者茂林鄉蘭亭里東流杯岩西右軍祠南脩竹塢北敷榮門佳山鄉鵝池里東清真軒西崇峻菴南騁懐亭北曲水曲水之東欄楯相接若閣道者曰恵風閣繇恵風歴清真西南登城亭曰列翠列翠以北曰華星亦城上亭多無扁不俱載葢今園燕休則飛葢堂最勝觴詠曲水最勝登覽之勝則列翠矣㑹稽志巻一
